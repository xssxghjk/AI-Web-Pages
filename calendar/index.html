<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Serif+Text:ital@0;1&display=swap">
  <script src="../nav.js"></script>
  <script src="../activity-calc.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1c1814;
      --surface: #252018;
      --surface2: #2e271d;
      --border: #3a3025;
      --border2: #4a3e2e;
      --accent: #c4864a;
      --accent-dim: rgba(196,134,74,0.10);
      --text: #e8dfd0;
      --muted: #9a8a76;
      --muted2: #b5a48e;
      --muted-2: #5a4e40;
      --upcoming: #d4924a;
      --upcoming-bg: rgba(212,146,74,0.10);
      --upcoming-border: rgba(212,146,74,0.25);
      --ongoing: #7ab87a;
      --ongoing-bg: rgba(122,184,122,0.10);
      --ongoing-border: rgba(122,184,122,0.25);
      --past: #7a8a9a;
      --past-bg: rgba(122,138,154,0.10);
      --past-border: rgba(122,138,154,0.22);
      --planning: #5ab4cc;
      --planning-bg: rgba(90,180,204,0.10);
      --planning-border: rgba(90,180,204,0.25);
      --fab-event: #a07ae8;
      --fab-event-bg: rgba(160,122,232,0.10);
      --fab-event-border: rgba(160,122,232,0.25);
      --local-event: #d4697a;
      --local-event-bg: rgba(212,105,122,0.10);
      --local-event-border: rgba(212,105,122,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Serif Text', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 4px 4px, 6px 6px;
      background-position: 0 0, 2px 2px;
    }

    /* ── HERO ── */
    .hero {
      padding: 2rem 1.5rem 1.5rem;
      text-align: left;
      border-bottom: 2px solid var(--text);
      position: relative;
      z-index: 1;
    }
    .hero-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .hero-inner .cal-export-btn { margin-left: auto; }
    .hero h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }
    .hero p {
      color: var(--muted);
      font-size: 0.9rem;
      font-style: italic;
    }

    /* ── MAIN ── */
    .main {
      width: 100%;
      max-width: 1000px;
      margin: 1.75rem auto;
      padding: 0 1.25rem 4rem;
      position: relative;
      z-index: 1;
    }

    /* ── CALENDAR NAV ── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      gap: 0.75rem;
    }
    .cal-nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: 2px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .cal-nav-btn:hover { border-color: var(--text); color: var(--text); background: var(--surface); }
    .cal-month-label {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    /* ── CALENDAR GRID ── */
    .cal-dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 3px;
    }
    .cal-dow {
      text-align: center;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted2);
      padding: 0.25rem 0 0.5rem;
      font-family: 'DM Serif Text', Georgia, serif;
    }

    /* Each calendar week is a wrapper containing the day cells + floating trip bars */
    .cal-week-wrapper {
      position: relative;
      margin-bottom: 3px;
    }
    .cal-week-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .cal-day {
      position: relative;
      border-radius: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.3rem 0.35rem 0.25rem;
      transition: border-color 0.15s;
    }
    .cal-day.empty {
      background: transparent;
      border-color: transparent;
    }
    .cal-day.today { border-color: var(--accent); background: var(--accent-dim); }
    .cal-day.has-trip { border-color: var(--border2); }
    .cal-day:not(.empty) { cursor: pointer; }
    .cal-day:not(.empty):not(.today):hover { border-color: var(--local-event-border); background: rgba(212,105,122,0.04); }
    .cal-day-num {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted2);
      line-height: 1;
    }
    .cal-day.today .cal-day-num { color: var(--accent); }
    .cal-run-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--ongoing);
      margin: 2px auto 0;
    }

    .cal-trip-bar {
      position: absolute;
      left: calc(var(--c) * ((100% - 18px) / 7 + 3px));
      width: calc(var(--s) * ((100% - 18px) / 7 + 3px) - 3px);
      border-radius: 2px;
      padding: 0 0.3rem;
      font-size: 0.6rem;
      font-weight: 700;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: filter 0.15s;
      overflow: hidden;
      font-family: 'DM Serif Text', Georgia, serif;
    }
    .cal-trip-bar:hover { filter: brightness(0.88); }
    .cal-trip-bar .bar-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cal-trip-bar.overflow-left  { border-top-left-radius: 0; border-bottom-left-radius: 0; border-left: none; }
    .cal-trip-bar.overflow-right { border-top-right-radius: 0; border-bottom-right-radius: 0; border-right: none; }

    .cal-trip-bar.s-upcoming  { background: var(--upcoming-bg);  color: var(--upcoming);  border: 1px solid var(--upcoming-border); }
    .cal-trip-bar.s-ongoing   { background: var(--ongoing-bg);   color: var(--ongoing);   border: 1px solid var(--ongoing-border); }
    .cal-trip-bar.s-past      { background: var(--past-bg);      color: var(--past);      border: 1px solid var(--past-border); }
    .cal-trip-bar.s-planning  { background: var(--planning-bg);  color: var(--planning);  border: 1px solid var(--planning-border); }
    .cal-trip-bar.s-fab-event { background: var(--fab-event-bg); color: var(--fab-event); border: 1px solid var(--fab-event-border); }
    .cal-trip-bar.s-local-event { background: var(--local-event-bg); color: var(--local-event); border: 1px solid var(--local-event-border); }

    /* ── LEGEND ── */
    .cal-legend {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .cal-legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      color: var(--muted2);
      font-style: italic;
    }
    .cal-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 1px;
      flex-shrink: 0;
    }
    .cal-legend-dot.s-upcoming  { background: var(--upcoming); }
    .cal-legend-dot.s-ongoing   { background: var(--ongoing); }
    .cal-legend-dot.s-past      { background: var(--past); }
    .cal-legend-dot.s-planning  { background: var(--planning); }
    .cal-legend-dot.s-fab-event { background: var(--fab-event); }
    .cal-legend-dot.s-local-event { background: var(--local-event); }

    /* ── SWIPE VIEWPORT ── */
    .cal-viewport {
      position: relative;
      overflow: hidden;
    }
    .cal-viewport > div {
      will-change: transform;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .main { padding: 0 0.25rem 2rem; margin-top: 0.5rem; }
      .cal-dow { font-size: 0.55rem; }
      .cal-day-num { font-size: 0.65rem; }
      .cal-trip-bar { font-size: 0.5rem; padding: 0 0.2rem; }
      .cal-month-label { font-size: 0.95rem; }
      .hero { padding: 1.25rem 0.75rem 1rem; }
      .hero h1 { font-size: 1.9rem; }
    }

    /* ── TWO-MONTH DESKTOP LAYOUT ── */
    .cal-panel-label {
      display: none;
    }
    @media (min-width: 768px) {
      .main { max-width: 1400px; }
      .cal-two-month-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
      }
      .cal-panel-label {
        display: block;
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 1rem;
        font-weight: 700;
        font-style: italic;
        color: var(--text);
        margin-bottom: 0.6rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.4rem;
      }
    }

    /* ── FAB EVENT POPUP ── */
    .fab-popup {
      position: fixed;
      z-index: 500;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 3px;
      padding: 0.8rem 0.85rem;
      min-width: 210px;
      max-width: 270px;
      box-shadow: 0 6px 24px rgba(26,22,16,0.15), 0 2px 6px rgba(26,22,16,0.08);
      visibility: hidden;
      opacity: 0;
      transform: scale(0.92) translateY(-4px);
      transform-origin: top left;
      pointer-events: none;
      transition: opacity 0.16s ease, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), visibility 0s linear 0.2s;
    }
    .fab-popup.open {
      visibility: visible;
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
      transition: opacity 0.16s ease, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), visibility 0s linear 0s;
    }
    .fab-popup-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.15rem;
    }
    .fab-popup-dates {
      font-size: 0.7rem;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 0.65rem;
    }
    .fab-popup-actions {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .fab-popup-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.6rem;
      border-radius: 2px;
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
      font-family: 'DM Serif Text', Georgia, serif;
    }
    .fab-popup-btn:hover { border-color: var(--muted); background: var(--surface2); }
    .fab-popup-btn.p-event { color: var(--fab-event); border-color: var(--fab-event-border); background: var(--fab-event-bg); }
    .fab-popup-btn.p-event:hover { filter: brightness(0.9); }
    .fab-popup-btn.p-prep { color: var(--accent); border-color: var(--upcoming-border); background: var(--upcoming-bg); }
    .fab-popup-btn.p-prep:hover { filter: brightness(0.9); }
    .fab-popup-btn.p-upcoming { color: var(--upcoming); border-color: var(--upcoming-border); background: var(--upcoming-bg); }
    .fab-popup-btn.p-upcoming:hover { filter: brightness(0.9); }
    .fab-popup-btn.p-ongoing  { color: var(--ongoing);  border-color: var(--ongoing-border);  background: var(--ongoing-bg);  }
    .fab-popup-btn.p-ongoing:hover  { filter: brightness(0.9); }
    .fab-popup-btn.p-past     { color: var(--past);     border-color: var(--past-border);     background: var(--past-bg);     }
    .fab-popup-btn.p-past:hover     { filter: brightness(0.9); }
    .fab-popup-btn.p-planning { color: var(--planning); border-color: var(--planning-border); background: var(--planning-bg); }
    .fab-popup-btn.p-planning:hover { filter: brightness(0.9); }

    /* ── IFRAME MODAL ── */
    .iframe-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 600;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      visibility: hidden;
      transition: transform 0.42s cubic-bezier(0.32,0.72,0,1), visibility 0s linear 0.42s;
    }
    .iframe-modal-overlay.open {
      transform: translateY(0);
      visibility: visible;
      transition: transform 0.42s cubic-bezier(0.32,0.72,0,1), visibility 0s linear 0s;
    }
    .iframe-modal-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0 1rem;
      height: 48px;
      background: rgba(250,247,242,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .iframe-modal-back {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.35rem 0.7rem;
      border-radius: 2px;
      font-size: 0.8rem;
      font-weight: 600;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
      font-family: 'DM Serif Text', Georgia, serif;
    }
    .iframe-modal-back:hover { border-color: var(--text); }
    .iframe-modal-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.85rem;
      font-weight: 700;
      font-style: italic;
      color: var(--muted2);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .iframe-modal-frame {
      flex: 1;
      border: none;
      width: 100%;
      display: block;
      background: var(--bg);
    }

    /* ── DAILY REPORT EXPORT ── */
    .cal-export-btn {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.28rem 0.6rem;
      border-radius: 2px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.62rem;
      font-style: italic;
      white-space: nowrap;
    }
    .cal-export-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    /* Center month label even with asymmetric side groups */
    .cal-nav { position: relative; }
    #cal-month-label { position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }

    /* ── REPORT MODAL ── */
    .dreport-overlay {
      position: fixed;
      inset: 0;
      z-index: 700;
      background: rgba(28,24,20,0.84);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.18s ease, visibility 0s linear 0.18s;
    }
    .dreport-overlay.open {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.18s ease, visibility 0s linear 0s;
    }
    .dreport-modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 3px;
      padding: 1.3rem 1.45rem 1.1rem;
      width: min(340px, calc(100vw - 2rem));
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      transform: scale(0.9) translateY(-8px);
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }
    .dreport-overlay.open .dreport-modal { transform: scale(1) translateY(0); }
    .dreport-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 700;
      font-style: italic;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .dreport-sub {
      font-size: 0.74rem;
      color: var(--muted);
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 1rem;
    }
    .dreport-date {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 2px;
      color: var(--text);
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.84rem;
      padding: 0.45rem 0.7rem;
      margin-bottom: 0.9rem;
      color-scheme: dark;
    }
    .dreport-date:focus { outline: none; border-color: var(--accent); }
    .dreport-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }
    .dreport-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 2px;
      padding: 0.38rem 0.75rem;
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.77rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .dreport-cancel:hover { border-color: var(--muted2); color: var(--text); }
    .dreport-go {
      background: var(--accent-dim);
      border: 1px solid rgba(196,134,74,0.5);
      color: var(--accent);
      border-radius: 2px;
      padding: 0.38rem 0.8rem;
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.77rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .dreport-go:hover { background: rgba(196,134,74,0.18); border-color: var(--accent); }
    .dreport-go:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

    /* ── TODAY STRIP ── */
    .today-strip {
      border-bottom: 1px solid var(--border);
      padding: 0.55rem 1.25rem;
      position: relative; z-index: 1;
    }
    .today-strip-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .today-strip-hd {
      font-size: 0.57rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted-2);
      font-style: italic;
      flex-shrink: 0;
      padding-right: 0.35rem;
      border-right: 1px solid var(--border);
    }
    .today-strip-items {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .tsi {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.68rem;
      font-style: italic;
      color: var(--muted2);
      padding: 0.18rem 0.5rem;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: transparent;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
      font-family: 'DM Serif Text', Georgia, serif;
    }
    .tsi:hover { border-color: var(--border2); color: var(--text); }
    .tsi.tsi-done { color: var(--muted-2); border-color: transparent; }
    .tsi-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tsi-dot-pending { background: var(--accent); opacity: 0.7; }
    .tsi-dot-done    { background: var(--ongoing); opacity: 0.55; }
    .tsi-dot-skipped { background: var(--muted-2); opacity: 0.55; }
    .tsi-dot-event   { background: #d4697a; opacity: 0.8; }
    .today-strip-link {
      margin-left: auto;
      font-size: 0.6rem;
      font-style: italic;
      color: var(--muted-2);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .today-strip-link:hover { color: var(--muted2); }

    /* ── FOOTER ── */
    footer {
      padding: 1.75rem 2rem;
      font-size: 0.78rem;
      font-style: italic;
      color: var(--muted-2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: auto;
      position: relative;
      z-index: 1;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <h1>Calendar</h1>
      <p>Trips and FaB events laid out month by month.</p>

  <script>
  // ── TODAY TODOS STRIP ──────────────────────────────────────────────────────
  (function () {
    function padZ(n) { return n < 10 ? '0' + n : '' + n; }
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    var iso = today.getFullYear() + '-' + padZ(today.getMonth() + 1) + '-' + padZ(today.getDate());

    var entries = {}, goals = {}, strength = {};
    try { entries  = JSON.parse(localStorage.getItem('journal_entries') || '{}'); } catch (e) {}
    try { goals    = JSON.parse(localStorage.getItem('journal_goals')   || '{}'); } catch (e) {}
    try { strength = JSON.parse(localStorage.getItem('workout_plan_v3') || '{}'); } catch (e) {}

    var dayEntry   = entries[iso] || {};
    var hasMorning = !!dayEntry.morning;
    var hasEvening = !!dayEntry.evening;
    var hasGoals   = Object.values(goals).some(function (g) { return g && g.status === 'active'; });

    // Strength check
    var strengthStatus = null;
    var ST_NAMES = ['Push', 'Pull', 'Legs'];
    if (strength && (strength.entries !== undefined || strength.schedule !== undefined)) {
      var sched = Array.isArray(strength.schedule) && strength.schedule.length === 3
        ? strength.schedule : [1, 3, 5];
      var sidx = sched.indexOf(today.getDay());
      if (sidx !== -1) {
        var se = (strength.entries || {})[iso] || null;
        strengthStatus = { name: ST_NAMES[sidx], done: !!(se && se.status === 'done') };
      }
    }

    // Build chips
    var items = [];
    if (hasGoals) items.push({ label: '☀ Morning', status: hasMorning ? 'done' : 'pending', href: '../journal/' });
    if (strengthStatus) items.push({ label: '💪 ' + strengthStatus.name, status: strengthStatus.done ? 'done' : 'pending', href: '../workout/' });
    if (hasGoals) items.push({ label: '🌙 Evening', status: hasEvening ? 'done' : 'pending', href: '../journal/' });

    // Local calendar events active today
    var calLocalEvs = [];
    try { calLocalEvs = JSON.parse(localStorage.getItem('cal_local_events') || '[]'); } catch(e) {}
    calLocalEvs.forEach(function(ev) {
      if (ev.startDate <= iso && ev.endDate >= iso) {
        items.push({ label: ev.name, status: 'event', href: null });
      }
    });

    if (!items.length) return;

    var strip = document.getElementById('today-strip');
    var container = document.getElementById('today-strip-items');
    var html = '';
    items.forEach(function (item) {
      var dotCls = 'tsi-dot-' + item.status;
      var isDone = item.status === 'done';
      if (item.href) {
        html += '<a class="tsi' + (isDone ? ' tsi-done' : '') + '" href="' + item.href + '">' +
          '<span class="tsi-dot ' + dotCls + '"></span>' + item.label + '</a>';
      } else {
        html += '<span class="tsi' + (isDone ? ' tsi-done' : '') + '">' +
          '<span class="tsi-dot ' + dotCls + '"></span>' + item.label + '</span>';
      }
    });
    container.innerHTML = html;
    strip.style.display = '';
  })();
  </script>

  <script src="../trips/trips.js"></script>
  <script>
  (function () {
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    let localEvents = [];
    try { localEvents = JSON.parse(localStorage.getItem('cal_local_events') || '[]'); } catch(e) {}

    function saveLocalEventsAndRefresh(evs) {
      localEvents = evs;
      localStorage.setItem('cal_local_events', JSON.stringify(evs));
      renderCalendar();
    }

    function generateId() {
      return Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
    }

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // Parse ISO date strings (YYYY-MM-DD) as local midnight to avoid UTC timezone shift
    function localDate(iso) {
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function firstTripMonth() {
      const sorted = [...ALL_EVENTS].sort((a, b) => a.startDate.localeCompare(b.startDate));
      if (!sorted.length) return new Date(today.getFullYear(), today.getMonth(), 1);
      const d = localDate(sorted[0].startDate);
      return new Date(d.getFullYear(), d.getMonth(), 1);
    }

    let calYear  = today.getFullYear();
    let calMonth = today.getMonth();

    const earliestMonth = firstTripMonth();
    const hasTripsThisMonth = ALL_EVENTS.some(t => {
      const s = localDate(t.startDate);
      const e = localDate(t.endDate);
      return (s.getFullYear() === calYear && s.getMonth() === calMonth) ||
             (e.getFullYear() === calYear && e.getMonth() === calMonth) ||
             (s <= new Date(calYear, calMonth, 1) && e >= new Date(calYear, calMonth + 1, 0));
    });
    if (!hasTripsThisMonth) {
      calYear  = earliestMonth.getFullYear();
      calMonth = earliestMonth.getMonth();
    }

    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    // Layout constants (px)
    const DAY_NUM_H  = 22;  // vertical space reserved for the day number
    const BAR_H      = 16;  // height of each trip bar
    const BAR_GAP    = 3;   // vertical gap between stacked bars
    const BOTTOM_PAD = 6;   // padding below last bar
    const MIN_CELL_H = 48;  // minimum cell height (no trips)

    // Build set of dates where a marathon run was actually completed (uses completedDate override when set)
    const marathonRunDates = new Set();
    try {
      const _mwd = JSON.parse(localStorage.getItem('c2hm_v1') || '{}');
      Object.entries(_mwd.days || {}).forEach(([iso, d]) => {
        if (d && (d.status === 'completed' || d.status === 'modified')) {
          marathonRunDates.add(d.completedDate || iso);
        }
      });
    } catch(e) {}

    function buildGridHTML(year, month) {
      const firstDay = new Date(year, month, 1);
      const lastDay  = new Date(year, month + 1, 0);

      let startOffset = firstDay.getDay() - 1;
      if (startOffset < 0) startOffset = 6;

      const tripsThisMonth = ALL_EVENTS.filter(trip => {
        const s = localDate(trip.startDate);
        const e = localDate(trip.endDate);
        return s <= lastDay && e >= firstDay;
      });

      const localEventsThisMonth = localEvents.filter(ev => {
        const s = localDate(ev.startDate);
        const e = localDate(ev.endDate);
        return s <= lastDay && e >= firstDay;
      }).map(ev => ({
        id: ev.id,
        title: ev.name,
        startDate: ev.startDate,
        endDate: ev.endDate,
        status: 'local-event',
        isLocal: true,
        link: null,
        displayDates: ev.startDate,
      }));

      const allBarsThisMonth = [...tripsThisMonth, ...localEventsThisMonth];

      const totalWeeks = Math.ceil((startOffset + lastDay.getDate()) / 7);
      let html = `<div class="cal-dow-row">${DOW.map(d => `<div class="cal-dow">${d}</div>`).join('')}</div>`;

      for (let week = 0; week < totalWeeks; week++) {
        const weekDayStart = week * 7 - startOffset + 1;
        const weekDates = Array.from({ length: 7 }, (_, col) => {
          const day = weekDayStart + col;
          if (day < 1 || day > lastDay.getDate()) return null;
          return new Date(year, month, day);
        });

        const weekBars = [];
        allBarsThisMonth.forEach(trip => {
          const tripStart = localDate(trip.startDate);
          const tripEnd   = localDate(trip.endDate);
          let colStart = -1, colEnd = -1;
          for (let col = 0; col < 7; col++) {
            const d = weekDates[col];
            if (!d) continue;
            if (d >= tripStart && d <= tripEnd) {
              if (colStart === -1) colStart = col;
              colEnd = col;
            }
          }
          if (colStart === -1) return;
          weekBars.push({
            trip, colStart, colEnd,
            overflowLeft:  tripStart < weekDates[colStart],
            overflowRight: tripEnd   > weekDates[colEnd],
          });
        });

        const slotEndCol = [];
        weekBars.forEach(bar => {
          let slot = 0;
          while (slotEndCol[slot] !== undefined && slotEndCol[slot] >= bar.colStart) slot++;
          slotEndCol[slot] = bar.colEnd;
          bar.slot = slot;
        });

        const numSlots = slotEndCol.length;
        const cellH = Math.max(MIN_CELL_H, DAY_NUM_H + numSlots * (BAR_H + BAR_GAP) + BOTTOM_PAD);

        const daysHtml = weekDates.map((date, col) => {
          if (!date) return `<div class="cal-day empty" style="height:${cellH}px"></div>`;
          const isToday = +date === +today;
          const hasTrip = weekBars.some(b => col >= b.colStart && col <= b.colEnd);
          const isoKey = date.getFullYear() + '-' +
            String(date.getMonth() + 1).padStart(2, '0') + '-' +
            String(date.getDate()).padStart(2, '0');
          const hasRun = marathonRunDates.has(isoKey);
          return `<div class="cal-day${isToday ? ' today' : ''}${hasTrip ? ' has-trip' : ''}" data-iso="${isoKey}" style="height:${cellH}px">` +
            `<div class="cal-day-num">${date.getDate()}</div>` +
            (hasRun ? '<div class="cal-run-dot"></div>' : '') +
            `</div>`;
        }).join('');

        const barsHtml = weekBars.map(({ trip, colStart, colEnd, overflowLeft, overflowRight, slot }) => {
          const span  = colEnd - colStart + 1;
          const topPx = DAY_NUM_H + slot * (BAR_H + BAR_GAP);
          const classes = ['cal-trip-bar', `s-${esc(trip.status)}`,
            overflowLeft ? 'overflow-left' : '', overflowRight ? 'overflow-right' : ''].filter(Boolean).join(' ');
          const styleAttr = `--c:${colStart};--s:${span};top:${topPx}px;height:${BAR_H}px`;
          const titleAttr = `${esc(trip.title)} · ${esc(trip.displayDates)}`;
          if (trip.isLocal) {
            return `<button class="${classes}" data-local-event-id="${esc(trip.id)}" title="${esc(trip.title)}"` +
              ` style="${styleAttr}"><span class="bar-label">${esc(trip.title)}</span></button>`;
          }
          if (trip.status === 'fab-event') {
            return `<button class="${classes}" data-event-id="${esc(trip.id)}" title="${titleAttr}"` +
              ` style="${styleAttr}"><span class="bar-label">${esc(trip.title)}</span></button>`;
          }
          return `<a class="${classes}" href="${esc(trip.link)}" data-event-id="${esc(trip.id)}" title="${titleAttr}"` +
            ` style="${styleAttr}"><span class="bar-label">${esc(trip.title)}</span></a>`;
        }).join('');

        html += `<div class="cal-week-wrapper"><div class="cal-week-days">${daysHtml}</div>${barsHtml}</div>`;
      }

      return { html, tripsThisMonth };
    }

    function updateLegend(tripsThisMonth) {
      const legend = document.getElementById('cal-legend');
      const statusesPresent = [...new Set(tripsThisMonth.map(t => t.status))];
      const hasFabEvent = statusesPresent.includes('fab-event');
      const tripStatuses = ['upcoming', 'ongoing', 'planning', 'past'];
      const tripStatus = tripStatuses.find(s => statusesPresent.includes(s));
      const items = [];
      if (tripStatus) items.push(`<div class="cal-legend-item"><div class="cal-legend-dot s-${esc(tripStatus)}"></div><span>Trips</span></div>`);
      if (hasFabEvent) items.push(`<div class="cal-legend-item"><div class="cal-legend-dot s-fab-event"></div><span>FaB Events</span></div>`);
      if (localEvents.length > 0) items.push(`<div class="cal-legend-item"><div class="cal-legend-dot s-local-event"></div><span>My Events</span></div>`);
      legend.innerHTML = items.join('');
    }

    function isDesktop() { return window.innerWidth >= 768; }

    function nextMonthOf(year, month) {
      return month === 11 ? { year: year + 1, month: 0 } : { year, month: month + 1 };
    }

    function buildCurrentContent() {
      if (isDesktop()) {
        const nxt = nextMonthOf(calYear, calMonth);
        const { html: h1, tripsThisMonth: t1 } = buildGridHTML(calYear, calMonth);
        const { html: h2, tripsThisMonth: t2 } = buildGridHTML(nxt.year, nxt.month);
        const p1 = `<div class="cal-month-panel"><div class="cal-panel-label">${MONTH_NAMES[calMonth]} ${calYear}</div>${h1}</div>`;
        const p2 = `<div class="cal-month-panel"><div class="cal-panel-label">${MONTH_NAMES[nxt.month]} ${nxt.year}</div>${h2}</div>`;
        return { html: `<div class="cal-two-month-layout">${p1}${p2}</div>`, tripsThisMonth: [...t1, ...t2] };
      }
      return buildGridHTML(calYear, calMonth);
    }

    function currentLabel() {
      if (isDesktop()) {
        const nxt = nextMonthOf(calYear, calMonth);
        return calYear === nxt.year
          ? `${MONTH_NAMES[calMonth]} \u2013 ${MONTH_NAMES[nxt.month]} ${calYear}`
          : `${MONTH_NAMES[calMonth]} ${calYear} \u2013 ${MONTH_NAMES[nxt.month]} ${nxt.year}`;
      }
      return `${MONTH_NAMES[calMonth]} ${calYear}`;
    }

    function renderCalendar() {
      document.getElementById('cal-month-label').textContent = currentLabel();
      const { html, tripsThisMonth } = buildCurrentContent();
      document.getElementById('cal-grid').innerHTML = html;
      updateLegend(tripsThisMonth);
    }

    // Animated slide to a new month. direction: 1 = next (slide left), -1 = prev (slide right)
    function navigateTo(direction) {
      if (animating) return;
      animating = true;

      calMonth += direction;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      if (calMonth < 0)  { calMonth = 11; calYear--; }

      document.getElementById('cal-month-label').textContent = currentLabel();
      const { html, tripsThisMonth } = buildCurrentContent();
      updateLegend(tripsThisMonth);

      const viewport = document.getElementById('cal-viewport');
      const oldGrid  = document.getElementById('cal-grid');
      const w = viewport.offsetWidth;
      // On desktop (2-month view), slide by 1 month width so the animation
      // only moves one month, not two.
      const slideAmount = isDesktop() ? Math.round(w / 2) : w;
      const oldH = viewport.offsetHeight;

      const newGrid = document.createElement('div');
      newGrid.innerHTML = html;
      Object.assign(newGrid.style, {
        position: 'absolute', top: '0', left: '0', width: '100%',
        transform: `translateX(${direction > 0 ? slideAmount : -slideAmount}px)`,
      });
      viewport.appendChild(newGrid);
      const newH = newGrid.offsetHeight;

      // Lock current height then force reflow before starting transitions
      viewport.style.height = `${oldH}px`;
      newGrid.getBoundingClientRect();

      const easing = 'cubic-bezier(0.25,0.46,0.45,0.94)';
      const transition = `transform 0.32s ${easing}`;
      viewport.style.transition = `height 0.32s ${easing}`;
      oldGrid.style.transition = transition;
      newGrid.style.transition = transition;
      viewport.style.height    = `${newH}px`;
      oldGrid.style.transform  = `translateX(${direction > 0 ? -slideAmount : slideAmount}px)`;
      newGrid.style.transform  = 'translateX(0)';

      newGrid.addEventListener('transitionend', () => {
        oldGrid.id = '';
        newGrid.id = 'cal-grid';
        oldGrid.remove();
        newGrid.style.cssText = '';
        viewport.style.transition = '';
        viewport.style.height = '';
        animating = false;
      }, { once: true });
    }

    renderCalendar();
    let animating = false;

    document.getElementById('cal-prev').addEventListener('click', () => navigateTo(-1));
    document.getElementById('cal-next').addEventListener('click', () => navigateTo(1));

    // Touch swipe with live drag-follow
    const viewport = document.getElementById('cal-viewport');
    let touchStartX = null;
    let touchStartY = null;
    let dragging = false;

    viewport.addEventListener('touchstart', e => {
      if (animating) return;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      dragging = false;
    }, { passive: true });

    viewport.addEventListener('touchmove', e => {
      if (touchStartX === null || animating) return;
      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;
      // If vertical motion dominates first, cancel
      if (!dragging && Math.abs(dy) > Math.abs(dx)) { touchStartX = null; return; }
      dragging = true;
      const grid = document.getElementById('cal-grid');
      grid.style.transition = 'none';
      grid.style.transform = `translateX(${dx}px)`;
    }, { passive: true });

    // ── FAB EVENT POPUP ──────────────────────────────────────────────────────
    const popup      = document.getElementById('fab-popup');
    const popupTitle = document.getElementById('fab-popup-title');
    const popupDates = document.getElementById('fab-popup-dates');
    const popupActions = document.getElementById('fab-popup-actions');

    // Build an ID→event lookup from the global ALL_EVENTS array
    const eventById = Object.fromEntries(ALL_EVENTS.map(e => [e.id, e]));

    function openFabPopup(btn) {
      const event = eventById[btn.dataset.eventId];
      if (!event) return;

      popupTitle.textContent = event.title;
      popupDates.textContent = event.displayDates + (event.destination ? ' · ' + event.destination : '');

      popupActions.innerHTML = '';

      if (event.status === 'fab-event') {
        // Primary: link to official event page (only if available)
        if (event.link) {
          const evtBtn = document.createElement('a');
          evtBtn.className = 'fab-popup-btn p-event';
          evtBtn.href = event.link;
          evtBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H5M10 2V7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> Event Page';
          popupActions.appendChild(evtBtn);
        }

        // Optional: tournament prep link
        if (event.prepId) {
          const prepBtn = document.createElement('a');
          prepBtn.className = 'fab-popup-btn p-prep';
          prepBtn.href = `../tcg-tournament-prep/detail.html?id=${encodeURIComponent(event.prepId)}`;
          prepBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg> Tournament Prep';
          popupActions.appendChild(prepBtn);
        }

        // Optional: tournament report link
        if (event.reportId) {
          const repBtn = document.createElement('a');
          repBtn.className = 'fab-popup-btn';
          repBtn.href = `../tcg-tournament-reports/detail.html?id=${encodeURIComponent(event.reportId)}`;
          repBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="2" y="1" width="8" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M4 4h4M4 6.5h4M4 9h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> Tournament Report';
          popupActions.appendChild(repBtn);
        }
      } else {
        // Regular trip: open the page in the iframe modal
        if (event.link) {
          const tripBtn = document.createElement('button');
          tripBtn.className = `fab-popup-btn p-${esc(event.status)}`;
          tripBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6h8M6 2l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> View Trip';
          tripBtn.addEventListener('click', () => openIframeModal(event.link, event.title));
          popupActions.appendChild(tripBtn);
        }
      }

      // Position popup near the button, keeping it within viewport
      const rect = btn.getBoundingClientRect();
      const pw = popup.offsetWidth;
      const ph = popup.offsetHeight;
      const margin = 6;
      let left = rect.left;
      let top  = rect.bottom + margin;
      if (left + pw > window.innerWidth - margin) left = window.innerWidth - pw - margin;
      if (left < margin) left = margin;
      if (top + ph > window.innerHeight - margin) top = rect.top - ph - margin;
      popup.style.left = left + 'px';
      popup.style.top  = top  + 'px';
      // set transform-origin based on which side popup is anchored
      popup.style.transformOrigin = (top > rect.bottom) ? 'top left' : 'bottom left';
      popup.classList.add('open');
    }

    function closeFabPopup() { popup.classList.remove('open'); }

    // Event delegation: clicks on any calendar bar (FAB events and regular trips)
    document.addEventListener('click', e => {
      const trigger = e.target.closest('[data-event-id].cal-trip-bar');
      if (trigger) {
        e.stopPropagation();
        if (trigger.tagName === 'A') e.preventDefault();
        // Toggle: close if same bar already open
        if (popup.classList.contains('open') && popup._activeBtn === trigger) { closeFabPopup(); popup._activeBtn = null; return; }
        popup._activeBtn = trigger;
        openFabPopup(trigger);
        return;
      }
      // Click outside popup closes it
      if (popup.classList.contains('open') && !popup.contains(e.target)) { closeFabPopup(); popup._activeBtn = null; }

      // Local event bar click → open edit modal
      const localTrigger = e.target.closest('[data-local-event-id]');
      if (localTrigger) { openEditEventModal(localTrigger.dataset.localEventId); return; }

      // Day cell click → open create event modal
      if (!levOverlay.classList.contains('open')) {
        const dayCell = e.target.closest('.cal-day:not(.empty)');
        if (dayCell && dayCell.dataset.iso) { openCreateEventModal(dayCell.dataset.iso); }
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (levOverlay.classList.contains('open')) { closeLevModal(); return; }
        if (iframeModal.classList.contains('open')) { closeIframeModal(); return; }
        closeFabPopup(); popup._activeBtn = null;
      }
    });

    // Close context popup when the page scrolls (it's fixed-position so it drifts from its button)
    window.addEventListener('scroll', () => {
      if (popup.classList.contains('open')) { closeFabPopup(); popup._activeBtn = null; }
    }, { passive: true });

    // ── IFRAME MODAL ──────────────────────────────────────────────────────
    const iframeModal      = document.getElementById('iframe-modal');
    const iframeModalTitle = document.getElementById('iframe-modal-title');
    const iframeModalClose = document.getElementById('iframe-modal-close');
    const iframeModalFrame = document.getElementById('iframe-modal-frame');

    function openIframeModal(url, title) {
      closeFabPopup();
      popup._activeBtn = null;
      iframeModalTitle.textContent = title || '';
      iframeModalFrame.src = url;
      iframeModal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeIframeModal() {
      iframeModal.classList.remove('open');
      document.body.style.overflow = '';
      // clear src after slide-out finishes so the iframe doesn't flash on re-open
      setTimeout(() => { iframeModalFrame.src = ''; }, 450);
    }

    iframeModalClose.addEventListener('click', closeIframeModal);

    // ── SWIPE-DOWN TO CLOSE MODAL ─────────────────────────────────────────
    const MODAL_DISMISS_THRESHOLD = 0.22;

    function applyModalDrag(dy) {
      iframeModal.style.transition = 'none';
      iframeModal.style.transform = `translateY(${Math.max(0, dy)}px)`;
    }

    function finishModalDrag(dy) {
      if (dy > window.innerHeight * MODAL_DISMISS_THRESHOLD) {
        iframeModal.style.transition = 'transform 0.32s cubic-bezier(0.32,0.72,0,1)';
        iframeModal.style.transform = 'translateY(100%)';
        document.body.style.overflow = '';
        setTimeout(() => {
          iframeModal.classList.remove('open');
          iframeModal.style.transform = '';
          iframeModal.style.transition = '';
          iframeModalFrame.src = '';
        }, 340);
      } else {
        iframeModal.style.transition = 'transform 0.3s cubic-bezier(0.32,0.72,0,1)';
        iframeModal.style.transform = 'translateY(0)';
        setTimeout(() => { iframeModal.style.transition = ''; iframeModal.style.transform = ''; }, 320);
      }
    }

    // Bar swipe: always works regardless of iframe scroll position
    {
      let startY = null, startX = null, dragging = false;
      iframeModal.addEventListener('touchstart', e => {
        if (!e.target.closest('.iframe-modal-bar')) return;
        startY = e.touches[0].clientY; startX = e.touches[0].clientX; dragging = false;
      }, { passive: true });
      iframeModal.addEventListener('touchmove', e => {
        if (startY === null) return;
        const dy = e.touches[0].clientY - startY;
        const dx = e.touches[0].clientX - startX;
        if (!dragging && Math.abs(dx) > Math.abs(dy)) { startY = null; return; }
        if (!dragging && Math.abs(dy) > 6) dragging = true;
        if (dragging) applyModalDrag(dy);
      }, { passive: true });
      iframeModal.addEventListener('touchend', e => {
        if (startY === null || !dragging) { startY = null; dragging = false; return; }
        const dy = e.changedTouches[0].clientY - startY;
        startY = null; dragging = false;
        finishModalDrag(dy);
      }, { passive: true });
    }

    // Iframe content swipe: activates when the iframe page is scrolled to the top
    function setupIframeDismissGesture() {
      const iDoc = iframeModalFrame.contentDocument;
      if (!iDoc) return;
      const iWin = iframeModalFrame.contentWindow;
      let startY = null, dragging = false;

      iDoc.addEventListener('touchstart', e => {
        // Only begin tracking if page is already at top
        startY = (iWin.scrollY === 0) ? e.touches[0].clientY : null;
        dragging = false;
      }, { passive: true });

      iDoc.addEventListener('touchmove', e => {
        if (startY === null) return;
        if (iWin.scrollY > 0) { startY = null; return; } // scrolled away from top during move
        const dy = e.touches[0].clientY - startY;
        if (!dragging && dy > 6) dragging = true;
        if (!dragging || dy <= 0) return;
        applyModalDrag(dy);
        e.preventDefault(); // block iframe from scrolling upward (rubber-band)
      }, { passive: false });

      iDoc.addEventListener('touchend', e => {
        if (startY === null || !dragging) { startY = null; dragging = false; return; }
        const dy = e.changedTouches[0].clientY - startY;
        startY = null; dragging = false;
        finishModalDrag(dy);
      }, { passive: true });
    }

    iframeModalFrame.addEventListener('load', () => {
      setupIframeDismissGesture();
    });

    // ── DAILY REPORT EXPORT ──────────────────────────────────────────────────
    (function () {
      const dreportOverlay = document.getElementById('dreport-overlay');
      const dreportDate    = document.getElementById('dreport-date');
      const dreportCancel  = document.getElementById('dreport-cancel');
      const dreportGo      = document.getElementById('dreport-go');
      const calExportBtn   = document.getElementById('cal-export-btn');

      function todayIso() {
        const d = new Date();
        return d.getFullYear() + '-' +
          String(d.getMonth() + 1).padStart(2, '0') + '-' +
          String(d.getDate()).padStart(2, '0');
      }

      function openReportModal() {
        dreportDate.value = todayIso();
        dreportGo.disabled = false;
        dreportGo.innerHTML = '<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3 6l3 3 3-3M2 11h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Download';
        dreportOverlay.classList.add('open');
      }

      function closeReportModal() { dreportOverlay.classList.remove('open'); }

      calExportBtn.addEventListener('click', openReportModal);
      dreportCancel.addEventListener('click', closeReportModal);
      dreportOverlay.addEventListener('click', e => { if (e.target === dreportOverlay) closeReportModal(); });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && dreportOverlay.classList.contains('open')) closeReportModal();
      });

      dreportGo.addEventListener('click', () => {
        const dateStr = dreportDate.value;
        if (!dateStr) return;
        dreportGo.disabled = true;
        dreportGo.textContent = 'Generating…';
        generateDailyReport(dateStr).then(() => {
          closeReportModal();
        });
      });

      function generateDailyReport(dateStr) {
        return new Promise(resolve => {
          document.fonts.ready.then(() => {
            // ── Load data ──────────────────────────────────────────────────
            let calorieLog = {}, workoutData = {}, strengthData = {}, caloWeights = {};
            let boulderSessions = [];
            try { calorieLog      = JSON.parse(localStorage.getItem('calorie_log')          || '{}'); } catch {}
            try { workoutData     = JSON.parse(localStorage.getItem('c2hm_v1')              || '{}'); } catch {}
            try { strengthData    = JSON.parse(localStorage.getItem('workout_plan_v3')      || '{}'); } catch {}
            try { boulderSessions = JSON.parse(localStorage.getItem('bouldering_sessions')  || '[]'); } catch {}
            try { caloWeights     = JSON.parse(localStorage.getItem('calorie_weights')      || '{}'); } catch {}

            const entries    = calorieLog[dateStr] || [];
            const _mDays = workoutData.days || {};
            const dayWorkout = _mDays[dateStr] ||
              Object.values(_mDays).find(d => d && d.completedDate === dateStr) || null;

            // Exact weigh-in for this day (shown in report if present)
            const dayWeighIn = (caloWeights[dateStr] && caloWeights[dateStr] > 0) ? caloWeights[dateStr] : null;

            // Weight: prefer calorie_weights (most recent entry ≤ date), fall back to marathon tracker
            let weightKg = workoutData.weightKg || null;
            {
              const wEntries = Object.entries(caloWeights)
                .filter(([d, kg]) => d <= dateStr && kg > 0)
                .sort((a, b) => b[0].localeCompare(a[0]));
              if (wEntries.length) weightKg = wEntries[0][1];
            }
            if (!weightKg) weightKg = 75;

            // ── Process calories ───────────────────────────────────────────
            const MEAL_ORDER = ['breakfast','lunch','dinner','snack','other'];
            const CAT_COLORS = { breakfast:'#d4924a', lunch:'#5ab4cc', dinner:'#c4864a', snack:'#7ab87a', other:'#7a6e60' };
            const CAT_LABELS = { breakfast:'Breakfast', lunch:'Lunch', dinner:'Dinner', snack:'Snack', other:'Other' };
            const grouped = {};
            let totalCalIn = 0, totalProtein = 0;
            entries.forEach(e => {
              const cat = e.category || 'other';
              if (!grouped[cat]) grouped[cat] = [];
              grouped[cat].push(e);
              totalCalIn  += e.calories || 0;
              totalProtein += e.protein  || 0;
            });
            const activeCats = MEAL_ORDER.filter(c => grouped[c] && grouped[c].length > 0);

            // ── Process marathon workout ───────────────────────────────────
            let workoutCal = 0;
            if (dayWorkout) workoutCal = ActivityCalc.runningKcal(weightKg, dayWorkout.km, dayWorkout.time) || 0;

            // ── Process strength training ──────────────────────────────────
            const strengthEntryMap = strengthData.entries || {};
            const strengthEntry    = strengthEntryMap[dateStr] || null;
            const ST_TYPES = [
              { name: 'Push', muscles: 'Chest · Shoulders · Triceps' },
              { name: 'Pull', muscles: 'Back · Biceps · Grip'        },
              { name: 'Legs', muscles: 'Glutes · Hamstrings · Hips'  },
            ];
            let strengthSession = null;
            if (strengthEntry && strengthEntry.status === 'done') {
              const sched = Array.isArray(strengthData.schedule) && strengthData.schedule.length === 3
                ? strengthData.schedule : [1, 3, 5];
              const [SY, SM, SD] = dateStr.split('-').map(Number);
              const sdow = new Date(SY, SM - 1, SD).getDay();
              const sidx = sched.indexOf(sdow);
              strengthSession = sidx >= 0 ? ST_TYPES[sidx] : { name: 'Strength', muscles: '' };
            }
            let strengthCal = 0;
            if (strengthSession) strengthCal = ActivityCalc.strengthKcal(weightKg, strengthEntry.duration) || 0;

            // ── Process bouldering ─────────────────────────────────────────
            const daySessions  = boulderSessions.filter(s => s.date === dateStr);
            const boulderSession = daySessions[0] || null;
            const boulderCal   = ActivityCalc.boulderingKcal(weightKg, daySessions);

            // ── Format date label ──────────────────────────────────────────
            const [Y, Mo, D] = dateStr.split('-').map(Number);
            const dt  = new Date(Y, Mo - 1, D);
            const DOW = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const MON = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const dateLabel = DOW[dt.getDay()] + ', ' + MON[dt.getMonth()] + ' ' + D + ', ' + Y;

            // ── Canvas constants ───────────────────────────────────────────
            const W = 600, PAD_X = 38, PAD_TOP = 30, PAD_BOT = 38;
            const IW = W - PAD_X * 2;

            // ── Two-pass paint function ────────────────────────────────────
            // Pass 1: ctx=null  → measure-only (returns total height)
            // Pass 2: ctx=real  → draws and returns total height
            function paint(ctx) {
              let y = PAD_TOP;
              const totalBurn = workoutCal + strengthCal + boulderCal;
              const net = Math.round(totalCalIn - totalBurn);

              function r(color, x, yy, w, h) {
                if (!ctx) return;
                ctx.fillStyle = color;
                ctx.fillRect(x, yy, w, h);
              }
              function t(font, color, ls, str, x, yy) {
                if (!ctx) return;
                ctx.font = font;
                ctx.fillStyle = color;
                ctx.letterSpacing = ls;
                ctx.fillText(str, x, yy);
              }
              function tr(font, color, ls, str, rx, yy) {
                if (!ctx) return;
                ctx.font = font;
                ctx.letterSpacing = ls;
                ctx.fillStyle = color;
                ctx.fillText(str, rx - ctx.measureText(str).width, yy);
              }
              function clampStr(str, maxPx, font, ls) {
                if (!ctx) return str;
                ctx.font = font;
                ctx.letterSpacing = ls;
                let s = str;
                while (ctx.measureText(s).width > maxPx && s.length > 1) s = s.slice(0, -1);
                return s === str ? str : s + '…';
              }
              function divider(yy) {
                r('#3a3025', PAD_X, yy, IW, 1);
              }
              function sectionLabel(str, yy) {
                t('700 9px “DM Serif Text”, Georgia, serif', '#c4864a', '1.4px', str, PAD_X, yy + 9);
              }

              // Accent gradient bar
              if (ctx) {
                const grad = ctx.createLinearGradient(PAD_X, 0, PAD_X + 220, 0);
                grad.addColorStop(0, '#c4864a');
                grad.addColorStop(1, 'rgba(196,134,74,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(PAD_X, y, 220, 3);
              }
              y += 3 + 10;

              sectionLabel('DAILY REPORT', y);
              y += 9 + 7;

              t('italic 700 24px “Cormorant Garamond”, Georgia, serif', '#e8dfd0', '-0.24px', dateLabel, PAD_X, y + 24);
              y += 24 + 18;

              divider(y); y += 1 + 20;

              // ── HERO STATS (3-column) ─────────────────────────────────────
              const COL_W = Math.floor(IW / 3);
              const heroStats = [
                { label: 'CALORIES IN',    value: Math.round(totalCalIn).toLocaleString() + ' kcal', color: '#c4864a' },
                { label: 'CALORIES BURNT', value: totalBurn > 0 ? totalBurn.toLocaleString() + ' kcal' : '—',         color: '#5ab4cc' },
                { label: 'PROTEIN',        value: totalProtein > 0 ? Math.round(totalProtein) + 'g' : '—',            color: '#7ab87a' },
              ];
              heroStats.forEach((stat, i) => {
                const lx = PAD_X + COL_W * i;
                t('700 8px “DM Serif Text”, Georgia, serif', '#7a6e60', '1.2px', stat.label, lx, y + 8);
                t('italic 700 22px “Cormorant Garamond”, Georgia, serif', stat.color, '-0.22px', stat.value, lx, y + 8 + 10 + 22);
              });
              y += 8 + 10 + 22 + 20;

              divider(y); y += 1 + 16;

              // ── NET ───────────────────────────────────────────────────────
              t('700 9px “DM Serif Text”, Georgia, serif', '#9a8a76', '1.1px', 'NET CALORIES', PAD_X, y + 9);
              y += 9 + 8;
              t('italic 700 28px “Cormorant Garamond”, Georgia, serif', '#e8dfd0', '-0.28px', net.toLocaleString() + ' kcal', PAD_X, y + 28);
              y += 28 + 20;

              // ── BODY WEIGHT (only if logged for this day) ─────────────────
              if (dayWeighIn) {
                divider(y); y += 1 + 16;
                sectionLabel('BODY WEIGHT', y); y += 9 + 8;
                const wKgStr  = dayWeighIn.toFixed(1) + ' kg';
                t('italic 700 26px “Cormorant Garamond”, Georgia, serif', '#a8c4e0', '-0.26px', wKgStr, PAD_X, y + 26);
                y += 26 + 18;
              }

              // ── MEAL BREAKDOWN (only if entries exist) ────────────────────
              if (activeCats.length > 0) {
                divider(y); y += 1 + 16;
                sectionLabel('MEALS', y); y += 9 + 10;

                activeCats.forEach(cat => {
                  const ces = grouped[cat];
                  const catTotal = ces.reduce((s, e) => s + (e.calories || 0), 0);

                  r(CAT_COLORS[cat], PAD_X, y + 5, 4, 14);
                  t('700 13px “DM Serif Text”, Georgia, serif', '#e8dfd0', '0px', CAT_LABELS[cat], PAD_X + 10, y + 16);
                  tr('13px “DM Serif Text”, Georgia, serif', '#9a8a76', '0px', Math.round(catTotal).toLocaleString() + ' kcal', PAD_X + IW, y + 16);
                  y += 26;

                  ces.forEach(e => {
                    const entryFont = '11px “DM Serif Text”, Georgia, serif';
                    const calStr  = Math.round(e.calories || 0).toLocaleString() + ' kcal';
                    const maxNamePx = IW - 14 - 66;
                    const name = clampStr(e.name || 'Unnamed', maxNamePx, entryFont, '0px');
                    t(entryFont, '#7a6e60', '0px', name, PAD_X + 14, y + 11);
                    tr(entryFont, '#7a6e60', '0px', calStr, PAD_X + IW, y + 11);
                    y += 18;
                  });
                  y += 4;
                });
                y += 4;
              }

              // ── RUNNING (only if run recorded) ────────────────────────────
              if (dayWorkout && dayWorkout.status) {
                divider(y); y += 1 + 16;
                sectionLabel('RUNNING', y); y += 9 + 10;

                const SC = { completed:'#7ab87a', modified:'#d4924a', skipped:'#c46a6a' };
                const SL = { completed:'✓ Completed', modified:'◎ Modified', skipped:'✗ Skipped' };
                t('700 14px “DM Serif Text”, Georgia, serif', SC[dayWorkout.status] || '#9a8a76', '0px', SL[dayWorkout.status] || dayWorkout.status, PAD_X, y + 14);
                y += 14 + 8;

                const parts = [];
                if (dayWorkout.km)   parts.push(dayWorkout.km + ' km');
                if (dayWorkout.time) parts.push(dayWorkout.time + ' min');
                if (workoutCal > 0)  parts.push('∼' + workoutCal.toLocaleString() + ' kcal burned');
                if (parts.length > 0) {
                  t('12px “DM Serif Text”, Georgia, serif', '#9a8a76', '0px', parts.join('  ·  '), PAD_X, y + 12);
                  y += 12 + 8;
                }
                if (dayWorkout.notes) {
                  t('italic 11px “DM Serif Text”, Georgia, serif', '#7a6e60', '0px', '”' + dayWorkout.notes + '”', PAD_X, y + 11);
                  y += 11 + 8;
                }
              }

              // ── STRENGTH TRAINING (only if session done) ──────────────────
              if (strengthSession) {
                divider(y); y += 1 + 16;
                sectionLabel('STRENGTH TRAINING', y); y += 9 + 10;

                t('700 14px “DM Serif Text”, Georgia, serif', '#7ab87a', '0px', '✓ ' + strengthSession.name + ' Session', PAD_X, y + 14);
                y += 14 + 6;
                if (strengthSession.muscles) {
                  t('11px “DM Serif Text”, Georgia, serif', '#9a8a76', '0px', strengthSession.muscles, PAD_X, y + 11);
                  y += 11 + 6;
                }
                const sParts = [];
                if (strengthEntry.duration) sParts.push(strengthEntry.duration + ' min');
                if (strengthCal > 0) sParts.push('∼' + strengthCal.toLocaleString() + ' kcal burned');
                if (sParts.length > 0) {
                  t('12px “DM Serif Text”, Georgia, serif', '#9a8a76', '0px', sParts.join('  ·  '), PAD_X, y + 12);
                  y += 12 + 10;
                }
              }

              // ── BOULDERING (only if session exists) ──────────────────────
              if (boulderSession) {
                divider(y); y += 1 + 16;
                sectionLabel('BOULDERING', y); y += 9 + 10;

                t('700 14px “DM Serif Text”, Georgia, serif', '#7ab87a', '0px', '✓ Session', PAD_X, y + 14);
                y += 14 + 6;
                const bParts = [];
                if (boulderSession.duration) bParts.push(boulderSession.duration + ' min');
                if (boulderCal > 0) bParts.push('∼' + boulderCal.toLocaleString() + ' kcal burned');
                const totalClimbs = Object.values(boulderSession.grades || {}).reduce((s, c) => s + c, 0);
                if (totalClimbs > 0) bParts.push(totalClimbs + ' climb' + (totalClimbs !== 1 ? 's' : ''));
                if (bParts.length > 0) {
                  t('12px “DM Serif Text”, Georgia, serif', '#9a8a76', '0px', bParts.join('  ·  '), PAD_X, y + 12);
                  y += 12 + 8;
                }
                if (boulderSession.notes) {
                  const noteFont = 'italic 11px “DM Serif Text”, Georgia, serif';
                  const noteStr  = clampStr('”' + boulderSession.notes + '”', IW - 4, noteFont, '0px');
                  t(noteFont, '#7a6e60', '0px', noteStr, PAD_X, y + 11);
                  y += 11 + 8;
                }
              }

              return y + PAD_BOT;
            }

            // ── Measure pass (no ctx) ──────────────────────────────────────
            const totalH = paint(null);

            // ── Draw pass ─────────────────────────────────────────────────
            const DPR = 2;
            const canvas = document.createElement('canvas');
            canvas.width  = W * DPR;
            canvas.height = totalH * DPR;
            const ctx = canvas.getContext('2d');
            ctx.scale(DPR, DPR);

            // Background
            ctx.fillStyle = '#1c1814';
            ctx.fillRect(0, 0, W, totalH);

            // Subtle dot texture
            ctx.fillStyle = 'rgba(232,223,208,0.02)';
            for (let px = 12; px < W; px += 24) {
              for (let py = 12; py < totalH; py += 24) {
                ctx.beginPath();
                ctx.arc(px, py, 0.7, 0, Math.PI * 2);
                ctx.fill();
              }
            }

            paint(ctx);

            // ── Download ──────────────────────────────────────────────────
            canvas.toBlob(blob => {
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href     = url;
              a.download = 'daily-report-' + dateStr + '.png';
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              setTimeout(() => URL.revokeObjectURL(url), 2000);
              resolve();
            }, 'image/png');
          });
        });
      }
    })();

    // ── LOCAL EVENT MODAL ─────────────────────────────────────────────────────
    const levOverlay    = document.getElementById('lev-overlay');
    const levModalTitle = document.getElementById('lev-modal-title');
    const levName       = document.getElementById('lev-name');
    const levStart      = document.getElementById('lev-start');
    const levEnd        = document.getElementById('lev-end');
    const levDelete     = document.getElementById('lev-delete');
    const levCancel     = document.getElementById('lev-cancel');
    const levSave       = document.getElementById('lev-save');
    let editingEventId  = null;

    function openCreateEventModal(isoDate) {
      editingEventId = null;
      levModalTitle.textContent = 'New Event';
      levName.value  = '';
      levStart.value = isoDate;
      levEnd.value   = isoDate;
      levDelete.style.display = 'none';
      levOverlay.classList.add('open');
      requestAnimationFrame(() => levName.focus());
    }

    function openEditEventModal(evId) {
      const ev = localEvents.find(e => e.id === evId);
      if (!ev) return;
      editingEventId = evId;
      levModalTitle.textContent = 'Edit Event';
      levName.value  = ev.name;
      levStart.value = ev.startDate;
      levEnd.value   = ev.endDate;
      levDelete.style.display = '';
      levOverlay.classList.add('open');
      requestAnimationFrame(() => levName.focus());
    }

    function closeLevModal() { levOverlay.classList.remove('open'); editingEventId = null; }

    levCancel.addEventListener('click', closeLevModal);
    levOverlay.addEventListener('click', e => { if (e.target === levOverlay) closeLevModal(); });

    levDelete.addEventListener('click', () => {
      if (!editingEventId) return;
      saveLocalEventsAndRefresh(localEvents.filter(e => e.id !== editingEventId));
      closeLevModal();
    });

    levStart.addEventListener('change', () => { if (levEnd.value < levStart.value) levEnd.value = levStart.value; });
    levEnd.addEventListener('change',   () => { if (levEnd.value < levStart.value) levStart.value = levEnd.value; });

    [levName, levStart, levEnd].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); levSave.click(); } });
    });

    levSave.addEventListener('click', () => {
      const name = levName.value.trim();
      if (!name) { levName.focus(); levName.style.borderColor = 'var(--local-event)'; return; }
      levName.style.borderColor = '';
      const start = levStart.value;
      const end   = levEnd.value >= start ? levEnd.value : start;
      if (editingEventId) {
        saveLocalEventsAndRefresh(localEvents.map(e => e.id === editingEventId ? { ...e, name, startDate: start, endDate: end } : e));
      } else {
        saveLocalEventsAndRefresh([...localEvents, { id: generateId(), name, startDate: start, endDate: end }]);
      }
      closeLevModal();
    });

    // Intercept FAB popup internal links (prep / report — not external event page)
    popupActions.addEventListener('click', e => {
      const btn = e.target.closest('a.fab-popup-btn');
      if (btn && btn.href && btn.target !== '_blank') {
        e.preventDefault();
        const title = btn.textContent.trim().replace(/^\W+/, '').trim();
        openIframeModal(btn.href, title);
      }
    });

    viewport.addEventListener('touchend', e => {
      if (touchStartX === null || !dragging) { touchStartX = null; dragging = false; return; }
      const dx = e.changedTouches[0].clientX - touchStartX;
      touchStartX = null;
      dragging = false;

      const grid = document.getElementById('cal-grid');
      const threshold = viewport.offsetWidth * 0.28;

      if (Math.abs(dx) >= threshold) {
        // Complete the swipe: snap old grid the rest of the way out and slide new one in
        animating = true;
        const direction = dx < 0 ? 1 : -1;
        calMonth += direction;
        if (calMonth > 11) { calMonth = 0; calYear++; }
        if (calMonth < 0)  { calMonth = 11; calYear--; }

        document.getElementById('cal-month-label').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
        const { html, tripsThisMonth } = buildGridHTML(calYear, calMonth);
        updateLegend(tripsThisMonth);

        const w = viewport.offsetWidth;
        const slideAmount = isDesktop() ? Math.round(w / 2) : w;
        const oldH = viewport.offsetHeight;
        const newGrid = document.createElement('div');
        newGrid.innerHTML = html;
        Object.assign(newGrid.style, {
          position: 'absolute', top: '0', left: '0', width: '100%',
          transform: `translateX(${direction > 0 ? slideAmount : -slideAmount}px)`,
        });
        viewport.appendChild(newGrid);
        const newH = newGrid.offsetHeight;

        viewport.style.height = `${oldH}px`;
        newGrid.getBoundingClientRect();

        const easing = 'cubic-bezier(0.25,0.46,0.45,0.94)';
        const transition = `transform 0.28s ${easing}`;
        viewport.style.transition = `height 0.28s ${easing}`;
        grid.style.transition = transition;
        newGrid.style.transition = transition;
        viewport.style.height   = `${newH}px`;
        grid.style.transform    = `translateX(${direction > 0 ? -slideAmount : slideAmount}px)`;
        newGrid.style.transform = 'translateX(0)';

        newGrid.addEventListener('transitionend', () => {
          grid.id = '';
          newGrid.id = 'cal-grid';
          grid.remove();
          newGrid.style.cssText = '';
          viewport.style.transition = '';
          viewport.style.height = '';
          animating = false;
        }, { once: true });
      } else {
        // Snap back
        grid.style.transition = 'transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94)';
        grid.style.transform = 'translateX(0)';
        grid.addEventListener('transitionend', () => { grid.style.transition = ''; }, { once: true });
      }
    }, { passive: true });
  })();

  </script>

</body>
</html>
