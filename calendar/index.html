<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Serif+Text:ital@0;1&display=swap">
  <script src="../nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1c1814;
      --surface: #252018;
      --surface2: #2e271d;
      --border: #3a3025;
      --border2: #4a3e2e;
      --accent: #c4864a;
      --accent-dim: rgba(196,134,74,0.10);
      --text: #e8dfd0;
      --muted: #9a8a76;
      --muted2: #b5a48e;
      --muted-2: #5a4e40;
      --upcoming: #d4924a;
      --upcoming-bg: rgba(212,146,74,0.10);
      --upcoming-border: rgba(212,146,74,0.25);
      --ongoing: #7ab87a;
      --ongoing-bg: rgba(122,184,122,0.10);
      --ongoing-border: rgba(122,184,122,0.25);
      --past: #7a8a9a;
      --past-bg: rgba(122,138,154,0.10);
      --past-border: rgba(122,138,154,0.22);
      --planning: #5ab4cc;
      --planning-bg: rgba(90,180,204,0.10);
      --planning-border: rgba(90,180,204,0.25);
      --fab-event: #a07ae8;
      --fab-event-bg: rgba(160,122,232,0.10);
      --fab-event-border: rgba(160,122,232,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Serif Text', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 4px 4px, 6px 6px;
      background-position: 0 0, 2px 2px;
    }

    /* ── HERO ── */
    .hero {
      padding: 2rem 1.5rem 1.5rem;
      text-align: left;
      border-bottom: 2px solid var(--text);
      position: relative;
      z-index: 1;
    }
    .hero-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .hero h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }
    .hero p {
      color: var(--muted);
      font-size: 0.9rem;
      font-style: italic;
    }

    /* ── MAIN ── */
    .main {
      width: 100%;
      max-width: 1000px;
      margin: 1.75rem auto;
      padding: 0 1.25rem 4rem;
      position: relative;
      z-index: 1;
    }

    /* ── CALENDAR NAV ── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      gap: 0.75rem;
    }
    .cal-nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: 2px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .cal-nav-btn:hover { border-color: var(--text); color: var(--text); background: var(--surface); }
    .cal-month-label {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    /* ── CALENDAR GRID ── */
    .cal-dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 3px;
    }
    .cal-dow {
      text-align: center;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted2);
      padding: 0.25rem 0 0.5rem;
      font-family: 'DM Serif Text', Georgia, serif;
    }

    /* Each calendar week is a wrapper containing the day cells + floating trip bars */
    .cal-week-wrapper {
      position: relative;
      margin-bottom: 3px;
    }
    .cal-week-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .cal-day {
      position: relative;
      border-radius: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.3rem 0.35rem 0.25rem;
      transition: border-color 0.15s;
    }
    .cal-day.empty {
      background: transparent;
      border-color: transparent;
    }
    .cal-day.today { border-color: var(--accent); background: var(--accent-dim); }
    .cal-day.has-trip { border-color: var(--border2); }
    .cal-day-num {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted2);
      line-height: 1;
    }
    .cal-day.today .cal-day-num { color: var(--accent); }

    .cal-trip-bar {
      position: absolute;
      left: calc(var(--c) * ((100% - 18px) / 7 + 3px));
      width: calc(var(--s) * ((100% - 18px) / 7 + 3px) - 3px);
      border-radius: 2px;
      padding: 0 0.3rem;
      font-size: 0.6rem;
      font-weight: 700;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: filter 0.15s;
      overflow: hidden;
      font-family: 'DM Serif Text', Georgia, serif;
    }
    .cal-trip-bar:hover { filter: brightness(0.88); }
    .cal-trip-bar .bar-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cal-trip-bar.overflow-left  { border-top-left-radius: 0; border-bottom-left-radius: 0; border-left: none; }
    .cal-trip-bar.overflow-right { border-top-right-radius: 0; border-bottom-right-radius: 0; border-right: none; }

    .cal-trip-bar.s-upcoming  { background: var(--upcoming-bg);  color: var(--upcoming);  border: 1px solid var(--upcoming-border); }
    .cal-trip-bar.s-ongoing   { background: var(--ongoing-bg);   color: var(--ongoing);   border: 1px solid var(--ongoing-border); }
    .cal-trip-bar.s-past      { background: var(--past-bg);      color: var(--past);      border: 1px solid var(--past-border); }
    .cal-trip-bar.s-planning  { background: var(--planning-bg);  color: var(--planning);  border: 1px solid var(--planning-border); }
    .cal-trip-bar.s-fab-event { background: var(--fab-event-bg); color: var(--fab-event); border: 1px solid var(--fab-event-border); }

    /* ── WORKOUT DAY DOTS ── */
    .workout-dot {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .wd-done    { background: #166534; }
    .wd-skipped { background: #92400e; }
    .wd-missed  { background: #c8102e; }
    .wd-paused  { background: #1e3f6e; border: 1px solid #2a5a90; }

    /* ── LEGEND ── */
    .cal-legend {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .cal-legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      color: var(--muted2);
      font-style: italic;
    }
    .cal-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 1px;
      flex-shrink: 0;
    }
    .cal-legend-dot.s-upcoming  { background: var(--upcoming); }
    .cal-legend-dot.s-ongoing   { background: var(--ongoing); }
    .cal-legend-dot.s-past      { background: var(--past); }
    .cal-legend-dot.s-planning  { background: var(--planning); }
    .cal-legend-dot.s-fab-event { background: var(--fab-event); }

    /* ── SWIPE VIEWPORT ── */
    .cal-viewport {
      position: relative;
      overflow: hidden;
    }
    .cal-viewport > div {
      will-change: transform;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .main { padding: 0 0.25rem 2rem; margin-top: 0.5rem; }
      .cal-dow { font-size: 0.55rem; }
      .cal-day-num { font-size: 0.65rem; }
      .cal-trip-bar { font-size: 0.5rem; padding: 0 0.2rem; }
      .cal-month-label { font-size: 0.95rem; }
      .hero { padding: 1.25rem 0.75rem 1rem; }
      .hero h1 { font-size: 1.9rem; }
    }

    /* ── TWO-MONTH DESKTOP LAYOUT ── */
    .cal-panel-label {
      display: none;
    }
    @media (min-width: 768px) {
      .main { max-width: 1400px; }
      .cal-two-month-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
      }
      .cal-panel-label {
        display: block;
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 1rem;
        font-weight: 700;
        font-style: italic;
        color: var(--text);
        margin-bottom: 0.6rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.4rem;
      }
    }

    /* ── FAB EVENT POPUP ── */
    .fab-popup {
      position: fixed;
      z-index: 500;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 3px;
      padding: 0.8rem 0.85rem;
      min-width: 210px;
      max-width: 270px;
      box-shadow: 0 6px 24px rgba(26,22,16,0.15), 0 2px 6px rgba(26,22,16,0.08);
      visibility: hidden;
      opacity: 0;
      transform: scale(0.92) translateY(-4px);
      transform-origin: top left;
      pointer-events: none;
      transition: opacity 0.16s ease, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), visibility 0s linear 0.2s;
    }
    .fab-popup.open {
      visibility: visible;
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
      transition: opacity 0.16s ease, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), visibility 0s linear 0s;
    }
    .fab-popup-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.15rem;
    }
    .fab-popup-dates {
      font-size: 0.7rem;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 0.65rem;
    }
    .fab-popup-actions {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .fab-popup-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.6rem;
      border-radius: 2px;
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
      font-family: 'DM Serif Text', Georgia, serif;
    }
    .fab-popup-btn:hover { border-color: var(--muted); background: var(--surface2); }
    .fab-popup-btn.p-event { color: var(--fab-event); border-color: var(--fab-event-border); background: var(--fab-event-bg); }
    .fab-popup-btn.p-event:hover { filter: brightness(0.9); }
    .fab-popup-btn.p-prep { color: var(--accent); border-color: var(--upcoming-border); background: var(--upcoming-bg); }
    .fab-popup-btn.p-prep:hover { filter: brightness(0.9); }
    .fab-popup-btn.p-upcoming { color: var(--upcoming); border-color: var(--upcoming-border); background: var(--upcoming-bg); }
    .fab-popup-btn.p-upcoming:hover { filter: brightness(0.9); }
    .fab-popup-btn.p-ongoing  { color: var(--ongoing);  border-color: var(--ongoing-border);  background: var(--ongoing-bg);  }
    .fab-popup-btn.p-ongoing:hover  { filter: brightness(0.9); }
    .fab-popup-btn.p-past     { color: var(--past);     border-color: var(--past-border);     background: var(--past-bg);     }
    .fab-popup-btn.p-past:hover     { filter: brightness(0.9); }
    .fab-popup-btn.p-planning { color: var(--planning); border-color: var(--planning-border); background: var(--planning-bg); }
    .fab-popup-btn.p-planning:hover { filter: brightness(0.9); }

    /* ── IFRAME MODAL ── */
    .iframe-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 600;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      visibility: hidden;
      transition: transform 0.42s cubic-bezier(0.32,0.72,0,1), visibility 0s linear 0.42s;
    }
    .iframe-modal-overlay.open {
      transform: translateY(0);
      visibility: visible;
      transition: transform 0.42s cubic-bezier(0.32,0.72,0,1), visibility 0s linear 0s;
    }
    .iframe-modal-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0 1rem;
      height: 48px;
      background: rgba(250,247,242,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .iframe-modal-back {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.35rem 0.7rem;
      border-radius: 2px;
      font-size: 0.8rem;
      font-weight: 600;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
      font-family: 'DM Serif Text', Georgia, serif;
    }
    .iframe-modal-back:hover { border-color: var(--text); }
    .iframe-modal-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.85rem;
      font-weight: 700;
      font-style: italic;
      color: var(--muted2);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .iframe-modal-frame {
      flex: 1;
      border: none;
      width: 100%;
      display: block;
      background: var(--bg);
    }

    /* ── FOOTER ── */
    footer {
      padding: 1.75rem 2rem;
      font-size: 0.78rem;
      font-style: italic;
      color: var(--muted-2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: auto;
      position: relative;
      z-index: 1;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <h1>Calendar</h1>
      <p>Trips and FaB events laid out month by month.</p>
    </div>
  </header>

  <main class="main">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="cal-prev">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M6.5 2L3.5 5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <span class="cal-month-label" id="cal-month-label"></span>
      <button class="cal-nav-btn" id="cal-next">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3.5 2L6.5 5l-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="cal-viewport" id="cal-viewport"><div id="cal-grid"></div></div>
    <div class="cal-legend" id="cal-legend"></div>
  </main>

  <footer>
    <span id="page-version" style="opacity:0.65"></span>
    <a href="https://github.com/xssxghjk/AI-Web-Pages" target="_blank" rel="noopener">View on GitHub</a>
  </footer>
  <script>fetch('../version.json').then(r=>r.json()).then(v=>{var e=document.getElementById('page-version');if(e)e.textContent='v'+v.version}).catch(()=>{});</script>

  <!-- Iframe modal: opens internal pages without leaving the calendar -->
  <div class="iframe-modal-overlay hidden" id="iframe-modal">
    <div class="iframe-modal-bar">
      <button class="iframe-modal-back" id="iframe-modal-close">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M6.5 2L3.5 5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back to Calendar
      </button>
      <span class="iframe-modal-title" id="iframe-modal-title"></span>
    </div>
    <iframe class="iframe-modal-frame" id="iframe-modal-frame" src="" title=""></iframe>
  </div>

  <!-- FAB event context popup (singleton, repositioned on each open) -->
  <div class="fab-popup" id="fab-popup">
    <div class="fab-popup-title" id="fab-popup-title"></div>
    <div class="fab-popup-dates" id="fab-popup-dates"></div>
    <div class="fab-popup-actions" id="fab-popup-actions"></div>
  </div>

  <script src="../trips/trips.js"></script>
  <script>
  // Build per-day workout status lookup from localStorage (c2hm_v1)
  // REST_DAYS[weekIdx] = day indices (0=Sun…6=Sat) that are rest type
  window.WORKOUT_STATUS = {};
  (function () {
    try {
      const raw = localStorage.getItem('c2hm_v1');
      if (!raw) return;
      const data = JSON.parse(raw);
      if (!data.planStart) return;

      // Old marathon-training used toISOString() (UTC dates). For UTC+ users,
      // local midnight is the previous UTC day, so entries were stored 1 day early.
      // Shift all keys +1 day in-memory when no version field is present.
      function shiftIso(iso) {
        const [y, m, d] = iso.split('-').map(Number);
        const nd = new Date(y, m - 1, d + 1);
        return nd.getFullYear() + '-' + String(nd.getMonth() + 1).padStart(2, '0') + '-' + String(nd.getDate()).padStart(2, '0');
      }
      let days = data.days || {};
      let planStart = data.planStart;
      if (!data.version && new Date().getTimezoneOffset() < 0) {
        const shifted = {};
        for (const [k, v] of Object.entries(days)) shifted[shiftIso(k)] = v;
        days = shifted;
        planStart = shiftIso(planStart);
      }

      const REST_DAYS = [
        [0,1,5],[1,5],[1,5],[1,5],[1,5],[1,5],[1,5],[1,5],[1,5],[1,5],
        [1,5],[1,5],[1,5],[1,5],[1,5],[1,5],[0,1,5],[1,5],[0,1,5],[1,3,5,6]
      ];

      const start = new Date(planStart + 'T00:00:00');
      const week1Sun = new Date(start.getTime() - start.getDay() * 86400000);
      week1Sun.setHours(0, 0, 0, 0);

      const todayMs = new Date().setHours(0, 0, 0, 0);

      for (let w = 0; w < 20; w++) {
        for (let d = 0; d < 7; d++) {
          const dt = new Date(week1Sun.getFullYear(), week1Sun.getMonth(), week1Sun.getDate() + w * 7 + d);
          const iso = dt.getFullYear() + '-' +
            String(dt.getMonth() + 1).padStart(2, '0') + '-' +
            String(dt.getDate()).padStart(2, '0');

          if (REST_DAYS[w].includes(d)) continue; // rest days get no dot
          if (dt.getTime() < start.getTime()) continue; // before plan start

          const entry = days[iso];
          if (entry && (entry.status === 'completed' || entry.status === 'modified')) {
            window.WORKOUT_STATUS[iso] = 'done';
          } else if (entry && entry.status === 'skipped') {
            window.WORKOUT_STATUS[iso] = 'skipped';
          } else if (dt.getTime() < todayMs) {
            const dMs = dt.getTime();
            let paused = false;
            for (const p of (data.pauseHistory || [])) {
              const s = new Date(p.since + 'T00:00:00').getTime();
              const e = new Date(p.end   + 'T00:00:00').getTime();
              if (dMs >= s && dMs < e) { paused = true; break; }
            }
            if (!paused && data.pause) {
              const s = new Date(data.pause.since + 'T00:00:00').getTime();
              const e = s + data.pause.days * 86400000;
              if (dMs >= s && dMs < e) paused = true;
            }
            window.WORKOUT_STATUS[iso] = paused ? 'paused' : 'missed';
          }
        }
      }
    } catch (e) {}
  })();
  </script>
  <script>
  (function () {
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // Parse ISO date strings (YYYY-MM-DD) as local midnight to avoid UTC timezone shift
    function localDate(iso) {
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function firstTripMonth() {
      const sorted = [...ALL_EVENTS].sort((a, b) => a.startDate.localeCompare(b.startDate));
      if (!sorted.length) return new Date(today.getFullYear(), today.getMonth(), 1);
      const d = localDate(sorted[0].startDate);
      return new Date(d.getFullYear(), d.getMonth(), 1);
    }

    let calYear  = today.getFullYear();
    let calMonth = today.getMonth();

    const earliestMonth = firstTripMonth();
    const hasTripsThisMonth = ALL_EVENTS.some(t => {
      const s = localDate(t.startDate);
      const e = localDate(t.endDate);
      return (s.getFullYear() === calYear && s.getMonth() === calMonth) ||
             (e.getFullYear() === calYear && e.getMonth() === calMonth) ||
             (s <= new Date(calYear, calMonth, 1) && e >= new Date(calYear, calMonth + 1, 0));
    });
    if (!hasTripsThisMonth) {
      calYear  = earliestMonth.getFullYear();
      calMonth = earliestMonth.getMonth();
    }

    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    // Layout constants (px)
    const DAY_NUM_H  = 22;  // vertical space reserved for the day number
    const BAR_H      = 16;  // height of each trip bar
    const BAR_GAP    = 3;   // vertical gap between stacked bars
    const BOTTOM_PAD = 6;   // padding below last bar
    const MIN_CELL_H = 48;  // minimum cell height (no trips)

    function buildGridHTML(year, month) {
      const firstDay = new Date(year, month, 1);
      const lastDay  = new Date(year, month + 1, 0);

      let startOffset = firstDay.getDay() - 1;
      if (startOffset < 0) startOffset = 6;

      const tripsThisMonth = ALL_EVENTS.filter(trip => {
        const s = localDate(trip.startDate);
        const e = localDate(trip.endDate);
        return s <= lastDay && e >= firstDay;
      });

      const totalWeeks = Math.ceil((startOffset + lastDay.getDate()) / 7);
      let html = `<div class="cal-dow-row">${DOW.map(d => `<div class="cal-dow">${d}</div>`).join('')}</div>`;

      for (let week = 0; week < totalWeeks; week++) {
        const weekDayStart = week * 7 - startOffset + 1;
        const weekDates = Array.from({ length: 7 }, (_, col) => {
          const day = weekDayStart + col;
          if (day < 1 || day > lastDay.getDate()) return null;
          return new Date(year, month, day);
        });

        const weekBars = [];
        tripsThisMonth.forEach(trip => {
          const tripStart = localDate(trip.startDate);
          const tripEnd   = localDate(trip.endDate);
          let colStart = -1, colEnd = -1;
          for (let col = 0; col < 7; col++) {
            const d = weekDates[col];
            if (!d) continue;
            if (d >= tripStart && d <= tripEnd) {
              if (colStart === -1) colStart = col;
              colEnd = col;
            }
          }
          if (colStart === -1) return;
          weekBars.push({
            trip, colStart, colEnd,
            overflowLeft:  tripStart < weekDates[colStart],
            overflowRight: tripEnd   > weekDates[colEnd],
          });
        });

        const slotEndCol = [];
        weekBars.forEach(bar => {
          let slot = 0;
          while (slotEndCol[slot] !== undefined && slotEndCol[slot] >= bar.colStart) slot++;
          slotEndCol[slot] = bar.colEnd;
          bar.slot = slot;
        });

        const numSlots = slotEndCol.length;
        const cellH = Math.max(MIN_CELL_H, DAY_NUM_H + numSlots * (BAR_H + BAR_GAP) + BOTTOM_PAD);

        const daysHtml = weekDates.map((date, col) => {
          if (!date) return `<div class="cal-day empty" style="height:${cellH}px"></div>`;
          const isToday = +date === +today;
          const hasTrip = weekBars.some(b => col >= b.colStart && col <= b.colEnd);
          const isoKey = date.getFullYear() + '-' +
            String(date.getMonth() + 1).padStart(2, '0') + '-' +
            String(date.getDate()).padStart(2, '0');
          const wStatus = window.WORKOUT_STATUS && window.WORKOUT_STATUS[isoKey];
          const dotHtml = wStatus === 'done'    ? '<div class="workout-dot wd-done"></div>'
                        : wStatus === 'skipped' ? '<div class="workout-dot wd-skipped"></div>'
                        : wStatus === 'missed'  ? '<div class="workout-dot wd-missed"></div>'
                        : wStatus === 'paused'  ? '<div class="workout-dot wd-paused"></div>'
                        : '';
          return `<div class="cal-day${isToday ? ' today' : ''}${hasTrip ? ' has-trip' : ''}" style="height:${cellH}px">` +
            `<div class="cal-day-num">${date.getDate()}</div>${dotHtml}</div>`;
        }).join('');

        const barsHtml = weekBars.map(({ trip, colStart, colEnd, overflowLeft, overflowRight, slot }) => {
          const span  = colEnd - colStart + 1;
          const topPx = DAY_NUM_H + slot * (BAR_H + BAR_GAP);
          const classes = ['cal-trip-bar', `s-${esc(trip.status)}`,
            overflowLeft ? 'overflow-left' : '', overflowRight ? 'overflow-right' : ''].filter(Boolean).join(' ');
          const styleAttr = `--c:${colStart};--s:${span};top:${topPx}px;height:${BAR_H}px`;
          const titleAttr = `${esc(trip.title)} · ${esc(trip.displayDates)}`;
          if (trip.status === 'fab-event') {
            return `<button class="${classes}" data-event-id="${esc(trip.id)}" title="${titleAttr}"` +
              ` style="${styleAttr}"><span class="bar-label">${esc(trip.title)}</span></button>`;
          }
          return `<a class="${classes}" href="${esc(trip.link)}" data-event-id="${esc(trip.id)}" title="${titleAttr}"` +
            ` style="${styleAttr}"><span class="bar-label">${esc(trip.title)}</span></a>`;
        }).join('');

        html += `<div class="cal-week-wrapper"><div class="cal-week-days">${daysHtml}</div>${barsHtml}</div>`;
      }

      return { html, tripsThisMonth };
    }

    function updateLegend(tripsThisMonth) {
      const legend = document.getElementById('cal-legend');
      const statusesPresent = [...new Set(tripsThisMonth.map(t => t.status))];
      const hasFabEvent = statusesPresent.includes('fab-event');
      const tripStatuses = ['upcoming', 'ongoing', 'planning', 'past'];
      const tripStatus = tripStatuses.find(s => statusesPresent.includes(s));
      const items = [];
      if (tripStatus) items.push(`<div class="cal-legend-item"><div class="cal-legend-dot s-${esc(tripStatus)}"></div><span>Trips</span></div>`);
      if (hasFabEvent) items.push(`<div class="cal-legend-item"><div class="cal-legend-dot s-fab-event"></div><span>FaB Events</span></div>`);
      const ws = window.WORKOUT_STATUS || {};
      const vals = Object.values(ws);
      if (vals.some(v => v === 'done'))    items.push('<div class="cal-legend-item"><div class="workout-dot wd-done" style="position:static;flex-shrink:0"></div><span>Workout done</span></div>');
      if (vals.some(v => v === 'skipped')) items.push('<div class="cal-legend-item"><div class="workout-dot wd-skipped" style="position:static;flex-shrink:0"></div><span>Workout skipped</span></div>');
      if (vals.some(v => v === 'paused'))  items.push('<div class="cal-legend-item"><div class="workout-dot wd-paused" style="position:static;flex-shrink:0"></div><span>Workout paused</span></div>');
      if (vals.some(v => v === 'missed'))  items.push('<div class="cal-legend-item"><div class="workout-dot wd-missed" style="position:static;flex-shrink:0"></div><span>Workout missed</span></div>');
      legend.innerHTML = items.join('');
    }

    function isDesktop() { return window.innerWidth >= 768; }

    function nextMonthOf(year, month) {
      return month === 11 ? { year: year + 1, month: 0 } : { year, month: month + 1 };
    }

    function buildCurrentContent() {
      if (isDesktop()) {
        const nxt = nextMonthOf(calYear, calMonth);
        const { html: h1, tripsThisMonth: t1 } = buildGridHTML(calYear, calMonth);
        const { html: h2, tripsThisMonth: t2 } = buildGridHTML(nxt.year, nxt.month);
        const p1 = `<div class="cal-month-panel"><div class="cal-panel-label">${MONTH_NAMES[calMonth]} ${calYear}</div>${h1}</div>`;
        const p2 = `<div class="cal-month-panel"><div class="cal-panel-label">${MONTH_NAMES[nxt.month]} ${nxt.year}</div>${h2}</div>`;
        return { html: `<div class="cal-two-month-layout">${p1}${p2}</div>`, tripsThisMonth: [...t1, ...t2] };
      }
      return buildGridHTML(calYear, calMonth);
    }

    function currentLabel() {
      if (isDesktop()) {
        const nxt = nextMonthOf(calYear, calMonth);
        return calYear === nxt.year
          ? `${MONTH_NAMES[calMonth]} \u2013 ${MONTH_NAMES[nxt.month]} ${calYear}`
          : `${MONTH_NAMES[calMonth]} ${calYear} \u2013 ${MONTH_NAMES[nxt.month]} ${nxt.year}`;
      }
      return `${MONTH_NAMES[calMonth]} ${calYear}`;
    }

    function renderCalendar() {
      document.getElementById('cal-month-label').textContent = currentLabel();
      const { html, tripsThisMonth } = buildCurrentContent();
      document.getElementById('cal-grid').innerHTML = html;
      updateLegend(tripsThisMonth);
    }

    // Animated slide to a new month. direction: 1 = next (slide left), -1 = prev (slide right)
    function navigateTo(direction) {
      if (animating) return;
      animating = true;

      calMonth += direction;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      if (calMonth < 0)  { calMonth = 11; calYear--; }

      document.getElementById('cal-month-label').textContent = currentLabel();
      const { html, tripsThisMonth } = buildCurrentContent();
      updateLegend(tripsThisMonth);

      const viewport = document.getElementById('cal-viewport');
      const oldGrid  = document.getElementById('cal-grid');
      const w = viewport.offsetWidth;
      // On desktop (2-month view), slide by 1 month width so the animation
      // only moves one month, not two.
      const slideAmount = isDesktop() ? Math.round(w / 2) : w;
      const oldH = viewport.offsetHeight;

      const newGrid = document.createElement('div');
      newGrid.innerHTML = html;
      Object.assign(newGrid.style, {
        position: 'absolute', top: '0', left: '0', width: '100%',
        transform: `translateX(${direction > 0 ? slideAmount : -slideAmount}px)`,
      });
      viewport.appendChild(newGrid);
      const newH = newGrid.offsetHeight;

      // Lock current height then force reflow before starting transitions
      viewport.style.height = `${oldH}px`;
      newGrid.getBoundingClientRect();

      const easing = 'cubic-bezier(0.25,0.46,0.45,0.94)';
      const transition = `transform 0.32s ${easing}`;
      viewport.style.transition = `height 0.32s ${easing}`;
      oldGrid.style.transition = transition;
      newGrid.style.transition = transition;
      viewport.style.height    = `${newH}px`;
      oldGrid.style.transform  = `translateX(${direction > 0 ? -slideAmount : slideAmount}px)`;
      newGrid.style.transform  = 'translateX(0)';

      newGrid.addEventListener('transitionend', () => {
        oldGrid.id = '';
        newGrid.id = 'cal-grid';
        oldGrid.remove();
        newGrid.style.cssText = '';
        viewport.style.transition = '';
        viewport.style.height = '';
        animating = false;
      }, { once: true });
    }

    renderCalendar();
    let animating = false;

    document.getElementById('cal-prev').addEventListener('click', () => navigateTo(-1));
    document.getElementById('cal-next').addEventListener('click', () => navigateTo(1));

    // Touch swipe with live drag-follow
    const viewport = document.getElementById('cal-viewport');
    let touchStartX = null;
    let touchStartY = null;
    let dragging = false;

    viewport.addEventListener('touchstart', e => {
      if (animating) return;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      dragging = false;
    }, { passive: true });

    viewport.addEventListener('touchmove', e => {
      if (touchStartX === null || animating) return;
      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;
      // If vertical motion dominates first, cancel
      if (!dragging && Math.abs(dy) > Math.abs(dx)) { touchStartX = null; return; }
      dragging = true;
      const grid = document.getElementById('cal-grid');
      grid.style.transition = 'none';
      grid.style.transform = `translateX(${dx}px)`;
    }, { passive: true });

    // ── FAB EVENT POPUP ──────────────────────────────────────────────────────
    const popup      = document.getElementById('fab-popup');
    const popupTitle = document.getElementById('fab-popup-title');
    const popupDates = document.getElementById('fab-popup-dates');
    const popupActions = document.getElementById('fab-popup-actions');

    // Build an ID→event lookup from the global ALL_EVENTS array
    const eventById = Object.fromEntries(ALL_EVENTS.map(e => [e.id, e]));

    function openFabPopup(btn) {
      const event = eventById[btn.dataset.eventId];
      if (!event) return;

      popupTitle.textContent = event.title;
      popupDates.textContent = event.displayDates + (event.destination ? ' · ' + event.destination : '');

      popupActions.innerHTML = '';

      if (event.status === 'fab-event') {
        // Primary: link to official event page (only if available)
        if (event.link) {
          const evtBtn = document.createElement('a');
          evtBtn.className = 'fab-popup-btn p-event';
          evtBtn.href = event.link;
          evtBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H5M10 2V7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> Event Page';
          popupActions.appendChild(evtBtn);
        }

        // Optional: tournament prep link
        if (event.prepId) {
          const prepBtn = document.createElement('a');
          prepBtn.className = 'fab-popup-btn p-prep';
          prepBtn.href = `../tcg-tournament-prep/detail.html?id=${encodeURIComponent(event.prepId)}`;
          prepBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg> Tournament Prep';
          popupActions.appendChild(prepBtn);
        }

        // Optional: tournament report link
        if (event.reportId) {
          const repBtn = document.createElement('a');
          repBtn.className = 'fab-popup-btn';
          repBtn.href = `../tcg-tournament-reports/detail.html?id=${encodeURIComponent(event.reportId)}`;
          repBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="2" y="1" width="8" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M4 4h4M4 6.5h4M4 9h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> Tournament Report';
          popupActions.appendChild(repBtn);
        }
      } else {
        // Regular trip: open the page in the iframe modal
        if (event.link) {
          const tripBtn = document.createElement('button');
          tripBtn.className = `fab-popup-btn p-${esc(event.status)}`;
          tripBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6h8M6 2l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> View Trip';
          tripBtn.addEventListener('click', () => openIframeModal(event.link, event.title));
          popupActions.appendChild(tripBtn);
        }
      }

      // Position popup near the button, keeping it within viewport
      const rect = btn.getBoundingClientRect();
      const pw = popup.offsetWidth;
      const ph = popup.offsetHeight;
      const margin = 6;
      let left = rect.left;
      let top  = rect.bottom + margin;
      if (left + pw > window.innerWidth - margin) left = window.innerWidth - pw - margin;
      if (left < margin) left = margin;
      if (top + ph > window.innerHeight - margin) top = rect.top - ph - margin;
      popup.style.left = left + 'px';
      popup.style.top  = top  + 'px';
      // set transform-origin based on which side popup is anchored
      popup.style.transformOrigin = (top > rect.bottom) ? 'top left' : 'bottom left';
      popup.classList.add('open');
    }

    function closeFabPopup() { popup.classList.remove('open'); }

    // Event delegation: clicks on any calendar bar (FAB events and regular trips)
    document.addEventListener('click', e => {
      const trigger = e.target.closest('[data-event-id].cal-trip-bar');
      if (trigger) {
        e.stopPropagation();
        if (trigger.tagName === 'A') e.preventDefault();
        // Toggle: close if same bar already open
        if (popup.classList.contains('open') && popup._activeBtn === trigger) { closeFabPopup(); popup._activeBtn = null; return; }
        popup._activeBtn = trigger;
        openFabPopup(trigger);
        return;
      }
      // Click outside popup closes it
      if (popup.classList.contains('open') && !popup.contains(e.target)) { closeFabPopup(); popup._activeBtn = null; }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (iframeModal.classList.contains('open')) { closeIframeModal(); return; }
        closeFabPopup(); popup._activeBtn = null;
      }
    });

    // Close context popup when the page scrolls (it's fixed-position so it drifts from its button)
    window.addEventListener('scroll', () => {
      if (popup.classList.contains('open')) { closeFabPopup(); popup._activeBtn = null; }
    }, { passive: true });

    // ── IFRAME MODAL ──────────────────────────────────────────────────────
    const iframeModal      = document.getElementById('iframe-modal');
    const iframeModalTitle = document.getElementById('iframe-modal-title');
    const iframeModalClose = document.getElementById('iframe-modal-close');
    const iframeModalFrame = document.getElementById('iframe-modal-frame');

    function openIframeModal(url, title) {
      closeFabPopup();
      popup._activeBtn = null;
      iframeModalTitle.textContent = title || '';
      iframeModalFrame.src = url;
      iframeModal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeIframeModal() {
      iframeModal.classList.remove('open');
      document.body.style.overflow = '';
      // clear src after slide-out finishes so the iframe doesn't flash on re-open
      setTimeout(() => { iframeModalFrame.src = ''; }, 450);
    }

    iframeModalClose.addEventListener('click', closeIframeModal);

    // ── SWIPE-DOWN TO CLOSE MODAL ─────────────────────────────────────────
    const MODAL_DISMISS_THRESHOLD = 0.22;

    function applyModalDrag(dy) {
      iframeModal.style.transition = 'none';
      iframeModal.style.transform = `translateY(${Math.max(0, dy)}px)`;
    }

    function finishModalDrag(dy) {
      if (dy > window.innerHeight * MODAL_DISMISS_THRESHOLD) {
        iframeModal.style.transition = 'transform 0.32s cubic-bezier(0.32,0.72,0,1)';
        iframeModal.style.transform = 'translateY(100%)';
        document.body.style.overflow = '';
        setTimeout(() => {
          iframeModal.classList.remove('open');
          iframeModal.style.transform = '';
          iframeModal.style.transition = '';
          iframeModalFrame.src = '';
        }, 340);
      } else {
        iframeModal.style.transition = 'transform 0.3s cubic-bezier(0.32,0.72,0,1)';
        iframeModal.style.transform = 'translateY(0)';
        setTimeout(() => { iframeModal.style.transition = ''; iframeModal.style.transform = ''; }, 320);
      }
    }

    // Bar swipe: always works regardless of iframe scroll position
    {
      let startY = null, startX = null, dragging = false;
      iframeModal.addEventListener('touchstart', e => {
        if (!e.target.closest('.iframe-modal-bar')) return;
        startY = e.touches[0].clientY; startX = e.touches[0].clientX; dragging = false;
      }, { passive: true });
      iframeModal.addEventListener('touchmove', e => {
        if (startY === null) return;
        const dy = e.touches[0].clientY - startY;
        const dx = e.touches[0].clientX - startX;
        if (!dragging && Math.abs(dx) > Math.abs(dy)) { startY = null; return; }
        if (!dragging && Math.abs(dy) > 6) dragging = true;
        if (dragging) applyModalDrag(dy);
      }, { passive: true });
      iframeModal.addEventListener('touchend', e => {
        if (startY === null || !dragging) { startY = null; dragging = false; return; }
        const dy = e.changedTouches[0].clientY - startY;
        startY = null; dragging = false;
        finishModalDrag(dy);
      }, { passive: true });
    }

    // Iframe content swipe: activates when the iframe page is scrolled to the top
    function setupIframeDismissGesture() {
      const iDoc = iframeModalFrame.contentDocument;
      if (!iDoc) return;
      const iWin = iframeModalFrame.contentWindow;
      let startY = null, dragging = false;

      iDoc.addEventListener('touchstart', e => {
        // Only begin tracking if page is already at top
        startY = (iWin.scrollY === 0) ? e.touches[0].clientY : null;
        dragging = false;
      }, { passive: true });

      iDoc.addEventListener('touchmove', e => {
        if (startY === null) return;
        if (iWin.scrollY > 0) { startY = null; return; } // scrolled away from top during move
        const dy = e.touches[0].clientY - startY;
        if (!dragging && dy > 6) dragging = true;
        if (!dragging || dy <= 0) return;
        applyModalDrag(dy);
        e.preventDefault(); // block iframe from scrolling upward (rubber-band)
      }, { passive: false });

      iDoc.addEventListener('touchend', e => {
        if (startY === null || !dragging) { startY = null; dragging = false; return; }
        const dy = e.changedTouches[0].clientY - startY;
        startY = null; dragging = false;
        finishModalDrag(dy);
      }, { passive: true });
    }

    iframeModalFrame.addEventListener('load', () => {
      setupIframeDismissGesture();
    });

    // Intercept FAB popup internal links (prep / report — not external event page)
    popupActions.addEventListener('click', e => {
      const btn = e.target.closest('a.fab-popup-btn');
      if (btn && btn.href && btn.target !== '_blank') {
        e.preventDefault();
        const title = btn.textContent.trim().replace(/^\W+/, '').trim();
        openIframeModal(btn.href, title);
      }
    });

    viewport.addEventListener('touchend', e => {
      if (touchStartX === null || !dragging) { touchStartX = null; dragging = false; return; }
      const dx = e.changedTouches[0].clientX - touchStartX;
      touchStartX = null;
      dragging = false;

      const grid = document.getElementById('cal-grid');
      const threshold = viewport.offsetWidth * 0.28;

      if (Math.abs(dx) >= threshold) {
        // Complete the swipe: snap old grid the rest of the way out and slide new one in
        animating = true;
        const direction = dx < 0 ? 1 : -1;
        calMonth += direction;
        if (calMonth > 11) { calMonth = 0; calYear++; }
        if (calMonth < 0)  { calMonth = 11; calYear--; }

        document.getElementById('cal-month-label').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
        const { html, tripsThisMonth } = buildGridHTML(calYear, calMonth);
        updateLegend(tripsThisMonth);

        const w = viewport.offsetWidth;
        const slideAmount = isDesktop() ? Math.round(w / 2) : w;
        const oldH = viewport.offsetHeight;
        const newGrid = document.createElement('div');
        newGrid.innerHTML = html;
        Object.assign(newGrid.style, {
          position: 'absolute', top: '0', left: '0', width: '100%',
          transform: `translateX(${direction > 0 ? slideAmount : -slideAmount}px)`,
        });
        viewport.appendChild(newGrid);
        const newH = newGrid.offsetHeight;

        viewport.style.height = `${oldH}px`;
        newGrid.getBoundingClientRect();

        const easing = 'cubic-bezier(0.25,0.46,0.45,0.94)';
        const transition = `transform 0.28s ${easing}`;
        viewport.style.transition = `height 0.28s ${easing}`;
        grid.style.transition = transition;
        newGrid.style.transition = transition;
        viewport.style.height   = `${newH}px`;
        grid.style.transform    = `translateX(${direction > 0 ? -slideAmount : slideAmount}px)`;
        newGrid.style.transform = 'translateX(0)';

        newGrid.addEventListener('transitionend', () => {
          grid.id = '';
          newGrid.id = 'cal-grid';
          grid.remove();
          newGrid.style.cssText = '';
          viewport.style.transition = '';
          viewport.style.height = '';
          animating = false;
        }, { once: true });
      } else {
        // Snap back
        grid.style.transition = 'transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94)';
        grid.style.transform = 'translateX(0)';
        grid.addEventListener('transitionend', () => { grid.style.transition = ''; }, { once: true });
      }
    }, { passive: true });
  })();

  </script>

</body>
</html>
