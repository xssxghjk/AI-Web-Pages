<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Serif+Text:ital@0;1&display=swap">
  <script src="../nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1c1814;
      --surface: #252018;
      --surface2: #2e271d;
      --border: #3a3025;
      --border2: #4a3e2e;
      --accent: #c4864a;
      --accent-dim: rgba(196,134,74,0.10);
      --gold: #d4924a;
      --red: #c4864a;
      --text: #e8dfd0;
      --muted: #9a8a76;
      --muted2: #b5a48e;
      --muted-2: #5a4e40;
      --green: #7ab87a;
      --purple: #a07ae8;
      --cyan: #5ab4cc;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Serif Text', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 4px 4px, 6px 6px;
      background-position: 0 0, 2px 2px;
    }

    a { color: var(--muted2); text-decoration: none; }
    a:hover { color: var(--text); text-decoration: underline; }

    /* ── HERO ── */
    .hero {
      padding: 2rem 1.5rem 1.5rem;
      border-bottom: 2px solid var(--text);
      position: relative;
      z-index: 1;
    }
    .hero h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.4rem;
    }
    .hero p {
      font-style: italic;
      color: var(--muted);
      font-size: 0.9rem;
      max-width: 560px;
    }

    /* ── MAIN ── */
    .main { max-width: 1000px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; position: relative; z-index: 1; }

    /* ── SECTION ── */
    .section { margin-bottom: 3rem; }

    .section-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; }
    .section-title {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.72rem;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted2);
      white-space: nowrap;
    }
    .section-divider { flex: 1; height: 1px; background: var(--border); }

    /* ── EVENTS ── */
    .event-row {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .event-row:last-child { border-bottom: none; }

    .event-row-date { font-style: italic; font-size: 0.78rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; min-width: 130px; }
    .event-row-main { flex: 1; }
    .event-row-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      font-weight: 700;
      font-style: italic;
    }
    .event-row-venue { font-size: 0.82rem; font-style: italic; color: var(--muted); margin-top: 0.1rem; }

    .event-row-badge {
      font-size: 0.6rem;
      font-style: italic;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 1px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .event-countdown { font-size: 0.78rem; font-style: italic; white-space: nowrap; flex-shrink: 0; }

    /* ── OVERVIEW ── */
    .info-row { display: flex; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
    .info-row:last-child { border-bottom: none; padding-bottom: 0; }
    .info-row:first-child { padding-top: 0; }
    .info-key { flex-shrink: 0; width: 7rem; font-size: 0.78rem; font-style: italic; color: var(--muted); padding-top: 0.05rem; }
    .info-val { font-size: 0.88rem; color: var(--text); }
    .info-val .note { display: block; font-size: 0.78rem; font-style: italic; color: var(--muted); margin-top: 0.15rem; }

    /* ── TIMELINE ── */
    .timeline { position: relative; padding-left: 1.75rem; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 5px; top: 8px; bottom: 8px;
      width: 1px;
      background: var(--border2);
    }

    .tl-item { position: relative; margin-bottom: 1.5rem; }
    .tl-item:last-child { margin-bottom: 0; }

    .tl-item::before {
      content: '';
      position: absolute;
      left: -1.45rem; top: 7px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      border: 2px solid var(--bg);
    }

    .tl-item.tl-drive::before    { background: var(--accent); }
    .tl-item.tl-calling::before  { background: var(--gold); }
    .tl-item.tl-event::before    { background: var(--gold); }
    .tl-item.tl-bh::before       { background: var(--cyan); }
    .tl-item.tl-premiere::before { background: var(--purple); }
    .tl-item.tl-showdown::before { background: var(--cyan); }
    .tl-item.tl-protour::before  { background: var(--purple); }
    .tl-item.tl-fly::before      { background: var(--purple); }

    .tl-day {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.68rem;
      font-style: italic;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }
    .tl-item.tl-drive    .tl-day { color: var(--accent); }
    .tl-item.tl-calling  .tl-day { color: var(--gold); }
    .tl-item.tl-event    .tl-day { color: var(--gold); }
    .tl-item.tl-bh       .tl-day { color: var(--cyan); }
    .tl-item.tl-premiere .tl-day { color: var(--purple); }
    .tl-item.tl-showdown .tl-day { color: var(--cyan); }
    .tl-item.tl-protour  .tl-day { color: var(--purple); }
    .tl-item.tl-fly      .tl-day { color: var(--purple); }

    .tl-item h3 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      font-weight: 700;
      font-style: italic;
      margin-bottom: 0.15rem;
    }
    .tl-item p  { font-size: 0.82rem; font-style: italic; color: var(--muted); }

    /* ── CHECKLIST ── */
    .checklist { display: flex; flex-direction: column; gap: 0.4rem; }

    .check-item {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1px;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .check-item:hover { border-color: var(--border2); }
    .check-item.done  { background: rgba(122,184,122,0.05); border-color: rgba(122,184,122,0.2); }

    .check-box {
      width: 18px; height: 18px;
      border-radius: 1px;
      border: 1px solid var(--border2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .check-item.done .check-box { background: var(--green); border-color: var(--green); }
    .check-box svg { display: none; }
    .check-item.done .check-box svg { display: block; }

    .check-label { font-size: 0.875rem; flex: 1; }
    .check-item.done .check-label { text-decoration: line-through; color: var(--muted); }

    .check-tag {
      font-size: 0.62rem;
      font-style: italic;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.18rem 0.5rem;
      border-radius: 1px;
    }
    .tag-hotel  { background: rgba(196,134,74,0.08);   color: var(--accent); }
    .tag-event  { background: rgba(212,146,74,0.10);  color: var(--gold); }
    .tag-travel { background: rgba(90,180,204,0.10);  color: var(--cyan); }
    .tag-misc   { background: rgba(122,138,154,0.08); color: var(--muted2); }

    .checklist-progress { margin-bottom: 1rem; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.8rem; font-style: italic; color: var(--muted); margin-bottom: 0.5rem; }
    .progress-label strong { color: var(--text); font-style: normal; }
    .progress-bar-bg { height: 2px; background: var(--border); overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); transition: width 0.4s ease; }

    /* ── ITEM CONTEXT MENU ── */
    .item-ctx {
      position: fixed;
      z-index: 500;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 2px;
      padding: 0.8rem 0.85rem;
      min-width: 200px;
      max-width: 260px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      visibility: hidden;
      opacity: 0;
      transform: scale(0.92) translateY(-4px);
      transform-origin: top left;
      pointer-events: none;
      transition: opacity 0.16s ease, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), visibility 0s linear 0.2s;
    }
    .item-ctx.open {
      visibility: visible;
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
      transition: opacity 0.16s ease, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), visibility 0s linear 0s;
    }
    .item-ctx-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--text);
      margin-bottom: 0.55rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 230px;
    }
    .item-ctx-actions { display: flex; gap: 0.3rem; }
    .item-ctx-btn {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.6rem;
      border-radius: 1px;
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.75rem;
      font-style: italic;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .item-ctx-btn:hover { border-color: var(--muted); background: var(--border); }
    .item-ctx-btn-delete { color: var(--red); border-color: rgba(192,64,64,0.3); background: rgba(192,64,64,0.07); }
    .item-ctx-btn-delete:hover { border-color: var(--red); background: rgba(192,64,64,0.14); }
    .item-ctx-edit { display: none; flex-direction: column; gap: 0.4rem; margin-bottom: 0.4rem; }
    .item-ctx-input {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 1px;
      padding: 0.45rem 0.6rem;
      color: var(--text);
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.82rem;
      outline: none;
      width: 100%;
    }
    .item-ctx-input:focus { border-color: var(--accent); }
    .item-ctx-select {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 1px;
      padding: 0.35rem 0.5rem;
      color: var(--text);
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.78rem;
      outline: none;
      color-scheme: dark;
      width: 100%;
    }
    .item-ctx-edit-btns { display: flex; gap: 0.3rem; }
    .item-ctx-btn-save { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .item-ctx-btn-save:hover { opacity: 0.88; border-color: var(--accent); background: var(--accent); }
    .item-ctx-btn-check { color: var(--green); border-color: rgba(107,158,107,0.3); background: rgba(107,158,107,0.07); }
    .item-ctx-btn-check:hover { border-color: var(--green); background: rgba(107,158,107,0.14); }

    /* ── ADD ITEM ── */
    .add-item-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; align-items: center; }
    .add-item-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1px;
      padding: 0.65rem 0.9rem;
      color: var(--text);
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-item-input::placeholder { color: var(--muted); font-style: italic; }
    .add-item-input:focus { border-color: var(--accent); }
    .add-item-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1px;
      padding: 0.65rem 0.5rem;
      color: var(--muted);
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
      color-scheme: dark;
    }
    .add-item-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 1px;
      padding: 0.65rem 1rem;
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.82rem;
      font-style: italic;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .add-item-btn:hover { opacity: 0.88; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .event-row { flex-wrap: wrap; row-gap: 0.2rem; column-gap: 0.5rem; }
      .event-row-date { min-width: unset; flex-basis: 100%; display: flex; align-items: center; gap: 0.5rem; }
      .event-countdown { order: 2; }
      .event-row-badge { order: 3; }
      .event-row-main  { flex-basis: 100%; order: 4; }
      .add-item-row { flex-wrap: wrap; }
      .add-item-input { flex: 1 1 100%; min-width: 0; }
      .add-item-select { flex: 1; }
    }

    /* ── FOOTER ── */
    footer {
      padding: 1.75rem 2rem;
      font-size: 0.78rem;
      font-style: italic;
      color: var(--muted-2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

<script src="data.js"></script>
<script>
(function () {
  const id   = new URLSearchParams(location.search).get('id');
  const trip = TRIP_PAGES[id];

  if (!trip) {
    document.title = 'Trip not found';
    document.body.innerHTML = '<div style="padding:3rem 2rem;color:#e8e8e8;font-family:system-ui">Trip not found. <a href="../trips/" style="color:#3b82f6">← All Trips</a></div>';
    return;
  }

  document.title = trip.title;

  // ── City-specific accent colors ───────────────────────────────────────────
  const CITY_ACCENTS = {
    'rotterdam-2026':       { accent: '#4a9fe8', dim: 'rgba(74,159,232,0.12)',  gold: '#6ab0e8' },
    'hamburg-2026':         { accent: '#e05040', dim: 'rgba(224,80,64,0.12)',   gold: '#e07060' },
    'hamburg-calling-2026': { accent: '#e05040', dim: 'rgba(224,80,64,0.12)',   gold: '#e07060' },
    'yokohama-pro-tour':    { accent: '#e83050', dim: 'rgba(232,48,80,0.12)',   gold: '#e85070' },
    'prague-omens-2026':    { accent: '#c8921c', dim: 'rgba(200,146,28,0.12)', gold: '#d4a840' },
  };
  const cityColors = CITY_ACCENTS[id];
  if (cityColors) {
    const root = document.documentElement;
    root.style.setProperty('--accent',     cityColors.accent);
    root.style.setProperty('--accent-dim', cityColors.dim);
    root.style.setProperty('--gold',       cityColors.gold);
  }

  // ── Configs ──────────────────────────────────────────────────────────────

  const BADGE = {
    calling:  { label: 'Calling',        color: '#f59e0b', bg: 'rgba(245,158,11,0.12)',   border: 'rgba(245,158,11,0.25)'   },
    bh:       { label: 'Battle Hardened', color: '#22d3ee', bg: 'rgba(34,211,238,0.12)',   border: 'rgba(34,211,238,0.25)'   },
    premiere: { label: 'Premiere',        color: '#e879f9', bg: 'rgba(232,121,249,0.12)',  border: 'rgba(232,121,249,0.25)'  },
    showdown: { label: 'Showdown',        color: '#22d3ee', bg: 'rgba(34,211,238,0.12)',   border: 'rgba(34,211,238,0.25)'   },
    protour:  { label: 'Pro Tour',        color: '#e879f9', bg: 'rgba(168,85,247,0.12)',   border: 'rgba(168,85,247,0.25)'   },
  };

  const CD_COLOR = {
    calling:  'var(--gold)',
    bh:       'var(--cyan)',
    premiere: 'var(--purple)',
    showdown: 'var(--cyan)',
    protour:  'var(--purple)',
  };

  const TAG_CONFIG = {
    event:  { cls: 'tag-event',  label: 'Event'  },
    hotel:  { cls: 'tag-hotel',  label: 'Hotel'  },
    travel: { cls: 'tag-travel', label: 'Travel' },
    misc:   { cls: 'tag-misc',   label: 'Misc'   },
  };

  // ── HTML helpers ─────────────────────────────────────────────────────────

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderEvents() {
    return trip.events.map((ev, i) => {
      const b        = BADGE[ev.badge] || { label: ev.badge, color: '#94a3b8', bg: 'rgba(148,163,184,0.1)', border: 'rgba(148,163,184,0.25)' };
      const cdColor  = ev.countdown ? (CD_COLOR[ev.countdown.type] || '#94a3b8') : '';
      return `
      <div class="event-row">
        <div class="event-row-date">${esc(ev.date)}</div>
        <div class="event-row-main">
          <div class="event-row-name">${esc(ev.name)}</div>
          <div class="event-row-venue">${esc(ev.venue)}</div>
        </div>
        ${ev.countdown ? `<div class="event-countdown" id="cd-${i}" style="color:${cdColor}"></div>` : ''}
        <div class="event-row-badge" style="background:${b.bg};color:${b.color};border:1px solid ${b.border}">${esc(b.label)}</div>
      </div>`;
    }).join('');
  }

  function renderOverview() {
    return trip.overview.map(row => `
      <div class="info-row">
        <span class="info-key">${esc(row.key)}</span>
        <span class="info-val">${esc(row.value)}${row.note ? `<span class="note">${esc(row.note)}</span>` : ''}</span>
      </div>`).join('');
  }

  function renderTimeline() {
    return trip.timeline.map(item => `
      <div class="tl-item${item.type ? ' tl-' + item.type : ''}">
        <div class="tl-day">${esc(item.day)}</div>
        <h3>${esc(item.title)}</h3>
        <p>${esc(item.desc)}</p>
      </div>`).join('');
  }

  function checkItemHTML(id, label, tag) {
    return `
      <div class="check-item" data-id="${esc(id)}" data-tag="${esc(tag || 'misc')}">
        <div class="check-box"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="check-label"></div>
      </div>`;
  }

  function renderChecklist() {
    return trip.checklist.map(item => checkItemHTML(item.id, item.label, item.tag)).join('');
  }

  // ── Build page ───────────────────────────────────────────────────────────

  document.body.innerHTML = `

    <header class="hero">
      <h1>${esc(trip.title)}</h1>
      <p>${esc(trip.heroText)}</p>
    </header>

    <div class="main">
      <div class="section" id="events">
        <div class="section-header"><span class="section-title">Events</span><div class="section-divider"></div></div>
        ${renderEvents()}
      </div>

      <div class="section" id="overview">
        <div class="section-header"><span class="section-title">Overview</span><div class="section-divider"></div></div>
        ${renderOverview()}
      </div>

      <div class="section" id="timeline">
        <div class="section-header"><span class="section-title">Timeline</span><div class="section-divider"></div></div>
        <div class="timeline">${renderTimeline()}</div>
      </div>

      <div class="section" id="checklist">
        <div class="section-header"><span class="section-title">Booking Checklist</span><div class="section-divider"></div></div>
        <div class="checklist-progress">
          <div class="progress-label"><span>Progress</span><strong id="progress-text">0 / ${trip.checklist.length} done</strong></div>
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
        </div>
        <div class="checklist" id="checklist-items">${renderChecklist()}</div>
        <div class="add-item-row">
          <input type="text" id="new-item-label" class="add-item-input" placeholder="Add a checklist item…" />
          <button id="add-item-btn" class="add-item-btn">Add</button>
        </div>
      </div>
    </div>

    <footer>
      <span id="page-version" style="opacity:0.65"></span>
      <a href="https://github.com/xssxghjk/AI-Web-Pages" target="_blank" rel="noopener">View on GitHub</a>
      <span id="storage-size"></span>
    </footer>

    <div class="item-ctx" id="item-ctx">
      <div class="item-ctx-title" id="item-ctx-title"></div>
      <div class="item-ctx-edit" id="item-ctx-edit">
        <input class="item-ctx-input" id="item-ctx-input" type="text" />
        <div class="item-ctx-edit-btns">
          <button class="item-ctx-btn item-ctx-btn-save" id="item-ctx-save">Save</button>
          <button class="item-ctx-btn" id="item-ctx-cancel">Cancel</button>
        </div>
      </div>
      <div class="item-ctx-actions" id="item-ctx-actions">
        <button class="item-ctx-btn item-ctx-btn-check" id="item-ctx-do-check">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          <span id="item-ctx-check-label">Check</span>
        </button>
        <button class="item-ctx-btn" id="item-ctx-do-edit">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5l2 2L4 10H2v-2L8.5 1.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          Edit
        </button>
        <button class="item-ctx-btn item-ctx-btn-delete" id="item-ctx-do-delete">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 3h8M5 3V2h2v1M4.5 5v4.5M7.5 5v4.5M3 3l.5 7h5L9 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Delete
        </button>
      </div>
    </div>
  `;

  // Set label text safely (avoids XSS in user-authored labels)
  document.querySelectorAll('.check-item').forEach((el, idx) => {
    el.querySelector('.check-label').textContent = trip.checklist[idx].label;
  });

  // ── Checklist state ───────────────────────────────────────────────────────

  const STORAGE_KEY  = trip.storageKey;
  const listEl       = document.getElementById('checklist-items');
  const progressFill = document.getElementById('progress-fill');
  const progressText = document.getElementById('progress-text');

  function loadState() {
    try {
      const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!raw) return { checked: {}, deleted: [], custom: [] };
      if ('checked' in raw || 'deleted' in raw || 'custom' in raw)
        return { checked: raw.checked || {}, deleted: raw.deleted || [], custom: raw.custom || [] };
      return { checked: raw, deleted: [], custom: [] };
    } catch { return { checked: {}, deleted: [], custom: [] }; }
  }

  function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  const state = loadState();

  function updateProgress() {
    const all  = listEl.querySelectorAll('.check-item');
    const done = listEl.querySelectorAll('.check-item.done').length;
    progressFill.style.width = all.length ? Math.round((done / all.length) * 100) + '%' : '0%';
    progressText.textContent = done + ' / ' + all.length + ' done';
  }

  function wireItem(el) {
    el.querySelector('.check-box').addEventListener('click', e => {
      e.stopPropagation();
      el.classList.toggle('done');
      state.checked[el.dataset.id] = el.classList.contains('done');
      saveState();
      updateProgress();
    });
    el.addEventListener('click', e => {
      e.stopPropagation();
      openItemCtx(el);
    });
  }

  listEl.querySelectorAll('.check-item').forEach(item => {
    if (state.deleted.includes(item.dataset.id)) { item.remove(); return; }
    if (state.checked[item.dataset.id]) item.classList.add('done');
    wireItem(item);
  });

  function renderCustom(c) {
    const el  = document.createElement('div');
    el.className   = 'check-item' + (state.checked[c.id] ? ' done' : '');
    el.dataset.id  = c.id;
    el.dataset.tag = c.tag || 'misc';
    el.innerHTML   = `<div class="check-box"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><div class="check-label"></div>`;
    el.querySelector('.check-label').textContent = c.label;
    listEl.appendChild(el);
    wireItem(el);
  }

  state.custom.forEach(renderCustom);
  updateProgress();

  document.getElementById('add-item-btn').addEventListener('click', () => {
    const labelEl = document.getElementById('new-item-label');
    const label   = labelEl.value.trim();
    if (!label) { labelEl.focus(); return; }
    const c = { id: 'custom-' + Date.now(), label, tag: 'misc' };
    state.custom.push(c);
    saveState();
    renderCustom(c);
    updateProgress();
    labelEl.value = '';
    labelEl.focus();
  });

  document.getElementById('new-item-label').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('add-item-btn').click();
  });

  // ── Item context menu ─────────────────────────────────────────────────────

  const itemCtx       = document.getElementById('item-ctx');
  const itemCtxTitle  = document.getElementById('item-ctx-title');
  const itemCtxActions = document.getElementById('item-ctx-actions');
  const itemCtxEdit   = document.getElementById('item-ctx-edit');
  const itemCtxInput  = document.getElementById('item-ctx-input');
  let activeCtxItem   = null;

  function openItemCtx(el) {
    if (itemCtx.classList.contains('open') && activeCtxItem === el) { closeItemCtx(); return; }
    activeCtxItem = el;
    itemCtxTitle.textContent     = el.querySelector('.check-label').textContent;
    itemCtxEdit.style.display    = 'none';
    itemCtxActions.style.display = 'flex';
    document.getElementById('item-ctx-check-label').textContent = el.classList.contains('done') ? 'Uncheck' : 'Check';
    const rect   = el.getBoundingClientRect();
    const pw     = itemCtx.offsetWidth || 220;
    const ph     = itemCtx.offsetHeight || 90;
    const margin = 8;
    let left = rect.left;
    let top  = rect.bottom + margin;
    if (left + pw > window.innerWidth  - margin) left = window.innerWidth  - pw - margin;
    if (left < margin) left = margin;
    if (top  + ph > window.innerHeight - margin) top  = rect.top - ph - margin;
    itemCtx.style.left            = left + 'px';
    itemCtx.style.top             = top  + 'px';
    itemCtx.style.transformOrigin = (top < rect.top) ? 'bottom left' : 'top left';
    itemCtx.classList.add('open');
  }

  function closeItemCtx() { itemCtx.classList.remove('open'); activeCtxItem = null; }

  document.getElementById('item-ctx-do-check').addEventListener('click', () => {
    if (!activeCtxItem) return;
    activeCtxItem.classList.toggle('done');
    state.checked[activeCtxItem.dataset.id] = activeCtxItem.classList.contains('done');
    saveState();
    updateProgress();
    closeItemCtx();
  });

  document.getElementById('item-ctx-do-edit').addEventListener('click', () => {
    if (!activeCtxItem) return;
    itemCtxInput.value           = activeCtxItem.querySelector('.check-label').textContent;
    itemCtxActions.style.display = 'none';
    itemCtxEdit.style.display    = 'flex';
    itemCtxInput.focus();
    itemCtxInput.select();
  });

  function saveEdit() {
    if (!activeCtxItem) return;
    const newLabel = itemCtxInput.value.trim();
    if (!newLabel) { itemCtxInput.focus(); return; }
    activeCtxItem.querySelector('.check-label').textContent = newLabel;
    const elId = activeCtxItem.dataset.id;
    if (elId.startsWith('custom-')) {
      const c = state.custom.find(c => c.id === elId);
      if (c) { c.label = newLabel; }
      saveState();
    }
    closeItemCtx();
  }

  document.getElementById('item-ctx-save').addEventListener('click', saveEdit);
  document.getElementById('item-ctx-input').addEventListener('keydown', e => { if (e.key === 'Enter') saveEdit(); });

  document.getElementById('item-ctx-cancel').addEventListener('click', () => {
    itemCtxEdit.style.display    = 'none';
    itemCtxActions.style.display = 'flex';
  });

  document.getElementById('item-ctx-do-delete').addEventListener('click', () => {
    if (!activeCtxItem) return;
    const el   = activeCtxItem;
    const elId = el.dataset.id;
    if (elId.startsWith('custom-')) {
      state.custom = state.custom.filter(c => c.id !== elId);
    } else {
      if (!state.deleted.includes(elId)) state.deleted.push(elId);
    }
    delete state.checked[elId];
    saveState();
    closeItemCtx();
    el.remove();
    updateProgress();
  });

  document.addEventListener('click', e => {
    if (itemCtx.classList.contains('open') && !itemCtx.contains(e.target)) closeItemCtx();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeItemCtx(); });
  window.addEventListener('scroll', () => { if (itemCtx.classList.contains('open')) closeItemCtx(); }, { passive: true });

  // ── Countdowns ────────────────────────────────────────────────────────────

  function daysUntil(dateStr) {
    const target = new Date(dateStr + 'T00:00:00');
    const today  = new Date(); today.setHours(0, 0, 0, 0);
    return Math.round((target - today) / 86400000);
  }

  trip.events.forEach((ev, i) => {
    if (!ev.countdown) return;
    const el = document.getElementById('cd-' + i);
    if (!el) return;
    const d = daysUntil(ev.countdown.date);
    if      (d > 0) el.textContent = 'In ' + d + 'd';
    else if (d === 0) el.textContent = 'Today';
    else { el.textContent = Math.abs(d) + 'd ago'; el.style.color = 'var(--muted)'; }
  });

})();
</script>
<script>fetch('../version.json').then(r=>r.json()).then(v=>{var e=document.getElementById('page-version');if(e)e.textContent='v'+v.version}).catch(()=>{});</script>
