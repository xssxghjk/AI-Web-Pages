<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — xssxghjk</title>
  <!-- GitHub Pages SPA routing: redirect to hub with path stored in session -->
  <script>
    // Preserve the path and redirect to the hub
    const path = window.location.pathname;
    // If the path has a known sub-page, try to redirect there via root
    sessionStorage.setItem('redirect', path);
    window.location.replace('/AI-Web-Pages/' + (path.replace(/^\/AI-Web-Pages/, '').replace(/^\//, '') || ''));
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    @keyframes glitch {
      0%   { text-shadow: 4px 0 0 #ff2d20, -4px 0 0 #00d4ff; transform: skewX(0deg); }
      10%  { text-shadow: -4px 0 0 #ff2d20,  4px 0 0 #00d4ff; transform: skewX(-2deg); }
      20%  { text-shadow:  4px 0 0 #ff2d20, -4px 0 0 #00d4ff; transform: skewX(0deg); }
      25%  { text-shadow: 0 0 0 transparent; transform: skewX(0deg); }
      100% { text-shadow: 0 0 0 transparent; transform: skewX(0deg); }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f5f5;
      color: #111;
      font-family: 'IBM Plex Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .container { position: relative; z-index: 1; }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(8rem, 25vw, 18rem);
      line-height: 0.9;
      color: #111;
      letter-spacing: -0.02em;
      animation: glitch 3s ease-in-out infinite;
      margin-bottom: 0.1em;
    }
    .label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ff2d20;
      margin-bottom: 0.75rem;
      border-top: 2px solid #ff2d20;
      padding-top: 0.5rem;
      display: inline-block;
    }
    p {
      color: #555;
      font-size: 0.82rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    a {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      color: #111;
      padding: 0.65rem 1.5rem;
      border: 2px solid #111;
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: inline-block;
    }
    a:hover {
      background: #ff2d20;
      border-color: #ff2d20;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <div class="label">Page Not Found</div>
    <p>Redirecting you to the hub…</p>
    <a href="/AI-Web-Pages/">Go to Hub</a>
  </div>
</body>
</html>
