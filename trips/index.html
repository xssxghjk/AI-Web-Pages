<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trips</title>
  <script src="../nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0c;
      --surface: #111114;
      --surface2: #18181d;
      --border: #222228;
      --border2: #2e2e36;
      --accent: #6c5ce7;
      --accent-dim: rgba(108,92,231,0.15);
      --text: #e2e2ea;
      --muted: #6b6b7e;
      --muted2: #9494a8;
      --muted-2: #4a4a5a;
      --upcoming: #6c5ce7;
      --upcoming-bg: rgba(108,92,231,0.08);
      --upcoming-border: rgba(108,92,231,0.25);
      --ongoing: #22c55e;
      --ongoing-bg: rgba(34,197,94,0.08);
      --ongoing-border: rgba(34,197,94,0.25);
      --past: #94a3b8;
      --past-bg: rgba(148,163,184,0.08);
      --past-border: rgba(148,163,184,0.25);
      --planning: #14b8a6;
      --planning-bg: rgba(20,184,166,0.08);
      --planning-border: rgba(20,184,166,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    /* ── HERO ── */
    .hero {
      padding: 1.5rem 1.5rem 1.25rem;
      text-align: center;
      background: linear-gradient(180deg, rgba(108,92,231,0.05) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    .hero h1 {
      font-size: clamp(1.3rem, 3vw, 1.9rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }
    .hero p {
      color: var(--muted);
      font-size: 0.9rem;
      max-width: 520px;
      margin-inline: auto;
      margin-bottom: 1rem;
    }
    .hero-stats {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-pill {
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--muted2);
    }
    .stat-pill.upcoming { color: var(--upcoming); background: var(--upcoming-bg); border-color: var(--upcoming-border); }
    .stat-pill.past     { color: var(--past);     background: var(--past-bg);     border-color: var(--past-border); }

    /* ── FILTER TOGGLE ── */
    .filter-toggle-bar {
      padding: 0.55rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--surface);
    }
    .filter-toggle-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-toggle-btn:hover { border-color: var(--muted2); color: var(--text); }
    .filter-toggle-btn.has-filters {
      background: rgba(108,92,231,0.1);
      border-color: rgba(108,92,231,0.4);
      color: var(--accent);
    }
    .filter-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.1rem;
      height: 1.1rem;
      border-radius: 999px;
      background: var(--accent);
      color: #0a0a0c;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 0 0.25rem;
    }
    .filter-active-tags {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-active-tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      background: rgba(108,92,231,0.1);
      border: 1px solid rgba(108,92,231,0.3);
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .filter-active-tag:hover { background: rgba(108,92,231,0.18); }
    .filter-active-tag .remove { opacity: 0.7; font-size: 0.8rem; line-height: 1; }

    /* ── FILTER PANEL ── */
    .filter-panel {
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.22s ease, padding 0.22s ease;
      padding: 0 1.5rem;
    }
    .filter-panel.open {
      max-height: 120px;
      padding: 0.85rem 1.5rem;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.55rem;
    }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      min-width: 2.5rem;
    }
    .filter-pills { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .filter-pill {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-pill:hover { border-color: var(--muted2); color: var(--text); }
    .filter-pill.active {
      background: rgba(108,92,231,0.12);
      border-color: rgba(108,92,231,0.45);
      color: var(--accent);
    }
    .filter-pill.s-upcoming.active { background: var(--upcoming-bg); border-color: var(--upcoming-border); color: var(--upcoming); }
    .filter-pill.s-ongoing.active  { background: var(--ongoing-bg);  border-color: var(--ongoing-border);  color: var(--ongoing); }
    .filter-pill.s-past.active     { background: var(--past-bg);     border-color: var(--past-border);     color: var(--past); }
    .filter-pill.s-planning.active { background: var(--planning-bg); border-color: var(--planning-border); color: var(--planning); }

    /* ── MAIN ── */
    .main {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1.25rem 4rem;
    }

    .no-results {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── TILES GRID ── */
    .tiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.5rem;
    }

    /* ── TRIP TILE ── */
    .trip-tile {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      border-left-width: 3px;
      padding: 0.65rem 1rem;
      transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
    }
    .trip-tile:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .trip-tile.s-upcoming { border-left-color: var(--upcoming); }
    .trip-tile.s-ongoing  { border-left-color: var(--ongoing); }
    .trip-tile.s-past     { border-left-color: var(--past); }
    .trip-tile.s-planning { border-left-color: var(--planning); }
    .trip-tile.s-upcoming:hover { border-color: var(--upcoming-border); }
    .trip-tile.s-ongoing:hover  { border-color: var(--ongoing-border); }
    .trip-tile.s-past:hover     { border-color: var(--past-border); }
    .trip-tile.s-planning:hover { border-color: var(--planning-border); }

    .tile-left {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .tile-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }
    .tile-fab-tag {
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #f59e0b;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 999px;
      padding: 0.1rem 0.45rem;
      align-self: flex-start;
    }

    .tile-countdown {
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .trip-tile.s-upcoming .tile-countdown { color: var(--upcoming); }
    .trip-tile.s-ongoing  .tile-countdown { color: var(--ongoing); }
    .trip-tile.s-past     .tile-countdown { color: var(--muted); }
    .trip-tile.s-planning .tile-countdown { color: var(--planning); }

    /* ── CALENDAR LINK ── */
    .cal-link {
      margin-left: auto;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted2);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .cal-link:hover { color: var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .tiles-grid { grid-template-columns: 1fr; }
    }

    /* ── FOOTER ── */
    footer {
      padding: 1.75rem 2rem;
      font-size: 0.78rem;
      color: var(--muted-2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: auto;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <header class="hero">
    <h1>Trips</h1>
    <p>Itineraries, hotel picks, booking info, and day-by-day logistics.</p>
    <div class="hero-stats" id="hero-stats"></div>
  </header>

  <div class="filter-toggle-bar">
    <button class="filter-toggle-btn" id="filter-toggle-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 2.5h10M3 6h6M5 9.5h2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Filter
      <span class="filter-badge" id="filter-badge" style="display:none"></span>
    </button>
    <div class="filter-active-tags" id="filter-active-tags"></div>
    <a class="cal-link" href="../calendar/">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="1" y="2" width="9" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M1 5h9M4 1v2M7 1v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      View trip calendar
    </a>
  </div>
  <div class="filter-panel" id="filter-panel">
    <div class="filter-group">
      <span class="filter-label">Status</span>
      <div class="filter-pills" id="status-filter"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Region</span>
      <div class="filter-pills" id="region-filter"></div>
    </div>
  </div>

  <main class="main">
    <div class="tiles-grid" id="trips-container"></div>
    <div class="no-results" id="no-results" style="display:none">No trips match the selected filters.</div>
  </main>

  <footer>
    <span>Built with Claude <span id="page-version" style="opacity:0.65"></span></span>
    <a href="https://github.com/xssxghjk/AI-Web-Pages" target="_blank" rel="noopener">View on GitHub</a>
  </footer>
  <script>fetch('../version.json').then(r=>r.json()).then(v=>{var e=document.getElementById('page-version');if(e)e.textContent='\xb7 v'+v.version}).catch(()=>{});</script>

  <script src="trips.js"></script>
  <script>
  (function () {

    const STATUS_LABELS = {
      upcoming: 'Upcoming',
      ongoing:  'Ongoing',
      past:     'Past',
      planning: 'Planning',
    };

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    TRIPS.sort((a, b) => (a.startDate > b.startDate ? 1 : -1));

    /* ── RENDER TILE ── */
    function daysUntil(startDate, endDate, status) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const start = new Date(startDate);
      const end   = new Date(endDate);
      if (status === 'ongoing') return 'Ongoing';
      if (status === 'past')    return 'Past';
      if (status === 'planning') return 'Planning';
      const diff = Math.round((start - today) / 86400000);
      if (diff === 0) return 'Today!';
      if (diff === 1) return 'Tomorrow';
      if (diff < 0)   return 'Past';
      return `In ${diff} day${diff !== 1 ? 's' : ''}`;
    }

    function renderTile(t) {
      const countdown = daysUntil(t.startDate, t.endDate, t.status);
      const hasFab = t.tags && t.tags.includes('FaB');
      return `
        <a
          class="trip-tile s-${esc(t.status)}"
          href="${esc(t.link)}"
          target="_top"
          data-status="${esc(t.status)}"
          data-region="${esc(t.region.toLowerCase())}"
        >
          <div class="tile-left">
            <div class="tile-title">${esc(t.title)}</div>
            ${hasFab ? '<span class="tile-fab-tag">FaB</span>' : ''}
          </div>
          <div class="tile-countdown">${esc(countdown)}</div>
        </a>`;
    }

    /* ── FILTER STATE ── */
    let activeStatus = 'all';
    let activeRegion = 'all';
    const regionLabelMap = {};

    function updateFilterUI() {
      const activeCount = (activeStatus !== 'all' ? 1 : 0) + (activeRegion !== 'all' ? 1 : 0);
      const badge = document.getElementById('filter-badge');
      const btn   = document.getElementById('filter-toggle-btn');
      const tags  = document.getElementById('filter-active-tags');

      badge.style.display = activeCount > 0 ? '' : 'none';
      badge.textContent = activeCount;
      btn.classList.toggle('has-filters', activeCount > 0);

      const parts = [];
      if (activeStatus !== 'all') parts.push({ label: STATUS_LABELS[activeStatus] || activeStatus, type: 'status' });
      if (activeRegion !== 'all') parts.push({ label: regionLabelMap[activeRegion] || activeRegion, type: 'region' });

      tags.innerHTML = parts.map(p =>
        `<span class="filter-active-tag" data-clear="${p.type}">
          ${esc(p.label)}<span class="remove">×</span>
        </span>`
      ).join('');

      tags.querySelectorAll('.filter-active-tag').forEach(tag => {
        tag.addEventListener('click', () => {
          const ftype = tag.dataset.clear;
          if (ftype === 'status') activeStatus = 'all';
          if (ftype === 'region') activeRegion = 'all';
          document.querySelectorAll(`[data-ftype="${ftype}"]`)
            .forEach(b => b.classList.toggle('active', b.dataset.fval === 'all'));
          applyFilters();
        });
      });
    }

    function applyFilters() {
      const tiles = document.querySelectorAll('.trip-tile');
      let visible = 0;
      tiles.forEach(tile => {
        const statusMatch = activeStatus === 'all' || tile.dataset.status === activeStatus;
        const regionMatch = activeRegion === 'all' || tile.dataset.region === activeRegion;
        const show = statusMatch && regionMatch;
        tile.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
      updateFilterUI();
    }

    /* ── BUILD FILTERS ── */
    function buildFilters() {
      const statuses = [...new Set(TRIPS.map(t => t.status))];
      const regions  = [...new Set(TRIPS.map(t => t.region))].sort();

      const statusEl = document.getElementById('status-filter');
      statusEl.innerHTML =
        `<button class="filter-pill active" data-ftype="status" data-fval="all">All</button>` +
        statuses.map(s =>
          `<button class="filter-pill s-${esc(s)}" data-ftype="status" data-fval="${esc(s)}">${esc(STATUS_LABELS[s] || s)}</button>`
        ).join('');

      const regionEl = document.getElementById('region-filter');
      regionEl.innerHTML =
        `<button class="filter-pill active" data-ftype="region" data-fval="all">All</button>` +
        regions.map(r => {
          regionLabelMap[r.toLowerCase()] = r;
          return `<button class="filter-pill" data-ftype="region" data-fval="${esc(r.toLowerCase())}">${esc(r)}</button>`;
        }).join('');

      document.querySelectorAll('.filter-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          const ftype = btn.dataset.ftype;
          const fval  = btn.dataset.fval;
          if (ftype === 'status') activeStatus = fval;
          if (ftype === 'region') activeRegion = fval;
          document.querySelectorAll(`[data-ftype="${ftype}"]`)
            .forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          applyFilters();
        });
      });

      /* ── FILTER TOGGLE ── */
      const toggleBtn   = document.getElementById('filter-toggle-btn');
      const filterPanel = document.getElementById('filter-panel');
      toggleBtn.addEventListener('click', () => {
        filterPanel.classList.toggle('open');
      });
    }

    /* ── BUILD STATS ── */
    function buildStats() {
      const upcomingCount = TRIPS.filter(t => t.status === 'upcoming' || t.status === 'ongoing').length;
      const pastCount     = TRIPS.filter(t => t.status === 'past').length;
      document.getElementById('hero-stats').innerHTML = `
        <span class="stat-pill">${TRIPS.length} trip${TRIPS.length !== 1 ? 's' : ''}</span>
        ${upcomingCount > 0 ? `<span class="stat-pill upcoming">${upcomingCount} upcoming</span>` : ''}
        ${pastCount     > 0 ? `<span class="stat-pill past">${pastCount} past</span>` : ''}`;
    }

    /* ── INIT ── */
    function init() {
      const container = document.getElementById('trips-container');
      container.innerHTML = TRIPS.map(renderTile).join('');
      buildStats();
      buildFilters();
    }

    init();

  })();
  </script>

</body>
</html>
