<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trips</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Serif+Text:ital@0;1&display=swap">
  <script src="../nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1c1814;
      --surface: #252018;
      --surface2: #2e271d;
      --border: #3a3025;
      --border2: #4a3e2e;
      --accent: #c4864a;
      --accent-dim: rgba(196,134,74,0.10);
      --text: #e8dfd0;
      --muted: #9a8a76;
      --muted2: #b5a48e;
      --muted-2: #5a4e40;
      --upcoming: #d4924a;
      --upcoming-bg: rgba(212,146,74,0.10);
      --upcoming-border: rgba(212,146,74,0.25);
      --ongoing: #7ab87a;
      --ongoing-bg: rgba(122,184,122,0.10);
      --ongoing-border: rgba(122,184,122,0.25);
      --past: #7a8a9a;
      --past-bg: rgba(122,138,154,0.10);
      --past-border: rgba(122,138,154,0.22);
      --planning: #5ab4cc;
      --planning-bg: rgba(90,180,204,0.10);
      --planning-border: rgba(90,180,204,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Serif Text', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 4px 4px, 6px 6px;
      background-position: 0 0, 2px 2px;
    }

    /* ── HERO ── */
    .hero {
      padding: 2rem 1.5rem 1.5rem;
      border-bottom: 2px solid var(--text);
      position: relative;
      z-index: 1;
    }
    .hero-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: baseline; gap: 1.5rem; flex-wrap: wrap; }
    .hero h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }
    .hero p {
      color: var(--muted);
      font-size: 0.9rem;
      font-style: italic;
    }
    .hero-stats {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
      width: 100%;
    }
    .stat-pill {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.78rem;
      font-style: italic;
      padding: 0.3rem 0.9rem;
      border-radius: 2px;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--muted2);
    }
    .stat-pill.upcoming { color: var(--upcoming); background: var(--upcoming-bg); border-color: var(--upcoming-border); }
    .stat-pill.past     { color: var(--past);     background: var(--past-bg);     border-color: var(--past-border); }

    /* ── FILTER TOGGLE ── */
    .filter-toggle-bar {
      padding: 0.55rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--surface);
      position: relative;
      z-index: 1;
    }
    .filter-toggle-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.75rem;
      font-style: italic;
      padding: 0.25rem 0.65rem;
      border-radius: 2px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-toggle-btn:hover { border-color: var(--muted2); color: var(--text); }
    .filter-toggle-btn.has-filters {
      background: var(--accent-dim);
      border-color: rgba(196,134,74,0.35);
      color: var(--accent);
    }
    .filter-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.1rem;
      height: 1.1rem;
      border-radius: 999px;
      background: var(--accent);
      color: var(--bg);
      font-size: 0.65rem;
      font-weight: 700;
      font-style: normal;
      padding: 0 0.25rem;
    }
    .filter-active-tags {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-active-tag {
      font-size: 0.7rem;
      font-style: italic;
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
      background: var(--accent-dim);
      border: 1px solid rgba(196,134,74,0.28);
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .filter-active-tag:hover { background: rgba(196,134,74,0.18); }
    .filter-active-tag .remove { opacity: 0.7; font-size: 0.8rem; line-height: 1; font-style: normal; }

    /* ── FILTER PANEL ── */
    .filter-panel {
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.22s ease, padding 0.22s ease;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }
    .filter-panel.open {
      max-height: 120px;
      padding: 0.85rem 1.5rem;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.55rem;
    }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-label {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.68rem;
      font-style: italic;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      min-width: 2.5rem;
    }
    .filter-pills { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .filter-pill {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.72rem;
      font-style: italic;
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-pill:hover { border-color: var(--muted2); color: var(--text); }
    .filter-pill.active {
      background: var(--accent-dim);
      border-color: rgba(196,134,74,0.4);
      color: var(--accent);
    }
    .filter-pill.s-upcoming.active { background: var(--upcoming-bg); border-color: var(--upcoming-border); color: var(--upcoming); }
    .filter-pill.s-ongoing.active  { background: var(--ongoing-bg);  border-color: var(--ongoing-border);  color: var(--ongoing); }
    .filter-pill.s-past.active     { background: var(--past-bg);     border-color: var(--past-border);     color: var(--past); }
    .filter-pill.s-planning.active { background: var(--planning-bg); border-color: var(--planning-border); color: var(--planning); }

    /* ── MAIN ── */
    .main {
      max-width: 1000px;
      margin: 1.75rem auto;
      padding: 0 1.25rem 4rem;
      position: relative;
      z-index: 1;
    }

    .no-results {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-style: italic;
      font-size: 0.95rem;
    }

    /* ── TILES GRID ── */
    .tiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
    }

    /* ── TRIP TILE ── */
    .trip-tile {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--border2);
      border-radius: 2px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .trip-tile:hover {
      box-shadow: 0 6px 28px rgba(0,0,0,0.45);
      border-color: var(--border2);
    }
    .trip-tile.s-upcoming { border-top-color: var(--upcoming); }
    .trip-tile.s-ongoing  { border-top-color: var(--ongoing); }
    .trip-tile.s-past     { border-top-color: var(--past); }
    .trip-tile.s-planning { border-top-color: var(--planning); }

    .tile-body {
      padding: 1.1rem 1.25rem 0.9rem;
    }
    .tile-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }
    .status-badge {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.65rem;
      font-style: italic;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
      border: 1px solid;
    }
    .status-badge.s-upcoming { color: var(--upcoming); background: var(--upcoming-bg); border-color: var(--upcoming-border); }
    .status-badge.s-ongoing  { color: var(--ongoing);  background: var(--ongoing-bg);  border-color: var(--ongoing-border); }
    .status-badge.s-past     { color: var(--past);     background: var(--past-bg);     border-color: var(--past-border); }
    .status-badge.s-planning { color: var(--planning); background: var(--planning-bg); border-color: var(--planning-border); }
    .tile-fab-tag {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.65rem;
      font-style: italic;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(196,134,74,0.25);
    }
    .tile-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.05rem;
      font-weight: 700;
      font-style: italic;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 0.7rem;
    }

    .tile-cta {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.5rem 1.25rem;
      border-top: 1px solid var(--border);
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.78rem;
      font-style: italic;
      color: var(--muted);
      transition: color 0.15s, background 0.15s;
    }
    .trip-tile.s-upcoming .tile-cta { color: var(--upcoming); }
    .trip-tile.s-ongoing  .tile-cta { color: var(--ongoing); }
    .trip-tile.s-past     .tile-cta { color: var(--muted); }
    .trip-tile.s-planning .tile-cta { color: var(--planning); }
    .trip-tile:hover .tile-cta { background: rgba(232,223,208,0.04); }
    .tile-cta-arrow {
      margin-left: auto;
      font-size: 1rem;
      transition: transform 0.15s;
      color: var(--muted2);
    }
    .trip-tile:hover .tile-cta-arrow { transform: translateX(3px); }

    /* ── CALENDAR LINK ── */
    .cal-link {
      margin-left: auto;
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.75rem;
      font-style: italic;
      color: var(--muted2);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .cal-link:hover { color: var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .tiles-grid { grid-template-columns: 1fr; }
      .hero { padding: 1.75rem 1.25rem 1.5rem; }
      .filter-toggle-bar { padding: 0.55rem 1.25rem; }
    }

    /* ── FOOTER ── */
    footer {
      padding: 1.75rem 2rem;
      font-size: 0.78rem;
      font-style: italic;
      color: var(--muted-2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: auto;
      position: relative;
      z-index: 1;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <h1>Trips</h1>
      <p>Itineraries, hotel picks, booking info, and day-by-day logistics.</p>
      <div class="hero-stats" id="hero-stats"></div>
    </div>
  </header>

  <div class="filter-toggle-bar">
    <button class="filter-toggle-btn" id="filter-toggle-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 2.5h10M3 6h6M5 9.5h2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Filter
      <span class="filter-badge" id="filter-badge" style="display:none"></span>
    </button>
    <div class="filter-active-tags" id="filter-active-tags"></div>
    <a class="cal-link" href="../calendar/">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="1" y="2" width="9" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M1 5h9M4 1v2M7 1v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      View calendar
    </a>
  </div>
  <div class="filter-panel" id="filter-panel">
    <div class="filter-group">
      <span class="filter-label">Status</span>
      <div class="filter-pills" id="status-filter"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Region</span>
      <div class="filter-pills" id="region-filter"></div>
    </div>
  </div>

  <main class="main">
    <div class="tiles-grid" id="trips-container"></div>
    <div class="no-results" id="no-results" style="display:none">No trips match the selected filters.</div>
  </main>

  <footer>
    <span id="page-version" style="opacity:0.65"></span>
    <a href="https://github.com/xssxghjk/AI-Web-Pages" target="_blank" rel="noopener">View on GitHub</a>
    <span id="storage-size"></span>
  </footer>
  <script>fetch('../version.json').then(r=>r.json()).then(v=>{var e=document.getElementById('page-version');if(e)e.textContent='v'+v.version}).catch(()=>{});</script>
<script>(function(){var u=0;try{for(var k in localStorage){if(Object.prototype.hasOwnProperty.call(localStorage,k))u+=(k.length+localStorage[k].length)*2}}catch(e){}var kb=(u/1024).toFixed(1),pct=+(u/(5*1024*1024)*100).toFixed(1),el=document.getElementById('storage-size');if(el){el.textContent='Storage: '+kb+' KB / 5 MB';el.style.opacity=0.65;el.title=pct+'% used';if(pct>90)el.style.color='#f87171';else if(pct>70)el.style.color='#fbbf24';}})();</script>

  <script src="trips.js"></script>
  <script>
  (function () {

    const STATUS_LABELS = {
      upcoming: 'Upcoming',
      ongoing:  'Ongoing',
      past:     'Past',
      planning: 'Planning',
    };

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* Compute effective status from dates so hardcoded values don't go stale */
    const _today = new Date();
    _today.setHours(0, 0, 0, 0);
    TRIPS.forEach(t => {
      if (t.status === 'planning') return;
      const start = new Date(t.startDate);
      const end   = new Date(t.endDate);
      if (_today > end)        t.status = 'past';
      else if (_today >= start) t.status = 'ongoing';
      else                      t.status = 'upcoming';
    });

    TRIPS.sort((a, b) => (a.startDate > b.startDate ? 1 : -1));

    /* ── RENDER TILE ── */
    function daysUntil(startDate, endDate, status) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const start = new Date(startDate);
      const end   = new Date(endDate);
      if (status === 'ongoing') return 'Ongoing';
      if (status === 'past')    return 'Past';
      if (status === 'planning') return 'Planning';
      const diff = Math.round((start - today) / 86400000);
      if (diff === 0) return 'Today!';
      if (diff === 1) return 'Tomorrow';
      if (diff < 0)   return 'Past';
      return `In ${diff} day${diff !== 1 ? 's' : ''}`;
    }

    function renderTile(t) {
      const countdown = daysUntil(t.startDate, t.endDate, t.status);
      const hasFab = t.tags && t.tags.includes('FaB');
      const statusLabel = STATUS_LABELS[t.status] || t.status;
      return `
        <a
          class="trip-tile s-${esc(t.status)}"
          href="${esc(t.link)}"
          target="_top"
          data-status="${esc(t.status)}"
          data-region="${esc(t.region.toLowerCase())}"
        >
          <div class="tile-body">
            <div class="tile-meta">
              <span class="status-badge s-${esc(t.status)}">${esc(statusLabel)}</span>
              ${hasFab ? '<span class="tile-fab-tag">FaB</span>' : ''}
            </div>
            <div class="tile-title">${esc(t.title)}</div>
          </div>
          <div class="tile-cta">
            ${esc(countdown)}
            <span class="tile-cta-arrow">→</span>
          </div>
        </a>`;
    }

    /* ── FILTER STATE ── */
    let activeStatus = 'upcoming';
    let activeRegion = 'all';
    const regionLabelMap = {};

    function updateFilterUI() {
      const activeCount = (activeStatus !== 'all' ? 1 : 0) + (activeRegion !== 'all' ? 1 : 0);
      const badge = document.getElementById('filter-badge');
      const btn   = document.getElementById('filter-toggle-btn');
      const tags  = document.getElementById('filter-active-tags');

      badge.style.display = activeCount > 0 ? '' : 'none';
      badge.textContent = activeCount;
      btn.classList.toggle('has-filters', activeCount > 0);

      const parts = [];
      if (activeStatus !== 'all') parts.push({ label: STATUS_LABELS[activeStatus] || activeStatus, type: 'status' });
      if (activeRegion !== 'all') parts.push({ label: regionLabelMap[activeRegion] || activeRegion, type: 'region' });

      tags.innerHTML = parts.map(p =>
        `<span class="filter-active-tag" data-clear="${p.type}">
          ${esc(p.label)}<span class="remove">×</span>
        </span>`
      ).join('');

      tags.querySelectorAll('.filter-active-tag').forEach(tag => {
        tag.addEventListener('click', () => {
          const ftype = tag.dataset.clear;
          if (ftype === 'status') activeStatus = 'all';
          if (ftype === 'region') activeRegion = 'all';
          document.querySelectorAll(`[data-ftype="${ftype}"]`)
            .forEach(b => b.classList.toggle('active', b.dataset.fval === 'all'));
          applyFilters();
        });
      });
    }

    function applyFilters() {
      const tiles = document.querySelectorAll('.trip-tile');
      let visible = 0;
      tiles.forEach(tile => {
        const statusMatch = activeStatus === 'all' || tile.dataset.status === activeStatus;
        const regionMatch = activeRegion === 'all' || tile.dataset.region === activeRegion;
        const show = statusMatch && regionMatch;
        tile.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
      updateFilterUI();
    }

    /* ── BUILD FILTERS ── */
    function buildFilters() {
      const statuses = [...new Set(TRIPS.map(t => t.status))];
      const regions  = [...new Set(TRIPS.map(t => t.region))].sort();

      const statusEl = document.getElementById('status-filter');
      statusEl.innerHTML =
        `<button class="filter-pill${activeStatus === 'all' ? ' active' : ''}" data-ftype="status" data-fval="all">All</button>` +
        statuses.map(s =>
          `<button class="filter-pill s-${esc(s)}${activeStatus === s ? ' active' : ''}" data-ftype="status" data-fval="${esc(s)}">${esc(STATUS_LABELS[s] || s)}</button>`
        ).join('');

      const regionEl = document.getElementById('region-filter');
      regionEl.innerHTML =
        `<button class="filter-pill active" data-ftype="region" data-fval="all">All</button>` +
        regions.map(r => {
          regionLabelMap[r.toLowerCase()] = r;
          return `<button class="filter-pill" data-ftype="region" data-fval="${esc(r.toLowerCase())}">${esc(r)}</button>`;
        }).join('');

      document.querySelectorAll('.filter-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          const ftype = btn.dataset.ftype;
          const fval  = btn.dataset.fval;
          if (ftype === 'status') activeStatus = fval;
          if (ftype === 'region') activeRegion = fval;
          document.querySelectorAll(`[data-ftype="${ftype}"]`)
            .forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          applyFilters();
        });
      });

      /* ── FILTER TOGGLE ── */
      const toggleBtn   = document.getElementById('filter-toggle-btn');
      const filterPanel = document.getElementById('filter-panel');
      toggleBtn.addEventListener('click', () => {
        filterPanel.classList.toggle('open');
      });
    }

    /* ── BUILD STATS ── */
    function buildStats() {
      const upcomingCount = TRIPS.filter(t => t.status === 'upcoming' || t.status === 'ongoing').length;
      const pastCount     = TRIPS.filter(t => t.status === 'past').length;
      document.getElementById('hero-stats').innerHTML = `
        <span class="stat-pill">${TRIPS.length} trip${TRIPS.length !== 1 ? 's' : ''}</span>
        ${upcomingCount > 0 ? `<span class="stat-pill upcoming">${upcomingCount} upcoming</span>` : ''}
        ${pastCount     > 0 ? `<span class="stat-pill past">${pastCount} past</span>` : ''}`;
    }

    /* ── INIT ── */
    function init() {
      const container = document.getElementById('trips-container');
      container.innerHTML = TRIPS.map(renderTile).join('');
      buildStats();
      buildFilters();
      applyFilters();
    }

    init();

  })();
  </script>
