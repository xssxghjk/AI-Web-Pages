<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Calendar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0c;
      --surface: #111114;
      --surface2: #18181d;
      --border: #222228;
      --border2: #2e2e36;
      --accent: #6c5ce7;
      --accent-dim: rgba(108,92,231,0.15);
      --text: #e2e2ea;
      --muted: #6b6b7e;
      --muted2: #9494a8;
      --muted-2: #4a4a5a;
      --upcoming: #f59e0b;
      --upcoming-bg: rgba(245,158,11,0.08);
      --upcoming-border: rgba(245,158,11,0.25);
      --ongoing: #22c55e;
      --ongoing-bg: rgba(34,197,94,0.08);
      --ongoing-border: rgba(34,197,94,0.25);
      --past: #94a3b8;
      --past-bg: rgba(148,163,184,0.08);
      --past-border: rgba(148,163,184,0.25);
      --planning: #14b8a6;
      --planning-bg: rgba(20,184,166,0.08);
      --planning-border: rgba(20,184,166,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,12,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-back {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .nav-back:hover { color: var(--text); }
    .nav-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-sep { color: var(--border2); }

    /* ── HERO ── */
    .hero {
      padding: 1.5rem 1.5rem 1.25rem;
      text-align: center;
      background: linear-gradient(180deg, rgba(108,92,231,0.05) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    .hero h1 {
      font-size: clamp(1.3rem, 3vw, 1.9rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }
    .hero p {
      color: var(--muted);
      font-size: 0.9rem;
      max-width: 520px;
      margin-inline: auto;
    }

    /* ── MAIN ── */
    .main {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1.25rem 4rem;
    }

    /* ── CALENDAR ── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      gap: 0.75rem;
    }
    .cal-nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .cal-nav-btn:hover { border-color: var(--muted2); color: var(--text); }
    .cal-month-label {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .cal-dow {
      text-align: center;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.25rem 0 0.5rem;
    }
    .cal-day {
      min-height: 3.2rem;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.3rem 0.35rem 0.25rem;
      position: relative;
      transition: border-color 0.15s;
    }
    .cal-day.empty {
      background: transparent;
      border-color: transparent;
    }
    .cal-day.today {
      border-color: var(--accent);
    }
    .cal-day-num {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted2);
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .cal-day.today .cal-day-num { color: var(--accent); }
    .cal-day.has-trip { border-color: var(--border2); }

    .cal-event {
      display: block;
      font-size: 0.6rem;
      font-weight: 700;
      line-height: 1.25;
      border-radius: 4px;
      padding: 0.1rem 0.3rem;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-decoration: none;
      cursor: pointer;
    }
    .cal-event.s-upcoming  { background: var(--upcoming-bg);  color: var(--upcoming);  border: 1px solid var(--upcoming-border); }
    .cal-event.s-ongoing   { background: var(--ongoing-bg);   color: var(--ongoing);   border: 1px solid var(--ongoing-border); }
    .cal-event.s-past      { background: var(--past-bg);      color: var(--past);      border: 1px solid var(--past-border); }
    .cal-event.s-planning  { background: var(--planning-bg);  color: var(--planning);  border: 1px solid var(--planning-border); }

    .cal-legend {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .cal-legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      color: var(--muted2);
    }
    .cal-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .cal-legend-dot.s-upcoming { background: var(--upcoming); }
    .cal-legend-dot.s-ongoing  { background: var(--ongoing); }
    .cal-legend-dot.s-past     { background: var(--past); }
    .cal-legend-dot.s-planning { background: var(--planning); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .cal-day { min-height: 2.4rem; padding: 0.2rem 0.2rem; }
      .cal-event { font-size: 0.5rem; padding: 0.08rem 0.2rem; }
      .cal-month-label { font-size: 0.9rem; }
    }

    /* ── FOOTER ── */
    footer {
      padding: 1.75rem 2rem;
      font-size: 0.78rem;
      color: var(--muted-2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: auto;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <nav>
    <a class="nav-back" href="./">← Trips</a>
    <span class="nav-sep">|</span>
    <span class="nav-title">Trip Calendar</span>
  </nav>

  <header class="hero">
    <h1>Trip Calendar</h1>
    <p>All trips laid out month by month.</p>
  </header>

  <main class="main">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="cal-prev">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M6.5 2L3.5 5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <span class="cal-month-label" id="cal-month-label"></span>
      <button class="cal-nav-btn" id="cal-next">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3.5 2L6.5 5l-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-legend" id="cal-legend"></div>
  </main>

  <footer>
    <span>Built with Claude</span>
    <a href="https://github.com/xssxghjk/AI-Web-Pages" target="_blank" rel="noopener">View on GitHub</a>
  </footer>

  <script src="trips.js"></script>
  <script>
  (function () {
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    function firstTripMonth() {
      const sorted = [...TRIPS].sort((a, b) => a.startDate.localeCompare(b.startDate));
      if (!sorted.length) return new Date(today.getFullYear(), today.getMonth(), 1);
      const d = new Date(sorted[0].startDate);
      return new Date(d.getFullYear(), d.getMonth(), 1);
    }

    let calYear  = today.getFullYear();
    let calMonth = today.getMonth();

    const earliestMonth = firstTripMonth();
    const hasTripsThisMonth = TRIPS.some(t => {
      const s = new Date(t.startDate);
      const e = new Date(t.endDate);
      return (s.getFullYear() === calYear && s.getMonth() === calMonth) ||
             (e.getFullYear() === calYear && e.getMonth() === calMonth) ||
             (s <= new Date(calYear, calMonth, 1) && e >= new Date(calYear, calMonth + 1, 0));
    });
    if (!hasTripsThisMonth) {
      calYear  = earliestMonth.getFullYear();
      calMonth = earliestMonth.getMonth();
    }

    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    function renderCalendar() {
      const grid   = document.getElementById('cal-grid');
      const label  = document.getElementById('cal-month-label');
      const legend = document.getElementById('cal-legend');

      label.textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;

      const firstDay = new Date(calYear, calMonth, 1);
      const lastDay  = new Date(calYear, calMonth + 1, 0);

      let startOffset = firstDay.getDay() - 1;
      if (startOffset < 0) startOffset = 6;

      const dayMap = {};
      TRIPS.forEach(trip => {
        const start = new Date(trip.startDate);
        const end   = new Date(trip.endDate);
        for (let d = new Date(calYear, calMonth, 1); d <= lastDay; d.setDate(d.getDate() + 1)) {
          if (d >= start && d <= end) {
            const key = d.getDate();
            if (!dayMap[key]) dayMap[key] = [];
            if (!dayMap[key].find(t => t.id === trip.id)) {
              dayMap[key].push({ ...trip, isStart: +d === +start });
            }
          }
        }
      });

      let html = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');

      for (let i = 0; i < startOffset; i++) {
        html += `<div class="cal-day empty"></div>`;
      }

      for (let day = 1; day <= lastDay.getDate(); day++) {
        const thisDate = new Date(calYear, calMonth, day);
        const isToday  = +thisDate === +today;
        const trips    = dayMap[day] || [];
        const hasTrip  = trips.length > 0;

        const eventsHtml = trips.map(t => {
          return `<a class="cal-event s-${esc(t.status)}" href="${esc(t.link)}" title="${esc(t.title)} · ${esc(t.displayDates)}">${esc(t.title)}</a>`;
        }).join('');

        html += `<div class="cal-day${isToday ? ' today' : ''}${hasTrip ? ' has-trip' : ''}">
          <div class="cal-day-num">${day}</div>
          ${eventsHtml}
        </div>`;
      }

      grid.innerHTML = html;

      const statusesPresent = [...new Set(
        Object.values(dayMap).flat().map(t => t.status)
      )];
      const STATUS_LABELS = { upcoming: 'Upcoming', ongoing: 'Ongoing', past: 'Past', planning: 'Planning' };
      legend.innerHTML = statusesPresent.map(s =>
        `<div class="cal-legend-item">
          <div class="cal-legend-dot s-${esc(s)}"></div>
          <span>${esc(STATUS_LABELS[s] || s)}</span>
        </div>`
      ).join('');
    }

    renderCalendar();

    document.getElementById('cal-prev').addEventListener('click', () => {
      calMonth--;
      if (calMonth < 0) { calMonth = 11; calYear--; }
      renderCalendar();
    });

    document.getElementById('cal-next').addEventListener('click', () => {
      calMonth++;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCalendar();
    });
  })();
  </script>

</body>
</html>
