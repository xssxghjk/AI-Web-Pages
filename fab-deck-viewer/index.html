<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaB Deck Viewer</title>
  <script src="../nav.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1c1814;
      --surface:    #252018;
      --surface-2:  #2e2820;
      --border:     #3a3025;
      --border-2:   #4a4030;
      --accent:     #c4864a;
      --accent-dim: rgba(196,134,74,0.08);
      --text:       #e8dfd0;
      --muted:      #7a6e60;
      --muted-2:    #9a8a76;
      --red-c:      #e05040;
      --yellow-c:   #d4924a;
      --blue-c:     #5ab4cc;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Serif Text', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(232,223,208,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    .loading-overlay, #view-list, #view-import, #view-detail, footer {
      position: relative;
      z-index: 1;
    }

    /* ── Loading overlay ── */
    .loading-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(28,24,20,0.93);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      animation: fade-in 0.18s ease;
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

    .loading-card {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-top: 3px solid var(--accent);
      border-radius: 2px;
      padding: 2.5rem 3.5rem;
      display: flex; flex-direction: column;
      align-items: center; gap: 1.5rem;
      min-width: 260px;
      box-shadow: 0 12px 48px rgba(28,24,20,0.18);
    }

    .loading-rings {
      position: relative;
      width: 60px; height: 60px;
    }
    .loading-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
    }
    .loading-ring.r1 {
      border-top-color: var(--accent);
      border-right-color: rgba(196,134,74,0.25);
      animation: spin 0.85s linear infinite;
    }
    .loading-ring.r2 {
      inset: 8px;
      border-bottom-color: rgba(196,134,74,0.55);
      border-left-color: rgba(196,134,74,0.12);
      animation: spin 1.3s linear infinite reverse;
    }
    .loading-ring.r3 {
      inset: 18px;
      border-top-color: rgba(196,134,74,0.8);
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-label {
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }
    .loading-msg {
      font-size: 0.78rem; color: var(--muted);
      text-align: center; line-height: 1.5;
      min-height: 1em;
      font-family: 'DM Serif Text', Georgia, serif;
    }

    /* ── Views ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── Page layout ── */
    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
    }

    /* ── Page header ── */
    .page-header {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 1.75rem;
      padding-bottom: 1.25rem;
      border-bottom: 2px solid var(--text);
    }
    .page-header-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-weight: 900;
      letter-spacing: -0.01em;
      flex: 1;
    }

    /* ── Buttons ── */
    button {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.875rem; font-weight: 600;
      padding: 0.55rem 1.2rem; border-radius: 2px; border: none;
      cursor: pointer; transition: background 0.15s, transform 0.1s, color 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--accent); color: #fff;
      border: 1px solid rgba(196,134,74,0.5);
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }
    .btn-primary:hover:not(:disabled) {
      background: #c41f38;
    }

    .btn-secondary {
      background: var(--surface-2); color: var(--text);
      border: 1px solid var(--border-2);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--border); }

    .btn-ghost {
      background: none; color: var(--muted); border: none;
      font-size: 0.82rem; padding: 0.45rem 0.75rem; border-radius: 2px;
    }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); }

    .btn-danger {
      background: none; color: var(--muted); border: none;
      font-size: 0.82rem; padding: 0.45rem 0.75rem; border-radius: 2px;
    }
    .btn-danger:hover { background: rgba(192,57,43,0.08); color: var(--red-c); }

    .btn-back {
      display: flex; align-items: center; gap: 0.4rem;
      flex-shrink: 0;
    }
    .btn-back svg { opacity: 0.7; }

    /* ── Deck list ── */
    .deck-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .deck-row {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.9rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: 2px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, border-left-color 0.15s;
    }
    .deck-row:hover {
      border-color: var(--border-2);
      border-left-color: var(--accent);
      background: var(--surface-2);
    }
    .deck-row-icon {
      width: 36px; height: 36px; flex-shrink: 0;
      background: rgba(196,134,74,0.06);
      border: 1px solid var(--border);
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
    }
    .deck-row-body { flex: 1; min-width: 0; }
    .deck-row-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: 0.95rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .deck-row-meta {
      margin-top: 0.2rem;
      font-size: 0.72rem; color: var(--muted);
      font-family: 'DM Serif Text', Georgia, serif;
    }
    .deck-row-chevron {
      color: var(--muted-2); font-size: 1.1rem; line-height: 1;
      transition: color 0.15s;
    }
    .deck-row:hover .deck-row-chevron { color: var(--accent); }

    /* ── Empty state ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      gap: 1rem;
      padding: 4rem 2rem;
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      border-radius: 2px;
      text-align: center;
      background: var(--surface);
      position: relative;
    }
    .empty-state::before, .empty-state::after {
      content: ''; position: absolute; width: 16px; height: 16px;
    }
    .empty-state::before {
      top: 7px; left: 7px;
      border-top: 2px solid var(--accent); border-left: 2px solid var(--accent);
    }
    .empty-state::after {
      bottom: 7px; right: 7px;
      border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent);
    }
    .empty-state-icon {
      width: 48px; height: 48px;
      color: var(--muted-2); opacity: 0.6;
    }
    .empty-state-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: 1.1rem; font-weight: 900;
      color: var(--text);
    }
    .empty-state-sub {
      font-size: 0.82rem; color: var(--muted); line-height: 1.6;
      max-width: 280px;
      font-family: 'DM Serif Text', Georgia, serif;
    }

    /* ── Section ── */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      border-radius: 2px; overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .section-header {
      padding: 0.65rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.7rem; font-weight: 400;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent);
      background: var(--surface-2);
    }
    .section-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 0.9rem; }

    /* ── Inputs ── */
    input[type="text"], textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border-2);
      border-radius: 2px;
      color: var(--text);
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.88rem;
      padding: 0.7rem 1rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(196,134,74,0.12);
    }
    input[type="text"]::placeholder, textarea::placeholder { color: var(--muted-2); }

    textarea {
      font-family: 'Courier New', monospace;
      font-size: 0.82rem; line-height: 1.7;
      resize: vertical;
    }

    .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }

    /* ── Error ── */
    .err {
      display: none; font-size: 0.8rem; color: var(--red-c);
      padding: 0.55rem 0.85rem;
      background: rgba(192,57,43,0.06);
      border: 1px solid rgba(192,57,43,0.2);
      border-radius: 2px;
      font-family: 'DM Serif Text', Georgia, serif;
    }

    /* ── Detail view header ── */
    .detail-head {
      margin-bottom: 1.25rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .detail-head-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(1.2rem, 2.5vw, 1.6rem);
      font-weight: 900; letter-spacing: -0.01em;
    }
    .detail-head-date {
      margin-top: 0.3rem;
      font-size: 0.75rem; color: var(--muted);
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex; gap: 1.25rem; flex-wrap: wrap; align-items: center;
      padding: 0.75rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
      border-radius: 2px;
      font-size: 0.78rem; color: var(--muted);
      margin-bottom: 1.75rem;
      font-family: 'DM Serif Text', Georgia, serif;
    }
    .sb-item { display: flex; align-items: center; gap: 0.4rem; }
    .sb-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sb-val  { font-weight: 700; color: var(--text); }

    /* ── Card warn ── */
    .card-warn {
      display: none; font-size: 0.78rem; color: var(--muted-2);
      padding: 0.55rem 0.85rem; margin-bottom: 1.25rem;
      background: rgba(196,134,74,0.06);
      border: 1px solid rgba(196,134,74,0.25);
      border-radius: 2px;
      font-family: 'DM Serif Text', Georgia, serif;
    }

    /* ── Group header ── */
    .group-head {
      display: flex; align-items: center; gap: 0.6rem;
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.7rem; font-weight: 400; letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .group-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Card grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.75rem;
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: none; }
    }

    .card-entry {
      position: relative;
      animation: cardReveal 0.35s ease forwards;
    }
    .card-entry:nth-child(2)   { animation-delay: 0.03s; }
    .card-entry:nth-child(3)   { animation-delay: 0.06s; }
    .card-entry:nth-child(4)   { animation-delay: 0.09s; }
    .card-entry:nth-child(5)   { animation-delay: 0.12s; }
    .card-entry:nth-child(6)   { animation-delay: 0.15s; }
    .card-entry:nth-child(7)   { animation-delay: 0.18s; }
    .card-entry:nth-child(8)   { animation-delay: 0.21s; }
    .card-entry:nth-child(n+9) { animation-delay: 0.24s; }

    .card-frame {
      position: relative;
      width: 100%; padding-top: 139.7%;
      border-radius: 4px; overflow: hidden;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      transition: box-shadow 0.2s;
    }
    .card-entry:hover .card-frame {
      box-shadow: 0 0 0 2px var(--accent), 0 6px 20px rgba(196,134,74,0.25);
    }
    .card-frame img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; border-radius: 3px;
      transition: transform 0.2s;
    }
    .card-entry:hover .card-frame img { transform: scale(1.03); }

    .card-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0.5rem; gap: 0.35rem;
      color: var(--muted); font-size: 0.65rem;
      text-align: center; line-height: 1.35;
      font-family: 'DM Serif Text', Georgia, serif;
    }
    .card-placeholder svg { opacity: 0.3; }

    .qty-badge {
      position: absolute; top: 5px; left: 5px; z-index: 3;
      background: rgba(28,24,20,0.75); color: var(--text);
      font-size: 0.65rem; font-weight: 700;
      padding: 1px 5px; border-radius: 2px;
      letter-spacing: 0.04em;
      font-family: 'DM Serif Text', Georgia, serif;
    }

    .pitch-dot {
      position: absolute; bottom: 5px; right: 5px; z-index: 3;
      width: 18px; height: 18px; border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.62rem; font-weight: 700;
    }
    .pitch-dot.red    { background: var(--red-c);    color: #fff; }
    .pitch-dot.yellow { background: var(--yellow-c); color: #2c1810; }
    .pitch-dot.blue   { background: var(--blue-c);   color: #fff; }

    .card-name {
      margin-top: 0.35rem;
      font-size: 0.62rem; font-weight: 600; color: var(--muted);
      text-align: center; line-height: 1.3;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
    }

    /* ── Footer ── */
    footer {
      padding: 1.5rem 2rem; font-size: 0.75rem; color: var(--muted-2);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap;
      font-family: 'DM Serif Text', Georgia, serif;
      position: relative; z-index: 1;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .page { padding: 1.25rem 1rem 3rem; }
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 0.5rem; }
      .loading-card { padding: 2rem 2rem; min-width: 220px; }
    }
  </style>
</head>
<body>

<!-- ── Loading overlay ── -->
<div id="loading-overlay" class="loading-overlay" style="display:none;" aria-live="polite" aria-label="Loading">
  <div class="loading-card">
    <div class="loading-rings">
      <div class="loading-ring r1"></div>
      <div class="loading-ring r2"></div>
      <div class="loading-ring r3"></div>
    </div>
    <div class="loading-label">Loading deck…</div>
    <div class="loading-msg" id="loading-msg">Fetching card database…</div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     VIEW: LIST
     ══════════════════════════════════════════ -->
<div id="view-list" class="view">
  <div class="page">
    <div class="page-header">
      <div class="page-header-title">My Decks</div>
      <button class="btn-primary" id="btn-go-import">+ Import Deck</button>
    </div>

    <!-- Empty state -->
    <div id="list-empty" class="empty-state" style="display:none;">
      <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="14" height="18" rx="2"/>
        <path d="M6 7h6M6 11h4"/>
        <path d="M16 14l2 2 4-4" stroke-width="1.8"/>
      </svg>
      <div class="empty-state-title">No decks yet</div>
      <div class="empty-state-sub">Import your first deck to get started — paste any FaBrary export and it'll show up here.</div>
      <button class="btn-primary" id="btn-empty-import">Import a Deck</button>
    </div>

    <!-- Deck list -->
    <div id="deck-list" class="deck-list"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     VIEW: IMPORT
     ══════════════════════════════════════════ -->
<div id="view-import" class="view" style="display:none;">
  <div class="page">
    <div class="page-header">
      <button class="btn-ghost btn-back" id="btn-back-from-import">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 2L4 7l5 5"/></svg>
        My Decks
      </button>
      <div class="page-header-title">Import Deck</div>
    </div>

    <div class="section">
      <div class="section-header">Deck Name</div>
      <div class="section-body">
        <input type="text" id="deck-name" placeholder="e.g. Briar Silver Age" maxlength="80" autocomplete="off" />
      </div>
    </div>

    <div class="section">
      <div class="section-header">Decklist</div>
      <div class="section-body">
        <textarea id="decklist" rows="14" placeholder="Paste a FaBrary export or any decklist here.

Example (FaBrary export format):
  Hero: Briar
  Format: Silver Age

  Arena cards
  1x Nebula Blade
  1x Helm of Might and Magic

  Deck cards
  2x Arcane Seeds // Life (red)
  2x Entwine Lightning (red)
  1x Come to Fight (blue)

Header lines, section labels, and footers are ignored automatically."></textarea>
        <div class="err" id="import-err"></div>
        <div class="btn-row">
          <button class="btn-primary"   id="btn-import">Import Deck</button>
          <button class="btn-secondary" id="btn-clear">Clear</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     VIEW: DETAIL
     ══════════════════════════════════════════ -->
<div id="view-detail" class="view" style="display:none;">
  <div class="page">
    <div class="page-header">
      <button class="btn-ghost btn-back" id="btn-back-from-detail">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 2L4 7l5 5"/></svg>
        My Decks
      </button>
      <div style="flex:1"></div>
      <button class="btn-danger" id="btn-delete-deck">Delete</button>
    </div>

    <div class="detail-head">
      <div class="detail-head-name" id="detail-name"></div>
      <div class="detail-head-date" id="detail-date"></div>
    </div>

    <div class="stats-bar" id="stats-bar"></div>

    <div class="card-warn" id="card-warn"></div>

    <div id="card-groups"></div>
  </div>
</div>

<footer>
  <span id="page-version" style="opacity:0.65"></span>
  <a href="https://github.com/xssxghjk/AI-Web-Pages" target="_blank" rel="noopener">View on GitHub</a>
</footer>
<script>fetch('../version.json').then(r=>r.json()).then(v=>{var e=document.getElementById('page-version');if(e)e.textContent='v'+v.version}).catch(()=>{});</script>

<script>
(function () {
  'use strict';

  const DB_URL = 'https://raw.githubusercontent.com/the-fab-cube/flesh-and-blood-cards/omens-of-the-third-age/json/english/card.json';
  let db = null;

  /* ── Storage ──────────────────────────────────────────────────────── */
  const STORAGE_KEY = 'fab_saved_decks_v1';
  function loadDecks() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function saveDecks(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

  /* ── View routing ─────────────────────────────────────────────────── */
  let currentDeckId = null;

  function showView(id) {
    document.querySelectorAll('.view').forEach(v => {
      v.style.display = 'none';
    });
    const el = document.getElementById(id);
    el.style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  /* ── Loading overlay ──────────────────────────────────────────────── */
  function showLoading(msg) {
    document.getElementById('loading-msg').textContent = msg || '';
    document.getElementById('loading-overlay').style.display = 'flex';
  }
  function updateLoading(msg) {
    document.getElementById('loading-msg').textContent = msg;
  }
  function hideLoading() {
    document.getElementById('loading-overlay').style.display = 'none';
  }

  /* ── HTML escaping ────────────────────────────────────────────────── */
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── Parser ───────────────────────────────────────────────────────── */
  function parseDecklist(raw) {
    const out = [];
    for (const line of raw.split('\n')) {
      const s = line.trim();
      if (!s || !/^\d/.test(s)) continue;
      const qm = s.match(/^(\d+)x?\s+(.+)$/i);
      if (!qm) continue;
      const qty = Math.max(1, +qm[1] || 1);
      let name = qm[2].trim();
      let hint = null;
      const hm = name.match(/^(.+?)\s*\((\d+|red|yellow|blue)\)\s*$/i);
      if (hm) {
        name = hm[1].trim();
        const h = hm[2].toLowerCase();
        hint = (h === '1' || h === 'red')    ? 'red'
             : (h === '2' || h === 'yellow') ? 'yellow'
             : (h === '3' || h === 'blue')   ? 'blue'
             : null;
      }
      if (name) out.push({ qty, name, hint });
    }
    return out;
  }

  /* ── Card database ────────────────────────────────────────────────── */
  async function ensureDb() {
    if (db) return;
    updateLoading('Fetching card database (~20 MB)…');
    const resp = await fetch(DB_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} fetching card database`);
    updateLoading('Parsing card data…');
    const cards = await resp.json();
    updateLoading('Indexing cards…');
    db = new Map();
    for (const card of cards) {
      const imgUrl = card.printings && card.printings.length
        ? (card.printings[0].image_url || null) : null;
      const entry = {
        name:  card.name,
        pitch: card.pitch || null,
        color: (card.color || '').toLowerCase(),
        imgUrl,
      };
      const nameLow = card.name.toLowerCase();
      if (entry.color) db.set(`${nameLow}_${entry.color}`, entry);
      if (!db.has(nameLow)) db.set(nameLow, entry);
    }
  }

  function lookup(name, hint) {
    const n = name.toLowerCase();
    if (hint && db.has(`${n}_${hint}`)) return db.get(`${n}_${hint}`);
    if (db.has(n)) return db.get(n);
    const front = n.split(' // ')[0].trim();
    if (front !== n) {
      if (hint && db.has(`${front}_${hint}`)) return db.get(`${front}_${hint}`);
      if (db.has(front)) return db.get(front);
    }
    return null;
  }

  /* ── List view ────────────────────────────────────────────────────── */
  function renderList() {
    const decks  = loadDecks();
    const list   = document.getElementById('deck-list');
    const empty  = document.getElementById('list-empty');
    list.innerHTML = '';

    if (decks.length === 0) {
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';

    decks.forEach(deck => {
      const row = document.createElement('div');
      row.className = 'deck-row';

      const count = deck.cardCount ? `${deck.cardCount} cards · ` : '';
      const date  = new Date(deck.savedAt).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });

      row.innerHTML = `
        <div class="deck-row-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="2" width="11" height="14" rx="1.5"/>
            <rect x="6" y="4" width="11" height="14" rx="1.5" fill="var(--surface)" stroke-width="1.4"/>
            <path d="M8 9h5M8 12h3" stroke-width="1.3"/>
          </svg>
        </div>
        <div class="deck-row-body">
          <div class="deck-row-name">${esc(deck.name)}</div>
          <div class="deck-row-meta">${count}${date}</div>
        </div>
        <div class="deck-row-chevron">›</div>
      `;

      row.addEventListener('click', () => viewDeck(deck.id));
      list.appendChild(row);
    });
  }

  /* ── Detail view ──────────────────────────────────────────────────── */
  async function viewDeck(id) {
    const deck = loadDecks().find(d => d.id === id);
    if (!deck) return;
    currentDeckId = id;

    showLoading('Loading deck…');
    try {
      await ensureDb();
      updateLoading('Looking up cards…');
      const entries = parseDecklist(deck.decklist);
      const pairs   = entries.map(e => ({ entry: e, card: lookup(e.name, e.hint) }));
      hideLoading();
      renderDetail(deck, pairs);
      showView('view-detail');
    } catch (e) {
      hideLoading();
      alert('Error: ' + e.message);
    }
  }

  const GROUPS = [
    { key: 'other',  label: 'Arena',             color: '#6b6b7e' },
    { key: 'red',    label: 'Red — Pitch 1',     color: '#ef4444' },
    { key: 'yellow', label: 'Yellow — Pitch 2',  color: '#f59e0b' },
    { key: 'blue',   label: 'Blue — Pitch 3',    color: '#60a5fa' },
  ];

  function renderDetail(deck, pairs) {
    document.getElementById('detail-name').textContent = deck.name;
    document.getElementById('detail-date').textContent =
      new Date(deck.savedAt).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });

    const buckets = {};
    GROUPS.forEach(g => { buckets[g.key] = []; });
    let total = 0;
    const counts = {};

    for (const p of pairs) {
      total += p.entry.qty;
      const key = p.card ? (p.card.color || 'other') : 'other';
      (buckets[key] || buckets.other).push(p);
      counts[key] = (counts[key] || 0) + p.entry.qty;
    }

    // Stats bar
    const sb = document.getElementById('stats-bar');
    sb.innerHTML =
      `<div class="sb-item">Total <span class="sb-val" style="margin-left:.3rem">${total}</span>&nbsp;cards</div>` +
      GROUPS
        .filter(g => counts[g.key] > 0)
        .map(g => `<div class="sb-item">
          <div class="sb-dot" style="background:${g.color}"></div>
          <span class="sb-val">${counts[g.key]}</span>&nbsp;${g.key === 'other' ? 'arena' : g.key}
        </div>`).join('');

    // Missing card warning
    const missing = pairs.filter(p => !p.card).map(p => p.entry.name);
    const warn = document.getElementById('card-warn');
    if (missing.length) {
      warn.textContent = `Not found in database: ${missing.join(', ')}`;
      warn.style.display = '';
    } else {
      warn.style.display = 'none';
    }

    // Card groups
    const groupsEl = document.getElementById('card-groups');
    groupsEl.innerHTML = '';
    for (const g of GROUPS) {
      if (!buckets[g.key] || buckets[g.key].length === 0) continue;
      const section = document.createElement('div');
      section.style.marginBottom = '2rem';
      const head = document.createElement('div');
      head.className = 'group-head';
      head.innerHTML = `<span style="color:${g.color}">${g.label}</span>`;
      section.appendChild(head);
      const grid = document.createElement('div');
      grid.className = 'card-grid';
      buckets[g.key].forEach(p => grid.appendChild(makeCard(p.entry, p.card)));
      section.appendChild(grid);
      groupsEl.appendChild(section);
    }
  }

  function makeCard(entry, card) {
    const wrap  = document.createElement('div');
    wrap.className = 'card-entry';

    const frame = document.createElement('div');
    frame.className = 'card-frame';

    if (card && card.imgUrl) {
      const img = new Image();
      img.alt      = entry.name;
      img.loading  = 'lazy';
      img.src      = card.imgUrl;
      img.addEventListener('error', function () {
        this.remove();
        placeholder.style.display = 'flex';
      });
      frame.appendChild(img);
    }

    const placeholder = document.createElement('div');
    placeholder.className = 'card-placeholder';
    placeholder.style.display = (card && card.imgUrl) ? 'none' : 'flex';
    placeholder.innerHTML = `
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18M9 21V9"/>
      </svg>
      <span>${esc(entry.name)}</span>
    `;
    frame.appendChild(placeholder);

    if (entry.qty > 1) {
      const qb = document.createElement('div');
      qb.className = 'qty-badge';
      qb.textContent = `×${entry.qty}`;
      frame.appendChild(qb);
    }

    if (card && card.pitch) {
      const pd = document.createElement('div');
      pd.className = `pitch-dot ${card.color || ''}`;
      pd.textContent = card.pitch;
      frame.appendChild(pd);
    }

    wrap.appendChild(frame);

    const nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.title     = entry.name;
    nameEl.textContent = entry.name;
    wrap.appendChild(nameEl);

    return wrap;
  }

  /* ── Import handlers ──────────────────────────────────────────────── */
  function goToImport() {
    document.getElementById('decklist').value  = '';
    document.getElementById('deck-name').value = '';
    document.getElementById('import-err').style.display = 'none';
    showView('view-import');
  }

  document.getElementById('btn-go-import').addEventListener('click', goToImport);
  document.getElementById('btn-empty-import').addEventListener('click', goToImport);

  document.getElementById('btn-back-from-import').addEventListener('click', () => showView('view-list'));

  document.getElementById('btn-clear').addEventListener('click', () => {
    document.getElementById('decklist').value = '';
    document.getElementById('import-err').style.display = 'none';
  });

  document.getElementById('btn-import').addEventListener('click', async function () {
    const raw  = document.getElementById('decklist').value.trim();
    const name = document.getElementById('deck-name').value.trim();

    const errEl = document.getElementById('import-err');
    errEl.style.display = 'none';

    if (!raw) {
      errEl.textContent = 'Paste a decklist first.';
      errEl.style.display = '';
      return;
    }
    const entries = parseDecklist(raw);
    if (!entries.length) {
      errEl.textContent = 'No card entries found. Check the format.';
      errEl.style.display = '';
      return;
    }

    const cardCount = entries.reduce((s, e) => s + e.qty, 0);
    const deck = {
      id:        Date.now().toString(36) + Math.random().toString(36).slice(2),
      name:      name || 'Untitled Deck',
      decklist:  raw,
      cardCount,
      savedAt:   new Date().toISOString(),
    };

    const decks = loadDecks();
    decks.unshift(deck);
    saveDecks(decks);
    renderList();

    await viewDeck(deck.id);
  });

  /* ── Detail handlers ──────────────────────────────────────────────── */
  document.getElementById('btn-back-from-detail').addEventListener('click', () => {
    showView('view-list');
  });

  document.getElementById('btn-delete-deck').addEventListener('click', () => {
    if (!currentDeckId) return;
    const decks = loadDecks().filter(d => d.id !== currentDeckId);
    saveDecks(decks);
    currentDeckId = null;
    renderList();
    showView('view-list');
  });

  /* ── Init ─────────────────────────────────────────────────────────── */
  renderList();
  showView('view-list');

})();
</script>
