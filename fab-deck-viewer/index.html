  /* ── Sideboard Guide ─────────────────────────────────────────────── */
  function saveSideboardGuide(deckId, guide) {
    const decks = loadDecks();
    const deck = decks.find(d => d.id === deckId);
    if (!deck) return;
    deck.sideboardGuide = guide;
    saveDecks(decks);
  }

  function getSideboardGuide(deck) {
    return Array.isArray(deck.sideboardGuide) ? deck.sideboardGuide : [];
  }

  function slugify(s) {
    return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function computeHeatmap(deckPairs, guide) {
    const total = guide.length;
    const cutCounts = {};
    for (const matchup of guide) {
      const raws = matchup.splitSideboard
        ? [matchup.cardsOutFirstRaw || '', matchup.cardsOutSecondRaw || '']
        : [matchup.cardsOutRaw || ''];
      const seen = new Set();
      for (const raw of raws) {
        for (const { name } of parseDecklist(raw)) {
          const key = name.toLowerCase();
          if (!seen.has(key)) {
            cutCounts[key] = (cutCounts[key] || 0) + 1;
            seen.add(key);
          }
        }
      }
    }
    const seen = new Set();
    const rows = [];
    for (const { entry } of deckPairs) {
      const key = entry.name.toLowerCase();
      if (seen.has(key)) continue;
      seen.add(key);
      const matchupsCut = cutCounts[key] || 0;
      const survivedMatchups = total - matchupsCut;
      rows.push({ name: entry.name, matchupsCut, survivedMatchups, total });
    }
    rows.sort((a, b) => a.survivedMatchups - b.survivedMatchups);
    return rows;
  }

  const RATINGS = ['auto-win', 'favoured', 'even', 'unfavoured', 'auto-loss'];

  function exportSideboardPdf(deck, guide, deckPairs) {
    const ratingLabel = r => r.charAt(0).toUpperCase() + r.slice(1).replace(/-/g, ' ');
    const goLabel = g => g === 'first' ? 'Go First' : g === 'second' ? 'Go Second' : 'Either';
    const ratingColor = {
      'auto-win':   '#16a34a',
      'favoured':   '#15803d',
      'even':       '#888',
      'unfavoured': '#b45309',
      'auto-loss':  '#991b1b',

    // Deck list for first page
    const deckListHtml = (() => {
      if (!deckPairs || deckPairs.length === 0) return '';
      const cardLi = p => {

      };
      const arenaPairs  = deckPairs.filter(p => !p.card || !p.card.color);
      const redPairs    = deckPairs.filter(p => p.card && p.card.color === 'red');
      const yellowPairs = deckPairs.filter(p => p.card && p.card.color === 'yellow');
      const bluePairs   = deckPairs.filter(p => p.card && p.card.color === 'blue');
      const colHtml = (label, pairs, cls) => `

      return `<div class="deck-page">

    })();

    const matchupEls = guide.map(m => {

        return `<li><span class="marker">−</span><span class="qty-col">×${c.qty}</span>${c.name}${hint}</li>`;
      };

      let cardsHtml = '';
      if (m.splitSideboard) {
        const firstCuts = parseDecklist(m.cardsOutFirstRaw || '');
        const secondCuts = parseDecklist(m.cardsOutSecondRaw || '');
        if (firstCuts.length > 0 || secondCuts.length > 0) {
          cardsHtml = `<div class="out-col">
            <div class="section-label">Go First — Out</div>

          </div>`;

      } else {

        cardsHtml = cuts.length > 0

      const noteHtml = m.note
        ? `<div class="section-label">Gameplan</div><p class="note">${m.note.replace(/\n/g, '<br>')}</p>`
        : '';
      const color = ratingColor[m.rating] || '#888';
      return `<div class="matchup">
        <div class="matchup-header">
          <span class="vs">vs</span>
          <span class="hero">${m.hero.toUpperCase()}</span>
          <span class="badge" style="background:${color}">${ratingLabel(m.rating)}</span>
          <span class="go">${goLabel(m.goFirst)}</span>
        </div>
        ${cardsHtml}${noteHtml}
      </div>`;
    });

    const matchupPagesHtml = (() => {
      const pages = [];
      for (let i = 0; i < matchupEls.length; i += 2) {
        const left = matchupEls[i];
        const right = i + 1 < matchupEls.length ? matchupEls[i + 1] : '';
        pages.push(`<div class="matchup-page">
          <div class="matchup-col">${left}</div>
          <div class="matchup-col matchup-col-right">${right}</div>
        </div>`);
      }
      return pages.join('');
    })();

    const ratingCounts = {};
    for (const m of guide) ratingCounts[m.rating] = (ratingCounts[m.rating] || 0) + 1;
    const overviewParts = RATINGS.filter(r => ratingCounts[r])
      .map(r => `<span>${ratingCounts[r]} ${ratingLabel(r)}</span>`).join(' · ');

    const html = `<!DOCTYPE html>

  function renderSideboard(deck, deckPairs) {
    const guide = getSideboardGuide(deck);
    const container = document.getElementById('sideboard-content');

    if (guide.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-title">No sideboard guides yet</div>
          <div class="empty-state-sub">Add a matchup to start building your guide</div>
        </div>
      `;
      const addBtn = document.createElement('button');
      addBtn.className = 'btn-primary sb-add-btn';
      addBtn.textContent = '+ Add matchup';
      addBtn.addEventListener('click', () => openMatchupEditor(deck, deckPairs, null));
      container.querySelector('.empty-state').appendChild(addBtn);
      return;
    }

    // Overview strip
    const ratingCounts = {};
    for (const m of guide) ratingCounts[m.rating] = (ratingCounts[m.rating] || 0) + 1;
    let overviewParts = [`${guide.length} matchup${guide.length !== 1 ? 's' : ''}`];
    for (const r of RATINGS) {
      if (ratingCounts[r]) {
        overviewParts.push(`<span class="sb-rating-badge sb-rating-${r}">${ratingCounts[r]} ${r}</span>`);
      }
    }
    const overviewHtml = `<div class="sb-overview">${overviewParts.join('<span class="sb-overview-sep"> · </span>')}</div>`;

    // Heatmap (only cards that appear in at least one matchup's cuts)
    const heatmapRows = computeHeatmap(deckPairs, guide).filter(r => r.matchupsCut > 0);
    let heatmapHtml = '';
    if (heatmapRows.length > 0) {
      const rowsHtml = heatmapRows.map(row => {
        const pct = row.total > 0 ? (row.survivedMatchups / row.total * 100).toFixed(1) : 0;
        const isCandidate = row.survivedMatchups <= 1;
        return `<div class="sb-heatmap-row">
          <div class="sb-heatmap-name">${esc(row.name)}</div>
          <div class="sb-heatmap-track"><div class="sb-heatmap-fill" style="width:${pct}%"></div></div>
          <div class="sb-heatmap-label${isCandidate ? ' sb-cut-candidate' : ''}">${row.survivedMatchups} / ${row.total} matchups</div>
        </div>`;
      }).join('');
      heatmapHtml = `<div class="sb-heatmap"><div class="sb-heatmap-title">Card Coverage</div>${rowsHtml}</div>`;
    }

    // Helper: count deck card (pitch card) cuts for a matchup
    const pitchNames = new Set(deckPairs.filter(p => p.card && p.card.color).map(p => p.entry.name.toLowerCase()));
    function deckCardCutCount(matchup) {
      const raws = matchup.splitSideboard
        ? [matchup.cardsOutFirstRaw || '', matchup.cardsOutSecondRaw || '']
        : [matchup.cardsOutRaw || ''];
      let n = 0;
      for (const raw of raws) {
        for (const c of parseDecklist(raw)) {
          if (pitchNames.has(c.name.toLowerCase())) n += c.qty;
        }
      }
      return n;
    }

    // Matchup rows
    const listHtml = guide.map(matchup => {
      const goFirstLabel = matchup.goFirst === 'first' ? '▸ Go First'
                         : matchup.goFirst === 'second' ? '▸ Go Second'
                         : '▸ Either';
      const goFirstClass = matchup.goFirst === 'first' ? 'sb-go-first'
                         : matchup.goFirst === 'second' ? 'sb-go-second'
                         : 'sb-go-either';
      return `<div class="sb-matchup-row" data-id="${esc(matchup.id)}">
        <div class="sb-matchup-head">
          <span class="sb-matchup-hero">${esc(matchup.hero)}</span>
          <span class="sb-rating-badge sb-rating-${matchup.rating}">${matchup.rating}</span>
          <span class="sb-go-indicator ${goFirstClass}">${goFirstLabel}</span>
          <span class="sb-chevron">›</span>
        </div>
        <div class="sb-matchup-body"><div class="sb-matchup-body-inner"></div></div>
      </div>`;
    }).join('');

    container.innerHTML = overviewHtml + heatmapHtml + `<div class="sb-matchup-list">${listHtml}</div>`;

    const actionsRow = document.createElement('div');
    actionsRow.className = 'sb-actions-row';

    const addBtn = document.createElement('button');
    addBtn.className = 'btn-secondary sb-add-btn';
    addBtn.textContent = '+ Add matchup';
    addBtn.addEventListener('click', () => openMatchupEditor(deck, deckPairs, null));

    const pdfBtn = document.createElement('button');
    pdfBtn.className = 'btn-secondary';
    pdfBtn.id = 'sb-export-pdf';
    pdfBtn.textContent = 'Export PDF';
    pdfBtn.addEventListener('click', () => exportSideboardPdf(deck, guide, deckPairs));

    actionsRow.appendChild(addBtn);
    actionsRow.appendChild(pdfBtn);
    container.appendChild(actionsRow);

    // Accordion toggle — whole row is clickable
    container.querySelectorAll('.sb-matchup-row').forEach(row => {
      row.addEventListener('click', (e) => {
        if (e.target.closest('.sb-matchup-edit-btn')) return;
        const inner = row.querySelector('.sb-matchup-body-inner');
        const isExpanded = row.classList.contains('expanded');
        container.querySelectorAll('.sb-matchup-row.expanded').forEach(r => {
          r.classList.remove('expanded');
        });
        if (!isExpanded) {
          row.classList.add('expanded');
          if (!inner.dataset.rendered) {
            const matchup = guide.find(m => m.id === row.dataset.id);
            if (matchup) renderMatchupBody(inner, matchup, deckPairs, deck);
            inner.dataset.rendered = '1';
          }
        }
      });
    });
  }

  function renderMatchupBody(bodyEl, matchup, deckPairs, deck) {
    let html = '';

    const deckTotal = deckPairs.reduce((s, p) => s + p.entry.qty, 0);
    let countLine = '';
    if (matchup.splitSideboard) {
      const fc = parseDecklist(matchup.cardsOutFirstRaw || '').reduce((s, c) => s + c.qty, 0);
      const sc = parseDecklist(matchup.cardsOutSecondRaw || '').reduce((s, c) => s + c.qty, 0);
      if (fc > 0 || sc > 0) countLine = `${deckTotal - fc}/${deckTotal - sc} left`;
    } else {
      const outsTotal = parseDecklist(matchup.cardsOutRaw || '').reduce((s, c) => s + c.qty, 0);
      if (outsTotal > 0) countLine = `${outsTotal} out · ${deckTotal - outsTotal} left`;
    }
    if (countLine) html += `<div class="sb-deck-count" style="margin-bottom:0.75rem">${countLine}</div>`;

    const cardLine = (c, cls) => {
      const hint = c.hint ? ` <span class="sb-card-hint">${esc(c.hint)}</span>` : '';
      return `<div class="${cls}"><span class="sb-qty">×${c.qty}</span>${esc(c.name)}${hint}</div>`;
    };

    if (matchup.splitSideboard) {
      const firstCuts = parseDecklist(matchup.cardsOutFirstRaw || '');
      const secondCuts = parseDecklist(matchup.cardsOutSecondRaw || '');
      if (firstCuts.length > 0 || secondCuts.length > 0) {
        const firstHtml = firstCuts.length > 0
          ? firstCuts.map(c => cardLine(c, 'sb-card-out')).join('')
          : '<div class="sb-card-none">No changes</div>';
        const secondHtml = secondCuts.length > 0
          ? secondCuts.map(c => cardLine(c, 'sb-card-out')).join('')
          : '<div class="sb-card-none">No changes</div>';
        html += `<div class="sb-body-section">
          <div class="sb-split-out-label first">▸ Go First — Out</div>${firstHtml}
          <div class="sb-split-out-label second">▸ Go Second — Out</div>${secondHtml}
        </div>`;
      }
    } else {
      const cuts = parseDecklist(matchup.cardsOutRaw || '');
      if (cuts.length > 0) {
        const outsHtml = cuts.map(c => cardLine(c, 'sb-card-out')).join('');
        html += `<div class="sb-body-section"><div class="sb-body-label">Out</div>${outsHtml}</div>`;
      }
    }

    if (matchup.note) {
      html += `<div class="sb-body-section"><div class="sb-body-label">Gameplan</div><div class="sb-note">${esc(matchup.note)}</div></div>`;
    }

    bodyEl.innerHTML = html;

    if (deck) {
      const editBtn = document.createElement('button');
      editBtn.className = 'btn-primary sb-matchup-edit-btn';
      editBtn.type = 'button';
      editBtn.textContent = 'Edit Matchup';
      editBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openMatchupEditor(deck, deckPairs, matchup.id);
      });
      bodyEl.appendChild(editBtn);
    }
  }

  function openMatchupEditor(deck, deckPairs, matchupIdOrNull) {
    const guide = getSideboardGuide(deck);
    const existing = matchupIdOrNull ? guide.find(m => m.id === matchupIdOrNull) : null;

    const currentRating = existing ? existing.rating : 'even';
    const currentGoFirst = existing ? existing.goFirst : null;
    const currentSplit = !!(existing && existing.splitSideboard);

    // boardMap helpers: key = `${name.toLowerCase()}|${hint||''}` → qty out
    function buildBoardMap(raw) {
      const m = {};
      for (const c of parseDecklist(raw || '')) {
        m[c.name.toLowerCase() + '|' + (c.hint || '')] = c.qty;
      }
      return m;
    }

    // When split: two separate maps; when not split: single map
    const boardMapFirst  = buildBoardMap(existing ? (existing.cardsOutFirstRaw  || (currentSplit ? '' : existing.cardsOutRaw)) : '');
    const boardMapSecond = buildBoardMap(existing ? (existing.cardsOutSecondRaw || '') : '');
    const boardMapSingle = buildBoardMap(existing && !currentSplit ? (existing.cardsOutRaw || '') : '');

    let isSplit = currentSplit;
    let activeSplitTab = 'first';

    function activeMap() {
      if (!isSplit) return boardMapSingle;
      return activeSplitTab === 'first' ? boardMapFirst : boardMapSecond;
    }

    function serializeBoardMap(bm) {
      const lines = [];
      for (const pair of deckPairs) {
        const key = pair.entry.name.toLowerCase() + '|' + (pair.entry.hint || '');
        const qty = bm[key] || 0;
        if (qty > 0) lines.push(`${qty} ${pair.entry.name}${pair.entry.hint ? ` (${pair.entry.hint})` : ''}`);
      }
      return lines.join('\n');
    }

    const ratingSelectHtml = `<select id="sb-rating-select">${
      RATINGS.map(r => {
        const label = r.charAt(0).toUpperCase() + r.slice(1).replace(/-/g, ' ');
        return `<option value="${r}"${currentRating === r ? ' selected' : ''}>${label}</option>`;
      }).join('')
    }</select>`;

    const goSelectHtml = `<select id="sb-go-select">
      <option value="first"${currentGoFirst === 'first' ? ' selected' : ''}>First</option>
      <option value=""${(currentGoFirst === null || currentGoFirst === undefined) ? ' selected' : ''}>Either</option>
      <option value="second"${currentGoFirst === 'second' ? ' selected' : ''}>Second</option>
    </select>`;

    const container = document.getElementById('sideboard-content');
    container.innerHTML = `
      <div class="sb-editor">
        <div class="sb-editor-title">${existing ? 'Edit Matchup' : 'New Matchup'}</div>
        <div class="sb-editor-field">
          <label>Hero</label>
          <input type="text" id="sb-hero-input" value="${esc(existing ? existing.hero : '')}" placeholder="e.g. Kayo" autocomplete="off" />
        </div>
        <div class="sb-editor-field">
          <label>Rating</label>
          ${ratingSelectHtml}
        </div>
        <div class="sb-editor-field">
          <label>Go First Preference</label>
          ${goSelectHtml}
        </div>
        <div class="sb-editor-field">
          <label>Split Sideboard by Turn Order</label>
          <div class="sb-split-toggle-row">
            <input type="checkbox" class="sb-split-check" id="sb-split-toggle" ${currentSplit ? 'checked' : ''} />
            <label for="sb-split-toggle" class="sb-split-check-label">Separate Cards Out for Go First / Go Second</label>
          </div>
        </div>
        <div class="sb-editor-field" id="sb-cards-out-field">
          <label>Cards Out</label>
          <div id="sb-split-tabs-container"></div>
          <div class="sb-picker-summary" id="sb-picker-summary"></div>
          <div class="sb-deck-picker" id="sb-deck-picker"></div>
        </div>
        <div class="sb-editor-field">
          <label>Gameplan Note</label>
          <textarea id="sb-note" rows="4" placeholder="Optional gameplan notes…">${esc(existing ? existing.note : '')}</textarea>
        </div>
        <div class="err" id="sb-warn"></div>
        <div class="sb-editor-actions">
          <button class="btn-primary" id="sb-save">Save</button>
          <button class="btn-secondary" id="sb-cancel">Cancel</button>
          ${existing ? '<button class="btn-danger" id="sb-delete">Delete</button>' : ''}
        </div>
      </div>
    `;

    function renderSplitTabs() {
      const tabsContainer = document.getElementById('sb-split-tabs-container');
      if (!tabsContainer) return;
      if (!isSplit) {
        tabsContainer.innerHTML = '';
        return;
      }
      tabsContainer.innerHTML = `
        <div class="sb-split-tabs">
          <button class="sb-split-tab-btn first${activeSplitTab === 'first' ? ' active' : ''}" type="button" data-tab="first">Go First</button>
          <button class="sb-split-tab-btn second${activeSplitTab === 'second' ? ' active' : ''}" type="button" data-tab="second">Go Second</button>
        </div>
      `;
      tabsContainer.querySelectorAll('.sb-split-tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeSplitTab = btn.dataset.tab;
          renderSplitTabs();
          renderPicker();
        });
      });
    }

    function renderPicker() {
      const pickerEl = document.getElementById('sb-deck-picker');
      const summaryEl = document.getElementById('sb-picker-summary');
      if (!pickerEl) return;

      pickerEl.innerHTML = '';
      const bm = activeMap();

      const arenaPairs = deckPairs.filter(p => !p.card || !p.card.color);
      const pitchPairs = deckPairs.filter(p => p.card && p.card.color);
      const showSections = arenaPairs.length > 0 && pitchPairs.length > 0;

      function renderRow(pair) {
        const key = pair.entry.name.toLowerCase() + '|' + (pair.entry.hint || '');
        const boardedOut = bm[key] || 0;
        const max = pair.entry.qty;
        const remaining = max - boardedOut;
        const hintColor = pair.entry.hint === 'red'    ? 'var(--red-c)'
                        : pair.entry.hint === 'blue'   ? 'var(--blue-c)'
                        : pair.entry.hint === 'yellow' ? 'var(--yellow-c)'
                        : null;

        const row = document.createElement('div');
        row.className = 'sb-picker-row' + (boardedOut > 0 ? ' boarding' : '');
        row.dataset.key = key;

        const nameDiv = document.createElement('div');
        nameDiv.className = 'sb-picker-name';
        if (hintColor) {
          const dot = document.createElement('span');
          dot.className = 'sb-picker-hint';
          dot.style.background = hintColor;
          nameDiv.appendChild(dot);
        }
        const nameSpan = document.createElement('span');
        nameSpan.textContent = pair.entry.name;
        nameDiv.appendChild(nameSpan);

        const ctrl = document.createElement('div');
        ctrl.className = 'sb-picker-ctrl';

        const minusBtn = document.createElement('button');
        minusBtn.className = 'sb-picker-btn sb-picker-minus';
        minusBtn.type = 'button';
        minusBtn.textContent = '–';
        minusBtn.disabled = boardedOut >= max;
        minusBtn.addEventListener('click', () => {
          const cur = bm[key] || 0;
          if (cur < max) { bm[key] = cur + 1; renderPicker(); }
        });

        const countSpan = document.createElement('span');
        countSpan.className = 'sb-picker-count';
        countSpan.textContent = `${remaining}/${max}`;

        const plusBtn = document.createElement('button');
        plusBtn.className = 'sb-picker-btn sb-picker-plus';
        plusBtn.type = 'button';
        plusBtn.textContent = '+';
        plusBtn.disabled = boardedOut === 0;
        plusBtn.addEventListener('click', () => {
          if ((bm[key] || 0) > 0) {
            bm[key] = bm[key] - 1;
            if (bm[key] === 0) delete bm[key];
            renderPicker();
          }
        });

        ctrl.appendChild(minusBtn);
        ctrl.appendChild(countSpan);
        ctrl.appendChild(plusBtn);
        row.appendChild(nameDiv);
        row.appendChild(ctrl);
        pickerEl.appendChild(row);
      }

      function renderSection(pairs, label) {
        if (pairs.length === 0) return;
        if (showSections) {
          const header = document.createElement('div');
          header.className = 'sb-picker-section';
          header.textContent = label;
          pickerEl.appendChild(header);
        }
        pairs.forEach(renderRow);
      }

      renderSection(arenaPairs, 'Arena');
      renderSection(pitchPairs, 'Deck Cards');

      const total = Object.values(bm).reduce((s, v) => s + v, 0);
      if (summaryEl) {
        let label = '';
        if (isSplit) {
          const fc = Object.values(boardMapFirst).reduce((s, v) => s + v, 0);
          const sc = Object.values(boardMapSecond).reduce((s, v) => s + v, 0);
          label = (fc > 0 || sc > 0)
            ? `${fc} first / ${sc} second selected to board out`
            : 'Click – to board out cards';
        } else {
          label = total > 0
            ? `${total} card${total !== 1 ? 's' : ''} selected to board out`
            : 'Click – to board out cards';
        }
        summaryEl.textContent = label;
      }
    }

    renderSplitTabs();
    renderPicker();

    let selectedRating = currentRating;
    let selectedGoFirst = currentGoFirst;

    document.getElementById('sb-rating-select').addEventListener('change', (e) => {
      selectedRating = e.target.value;
    });

    document.getElementById('sb-go-select').addEventListener('change', (e) => {
      selectedGoFirst = e.target.value || null;
    });

    document.getElementById('sb-split-toggle').addEventListener('change', (e) => {
      isSplit = e.target.checked;
      if (isSplit) {
        // Migrate single board map into go-first on first enable
        if (Object.keys(boardMapFirst).length === 0) {
          Object.assign(boardMapFirst, boardMapSingle);
        }
        activeSplitTab = 'first';
      }
      renderSplitTabs();
      renderPicker();
    });

    document.getElementById('sb-cancel').addEventListener('click', () => {
      const latestDeck = loadDecks().find(d => d.id === deck.id) || deck;
      renderSideboard(latestDeck, deckPairs);
    });

    if (existing) {
      document.getElementById('sb-delete').addEventListener('click', () => {
        if (window.confirm('Delete this matchup?')) {
          const latestGuide = getSideboardGuide(loadDecks().find(d => d.id === deck.id) || deck);
          saveSideboardGuide(deck.id, latestGuide.filter(m => m.id !== existing.id));
          const updatedDeck = loadDecks().find(d => d.id === deck.id) || deck;
          renderSideboard(updatedDeck, deckPairs);
        }
      });
    }

    document.getElementById('sb-save').addEventListener('click', () => {
      const hero = document.getElementById('sb-hero-input').value.trim();
      const note = document.getElementById('sb-note').value.trim();
      const warnEl = document.getElementById('sb-warn');
      warnEl.style.display = 'none';

      if (!hero) {
        warnEl.textContent = 'Hero name is required.';
        warnEl.style.display = '';
        return;
      }

      const latestDeck = loadDecks().find(d => d.id === deck.id) || deck;
      const latestGuide = getSideboardGuide(latestDeck);

      let matchupId;
      if (existing) {
        matchupId = existing.id;
      } else {
        const base = slugify(hero) || 'matchup';
        matchupId = base;
        let suffix = 2;
        while (latestGuide.some(m => m.id === matchupId)) matchupId = `${base}-${suffix++}`;
      }

      let matchupObj;
      if (isSplit) {
        const cardsOutFirstRaw = serializeBoardMap(boardMapFirst);
        const cardsOutSecondRaw = serializeBoardMap(boardMapSecond);
        const totalQty = parseDecklist(cardsOutFirstRaw).reduce((s, c) => s + c.qty, 0)
                       + parseDecklist(cardsOutSecondRaw).reduce((s, c) => s + c.qty, 0);
        if (totalQty > 160) {
          warnEl.textContent = `Warning: Total cuts (${totalQty}) is unusually high`;
          warnEl.style.display = '';
        }
        matchupObj = { id: matchupId, hero, rating: selectedRating, goFirst: selectedGoFirst, note, splitSideboard: true, cardsOutFirstRaw, cardsOutSecondRaw };
      } else {
        const cardsOutRaw = serializeBoardMap(boardMapSingle);
        const totalQty = parseDecklist(cardsOutRaw).reduce((s, c) => s + c.qty, 0);
        if (totalQty > 80) {
          warnEl.textContent = `Warning: Total cuts (${totalQty}) exceeds 80`;
          warnEl.style.display = '';
        }
        matchupObj = { id: matchupId, hero, rating: selectedRating, goFirst: selectedGoFirst, note, cardsOutRaw };
      }

      const newGuide = existing
        ? latestGuide.map(m => m.id === existing.id ? matchupObj : m)
        : [...latestGuide, matchupObj];

      saveSideboardGuide(deck.id, newGuide);
      const updatedDeck = loadDecks().find(d => d.id === deck.id) || deck;
      renderSideboard(updatedDeck, deckPairs);
    });
  }

  /* ── Card context menu ──────────────────────────────────────────── */
  let ctxMenuEntry = null;

  function showCardContextMenu(e, entry) {
    ctxMenuEntry = entry;
    const menu = document.getElementById('card-ctx-menu');
    menu.style.display = '';
    const rect = menu.getBoundingClientRect();
    const x = Math.min(e.clientX, window.innerWidth - (rect.width || 160) - 8);
    const y = Math.min(e.clientY, window.innerHeight - (rect.height || 48) - 8);
    menu.style.left = Math.max(8, x) + 'px';
    menu.style.top  = Math.max(8, y) + 'px';
  }

  function closeCardContextMenu() {
    document.getElementById('card-ctx-menu').style.display = 'none';
    ctxMenuEntry = null;
  }

  document.addEventListener('click', closeCardContextMenu);

  document.getElementById('card-ctx-replace').addEventListener('click', e => {
    e.stopPropagation();
    const entry = ctxMenuEntry;
    closeCardContextMenu();
    if (entry) openReplaceCardModal(entry);
  });

  /* ── Replace Card ────────────────────────────────────────────────── */
  function replaceCardInRaw(text, oldName, oldHint, newName, newHint, qtyToReplace) {
    return text.split('\n').map(line => {
      const s = line.trim();
      if (!s || !/^\d/.test(s)) return line;
      const m = s.match(/^(\d+)x?\s+(.+?)(\s*\((\d+|red|yellow|blue)\))?\s*$/i);
      if (!m) return line;
      const name = m[2].trim();
      const rawHint = m[4] ? m[4].toLowerCase() : '';
      const normalizedHint = (rawHint === '1' || rawHint === 'red')    ? 'red'
                           : (rawHint === '2' || rawHint === 'yellow') ? 'yellow'
                           : (rawHint === '3' || rawHint === 'blue')   ? 'blue'
                           : '';
      if (name.toLowerCase() !== oldName.toLowerCase()) return line;
      if (normalizedHint !== (oldHint || '')) return line;
      const totalQty = parseInt(m[1], 10);
      const replacing = (qtyToReplace !== undefined) ? Math.min(qtyToReplace, totalQty) : totalQty;
      const remaining = totalQty - replacing;
      const resolvedHint = newHint || normalizedHint;
      const newLine = `${replacing} ${newName}${resolvedHint ? ` (${resolvedHint})` : ''}`;
      if (remaining > 0) {
        const oldHintStr = normalizedHint ? ` (${normalizedHint})` : '';
        return `${remaining} ${name}${oldHintStr}\n${newLine}`;
      }
      return newLine;
    }).join('\n');
  }

  function reRenderCurrentDeck() {
    const deck = loadDecks().find(d => d.id === currentDeckId);
    if (!deck) return;
    const entries = parseDecklist(deck.decklist);
    const pairs   = entries.map(e => ({ entry: e, card: lookup(e.name, e.hint) }));
    renderDetail(deck, pairs);
    showView('view-detail');
  }

  function closeReplaceCardModal() {
    document.getElementById('replace-card-backdrop').style.display = 'none';
    document.body.style.overflow = '';
    const acList = document.getElementById('card-ac-list');
    if (acList) { acList.style.display = 'none'; acList.innerHTML = ''; }
    currentReplaceEntry = null;
    currentReplaceNewEntry = null;
  }

  function openReplaceCardModal(entry) {
    currentReplaceEntry = entry;
    currentReplaceNewEntry = null;

    const hintStr = entry.hint ? ` (${entry.hint})` : '';
    document.getElementById('replace-old-display').textContent = entry.name + hintStr + ' ×' + entry.qty;

    const qtySelect = document.getElementById('replace-qty-select');
    qtySelect.innerHTML = '';
    for (let i = 1; i <= entry.qty; i++) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = i === entry.qty ? `${i} (all)` : String(i);
      qtySelect.appendChild(opt);
    }
    qtySelect.value = entry.qty;

    document.getElementById('replace-new-name').value = '';
    document.getElementById('replace-card-err').style.display = 'none';

    document.getElementById('replace-card-backdrop').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('replace-new-name').focus(), 60);
  }

  /* ── Card name autocomplete ─────────────────────────────────────── */
  (function () {
    const input   = document.getElementById('replace-new-name');
    const list    = document.getElementById('card-ac-list');
    let acIndex   = -1;
    let acItems   = [];

    function getAllCardVariants() {
      if (!db) return [];
      const seen = new Set();
      const variants = [];
      for (const entry of db.values()) {
        const key = entry.name.toLowerCase() + '|' + (entry.color || '');
        if (!seen.has(key)) { seen.add(key); variants.push(entry); }
      }
      return variants;
    }

    function closeAc() {
      list.style.display = 'none';
      list.innerHTML = '';
      acIndex = -1;
      acItems = [];
      input.setAttribute('aria-expanded', 'false');
    }

    function selectItem(entry) {
      input.value = entry.name;
      currentReplaceNewEntry = entry;
      closeAc();
    }

    function buildAc(query) {
      const q = query.toLowerCase().trim();
      if (q.length < 2) { closeAc(); return; }

      const allVariants = getAllCardVariants();
      const starts   = allVariants.filter(e => e.name.toLowerCase().startsWith(q));
      const contains = allVariants.filter(e => !e.name.toLowerCase().startsWith(q) && e.name.toLowerCase().includes(q));
      const results  = [...starts, ...contains].slice(0, 18);

      if (results.length === 0) { closeAc(); return; }

      list.innerHTML = '';
      acItems = results;
      acIndex = -1;

      const PITCH_COLOR = { red: 'var(--red-c)', yellow: 'var(--yellow-c)', blue: 'var(--blue-c)' };
      const PITCH_LABEL = { red: 'Red · 1', yellow: 'Yellow · 2', blue: 'Blue · 3' };

      results.forEach((entry) => {
        const item = document.createElement('div');
        item.className = 'card-ac-item';
        item.setAttribute('role', 'option');
        item.setAttribute('aria-selected', 'false');

        const pitchLabel = PITCH_LABEL[entry.color] || '';
        const typesStr   = Array.isArray(entry.types) ? entry.types.slice(0, 2).join(', ') : '';
        const meta       = [typesStr, pitchLabel].filter(Boolean).join(' · ');
        const dotStyle   = entry.color ? `display:inline-block;width:8px;height:8px;border-radius:50%;background:${PITCH_COLOR[entry.color]};flex-shrink:0;` : '';

        const imgEl = entry.imgUrl
          ? `<img class="card-ac-img" src="${esc(entry.imgUrl)}" alt="" loading="lazy" />`
          : `<div class="card-ac-img-placeholder">?</div>`;

        const dotEl = dotStyle ? `<span style="${dotStyle}" aria-hidden="true"></span>` : '';

        item.innerHTML = imgEl
          + `<div class="card-ac-info"><div class="card-ac-name">${dotEl}${esc(entry.name)}</div>${meta ? `<div class="card-ac-meta">${esc(meta)}</div>` : ''}</div>`;

        item.addEventListener('mousedown', e => { e.preventDefault(); selectItem(entry); });
        list.appendChild(item);
      });

      list.style.display = '';
      input.setAttribute('aria-expanded', 'true');
    }

    function setAcActive(idx) {
      acItems.forEach((_, i) => {
        const el = list.children[i];
        if (!el) return;
        el.setAttribute('aria-selected', i === idx ? 'true' : 'false');
      });
      acIndex = idx;
      if (idx >= 0 && list.children[idx]) {
        list.children[idx].scrollIntoView({ block: 'nearest' });
      }
    }

    input.addEventListener('input', () => { currentReplaceNewEntry = null; buildAc(input.value); });

    input.addEventListener('keydown', e => {
      if (list.style.display === 'none') return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setAcActive(Math.min(acIndex + 1, acItems.length - 1));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setAcActive(Math.max(acIndex - 1, 0));
      } else if (e.key === 'Enter' && acIndex >= 0) {
        e.preventDefault();
        selectItem(acItems[acIndex]);
      } else if (e.key === 'Escape') {
        closeAc();
      }
    });

    input.addEventListener('blur', () => setTimeout(closeAc, 120));
  })();

  document.getElementById('replace-card-save').addEventListener('click', () => {
    const errEl = document.getElementById('replace-card-err');
    errEl.style.display = 'none';

    if (!currentReplaceEntry) { closeReplaceCardModal(); return; }
    const oldName = currentReplaceEntry.name;
    const oldHint = currentReplaceEntry.hint || '';
    const qtyToReplace = parseInt(document.getElementById('replace-qty-select').value, 10);

    const newEntry = currentReplaceNewEntry;
    const newName  = newEntry ? newEntry.name : document.getElementById('replace-new-name').value.trim();
    const newHint  = newEntry ? (newEntry.color || '') : '';

    if (!newName) {
      errEl.textContent = 'New card name is required.';
      errEl.style.display = '';
      return;
    }
    if (newName.toLowerCase() === oldName.toLowerCase() && newHint === oldHint) {
      errEl.textContent = 'New card is the same as the original.';
      errEl.style.display = '';
      return;
    }

    const decks = loadDecks();
    const deck  = decks.find(d => d.id === currentDeckId);
    if (!deck) { closeReplaceCardModal(); return; }

    const existingNewEntry = parseDecklist(deck.decklist).find(e =>
      e.name.toLowerCase() === newName.toLowerCase() && (e.hint || '') === newHint
    );
    const existingNewQty = existingNewEntry ? existingNewEntry.qty : 0;
    if (existingNewQty + qtyToReplace > 3) {
      errEl.textContent = `Cannot add ${qtyToReplace} cop${qtyToReplace === 1 ? 'y' : 'ies'} — deck already has ${existingNewQty} cop${existingNewQty === 1 ? 'y' : 'ies'} of this card (max 3).`;
      errEl.style.display = '';
      return;
    }

    deck.decklist = replaceCardInRaw(deck.decklist, oldName, oldHint, newName, newHint, qtyToReplace);

    if (Array.isArray(deck.sideboardGuide)) {
      deck.sideboardGuide = deck.sideboardGuide.map(m => m.splitSideboard
        ? { ...m,
            cardsOutFirstRaw:  replaceCardInRaw(m.cardsOutFirstRaw  || '', oldName, oldHint, newName, newHint, qtyToReplace),
            cardsOutSecondRaw: replaceCardInRaw(m.cardsOutSecondRaw || '', oldName, oldHint, newName, newHint, qtyToReplace),
          }
        : { ...m, cardsOutRaw: replaceCardInRaw(m.cardsOutRaw || '', oldName, oldHint, newName, newHint, qtyToReplace) }
      );
    }

    deck.cardCount = parseDecklist(deck.decklist).reduce((s, e) => s + e.qty, 0);
    saveDecks(decks);
    closeReplaceCardModal();
    reRenderCurrentDeck();
  });

  document.getElementById('replace-card-cancel').addEventListener('click', closeReplaceCardModal);
  document.getElementById('replace-card-close').addEventListener('click', closeReplaceCardModal);
  document.getElementById('replace-card-backdrop').addEventListener('click', function (e) {
    if (e.target === this) closeReplaceCardModal();
  });

  /* ── Tab switching ────────────────────────────────────────────────── */
  document.getElementById('tab-btn-decklist').addEventListener('click', () => {
    document.getElementById('tab-btn-decklist').className = 'tab-btn active';
    document.getElementById('tab-btn-analysis').className = 'tab-btn';
    document.getElementById('tab-btn-sideboard').className = 'tab-btn';
    document.getElementById('tab-decklist').style.display = '';
    document.getElementById('tab-analysis').style.display = 'none';
    document.getElementById('tab-sideboard').style.display = 'none';
  });

  document.getElementById('tab-btn-analysis').addEventListener('click', () => {
    document.getElementById('tab-btn-decklist').className = 'tab-btn';
    document.getElementById('tab-btn-analysis').className = 'tab-btn active';
    document.getElementById('tab-btn-sideboard').className = 'tab-btn';
    document.getElementById('tab-decklist').style.display = 'none';
    document.getElementById('tab-analysis').style.display = '';
    document.getElementById('tab-sideboard').style.display = 'none';
    // Rebuild filter bar with latest sideboard data (handles newly added matchups)
    const freshDeck = loadDecks().find(d => d.id === currentDeckId);
    if (freshDeck) buildAnalysisFilterBar(freshDeck, currentDeckPairs);
    if (!analysisAnimated) {
      analysisAnimated = true;
      requestAnimationFrame(() => requestAnimationFrame(animateAnalysis));
    }
  });

  document.getElementById('tab-btn-sideboard').addEventListener('click', () => {
    document.getElementById('tab-btn-decklist').className = 'tab-btn';
    document.getElementById('tab-btn-analysis').className = 'tab-btn';
    document.getElementById('tab-btn-sideboard').className = 'tab-btn active';
    document.getElementById('tab-decklist').style.display = 'none';
    document.getElementById('tab-analysis').style.display = 'none';
    document.getElementById('tab-sideboard').style.display = '';
    if (!sideboardRendered) {
      sideboardRendered = true;
      const deck = loadDecks().find(d => d.id === currentDeckId);
      if (deck) renderSideboard(deck, currentDeckPairs);
    }
  });

  /* ── Analysis sub-tab switching ───────────────────────────────────── */
  function switchAnalysisSubTab(tab) {
    analysisSubTab = tab;
    document.getElementById('sub-tab-numbers').className    = 'sub-tab-btn' + (tab === 'numbers'     ? ' active' : '');
    document.getElementById('sub-tab-simulations').className = 'sub-tab-btn' + (tab === 'simulations' ? ' active' : '');
    document.getElementById('analysis-content').style.display   = tab === 'numbers'     ? '' : 'none';
    document.getElementById('analysis-simulator').style.display = tab === 'simulations' ? '' : 'none';
    if (tab === 'simulations') renderSimulator(currentAnalysisPairs);
  }

  document.getElementById('sub-tab-numbers').addEventListener('click', () => switchAnalysisSubTab('numbers'));
  document.getElementById('sub-tab-simulations').addEventListener('click', () => switchAnalysisSubTab('simulations'));

  /* ── Import handlers ──────────────────────────────────────────────── */
  function goToImport() {
    document.getElementById('decklist').value  = '';
    document.getElementById('deck-name').value = '';
    document.getElementById('import-err').style.display = 'none';
    showView('view-import');
  }

  document.getElementById('btn-go-import').addEventListener('click', goToImport);
  document.getElementById('btn-empty-import').addEventListener('click', goToImport);

  document.getElementById('btn-back-from-import').addEventListener('click', () => showView('view-list'));

  document.getElementById('btn-clear').addEventListener('click', () => {
    document.getElementById('decklist').value = '';
    document.getElementById('import-err').style.display = 'none';
  });

  document.getElementById('btn-import').addEventListener('click', async function () {
    const raw  = document.getElementById('decklist').value.trim();
    const name = document.getElementById('deck-name').value.trim();

    const errEl = document.getElementById('import-err');
    errEl.style.display = 'none';

    if (!raw) {
      errEl.textContent = 'Paste a decklist first.';
      errEl.style.display = '';
      return;
    }
    const entries = parseDecklist(raw);
    if (!entries.length) {
      errEl.textContent = 'No card entries found. Check the format.';
      errEl.style.display = '';
      return;
    }

    const cardCount = entries.reduce((s, e) => s + e.qty, 0);
    const deck = {
      id:        Date.now().toString(36) + Math.random().toString(36).slice(2),
      name:      name || 'Untitled Deck',
      decklist:  raw,
      cardCount,
      savedAt:   new Date().toISOString(),
    };

    const decks = loadDecks();
    decks.unshift(deck);
    saveDecks(decks);
    renderList();

    await viewDeck(deck.id);
  });

  /* ── Detail handlers ──────────────────────────────────────────────── */
  document.getElementById('btn-back-from-detail').addEventListener('click', () => {
    showView('view-list');
  });

  document.getElementById('btn-delete-deck').addEventListener('click', () => {
    if (!currentDeckId) return;
    const decks = loadDecks().filter(d => d.id !== currentDeckId);
    saveDecks(decks);
    currentDeckId = null;
    renderList();
    showView('view-list');
  });

  /* ── Category popup handlers ─────────────────────────────────────── */
  document.getElementById('cat-popup-close').addEventListener('click', closeCategoryPopup);

  document.getElementById('category-popup').addEventListener('click', function(e) {
    if (e.target === this) closeCategoryPopup();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && document.getElementById('replace-card-backdrop').style.display !== 'none') {
      closeReplaceCardModal();
    }
    if (e.key === 'Escape' && document.getElementById('category-popup').style.display !== 'none') {
      closeCategoryPopup();
    }
  });

  document.getElementById('analysis-content').addEventListener('click', function(e) {
    const row = e.target.closest('.hbar-row--clickable');
    if (!row) return;
    openCategoryPopup(row.dataset.filterType, row.dataset.filterKey);
  });

  document.getElementById('analysis-content').addEventListener('keydown', function(e) {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const row = e.target.closest('.hbar-row--clickable');
    if (!row) return;
    e.preventDefault();
    openCategoryPopup(row.dataset.filterType, row.dataset.filterKey);
  });

  /* ── Init ─────────────────────────────────────────────────────────── */
  renderList();
  showView('view-list');

})();
</script>

</body>
</html>
