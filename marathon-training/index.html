<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run &amp; Walk Tracker</title>
<script src="../nav.js"></script>
<script src="../activity-calc.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #1c1814;
  --surf:    #252018;
  --surf2:   #2e2820;
  --border:  #3a3025;
  --bord2:   #4a4030;
  --accent:  #c4864a;
  --ab:      rgba(196,134,74,0.10);
  --ab2:     rgba(196,134,74,0.25);
  --text:    #e8dfd0;
  --text2:   #9a8a76;
  --muted:   #5a5040;
  --green:   #7ab87a;
  --blue:    #5ab4cc;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; }
body {
  font-family: 'DM Serif Text', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.55;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(232,223,208,0.05) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none; z-index: 0;
}
.app-header, .main, .app-footer { position: relative; z-index: 1; }

.app-header {
  background: var(--surf);
  border-bottom: 2px solid var(--text);
  padding: 14px 20px;
  position: sticky; top: 0; z-index: 100;
}
.header-inner {
  max-width: 720px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.app-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 700;
}
.app-title span { color: var(--accent); }

.main { max-width: 720px; margin: 0 auto; padding: 20px; }

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
@media (max-width: 640px) { .stats-row { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 400px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
.stat-card {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 12px;
  text-align: center;
}
.stat-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 700; color: var(--accent);
}
.stat-lbl { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

/* Log form */
.form-card {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 20px;
}
.form-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 700;
  margin-bottom: 14px;
  color: var(--text);
}
.form-row-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
@media (max-width: 480px) { .form-row-3 { grid-template-columns: 1fr 1fr; } }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.form-input {
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  width: 100%;
}
.form-input:focus { outline: none; border-color: var(--accent); }
.form-input::placeholder { color: var(--muted); }
.form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }

/* Type toggle */
.type-toggle {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 14px;
}
.type-btn {
  flex: 1;
  padding: 8px 12px;
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'DM Serif Text', Georgia, serif;
  font-size: 13px;
  color: var(--text2);
  border-right: 1px solid var(--border);
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.type-btn:last-child { border-right: none; }
.type-btn.active[data-type="run"] { background: rgba(122,184,122,0.12); color: var(--green); }
.type-btn.active[data-type="walk"] { background: rgba(196,134,74,0.12); color: var(--accent); }
.type-btn:hover:not(.active) { color: var(--text); background: rgba(232,223,208,0.04); }

/* Buttons */
.btn {
  padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 13px; font-family: 'DM Serif Text', Georgia, serif;
  font-weight: 600; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 5px;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.12); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Activity list */
.list-card {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.list-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 700;
  display: flex; align-items: center; justify-content: space-between;
}
.filter-tabs {
  display: flex; gap: 6px;
}
.filter-tab {
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-family: 'DM Serif Text', Georgia, serif;
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-tab.active { background: var(--ab); border-color: var(--accent); color: var(--accent); }
.filter-tab:hover:not(.active) { color: var(--text); }

.activity-entry {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.activity-entry:last-child { border-bottom: none; }
.activity-entry:hover { background: rgba(196,134,74,0.04); }
.entry-date {
  font-size: 12px; font-weight: 700; color: var(--accent);
  min-width: 70px; padding-top: 2px; flex-shrink: 0;
}
.entry-body { flex: 1; min-width: 0; }
.entry-type {
  display: inline-block;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 1px 7px; border-radius: 3px;
  margin-bottom: 3px;
}
.entry-type.run { background: rgba(122,184,122,0.15); color: var(--green); }
.entry-type.walk { background: rgba(196,134,74,0.15); color: var(--accent); }
.entry-meta { font-size: 12px; color: var(--text2); margin-top: 1px; }
.entry-kcal { font-size: 12px; color: var(--green); margin-top: 2px; }
.entry-notes { font-size: 12px; color: var(--text2); font-style: italic; margin-top: 2px; }
.entry-actions { display: flex; gap: 4px; flex-shrink: 0; }
.btn-icon {
  background: none; border: none; cursor: pointer;
  color: var(--text2); font-size: 13px;
  padding: 3px 6px; border-radius: 4px;
  transition: color 0.15s, background 0.15s; opacity: 0.5;
}
.btn-icon:hover { opacity: 1; color: var(--accent); background: var(--ab); }
.btn-icon.del:hover { color: #c46a6a; background: rgba(196,106,106,0.12); }

.empty-state {
  padding: 32px 18px;
  color: var(--text2);
  font-size: 13px;
  text-align: center;
  font-style: italic;
}

.app-footer {
  padding: 1.5rem 2rem;
  font-size: 0.78rem;
  color: var(--muted);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  margin-top: 2rem;
}
.app-footer a { color: var(--text2); text-decoration: none; }
.app-footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="app-title">Run &amp; Walk <span>Tracker</span></div>
    <button class="btn btn-primary" onclick="openForm()">+ Log Activity</button>
  </div>
</header>

<main class="main">

  <div class="stats-row" id="stats-row"></div>

  <div class="form-card" id="log-form" style="display:none">
    <div class="form-title" id="form-title">Log an Activity</div>

    <div class="type-toggle" id="type-toggle">
      <button class="type-btn active" data-type="run" onclick="setType('run')">&#127939; Run</button>
      <button class="type-btn" data-type="walk" onclick="setType('walk')">&#128694; Walk</button>
    </div>

    <div class="form-row-3">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" class="form-input" id="f-date">
      </div>
      <div class="form-group">
        <label class="form-label">Distance (km)</label>
        <input type="number" class="form-input" id="f-km" placeholder="e.g. 5.2" min="0" max="200" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label">Duration (min)</label>
        <input type="number" class="form-input" id="f-time" placeholder="e.g. 30" min="0" max="600">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label class="form-label">Notes</label>
      <input type="text" class="form-input" id="f-notes" placeholder="Optional — route, pace, how it felt…">
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="cancelForm()">Cancel</button>
      <button class="btn btn-primary" onclick="saveActivity()">Save</button>
    </div>
  </div>

  <div class="list-card">
    <div class="list-header">
      <span>Activity Log</span>
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">All</button>
        <button class="filter-tab" data-filter="run" onclick="setFilter('run')">Runs</button>
        <button class="filter-tab" data-filter="walk" onclick="setFilter('walk')">Walks</button>
      </div>
    </div>
    <div id="activity-list"></div>
  </div>

  <div id="migrate-banner" style="display:none; margin-top:14px; background:var(--surf); border:1px solid var(--bord2); border-radius:10px; padding:14px 18px; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
    <span style="font-size:12px; color:var(--text2);">Old activity data found in browser storage.</span>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-primary btn-sm" onclick="runMigration()">Import old data</button>
      <button class="btn btn-ghost btn-sm" onclick="dismissMigration()">Dismiss</button>
    </div>
  </div>

</main>

<footer class="app-footer">
  <span id="page-version" style="opacity:0.65"></span>
  <span id="storage-size"></span>
</footer>
<script>fetch('../version.json').then(r=>r.json()).then(v=>{var e=document.getElementById('page-version');if(e)e.textContent='v'+v.version}).catch(()=>{});</script>

<script>
// ── Storage ────────────────────────────────────────────────────────────────
const LS_KEY = 'activity_tracker_v1';

function loadActivities() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw !== null) return JSON.parse(raw);
  } catch (e) {}
  return [];
}

function saveActivities(list) {
  localStorage.setItem(LS_KEY, JSON.stringify(list));
}

let activities = loadActivities();

// ── Weight helper ──────────────────────────────────────────────────────────
function getWeight() {
  try {
    const weights = JSON.parse(localStorage.getItem('calorie_weights') || 'null');
    if (!weights) return null;
    const dates = Object.keys(weights).filter(d => weights[d] > 0).sort();
    return dates.length > 0 ? weights[dates[dates.length - 1]] : null;
  } catch (e) { return null; }
}

// ── Date helpers ───────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

function fmtDate(str) {
  const [y, m, d] = str.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[+m - 1] + ' ' + +d;
}

function kcalForActivity(a, weight) {
  if (a.type === 'run') return ActivityCalc.runningKcal(weight, a.km, a.time);
  return ActivityCalc.walkingKcal(weight, a.km, a.time);
}

// ── Form state ─────────────────────────────────────────────────────────────
let editId = null;
let currentType = 'run';
let currentFilter = 'all';

function setType(t) {
  currentType = t;
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === t);
  });
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.filter === f);
  });
  renderList();
}

function openForm(id) {
  editId = id || null;
  const form = document.getElementById('log-form');
  document.getElementById('form-title').textContent = id ? 'Edit Activity' : 'Log an Activity';
  if (id) {
    const a = activities.find(a => a.id === id);
    if (!a) return;
    setType(a.type || 'run');
    document.getElementById('f-date').value  = a.date;
    document.getElementById('f-km').value   = a.km   || '';
    document.getElementById('f-time').value = a.time || '';
    document.getElementById('f-notes').value = a.notes || '';
  } else {
    setType('run');
    document.getElementById('f-date').value  = todayStr();
    document.getElementById('f-km').value   = '';
    document.getElementById('f-time').value = '';
    document.getElementById('f-notes').value = '';
  }
  form.style.display = '';
  document.getElementById('f-km').focus();
}

function cancelForm() {
  document.getElementById('log-form').style.display = 'none';
  editId = null;
}

function saveActivity() {
  const km    = parseFloat(document.getElementById('f-km').value) || null;
  const time  = parseInt(document.getElementById('f-time').value)  || null;
  const date  = document.getElementById('f-date').value || todayStr();
  const notes = document.getElementById('f-notes').value.trim() || null;

  if (!km && !time) {
    const inp = document.getElementById('f-km');
    inp.focus();
    inp.style.borderColor = '#c46a6a';
    setTimeout(() => { inp.style.borderColor = ''; }, 1200);
    return;
  }

  const entry = { id: editId || (Date.now().toString(36) + Math.random().toString(36).slice(2)),
    date, type: currentType, km, time, notes };

  if (editId) {
    const idx = activities.findIndex(a => a.id === editId);
    if (idx >= 0) activities[idx] = entry;
  } else {
    activities.push(entry);
  }
  saveActivities(activities);
  cancelForm();
  render();
}

function deleteActivity(id) {
  if (!confirm('Delete this activity?')) return;
  activities = activities.filter(a => a.id !== id);
  saveActivities(activities);
  render();
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  renderStats();
  renderList();
}

function renderStats() {
  const weight = getWeight();
  const runs  = activities.filter(a => a.type === 'run');
  const walks = activities.filter(a => a.type === 'walk');
  const totalKm = activities.reduce((s, a) => s + (a.km || 0), 0);
  const runKcal  = runs.reduce((s, a)  => s + (kcalForActivity(a, weight)  || 0), 0);
  const walkKcal = walks.reduce((s, a) => s + (kcalForActivity(a, weight) || 0), 0);
  const noWeight = !weight;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${runs.length}</div>
      <div class="stat-lbl">Runs</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${walks.length}</div>
      <div class="stat-lbl">Walks</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${Math.round(totalKm * 10) / 10}</div>
      <div class="stat-lbl">Total KM</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--green)">${runKcal > 0 ? '~' + runKcal.toLocaleString() : '—'}</div>
      <div class="stat-lbl">Run kcal${noWeight ? ' *' : ''}</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--accent)">${walkKcal > 0 ? '~' + walkKcal.toLocaleString() : '—'}</div>
      <div class="stat-lbl">Walk kcal${noWeight ? ' *' : ''}</div>
    </div>
  `;
}

function renderList() {
  const container = document.getElementById('activity-list');
  const weight = getWeight();
  let filtered = activities.slice();
  if (currentFilter !== 'all') filtered = filtered.filter(a => a.type === currentFilter);
  const sorted = filtered.sort((a, b) => b.date.localeCompare(a.date));

  if (sorted.length === 0) {
    const msg = currentFilter === 'run' ? 'No runs logged yet.'
      : currentFilter === 'walk' ? 'No walks logged yet.'
      : 'No activities logged yet — tap + Log Activity to add one.';
    container.innerHTML = `<div class="empty-state">${msg}</div>`;
    return;
  }

  container.innerHTML = sorted.map(a => {
    const kcal = kcalForActivity(a, weight);
    const meta = [
      a.km   ? a.km + ' km' : null,
      a.time ? a.time + ' min' : null,
    ].filter(Boolean).join(' · ');
    const typeLabel = a.type === 'run' ? 'Run' : 'Walk';

    return `<div class="activity-entry">
      <div class="entry-date">${fmtDate(a.date)}</div>
      <div class="entry-body">
        <span class="entry-type ${a.type}">${typeLabel}</span>
        ${meta  ? `<div class="entry-meta">${meta}</div>` : ''}
        ${kcal  ? `<div class="entry-kcal">~${kcal.toLocaleString()} kcal</div>` : ''}
        ${a.notes ? `<div class="entry-notes">${a.notes}</div>` : ''}
      </div>
      <div class="entry-actions">
        <button class="btn-icon" onclick="openForm('${a.id}')" title="Edit">✎</button>
        <button class="btn-icon del" onclick="deleteActivity('${a.id}')" title="Delete">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ── Migration ──────────────────────────────────────────────────────────────
function checkMigrationAvailable() {
  const existingIds = new Set(activities.map(a => a.id));
  const candidates = collectOldEntries();
  const novel = candidates.filter(e => !existingIds.has(e.id));
  if (novel.length > 0) {
    const banner = document.getElementById('migrate-banner');
    banner.style.display = 'flex';
    banner.querySelector('span').textContent =
      `${novel.length} old activit${novel.length === 1 ? 'y' : 'ies'} found in browser storage.`;
  }
}

function collectOldEntries() {
  const out = [];
  // Old walk tracker: walk_tracker_v1 — array of { id, date, km, time, notes }
  try {
    const raw = localStorage.getItem('walk_tracker_v1');
    if (raw) {
      const walks = JSON.parse(raw);
      if (Array.isArray(walks)) {
        walks.forEach(w => {
          if (w.date) out.push({
            id: w.id || (Date.now().toString(36) + Math.random().toString(36).slice(2)),
            date: w.date, type: 'walk', km: w.km || null, time: w.time || null, notes: w.notes || null
          });
        });
      }
    }
  } catch (e) {}
  // Even older marathon tracker: c2hm_v1 — { walks: [...], runs: [...] }
  try {
    const raw = localStorage.getItem('c2hm_v1');
    if (raw) {
      const data = JSON.parse(raw);
      if (data && Array.isArray(data.walks)) {
        data.walks.forEach(w => {
          if (w.date) out.push({
            id: w.id || (Date.now().toString(36) + Math.random().toString(36).slice(2)),
            date: w.date, type: 'walk', km: w.km || null, time: w.time || null, notes: w.notes || null
          });
        });
      }
      if (data && Array.isArray(data.runs)) {
        data.runs.forEach(r => {
          if (r.date) out.push({
            id: r.id || (Date.now().toString(36) + Math.random().toString(36).slice(2)),
            date: r.date, type: 'run', km: r.km || null, time: r.time || null, notes: r.notes || null
          });
        });
      }
    }
  } catch (e) {}
  return out;
}

function runMigration() {
  const existingIds = new Set(activities.map(a => a.id));
  const candidates = collectOldEntries();
  const novel = candidates.filter(e => !existingIds.has(e.id));
  if (novel.length === 0) {
    dismissMigration();
    return;
  }
  activities = activities.concat(novel);
  saveActivities(activities);
  dismissMigration();
  render();
  const banner = document.getElementById('migrate-banner');
  banner.style.display = 'flex';
  banner.querySelector('span').textContent =
    `Imported ${novel.length} activit${novel.length === 1 ? 'y' : 'ies'} successfully.`;
  banner.querySelector('.btn-primary').style.display = 'none';
  setTimeout(dismissMigration, 3000);
}

function dismissMigration() {
  document.getElementById('migrate-banner').style.display = 'none';
}

render();
checkMigrationAvailable();
</script>

</body>
</html>
