<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pitch Stack Memorization</title>
  <script src="../nav.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #1c1814;
      --surface:      #252018;
      --surface-2:    #2e2820;
      --border:       #3a3025;
      --border-2:     #4a4030;
      --accent:       #c4864a;
      --accent-dim:   rgba(196,134,74,0.08);
      --text:         #e8dfd0;
      --muted:        #7a6e60;
      --muted-2:      #9a8a76;
      --green:        #7ab87a;
      --red:          #c4864a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Serif Text', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(232,223,208,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    .hero, main, footer { position: relative; z-index: 1; }

    /* ── Hero ── */
    .hero {
      padding: 2rem 1.5rem 1.75rem;
      text-align: left;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }

    .hero-wrap { border-bottom: 2px solid var(--text); position: relative; z-index: 1; }

    .hero h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.2;
    }

    .hero p {
      margin-top: 0.5rem;
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--muted-2);
      line-height: 1.65;
    }

    /* ── Main ── */
    main {
      flex: 1;
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Footer ── */
    footer {
      padding: 1.5rem 2rem;
      font-size: 0.78rem;
      color: var(--muted-2);
      border-top: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* ── Setup Screen ── */
    .setup-card {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 4px;
      padding: 2rem;
      max-width: 480px;
      margin: 2rem auto;
    }

    .setup-card h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    .form-group { margin-bottom: 1.25rem; }

    .form-group label {
      display: block;
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--muted-2);
      margin-bottom: 0.45rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .form-group select,
    .form-group input[type="number"] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 2px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'DM Serif Text', Georgia, serif;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group select:focus,
    .form-group input[type="number"]:focus {
      border-color: var(--accent);
    }

    .form-group select option { background: var(--surface-2); }

    .no-decks-msg {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
      padding: 0.75rem 1rem;
      background: var(--surface-2);
      border: 2px solid var(--border);
      border-radius: 12px;
    }

    .no-decks-msg a { color: var(--accent); text-decoration: none; font-weight: 700; }
    .no-decks-msg a:hover { text-decoration: underline; }

    .btn-start {
      width: 100%;
      padding: 0.8rem 1.25rem;
      margin-top: 0.5rem;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.12s, transform 0.12s;
    }

    .btn-start:hover:not(:disabled) {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .btn-start:active:not(:disabled) {
      transform: translateY(1px);
    }

    .btn-start:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ── Memorize Screen ── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: perspective(900px) rotateY(-25deg) scale(0.95); }
      to   { opacity: 1; transform: perspective(900px) rotateY(0deg) scale(1); }
    }

    .memorize-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    .memorize-progress {
      position: fixed;
      top: 64px;
      right: 1.5rem;
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.88rem;
      color: var(--accent);
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 2px;
      padding: 0.3rem 0.85rem;
      z-index: 50;
    }

    .memorize-card-anim {
      animation: fadeSlideIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .memorize-card-img {
      width: min(280px, 72vw);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.08);
      display: block;
    }

    .memorize-card-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
    }

    .memorize-hint {
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--muted-2);
    }

    .ready-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(28,24,20,0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--accent);
      animation: fadeSlideIn 0.25s ease both;
    }

    /* ── Recall Screen ── */
    @keyframes correctPulse {
      0%   { transform: scale(1); }
      25%  { transform: scale(1.12); box-shadow: 0 0 0 6px rgba(34,197,94,0.35); }
      50%  { transform: scale(0.96); }
      75%  { transform: scale(1.06); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    @keyframes incorrectShake {
      0%   { transform: translateX(0); }
      18%  { transform: translateX(-8px); }
      36%  { transform: translateX(8px); }
      54%  { transform: translateX(-5px); }
      72%  { transform: translateX(5px); }
      100% { transform: translateX(0); }
    }

    @keyframes slotFill {
      from { opacity: 0; transform: scale(0.7) rotate(-8deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(540deg); opacity: 0; }
    }

    .recall-slots-wrap {
      overflow-x: auto;
      margin-bottom: 1.75rem;
      padding-bottom: 0.25rem;
    }

    .recall-slots {
      display: flex;
      gap: 0.5rem;
      min-width: max-content;
      padding: 0.5rem 0.25rem;
    }

    .recall-slot {
      width: 68px;
      height: 96px;
      background: var(--surface-2);
      border: 2px dashed var(--border-2);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.78rem;
      color: var(--muted-2);
      position: relative;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }

    .recall-slot.active {
      border-color: var(--accent);
      border-style: solid;
    }

    .recall-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
      animation: slotFill 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .recall-slot .slot-badge {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 900;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .recall-slot .slot-badge.correct { background: var(--green); color: #fff; }
    .recall-slot .slot-badge.incorrect { background: var(--red); color: #fff; }

    .recall-pool-label {
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.88rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.9rem;
    }

    .recall-pool {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
    }

    .pool-card {
      width: 130px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }

    .pool-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .pool-card img { width: 100%; display: block; }

    .pool-card-name {
      font-size: 0.72rem;
      color: var(--muted-2);
      padding: 0.3rem 0.4rem;
      text-align: center;
      line-height: 1.3;
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
    }

    /* ── Result Screen ── */
    .result-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding-top: 1rem;
    }

    .result-score-block {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .result-score-label {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .result-score-value {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 900;
      font-size: clamp(3rem, 10vw, 5rem);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .result-score-value .score-num { color: var(--accent); }
    .result-score-value .score-denom { color: var(--muted-2); font-size: 0.6em; }

    .result-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .btn-result {
      padding: 0.7rem 1.6rem;
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      border: none;
    }

    .btn-result:hover { transform: translateY(-2px); }

    .btn-result.primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-result.secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-2);
    }

    .result-replay-label {
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      color: var(--muted-2);
      text-transform: uppercase;
      margin-bottom: 1rem;
      text-align: center;
    }

    .result-replay-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
    }

    .result-replay-card {
      position: relative;
      width: 90px;
      border-radius: 12px;
      overflow: hidden;
      border: 2.5px solid var(--border);
    }

    .result-replay-card img { width: 100%; display: block; }

    .result-replay-card .replay-num {
      position: absolute;
      top: 3px;
      left: 5px;
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    }

    .result-replay-card .replay-overlay {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      opacity: 0.2;
    }

    .result-replay-card.correct .replay-overlay { background: var(--green); }
    .result-replay-card.incorrect .replay-overlay { background: var(--red); }

    .result-replay-card .replay-badge {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 900;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .result-replay-card.correct .replay-badge { background: var(--green); color: #fff; }
    .result-replay-card.incorrect .replay-badge { background: var(--red); color: #fff; }

    .result-replay-no-image {
      width: 100%;
      height: 126px;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--muted-2);
      text-align: center;
      padding: 0.25rem;
      line-height: 1.3;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      main { padding: 1.25rem; }
      footer { padding: 1.25rem; }
      .setup-card { padding: 1.25rem; margin: 1rem auto; }
    }
  </style>
</head>
<body>

  <div class="hero-wrap">
    <header class="hero">
      <h1>Pitch Stack Memorization</h1>
      <p>Test your deck knowledge — memorize the sequence, then recall it.</p>
    </header>
  </div>

  <main>
    <div id="screen-setup" class="screen active"></div>
    <div id="screen-memorize" class="screen"></div>
    <div id="screen-recall" class="screen"></div>
    <div id="screen-result" class="screen"></div>
  </main>

  <footer>
    <span id="page-version" style="opacity:0.65"></span>
    <a href="https://github.com/xssxghjk/AI-Web-Pages" target="_blank" rel="noopener">View on GitHub</a>
  </footer>
  <script>fetch('../version.json').then(r=>r.json()).then(v=>{var e=document.getElementById('page-version');if(e)e.textContent='v'+v.version}).catch(()=>{});</script>

  <script>
    const STATE = {
      currentScreen: 'setup',
      selectedDeck: null,
      cardDb: null,
      sequence: [],
    };

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(function (el) {
        el.classList.remove('active');
      });
      const target = document.getElementById('screen-' + name);
      if (target) {
        target.classList.add('active');
        STATE.currentScreen = name;
      }
    }

    /* ── Decklist parsing ── */
    function parseDecklist(raw) {
      const out = [];
      for (const line of raw.split('\n')) {
        const s = line.trim();
        if (!s || !/^\d/.test(s)) continue;
        const qm = s.match(/^(\d+)x?\s+(.+)$/i);
        if (!qm) continue;
        const qty = Math.max(1, +qm[1] || 1);
        let name = qm[2].trim();
        let hint = null;
        const hm = name.match(/^(.+?)\s*\((\d+|red|yellow|blue)\)\s*$/i);
        if (hm) {
          name = hm[1].trim();
          const h = hm[2].toLowerCase();
          hint = (h === '1' || h === 'red')    ? 'red'
               : (h === '2' || h === 'yellow') ? 'yellow'
               : (h === '3' || h === 'blue')   ? 'blue'
               : null;
        }
        if (name) out.push({ qty, name, hint });
      }
      return out;
    }

    /* ── Setup Screen ── */
    function loadSavedDecks() {
      try {
        const raw = localStorage.getItem('fab_saved_decks_v1');
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function countWeightedCards(deck) {
      if (!deck || !deck.decklist) return 0;
      return parseDecklist(deck.decklist).reduce(function (sum, entry) {
        const multiplier = entry.hint === 'blue' ? 3 : entry.hint === 'yellow' ? 2 : 1;
        return sum + entry.qty * multiplier;
      }, 0);
    }

    function renderSetupScreen(opts) {
      opts = opts || {};
      const setupEl = document.getElementById('screen-setup');
      const decks = loadSavedDecks();

      if (decks.length === 0) {
        setupEl.innerHTML =
          '<div class="setup-card">' +
            '<h2>New Game</h2>' +
            '<div class="no-decks-msg">' +
              'No saved decks found. ' +
              '<a href="../fab-deck-viewer/">Build a deck in the Deck Builder</a> ' +
              'and save it to get started.' +
            '</div>' +
          '</div>';
        return;
      }

      const optionsHtml = decks.map(function (deck, i) {
        const date = deck.savedAt ? new Date(deck.savedAt).toLocaleDateString() : '';
        const label = deck.name + (date ? ' — ' + date : '');
        return '<option value="' + i + '">' + label + '</option>';
      }).join('');

      const preselect = (typeof opts.deckIndex === 'number') ? opts.deckIndex : -1;
      const precount  = opts.cardCount || 10;

      setupEl.innerHTML =
        '<div class="setup-card">' +
          '<h2>New Game</h2>' +
          '<div class="form-group">' +
            '<label for="deck-select">Deck</label>' +
            '<select id="deck-select">' +
              '<option value="">— choose a deck —</option>' +
              optionsHtml +
            '</select>' +
          '</div>' +
          '<div class="form-group">' +
            '<label for="card-count">Number of cards</label>' +
            '<input id="card-count" type="number" min="1" value="' + precount + '" placeholder="10" />' +
          '</div>' +
          '<button id="btn-start" class="btn-start" disabled>Start</button>' +
        '</div>';

      const selectEl  = document.getElementById('deck-select');
      const countEl   = document.getElementById('card-count');
      const startBtn  = document.getElementById('btn-start');

      function updateMaxAndValidate() {
        const idx = parseInt(selectEl.value, 10);
        if (!isNaN(idx) && decks[idx]) {
          STATE.selectedDeck = decks[idx];
          const maxCards = countWeightedCards(decks[idx]);
          countEl.max = maxCards || 1;
          if (countEl.value === '' || parseInt(countEl.value, 10) > maxCards) {
            countEl.value = Math.min(10, maxCards);
          }
        } else {
          STATE.selectedDeck = null;
        }
        validate();
      }

      function validate() {
        const idx   = parseInt(selectEl.value, 10);
        const count = parseInt(countEl.value, 10);
        const max   = parseInt(countEl.max, 10) || Infinity;
        startBtn.disabled = isNaN(idx) || !decks[idx] || isNaN(count) || count < 1 || count > max;
      }

      if (preselect >= 0 && preselect < decks.length) {
        selectEl.value = preselect;
        updateMaxAndValidate();
        countEl.value = precount;
        validate();
      }

      selectEl.addEventListener('change', updateMaxAndValidate);
      countEl.addEventListener('input', validate);

      startBtn.addEventListener('click', function () {
        startGame();
      });
    }

    /* ── Weighted sampling ── */
    const EXCLUDED_CARD_TYPES = ['Equipment', 'Hero', 'Token', 'Landmark', 'Environment'];

    function buildSequence(deck, cardDb, n) {
      // Build lookup: "name_color" and "name" → card object
      const cardMap = new Map();
      for (const card of cardDb) {
        const cardTypes = card.types || [];
        if (cardTypes.some(function (t) { return EXCLUDED_CARD_TYPES.includes(t); })) continue;
        const imgUrl = card.printings && card.printings.length
          ? (card.printings[0].image_url || null)
          : null;
        const obj = {
          id:        (card.unique_id || card.name + '_' + (card.pitch || '0')),
          name:      card.name,
          image_url: imgUrl,
          pitch:     card.pitch || null,
        };
        const nameLow = card.name.toLowerCase();
        const colorKey = (card.color || '').toLowerCase();
        if (colorKey) cardMap.set(nameLow + '_' + colorKey, obj);
        if (!cardMap.has(nameLow)) cardMap.set(nameLow, obj);
      }

      // Expand each deck entry into the weighted list
      const weighted = [];
      for (const entry of parseDecklist(deck.decklist)) {
        const nameLow = entry.name.toLowerCase();
        const card = (entry.hint && cardMap.get(nameLow + '_' + entry.hint))
                  || cardMap.get(nameLow)
                  || null;
        if (!card) continue;
        const multiplier = entry.hint === 'blue' ? 3 : entry.hint === 'yellow' ? 2 : 1;
        const weight = entry.qty * multiplier;
        for (let i = 0; i < weight; i++) weighted.push(card);
      }

      // Fisher-Yates shuffle
      for (let i = weighted.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = weighted[i]; weighted[i] = weighted[j]; weighted[j] = tmp;
      }

      return weighted.slice(0, n);
    }

    async function fetchCardDb() {
      const CACHE_KEY = 'fab_card_db';
      const cached = sessionStorage.getItem(CACHE_KEY);
      if (cached) {
        try {
          return JSON.parse(cached);
        } catch (e) {
          sessionStorage.removeItem(CACHE_KEY);
        }
      }
      const url = 'https://raw.githubusercontent.com/the-fab-cube/flesh-and-blood-cards/omens-of-the-third-age/json/english/card.json';
      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed to fetch card database: ' + res.status);
      const data = await res.json();
      try {
        sessionStorage.setItem(CACHE_KEY, JSON.stringify(data));
      } catch (e) {
        // sessionStorage quota exceeded — proceed without caching
      }
      return data;
    }

    async function startGame() {
      const startBtn = document.getElementById('btn-start');
      if (startBtn) {
        startBtn.disabled = true;
        startBtn.textContent = 'Loading…';
      }
      try {
        STATE.cardDb = await fetchCardDb();
        const countEl = document.getElementById('card-count');
        const n = parseInt(countEl ? countEl.value : '10', 10) || 10;
        STATE.sequence = buildSequence(STATE.selectedDeck, STATE.cardDb, n);
        STATE.memorizeIndex = 0;
        showScreen('memorize');
        renderMemorizeScreen();
      } catch (err) {
        console.error(err);
        if (startBtn) {
          startBtn.disabled = false;
          startBtn.textContent = 'Start';
        }
        alert('Could not load card database. Check your connection and try again.');
      }
    }

    /* ── Memorize Phase ── */
    function renderMemorizeScreen() {
      const el = document.getElementById('screen-memorize');
      el.innerHTML =
        '<div class="memorize-wrap" id="memorize-wrap">' +
          '<div class="memorize-card-anim" id="memorize-card-anim"></div>' +
          '<p class="memorize-hint">Tap / click to advance</p>' +
        '</div>' +
        '<div class="memorize-progress" id="memorize-progress"></div>';

      showMemorizeCard(0);

      document.getElementById('memorize-wrap').addEventListener('click', function () {
        const next = STATE.memorizeIndex + 1;
        if (next < STATE.sequence.length) {
          STATE.memorizeIndex = next;
          showMemorizeCard(next);
        } else {
          showGetReady();
        }
      });
    }

    function showMemorizeCard(index) {
      const card = STATE.sequence[index];
      const total = STATE.sequence.length;

      const progressEl = document.getElementById('memorize-progress');
      if (progressEl) progressEl.textContent = 'Card ' + (index + 1) + ' / ' + total;

      const animEl = document.getElementById('memorize-card-anim');
      if (!animEl) return;

      // Re-trigger animation by replacing the element
      const fresh = animEl.cloneNode(false);
      if (card.image_url) {
        const img = document.createElement('img');
        img.className = 'memorize-card-img';
        img.src = card.image_url;
        img.alt = card.name;
        fresh.appendChild(img);
      }
      const nameEl = document.createElement('div');
      nameEl.className = 'memorize-card-name';
      nameEl.textContent = card.name;
      fresh.appendChild(nameEl);

      animEl.replaceWith(fresh);
    }

    function showGetReady() {
      const overlay = document.createElement('div');
      overlay.className = 'ready-overlay';
      overlay.textContent = 'Get ready…';
      document.body.appendChild(overlay);
      setTimeout(function () {
        overlay.remove();
        startRecall();
      }, 1000);
    }

    function startRecall() {
      STATE.recallIndex = 0;
      STATE.recallAnswers = new Array(STATE.sequence.length).fill(null);
      STATE.recallLocked = false;
      showScreen('recall');
      renderRecallScreen();
    }

    /* ── Recall Phase ── */
    function buildCardPool(deck, cardDb) {
      // Build lookup (same approach as buildSequence)
      const cardMap = new Map();
      for (const card of cardDb) {
        const imgUrl = card.printings && card.printings.length
          ? (card.printings[0].image_url || null)
          : null;
        const obj = {
          id:        (card.unique_id || card.name + '_' + (card.pitch || '0')),
          name:      card.name,
          image_url: imgUrl,
          pitch:     card.pitch || null,
        };
        const nameLow = card.name.toLowerCase();
        const colorKey = (card.color || '').toLowerCase();
        if (colorKey) cardMap.set(nameLow + '_' + colorKey, obj);
        if (!cardMap.has(nameLow)) cardMap.set(nameLow, obj);
      }

      const seen = new Set();
      const pool = [];
      for (const entry of parseDecklist(deck.decklist)) {
        const nameLow = entry.name.toLowerCase();
        const card = (entry.hint && cardMap.get(nameLow + '_' + entry.hint))
                  || cardMap.get(nameLow)
                  || null;
        if (!card || seen.has(card.id)) continue;
        seen.add(card.id);
        pool.push(card);
      }

      // Sort: blue(pitch 3) → yellow(2) → red(1) → non-pitch
      const pitchRank = function(p) {
        if (p === null || p === undefined) return 3;
        const s = String(p);
        if (s === '3' || s === 'blue')   return 0;
        if (s === '2' || s === 'yellow') return 1;
        if (s === '1' || s === 'red')    return 2;
        return 3;
      };
      pool.sort(function(a, b) {
        const diff = pitchRank(a.pitch) - pitchRank(b.pitch);
        return diff !== 0 ? diff : a.name.localeCompare(b.name);
      });

      return pool;
    }

    function renderRecallScreen() {
      const n    = STATE.sequence.length;
      const pool = buildCardPool(STATE.selectedDeck, STATE.cardDb);
      const el   = document.getElementById('screen-recall');

      // Slots
      let slotsHtml = '<div class="recall-slots-wrap"><div class="recall-slots" id="recall-slots">';
      for (let i = 0; i < n; i++) {
        slotsHtml += '<div class="recall-slot' + (i === 0 ? ' active' : '') + '" id="slot-' + i + '">' + (i + 1) + '</div>';
      }
      slotsHtml += '</div></div>';

      // Card pool
      let poolHtml = '<div class="recall-pool-label">Pick the cards in order</div><div class="recall-pool" id="recall-pool">';
      for (const card of pool) {
        const escapedName = card.name.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        const escapedId   = card.id.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
        const imgTag = card.image_url
          ? '<img src="' + card.image_url + '" alt="' + escapedName + '" />'
          : '';
        poolHtml += '<div class="pool-card" data-card-id="' + escapedId + '">'
          + imgTag
          + '<div class="pool-card-name">' + escapedName + '</div>'
          + '</div>';
      }
      poolHtml += '</div>';

      el.innerHTML = slotsHtml + poolHtml;

      document.getElementById('recall-pool').addEventListener('click', function(e) {
        const cardEl = e.target.closest('.pool-card');
        if (!cardEl || STATE.recallLocked) return;
        handleRecallPick(cardEl.dataset.cardId, cardEl);
      });
    }

    function handleRecallPick(pickedId, pickedEl) {
      const pos     = STATE.recallIndex;
      const correct = STATE.sequence[pos];
      const isRight = pickedId === correct.id;

      STATE.recallAnswers[pos] = { card: correct, correct: isRight };

      if (isRight) {
        pickedEl.style.animation   = 'correctPulse 0.5s ease both';
        pickedEl.style.borderColor = 'var(--green)';
        fillSlot(pos, correct, true);
        setTimeout(function() {
          pickedEl.style.animation   = '';
          pickedEl.style.borderColor = '';
        }, 500);
        STATE.recallIndex++;
        if (STATE.recallIndex >= STATE.sequence.length) {
          setTimeout(showResult, 600);
        } else {
          updateActiveSlot();
        }
      } else {
        STATE.recallLocked = true;
        pickedEl.style.animation   = 'incorrectShake 0.4s ease both';
        pickedEl.style.borderColor = 'var(--red)';

        // Briefly highlight the correct card in pool
        const correctPoolEl = document.querySelector('[data-card-id="' + correct.id.replace(/"/g, '\\"') + '"]');
        if (correctPoolEl) {
          correctPoolEl.style.animation   = 'correctPulse 0.55s ease 0.1s both';
          correctPoolEl.style.borderColor = 'var(--green)';
        }

        fillSlot(pos, correct, false);

        setTimeout(function() {
          pickedEl.style.animation   = '';
          pickedEl.style.borderColor = '';
          if (correctPoolEl) {
            correctPoolEl.style.animation   = '';
            correctPoolEl.style.borderColor = '';
          }
          STATE.recallLocked = false;
          STATE.recallIndex++;
          if (STATE.recallIndex >= STATE.sequence.length) {
            showResult();
          } else {
            updateActiveSlot();
          }
        }, 800);
      }
    }

    function fillSlot(pos, card, isCorrect) {
      const slot = document.getElementById('slot-' + pos);
      if (!slot) return;
      slot.classList.remove('active');
      const escapedName = card.name.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
      const imgTag = card.image_url
        ? '<img src="' + card.image_url + '" alt="' + escapedName + '" />'
        : '';
      const badgeClass = isCorrect ? 'correct' : 'incorrect';
      const badgeChar  = isCorrect ? '✓' : '✗';
      slot.innerHTML = imgTag + '<div class="slot-badge ' + badgeClass + '">' + badgeChar + '</div>';
    }

    function updateActiveSlot() {
      const slot = document.getElementById('slot-' + STATE.recallIndex);
      if (slot) slot.classList.add('active');
    }

    function showResult() {
      showScreen('result');
      renderResultScreen();
    }

    function renderResultScreen() {
      const answers = STATE.recallAnswers;
      const n       = answers.length;
      const score   = answers.filter(function(a) { return a && a.correct; }).length;

      const el = document.getElementById('screen-result');

      // Score block
      let html =
        '<div class="result-wrap">' +
          '<div class="result-score-block">' +
            '<div class="result-score-label">Your Score</div>' +
            '<div class="result-score-value">' +
              '<span class="score-num">' + score + '</span>' +
              '<span class="score-denom"> / ' + n + '</span>' +
            '</div>' +
          '</div>' +

          // Action buttons
          '<div class="result-actions">' +
            '<button class="btn-result primary" id="btn-play-again">Play again</button>' +
            '<button class="btn-result secondary" id="btn-change-settings">Change settings</button>' +
          '</div>' +

          // Sequence replay
          '<div class="result-replay-label">Sequence Replay</div>' +
          '<div class="result-replay-grid">';

      for (let i = 0; i < n; i++) {
        const ans   = answers[i];
        const card  = ans ? ans.card : null;
        const isOk  = ans && ans.correct;
        const cls   = isOk ? 'correct' : 'incorrect';
        const badge = isOk ? '✓' : '✗';

        html += '<div class="result-replay-card ' + cls + '">';

        if (card && card.image_url) {
          const esc = card.name.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
          html += '<img src="' + card.image_url + '" alt="' + esc + '" />';
        } else {
          const name = card ? card.name.replace(/&/g, '&amp;').replace(/</g, '&lt;') : '?';
          html += '<div class="result-replay-no-image">' + name + '</div>';
        }

        html +=
          '<div class="replay-num">' + (i + 1) + '</div>' +
          '<div class="replay-overlay"></div>' +
          '<div class="replay-badge">' + badge + '</div>' +
          '</div>';
      }

      html += '</div></div>';

      el.innerHTML = html;

      document.getElementById('btn-play-again').addEventListener('click', function() {
        const deckIdx = STATE.selectedDeck
          ? loadSavedDecks().findIndex(function(d) { return d === STATE.selectedDeck || (d.name === STATE.selectedDeck.name && d.savedAt === STATE.selectedDeck.savedAt); })
          : -1;
        renderSetupScreen({ deckIndex: deckIdx, cardCount: STATE.sequence.length });
        showScreen('setup');
      });

      document.getElementById('btn-change-settings').addEventListener('click', function() {
        STATE.selectedDeck = null;
        renderSetupScreen();
        showScreen('setup');
      });

      if (score > 0) {
        var confettiColors = ['#ff6b35','#ffd23f','#4ade80','#a78bfa','#fb7185'];
        for (var ci = 0; ci < 45; ci++) {
          var c = document.createElement('div');
          c.style.cssText = 'position:fixed;top:-10px;z-index:999;pointer-events:none;' +
            'left:' + (Math.random()*100) + 'vw;' +
            'width:' + (6+Math.random()*8) + 'px;' +
            'height:' + (6+Math.random()*8) + 'px;' +
            'background:' + confettiColors[Math.floor(Math.random()*confettiColors.length)] + ';' +
            'border-radius:' + (Math.random()>0.5?'50%':'3px') + ';' +
            'animation:confettiFall ' + (1.5+Math.random()*2) + 's ease-in ' + (Math.random()*0.8) + 's forwards';
          document.body.appendChild(c);
          (function(el){ el.addEventListener('animationend', function(){ el.remove(); }); })(c);
        }
      }
    }

    renderSetupScreen();
  </script>
