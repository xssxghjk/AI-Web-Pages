<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xssxghjk — Dashboard</title>
  <script src="../nav.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Serif+Text:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #161210;
      --surface:   #1e1a14;
      --surface2:  #26211a;
      --border:    #302820;
      --border2:   #403530;
      --accent:    #c4864a;
      --accent-d:  rgba(196,134,74,0.09);
      --accent-b:  rgba(196,134,74,0.24);
      --text:      #ece3d4;
      --text2:     #9a8a76;
      --muted:     #7a6e60;
      --muted2:    #5a4e40;
      --green:     #6a9a6a;
      --green-b:   rgba(106,154,106,0.18);
    }

    html { overflow-x: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Serif Text', Georgia, serif;
      min-height: 100vh;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 0%, rgba(196,134,74,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 100%, rgba(90,70,50,0.08) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    body > * { position: relative; z-index: 1; }

    /* ── HERO ── */
    .hero {
      border-bottom: 1px solid var(--border);
      padding: 2rem 2rem 1.5rem;
      background: linear-gradient(180deg, rgba(196,134,74,0.04) 0%, transparent 100%);
    }
    .hero-inner { max-width: 1100px; margin: 0 auto; }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .hero-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2rem, 6vw, 3.8rem);
      font-weight: 700;
      font-style: italic;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
    }
    .hero-name span { color: var(--accent); }

    .hero-center {
      flex: 1;
      min-width: 0;
    }
    .hero-date {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
      letter-spacing: 0.04em;
    }
    .hero-subtitle {
      font-size: 0.62rem;
      color: var(--muted2);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-top: 0.15rem;
    }

    /* ── EXPORT BUTTON ── */
    .export-btn {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.32rem 0.75rem;
      border-radius: 2px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.65rem;
      font-style: italic;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .export-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-d); }
    .export-btn:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

    /* ── TAB BAR ── */
    .tab-bar {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      background: var(--surface);
      position: relative;
      z-index: 1;
    }
    .tab-bar-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
    }
    .tab-btn {
      padding: 0.7rem 1.25rem;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-style: italic;
      color: var(--muted2);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      font-family: 'DM Serif Text', Georgia, serif;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text2); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-nav {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.3rem 0;
    }
    .nav-arrow {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      width: 22px;
      height: 22px;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      line-height: 1;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .nav-arrow:hover:not([disabled]) { color: var(--accent); border-color: var(--accent); background: var(--accent-d); }
    .nav-arrow[disabled] { opacity: 0.28; cursor: not-allowed; }
    .nav-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.56rem;
      color: var(--text2);
      white-space: nowrap;
      min-width: 130px;
      text-align: center;
      letter-spacing: 0.03em;
    }

    /* ── STATS GRID ── */
    .stats-section {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
    }
    .stats-inner { max-width: 1100px; margin: 0 auto; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.85rem 1rem;
      transition: border-color 0.15s;
    }
    .stat-card:hover { border-color: var(--border2); }

    .stat-label {
      font-size: 0.56rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted2);
      font-style: italic;
      margin-bottom: 0.4rem;
    }

    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }
    .stat-value.sm { font-size: 1rem; }
    .stat-value.accent { color: var(--accent); }
    .stat-value.green  { color: var(--green); }
    .stat-value.blue   { color: #5ab4cc; }

    .stat-sub {
      font-size: 0.63rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 0.32rem;
      line-height: 1.4;
    }

    .stat-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.12rem 0.35rem;
      border-radius: 1px;
      margin-top: 0.35rem;
      font-style: normal;
    }
    .badge-green  { background: var(--green-b); color: var(--green); }
    .badge-accent { background: var(--accent-d); color: var(--accent); }
    .badge-muted  { background: rgba(90,78,64,0.3); color: var(--muted2); }

    /* ── MAIN CONTENT ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.75rem 2rem 0;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2rem;
    }
    @media (max-width: 860px) {
      .content-grid { grid-template-columns: 1fr; }
    }

    /* ── SECTION HEADERS ── */
    .section-head {
      font-size: 0.58rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted2);
      font-style: italic;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.85rem;
    }

    /* ── ACTIVITY FEED ── */
    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
    }
    .activity-item:last-child { border-bottom: none; }

    .activity-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 0.35rem;
      flex-shrink: 0;
    }
    .dot-run      { background: #7a9de8; }
    .dot-workout  { background: #e87838; }
    .dot-boulder  { background: #4ec994; }
    .dot-journal  { background: var(--accent); }
    .dot-calorie  { background: #7ab87a; }

    .activity-body { flex: 1; min-width: 0; }
    .activity-title {
      font-size: 0.84rem;
      color: var(--text);
      line-height: 1.35;
    }
    .activity-meta {
      font-size: 0.7rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 0.1rem;
    }

    .activity-age {
      font-size: 0.65rem;
      color: var(--muted2);
      font-style: italic;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 0.3rem;
    }

    /* ── GOALS ── */
    .goal-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--surface);
      margin-bottom: 0.45rem;
      transition: border-color 0.15s;
    }
    .goal-item:hover { border-color: var(--border2); }
    .goal-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 0.45rem;
      flex-shrink: 0;
    }
    .goal-title {
      font-size: 0.82rem;
      color: var(--text2);
      line-height: 1.4;
    }

    .no-data {
      font-size: 0.8rem;
      color: var(--muted2);
      font-style: italic;
      padding: 1.25rem 0;
    }

    /* ── FOOTER ── */
    footer {
      max-width: 1100px;
      margin: 2rem auto 0;
      padding: 1.25rem 2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted2);
      font-style: italic;
      flex-wrap: wrap;
    }
    footer a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
    footer a:hover { color: var(--text2); }

    @media (max-width: 640px) {
      .hero        { padding: 1.25rem 1rem 1rem; }
      .tab-bar     { padding: 0 0.5rem; flex-wrap: wrap; }
      .tab-bar-inner { flex-wrap: wrap; gap: 0; }
      .tab-btn     { padding: 0.65rem 0.7rem; font-size: 0.56rem; }
      .tab-nav     { width: 100%; padding: 0.3rem 0.2rem 0.45rem; border-top: 1px solid var(--border); justify-content: center; margin-left: 0; }
      .nav-label   { min-width: 100px; font-size: 0.54rem; }
      .stats-section { padding: 1.1rem 1rem; }
      .stats-grid  { grid-template-columns: 1fr 1fr; }
      .stat-value  { font-size: 1.15rem; }
      .stat-value.sm { font-size: 0.9rem; }
      .main        { padding: 1.25rem 1rem 0; }
      footer       { padding: 1rem; }
    }
  </style>
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <div class="hero-top">
        <div class="hero-name">xssxg<span>h</span>jk</div>
        <div class="hero-center">
          <div class="hero-date" id="hero-date"></div>
          <div class="hero-subtitle">Personal Dashboard</div>
        </div>
        <button class="export-btn" id="export-btn">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3 6l3 3 3-3M2 11h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span id="export-label">Weekly Report</span>
        </button>
      </div>
    </div>
  </header>

  <div class="tab-bar">
    <div class="tab-bar-inner">
      <button class="tab-btn" data-tab="day">Day</button>
      <button class="tab-btn active" data-tab="week">Week</button>
      <button class="tab-btn" data-tab="month">Month</button>

  <main class="main">

      </div>
    </div>
  </main>

  <footer>
    <span id="page-version"></span>
    <a href="https://github.com/xssxghjk/AI-Web-Pages" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script>
  (function () {
    'use strict';

    // ── Helpers ──────────────────────────────────────────────────────────────
    function pad(n) { return n < 10 ? '0' + n : '' + n; }
    function isoDate(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
    function todayIso() { return isoDate(new Date()); }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function relAge(iso) {
      var today = new Date(); today.setHours(0,0,0,0);
      var d = new Date(iso + 'T00:00:00');
      var n = Math.round((today - d) / 86400000);
      if (n === 0) return 'today';
      if (n === 1) return 'yesterday';
      if (n < 7)  return n + 'd ago';
      if (n < 31) return Math.floor(n / 7) + 'w ago';
      return Math.floor(n / 30) + 'mo ago';
    }
    function weekStart() {
      var d = new Date(); d.setHours(0,0,0,0);
      d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
      return isoDate(d);
    }
    function monthStart() {
      var d = new Date();
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-01';
    }
    function rangeLabel(period) {
      var d = new Date();
      var MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      if (period === 'day') {
        var DOW = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        return DOW[d.getDay()] + ', ' + FULL[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
      }
      if (period === 'week') {
        var ws = new Date(weekStart() + 'T00:00:00');
        var we = new Date(ws); we.setDate(ws.getDate() + 6);
        return MON[ws.getMonth()] + ' ' + ws.getDate() + ' – ' + MON[we.getMonth()] + ' ' + we.getDate() + ', ' + d.getFullYear();
      }
      return FULL[d.getMonth()] + ' ' + d.getFullYear();
    }

    // ── Offset-aware helpers ─────────────────────────────────────────────────
    var currentOffset = 0;

    function offsetDayIso(n) {
      var d = new Date(); d.setHours(0,0,0,0);
      d.setDate(d.getDate() + n);
      return isoDate(d);
    }
    function offsetWeekStart(n) {
      var d = new Date(); d.setHours(0,0,0,0);
      d.setDate(d.getDate() - ((d.getDay() + 6) % 7) + n * 7);
      return isoDate(d);
    }
    function offsetMonthStart(n) {
      var now = new Date();
      var total = now.getMonth() + n;
      var y = now.getFullYear() + Math.floor(total / 12);
      var m = ((total % 12) + 12) % 12;
      return y + '-' + pad(m + 1) + '-01';
    }
    function getPeriodLabel(tab, offset) {
      var MON  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      if (tab === 'day') {
        if (offset === 0) return 'Today';
        if (offset === -1) return 'Yesterday';
        var d = new Date(); d.setDate(d.getDate() + offset);
        return MON[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
      }
      if (tab === 'week') {
        var ws = new Date(offsetWeekStart(offset) + 'T00:00:00');
        var we = new Date(ws); we.setDate(ws.getDate() + 6);
        var wkLabel = ws.getMonth() === we.getMonth()
          ? MON[ws.getMonth()] + ' ' + ws.getDate() + '–' + we.getDate()
          : MON[ws.getMonth()] + ' ' + ws.getDate() + ' – ' + MON[we.getMonth()] + ' ' + we.getDate();
        return wkLabel + ', ' + we.getFullYear();
      }
      if (tab === 'month') {
        var ms = offsetMonthStart(offset).split('-');
        return FULL[parseInt(ms[1]) - 1] + ' ' + ms[0];
      }
      if (tab === 'year') {
        return String(new Date().getFullYear() + offset);
      }
      return '';
    }

    // ── Data loading ─────────────────────────────────────────────────────────
    function loadAll() {
      function get(k, fb) { try { return JSON.parse(localStorage.getItem(k) || 'null') || fb; } catch(e) { return fb; } }
      return {
        jEntries : get('journal_entries', {}),
        jGoals   : get('journal_goals', {}),
        marathon : get('c2hm_v1', {}),
        workout  : get('workout_plan_v3', {}),
        boulder  : get('bouldering_sessions', []),
        calLog   : get('calorie_log', {}),
        calW     : get('calorie_weights', {}),
      };
    }

    // ── Period stat computation ───────────────────────────────────────────────
    function computeStats(data, since, until) {
      var today = todayIso();
      var end = (until && until < today) ? until : today;
      var stats = {
        runs: 0, runKm: 0,
        workouts: 0,
        boulderSessions: 0, boulderMaxGrade: 0,
        boulderTotalClimbs: 0,
        journalMorning: 0, journalEvening: 0, journalDays: 0,
        calTotal: 0, calDays: 0,
        calProteinTotal: 0, calProteinDays: 0,
        activeGoals: 0,
        weightLast: null, weightFirst: null,
        workoutTypes: [],
      };

      Object.values(data.jGoals).forEach(function(g) {
        if (g && g.status === 'active') stats.activeGoals++;
      });

      Object.entries(data.jEntries).forEach(function(kv) {
        var iso = kv[0], e = kv[1];
        if (iso < since || iso > end) return;
        var hasMorning = !!(e && e.morning);
        var hasEvening = !!(e && e.evening);
        if (hasMorning || hasEvening) stats.journalDays++;
        if (hasMorning) stats.journalMorning++;
        if (hasEvening) stats.journalEvening++;
      });

      var mDays = data.marathon.days || {};
      Object.entries(mDays).forEach(function(kv) {
        var iso = kv[0], d = kv[1];
        var effectiveDate = (d && d.completedDate) || iso;
        if (effectiveDate < since || effectiveDate > end) return;
        if (d && (d.status === 'completed' || d.status === 'modified')) {
          stats.runs++;
          stats.runKm += parseFloat(d.km || 0);
        }
      });

      var ST_NAMES = ['Push', 'Pull', 'Legs'];
      var sched = (data.workout && Array.isArray(data.workout.schedule) && data.workout.schedule.length === 3)
        ? data.workout.schedule : [1, 3, 5];
      var wEntries = (data.workout && data.workout.entries) || {};
      Object.entries(wEntries).forEach(function(kv) {
        var iso = kv[0], e = kv[1];
        if (iso < since || iso > end) return;
        if (e && e.status === 'done') {
          stats.workouts++;
          var parts = iso.split('-').map(Number);
          var dow = new Date(parts[0], parts[1]-1, parts[2]).getDay();
          var sidx = sched.indexOf(dow);
          if (sidx >= 0 && stats.workoutTypes.indexOf(ST_NAMES[sidx]) === -1) {
            stats.workoutTypes.push(ST_NAMES[sidx]);
          }
        }
      });

      (data.boulder || []).forEach(function(s) {
        if (!s || !s.date || s.date < since || s.date > end) return;
        stats.boulderSessions++;
        var climbs = Object.values(s.grades || {}).reduce(function(a, b) { return a + (b || 0); }, 0);
        stats.boulderTotalClimbs += climbs;
        for (var g = 7; g >= 1; g--) {
          if ((s.grades || {})[g] > 0) { if (g > stats.boulderMaxGrade) stats.boulderMaxGrade = g; break; }
        }
      });

      Object.entries(data.calLog).forEach(function(kv) {
        var iso = kv[0], entries = kv[1];
        if (iso < since || iso > end) return;
        if (!Array.isArray(entries) || !entries.length) return;
        var total = entries.reduce(function(s, e) { return s + (parseFloat(e.calories) || 0); }, 0);
        var prot  = entries.reduce(function(s, e) { return s + (parseFloat(e.protein)  || 0); }, 0);
        stats.calTotal += total;
        stats.calDays++;
        if (prot > 0) { stats.calProteinTotal += prot; stats.calProteinDays++; }
      });

      var wDates = Object.keys(data.calW).filter(function(d) { return d >= since && d <= end && data.calW[d] > 0; }).sort();
      if (wDates.length) {
        stats.weightFirst = data.calW[wDates[0]];
        stats.weightLast  = data.calW[wDates[wDates.length - 1]];
      }

      return stats;
    }

    // ── Day stat computation ─────────────────────────────────────────────────
    var ST_TYPES_DAY = ['Push', 'Pull', 'Legs'];

    function computeStatsDay(data, dateStr) {
      var iso = dateStr || todayIso();

      // Weight for calorie burn estimates
      var weightKg = (data.marathon && data.marathon.weightKg) || 75;
      var wAllDates = Object.keys(data.calW).filter(function(d) { return d <= iso && data.calW[d] > 0; }).sort();
      if (wAllDates.length) weightKg = data.calW[wAllDates[wAllDates.length - 1]];

      // Calories
      var calEntries = Array.isArray(data.calLog[iso]) ? data.calLog[iso] : [];
      var calIn      = calEntries.reduce(function(s, e) { return s + (parseFloat(e.calories) || 0); }, 0);
      var calProtein = calEntries.reduce(function(s, e) { return s + (parseFloat(e.protein)  || 0); }, 0);

      // Run
      var mDays = (data.marathon && data.marathon.days) || {};
      var runEntry = mDays[iso] || null;
      if (!runEntry) {
        runEntry = Object.values(mDays).find(function(d) { return d && d.completedDate === iso; }) || null;
      }
      var runCal = 0;
      if (runEntry) {
        if (runEntry.km)   runCal = Math.round(weightKg * parseFloat(runEntry.km));
        else if (runEntry.time) runCal = Math.round(8.0 * weightKg * parseFloat(runEntry.time) / 60);
      }

      // Strength
      var sched = (data.workout && Array.isArray(data.workout.schedule) && data.workout.schedule.length === 3)
        ? data.workout.schedule : [1, 3, 5];
      var isoParts = iso.split('-').map(Number);
      var todayDow = new Date(isoParts[0], isoParts[1]-1, isoParts[2]).getDay();
      var sidx = sched.indexOf(todayDow);
      var isStrengthDay  = sidx >= 0;
      var scheduledType  = isStrengthDay ? ST_TYPES_DAY[sidx] : null;
      var wEntries = (data.workout && data.workout.entries) || {};
      var strengthEntry  = wEntries[iso] || null;
      var strengthDone   = !!(strengthEntry && strengthEntry.status === 'done');
      var strengthType   = strengthDone && isStrengthDay ? ST_TYPES_DAY[sidx] : (strengthDone ? 'Strength' : null);
      var strengthCal    = 0;
      if (strengthDone) {
        strengthCal = Math.round(3.0 * weightKg * ((strengthEntry.duration || 60) / 60));
      }

      // Bouldering
      var boulderSession = (data.boulder || []).find(function(s) { return s && s.date === iso; }) || null;
      var boulderCal = 0;
      if (boulderSession) {
        boulderCal = Math.round(2.0 * weightKg * ((boulderSession.duration || 90) / 60));
      }

      // Journal
      var dayEntry  = (data.jEntries || {})[iso] || {};
      var hasMorning = !!(dayEntry && dayEntry.morning);
      var hasEvening = !!(dayEntry && dayEntry.evening);
      var morningFocus = (dayEntry.morning && dayEntry.morning.focus) ? dayEntry.morning.focus.slice(0, 55) : '';

      var totalBurned = runCal + strengthCal + boulderCal;

      return {
        iso, calIn: Math.round(calIn), calProtein: Math.round(calProtein),
        calItemCount: calEntries.length,
        totalBurned, runCal, strengthCal, boulderCal,
        netCal: Math.round(calIn - totalBurned),
        runEntry, isStrengthDay, scheduledType, strengthEntry, strengthDone, strengthType,
        boulderSession, hasMorning, hasEvening, morningFocus,
        weightKg,
      };
    }

    // ── Render helpers ───────────────────────────────────────────────────────
    function mkCard(label, value, sub, cls, badge) {
      var bHtml = badge ? '<div class="stat-badge badge-' + badge.type + '">' + esc(badge.text) + '</div>' : '';
      return '<div class="stat-card">' +
        '<div class="stat-label">' + esc(label) + '</div>' +
        '<div class="stat-value' + (cls ? ' ' + cls : '') + '">' + esc(String(value)) + '</div>' +
        (sub ? '<div class="stat-sub">' + esc(sub) + '</div>' : '') +
        bHtml +
        '</div>';
    }

    function renderStatsDay(data, offset) {
      var s = computeStatsDay(data, offsetDayIso(offset || 0));

      // Card: Calories In
      var calVal  = s.calIn > 0 ? s.calIn.toLocaleString() + ' kcal' : '—';
      var calSub  = s.calItemCount > 0 ? s.calItemCount + ' item' + (s.calItemCount !== 1 ? 's' : '') + ' logged' : 'nothing logged yet';
      var calCls  = s.calIn > 0 ? 'accent' : '';

      // Card: Protein
      var protVal = s.calProtein > 0 ? s.calProtein + 'g' : '—';
      var protSub = s.calProtein > 0 ? 'protein today' : 'no protein data';

      // Card: Burned
      var burnParts = [];
      if (s.runCal > 0) burnParts.push('run ' + s.runCal.toLocaleString());
      if (s.strengthCal > 0) burnParts.push('str ' + s.strengthCal.toLocaleString());
      if (s.boulderCal > 0) burnParts.push('bld ' + s.boulderCal.toLocaleString());
      var burnVal = s.totalBurned > 0 ? s.totalBurned.toLocaleString() + ' kcal' : '—';
      var burnSub = burnParts.length ? burnParts.join(' · ') : 'no activity yet';

      // Card: Net
      var hasNet   = s.calIn > 0 || s.totalBurned > 0;
      var netRaw   = hasNet ? s.netCal : null;
      var netVal   = hasNet ? (s.netCal >= 0 ? '+' + s.netCal.toLocaleString() : s.netCal.toLocaleString()) + ' kcal' : '—';
      var netCls   = netRaw !== null ? (netRaw < -50 ? 'green' : (netRaw > 300 ? 'accent' : '')) : '';
      var netSub   = netRaw !== null ? (netRaw < -50 ? 'calorie deficit' : (netRaw > 300 ? 'calorie surplus' : 'roughly balanced')) : 'log food & activity';

      // Card: Run
      var runVal, runSub, runCls, runBadge;
      var re = s.runEntry;
      if (re && (re.status === 'completed' || re.status === 'modified')) {
        runVal  = re.km ? re.km + ' km' : (re.time ? re.time + ' min' : 'Done');
        var parts = [];
        if (re.km && re.time) parts.push(re.time + ' min');
        if (s.runCal > 0) parts.push('~' + s.runCal.toLocaleString() + ' kcal');
        runSub  = parts.join(' · ') || 'completed';
        runCls  = 'green';
        runBadge = { type: 'green', text: re.status === 'modified' ? 'Modified' : '✓ Done' };
      } else if (re && re.status === 'skipped') {
        runVal = 'Skipped'; runSub = 'rest day logged'; runCls = ''; runBadge = { type: 'muted', text: 'Skipped' };
      } else {
        runVal = '—'; runSub = 'no run logged yet'; runCls = ''; runBadge = null;
      }

      // Card: Strength
      var strVal, strSub, strCls, strBadge;
      if (s.strengthDone) {
        strVal  = s.strengthType ? s.strengthType : 'Strength';
        var sparts = [];
        if (s.strengthEntry.duration) sparts.push(s.strengthEntry.duration + ' min');
        if (s.strengthCal > 0) sparts.push('~' + s.strengthCal.toLocaleString() + ' kcal');
        strSub  = sparts.join(' · ') || 'session done';
        strCls  = 'green';
        strBadge = { type: 'green', text: '✓ Done' };
      } else if (s.isStrengthDay) {
        strVal  = s.scheduledType || 'Strength';
        strSub  = 'scheduled today — not yet logged';
        strCls  = 'accent';
        strBadge = { type: 'accent', text: 'Pending' };
      } else {
        strVal = 'Rest Day'; strSub = 'no strength today'; strCls = ''; strBadge = null;
      }

      // Card: Journal
      var jDone = (s.hasMorning ? 1 : 0) + (s.hasEvening ? 1 : 0);
      var jVal, jSub, jCls, jBadge;
      if (jDone === 2) {
        jVal = 'Both Done'; jSub = s.morningFocus ? '"' + s.morningFocus + '"' : 'morning & evening logged';
        jCls = 'green'; jBadge = { type: 'green', text: '✓ Complete' };
      } else if (s.hasMorning) {
        jVal = 'Morning ✓'; jSub = s.morningFocus ? '"' + s.morningFocus + '"' : 'evening still pending';
        jCls = 'accent'; jBadge = { type: 'accent', text: 'Partial' };
      } else if (s.hasEvening) {
        jVal = 'Evening ✓'; jSub = 'morning was missed';
        jCls = 'accent'; jBadge = { type: 'accent', text: 'Partial' };
      } else {
        jVal = 'Pending'; jSub = 'no entries today'; jCls = ''; jBadge = null;
      }

      return [
        mkCard('Calories In',  calVal,  calSub,  calCls,  null),
        mkCard('Protein',      protVal, protSub, '',      null),
        mkCard('Burned',       burnVal, burnSub, '',      null),
        mkCard('Net Calories', netVal,  netSub,  netCls,  null),
        mkCard('Run',          runVal,  runSub,  runCls,  runBadge),
        mkCard('Strength',     strVal,  strSub,  strCls,  strBadge),
        mkCard('Journal',      jVal,    jSub,    jCls,    jBadge),
      ].join('');
    }

    function renderStatsWeek(data, offset) {
      var since = offsetWeekStart(offset || 0);
      var weDate = new Date(since + 'T00:00:00'); weDate.setDate(weDate.getDate() + 6);
      var until = isoDate(weDate);
      var today = todayIso();
      var effectiveEnd = until < today ? until : today;
      var s = computeStats(data, since, effectiveEnd);

      // Days elapsed in week
      var d = new Date(since + 'T00:00:00'), wDays = 0;
      while (isoDate(d) <= effectiveEnd) { wDays++; d.setDate(d.getDate() + 1); }

      var avgKm  = s.runs > 0 ? Math.round(s.runKm / s.runs * 10) / 10 : 0;
      var calAvg = s.calDays ? Math.round(s.calTotal / s.calDays) : 0;
      var avgProt = s.calProteinDays ? Math.round(s.calProteinTotal / s.calProteinDays) : 0;

      // Run card
      var runVal = s.runs + ' run' + (s.runs !== 1 ? 's' : '');
      var runSub = s.runKm > 0
        ? (Math.round(s.runKm * 10) / 10) + ' km · avg ' + avgKm + ' km/run'
        : 'no runs this week';
      var runCls = s.runs > 0 ? 'accent' : '';

      // Strength card
      var strVal = s.workouts + ' session' + (s.workouts !== 1 ? 's' : '');
      var strSub = s.workoutTypes.length > 0
        ? s.workoutTypes.join(' · ') + ' completed'
        : 'no sessions this week';
      var strCls = s.workouts > 0 ? 'green' : '';

      // Boulder card
      var bldVal = s.boulderSessions + ' session' + (s.boulderSessions !== 1 ? 's' : '');
      var bldParts = [];
      if (s.boulderTotalClimbs > 0) bldParts.push(s.boulderTotalClimbs + ' climbs');
      if (s.boulderMaxGrade > 0)   bldParts.push('max grade ' + s.boulderMaxGrade);
      var bldSub = bldParts.length ? bldParts.join(' · ') : 'no sessions this week';
      var bldCls = s.boulderSessions > 0 ? 'blue' : '';

      // Journal card
      var jVal = s.journalMorning + '/' + wDays;
      var jSub = 'mornings · ' + s.journalEvening + '/' + wDays + ' evenings';
      var jRate = wDays > 0 ? Math.round((s.journalMorning / wDays) * 100) : 0;
      var jCls  = jRate >= 80 ? 'green' : (jRate >= 50 ? 'accent' : '');

      // Calories card
      var calVal = calAvg > 0 ? calAvg.toLocaleString() + ' kcal' : '—';
      var calSub = s.calDays > 0
        ? s.calDays + '/' + wDays + ' days tracked'
        : 'no nutrition data';

      // Protein card
      var protVal = avgProt > 0 ? avgProt + 'g' : '—';
      var protSub = s.calProteinDays > 0
        ? s.calProteinDays + '/' + wDays + ' days tracked'
        : 'no protein data';
      var protCls = avgProt >= 150 ? 'green' : (avgProt > 0 ? 'accent' : '');

      // Goals card
      var activeGoals = Object.values(data.jGoals).filter(function(g) { return g && g.status === 'active'; });
      var goalVal = s.activeGoals;
      var goalSub = activeGoals.length
        ? activeGoals.slice(0, 2).map(function(g) { return g.text || 'Untitled'; }).join(' · ').slice(0, 60)
        : 'no active goals';
      var goalCls = s.activeGoals > 0 ? 'accent' : '';

      return [
        mkCard('Running',       runVal,  runSub,  runCls,  null),
        mkCard('Strength',      strVal,  strSub,  strCls,  null),
        mkCard('Bouldering',    bldVal,  bldSub,  bldCls,  null),
        mkCard('Journal',       jVal,    jSub,    jCls,    null),
        mkCard('Avg Calories',  calVal,  calSub,  '',      null),
        mkCard('Avg Protein',   protVal, protSub, protCls, null),
        mkCard('Active Goals',  goalVal, goalSub, goalCls, null),
      ].join('');
    }

    function renderStatsMonth(data, offset) {
      var since = offsetMonthStart(offset || 0);
      var mParts = since.split('-').map(Number);
      var lastDay = new Date(mParts[0], mParts[1], 0);
      var until = isoDate(lastDay);
      var today = todayIso();
      var effectiveEnd = until < today ? until : today;
      var s = computeStats(data, since, effectiveEnd);

      // Days elapsed in month and total days in month
      var d = new Date(since + 'T00:00:00'), mDaysElapsed = 0;
      while (isoDate(d) <= effectiveEnd) { mDaysElapsed++; d.setDate(d.getDate() + 1); }
      var totalDaysInMonth = lastDay.getDate();

      var avgKm = s.runs > 0 ? Math.round(s.runKm / s.runs * 10) / 10 : 0;
      var weeksElapsed = mDaysElapsed / 7;
      var runsPerWeek  = s.runs > 0 && weeksElapsed > 0 ? Math.round(s.runs / weeksElapsed * 10) / 10 : 0;
      var calAvg = s.calDays ? Math.round(s.calTotal / s.calDays) : 0;
      var avgProt = s.calProteinDays ? Math.round(s.calProteinTotal / s.calProteinDays) : 0;
      var journalRate = mDaysElapsed > 0 ? Math.round((s.journalMorning / mDaysElapsed) * 100) : 0;

      // Weight delta
      var weightStr = '—', weightSub = 'no weigh-ins this month';
      if (s.weightLast) {
        weightStr = s.weightLast.toFixed(1) + ' kg';
        if (s.weightFirst && s.weightFirst !== s.weightLast) {
          var delta = (s.weightLast - s.weightFirst).toFixed(1);
          weightSub = (parseFloat(delta) < 0 ? '' : '+') + delta + ' kg this month';
        } else {
          weightSub = 'latest weigh-in';
        }
      }
      var weightCls = s.weightLast && s.weightFirst && s.weightLast < s.weightFirst ? 'green' : '';

      return [
        mkCard('Running',
          s.runs + ' run' + (s.runs !== 1 ? 's' : ''),
          s.runKm > 0
            ? (Math.round(s.runKm * 10) / 10) + ' km · avg ' + runsPerWeek + '/week'
            : 'no runs this month',
          s.runs > 0 ? 'accent' : '', null),

        mkCard('Strength',
          s.workouts + ' session' + (s.workouts !== 1 ? 's' : ''),
          s.workouts > 0
            ? 'completed this month'
            : 'no strength sessions',
          s.workouts > 0 ? 'green' : '', null),

        mkCard('Bouldering',
          s.boulderSessions + ' session' + (s.boulderSessions !== 1 ? 's' : ''),
          s.boulderMaxGrade
            ? (s.boulderTotalClimbs > 0 ? s.boulderTotalClimbs + ' climbs · ' : '') + 'max grade ' + s.boulderMaxGrade
            : 'no sessions this month',
          s.boulderSessions > 0 ? 'blue' : '', null),

        mkCard('Journal',
          journalRate + '%',
          s.journalMorning + '/' + mDaysElapsed + ' mornings · ' + s.journalEvening + '/' + mDaysElapsed + ' evenings',
          journalRate >= 70 ? 'green' : (journalRate >= 40 ? 'accent' : ''), null),

        mkCard('Avg Calories',
          calAvg > 0 ? calAvg.toLocaleString() + ' kcal' : '—',
          s.calDays > 0
            ? s.calDays + '/' + mDaysElapsed + ' days tracked this month'
            : 'no nutrition data',
          '', null),

        mkCard('Avg Protein',
          avgProt > 0 ? avgProt + 'g' : '—',
          s.calProteinDays > 0
            ? s.calProteinDays + '/' + mDaysElapsed + ' days tracked'
            : 'no protein data',
          avgProt >= 150 ? 'green' : (avgProt > 0 ? 'accent' : ''), null),

        mkCard('Weight',
          weightStr, weightSub, weightCls, null),
      ].join('');
    }

    function renderStatsYear(data, offset) {
      var yr = new Date().getFullYear() + (offset || 0);
      var since = yr + '-01-01';
      var until = yr + '-12-31';
      var today = todayIso();
      var effectiveEnd = until < today ? until : today;
      var s = computeStats(data, since, effectiveEnd);

      var d = new Date(since + 'T00:00:00'), yDaysElapsed = 0;
      while (isoDate(d) <= effectiveEnd) { yDaysElapsed++; d.setDate(d.getDate() + 1); }

      var monthsElapsed = Math.max(1, yDaysElapsed / 30.44);
      var runsPerMonth  = s.runs > 0 ? (Math.round(s.runs / monthsElapsed * 10) / 10) : 0;
      var calAvg        = s.calDays ? Math.round(s.calTotal / s.calDays) : 0;
      var journalRate   = yDaysElapsed > 0 ? Math.round((s.journalMorning / yDaysElapsed) * 100) : 0;
      var avgProt       = s.calProteinDays ? Math.round(s.calProteinTotal / s.calProteinDays) : 0;

      var weightStr = '—', weightSub = 'no weigh-ins this year';
      if (s.weightLast) {
        weightStr = s.weightLast.toFixed(1) + ' kg';
        if (s.weightFirst && s.weightFirst !== s.weightLast) {
          var delta = (s.weightLast - s.weightFirst).toFixed(1);
          weightSub = (parseFloat(delta) < 0 ? '' : '+') + delta + ' kg this year';
        } else {
          weightSub = 'latest weigh-in';
        }
      }
      var weightCls = s.weightLast && s.weightFirst && s.weightLast < s.weightFirst ? 'green' : '';

      return [
        mkCard('Running',
          s.runs + ' run' + (s.runs !== 1 ? 's' : ''),
          s.runKm > 0
            ? (Math.round(s.runKm * 10) / 10) + ' km · ' + runsPerMonth + '/month avg'
            : 'no runs this year',
          s.runs > 0 ? 'accent' : '', null),

        mkCard('Strength',
          s.workouts + ' session' + (s.workouts !== 1 ? 's' : ''),
          s.workouts > 0 ? 'across ' + yr : 'no strength sessions',
          s.workouts > 0 ? 'green' : '', null),

        mkCard('Bouldering',
          s.boulderSessions + ' session' + (s.boulderSessions !== 1 ? 's' : ''),
          s.boulderMaxGrade
            ? (s.boulderTotalClimbs > 0 ? s.boulderTotalClimbs + ' climbs · ' : '') + 'max grade ' + s.boulderMaxGrade
            : 'no sessions this year',
          s.boulderSessions > 0 ? 'blue' : '', null),

        mkCard('Journal',
          journalRate + '%',
          s.journalMorning + '/' + yDaysElapsed + ' mornings · ' + s.journalEvening + '/' + yDaysElapsed + ' evenings',
          journalRate >= 70 ? 'green' : (journalRate >= 40 ? 'accent' : ''), null),

        mkCard('Avg Calories',
          calAvg > 0 ? calAvg.toLocaleString() + ' kcal' : '—',
          s.calDays > 0
            ? s.calDays + ' days tracked'
            : 'no nutrition data',
          '', null),

        mkCard('Avg Protein',
          avgProt > 0 ? avgProt + 'g' : '—',
          s.calProteinDays > 0
            ? s.calProteinDays + ' days tracked'
            : 'no protein data',
          avgProt >= 150 ? 'green' : (avgProt > 0 ? 'accent' : ''), null),

        mkCard('Weight',
          weightStr, weightSub, weightCls, null),
      ].join('');
    }

    // ── Activity feed ────────────────────────────────────────────────────────
    function buildActivity(data, limit) {
      var items = [];
      var today = todayIso();
      var cutoff = isoDate(new Date(Date.now() - 60 * 86400000));

      Object.entries(data.jEntries).forEach(function(kv) {
        var iso = kv[0], e = kv[1];
        if (iso < cutoff || iso > today) return;
        if (e && e.morning) {
          var f = (e.morning.focus || '');
          items.push({ date: iso, type: 'journal', title: 'Morning Journal', meta: f ? '“' + f.slice(0,60) + (f.length>60?'…':'”') : 'Morning entry' });
        }
        if (e && e.evening) {
          items.push({ date: iso, type: 'journal', title: 'Evening Reflection', meta: 'Evening entry' });
        }
      });

      Object.entries(data.marathon.days || {}).forEach(function(kv) {
        var iso = kv[0], d = kv[1];
        var effectiveDate = (d && d.completedDate) || iso;
        if (effectiveDate < cutoff || effectiveDate > today) return;
        if (d && (d.status === 'completed' || d.status === 'modified')) {
          var sub = d.km ? d.km + ' km' : d.time ? d.time + ' min' : 'Run completed';
          items.push({ date: effectiveDate, type: 'run', title: 'Marathon Run', meta: sub });
        }
      });

      Object.entries((data.workout && data.workout.entries) || {}).forEach(function(kv) {
        var iso = kv[0], e = kv[1];
        if (iso < cutoff || iso > today) return;
        if (e && e.status === 'done') {
          var dur = e.duration ? e.duration + ' min' : '';
          items.push({ date: iso, type: 'workout', title: 'Strength Session', meta: dur || 'Completed' });
        }
      });

      (data.boulder || []).forEach(function(s) {
        if (!s || !s.date || s.date < cutoff || s.date > today) return;
        var total = Object.values(s.grades || {}).reduce(function(a, b) { return a + (b || 0); }, 0);
        var maxG = 0;
        for (var g = 7; g >= 1; g--) { if ((s.grades || {})[g] > 0) { maxG = g; break; } }
        items.push({ date: s.date, type: 'boulder', title: 'Bouldering Session', meta: total + ' climbs' + (maxG ? ' \xb7 max grade ' + maxG : '') });
      });

      items.sort(function(a, b) { return a.date < b.date ? 1 : a.date > b.date ? -1 : 0; });
      return items.slice(0, limit || 15);
    }

    function dotClass(type) {
      if (type === 'run')     return 'dot-run';
      if (type === 'workout') return 'dot-workout';
      if (type === 'boulder') return 'dot-boulder';
      if (type === 'journal') return 'dot-journal';
      return 'dot-calorie';
    }

    function renderActivity(items) {
      if (!items.length) return '<div class="no-data">No recent activity found. Start logging in any tracker.</div>';
      return items.map(function(item) {
        return '<div class="activity-item">' +
          '<span class="activity-dot ' + dotClass(item.type) + '"></span>' +
          '<span class="activity-body">' +
            '<span class="activity-title">' + esc(item.title) + '</span>' +
            '<span class="activity-meta">' + esc(item.meta) + '</span>' +
          '</span>' +
          '<span class="activity-age">' + relAge(item.date) + '</span>' +
          '</div>';
      }).join('');
    }

    function renderGoals(data) {
      var active = Object.values(data.jGoals).filter(function(g) { return g && g.status === 'active'; });
      if (!active.length) return '<div class="no-data">No active goals. Set them in <a href="../journal/" style="color:var(--accent);text-decoration:none">Journal</a>.</div>';
      return active.map(function(g) {
        return '<div class="goal-item">' +
          '<span class="goal-dot"></span>' +
          '<span class="goal-title">' + esc(g.text || 'Untitled goal') + '</span>' +
          '</div>';
      }).join('');
    }

    // ── Canvas helpers ───────────────────────────────────────────────────────
    function paintBg(ctx, W, H) {
      ctx.fillStyle = '#1c1814';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(232,223,208,0.02)';
      for (var px = 12; px < W; px += 24) {
        for (var py = 12; py < H; py += 24) {
          ctx.beginPath(); ctx.arc(px, py, 0.7, 0, Math.PI * 2); ctx.fill();
        }
      }
    }

    // ── Daily report export (same as calendar) ───────────────────────────────
    function generateDailyReport(dateStr) {
      return new Promise(function(resolve) {
        document.fonts.ready.then(function() {
          var calorieLog = {}, workoutData = {}, strengthData = {}, caloWeights = {}, boulderSessions = [];
          try { calorieLog      = JSON.parse(localStorage.getItem('calorie_log')         || '{}'); } catch(e) {}
          try { workoutData     = JSON.parse(localStorage.getItem('c2hm_v1')             || '{}'); } catch(e) {}
          try { strengthData    = JSON.parse(localStorage.getItem('workout_plan_v3')     || '{}'); } catch(e) {}
          try { boulderSessions = JSON.parse(localStorage.getItem('bouldering_sessions') || '[]'); } catch(e) {}
          try { caloWeights     = JSON.parse(localStorage.getItem('calorie_weights')     || '{}'); } catch(e) {}

          var entries    = calorieLog[dateStr] || [];
          var _mDays     = workoutData.days || {};
          var dayWorkout = _mDays[dateStr] || Object.values(_mDays).find(function(d) { return d && d.completedDate === dateStr; }) || null;
          var dayWeighIn = (caloWeights[dateStr] && caloWeights[dateStr] > 0) ? caloWeights[dateStr] : null;

          var weightKg = workoutData.weightKg || null;
          var wEntries = Object.entries(caloWeights).filter(function(kv) { return kv[0] <= dateStr && kv[1] > 0; }).sort(function(a,b) { return b[0].localeCompare(a[0]); });
          if (wEntries.length) weightKg = wEntries[0][1];
          if (!weightKg) weightKg = 75;

          var MEAL_ORDER = ['breakfast','lunch','dinner','snack','other'];
          var CAT_COLORS = { breakfast:'#d4924a', lunch:'#5ab4cc', dinner:'#c4864a', snack:'#7ab87a', other:'#7a6e60' };
          var CAT_LABELS = { breakfast:'Breakfast', lunch:'Lunch', dinner:'Dinner', snack:'Snack', other:'Other' };
          var grouped = {}; var totalCalIn = 0, totalProtein = 0;
          entries.forEach(function(e) {
            var cat = e.category || 'other';
            if (!grouped[cat]) grouped[cat] = [];
            grouped[cat].push(e);
            totalCalIn  += e.calories || 0;
            totalProtein += e.protein  || 0;
          });
          var activeCats = MEAL_ORDER.filter(function(c) { return grouped[c] && grouped[c].length > 0; });

          var workoutCal = 0;
          if (dayWorkout) {
            if (dayWorkout.km && weightKg) workoutCal = Math.round(weightKg * dayWorkout.km);
            else if (dayWorkout.time && weightKg) workoutCal = Math.round(8.0 * weightKg * dayWorkout.time / 60);
          }

          var strengthEntryMap = strengthData.entries || {};
          var strengthEntry    = strengthEntryMap[dateStr] || null;
          var ST_TYPES = [
            { name: 'Push', muscles: 'Chest \xb7 Shoulders \xb7 Triceps' },
            { name: 'Pull', muscles: 'Back \xb7 Biceps \xb7 Grip' },
            { name: 'Legs', muscles: 'Glutes \xb7 Hamstrings \xb7 Hips' },
          ];
          var strengthSession = null;
          if (strengthEntry && strengthEntry.status === 'done') {
            var sSched = Array.isArray(strengthData.schedule) && strengthData.schedule.length === 3 ? strengthData.schedule : [1,3,5];
            var sparts = dateStr.split('-').map(Number);
            var sdow   = new Date(sparts[0], sparts[1]-1, sparts[2]).getDay();
            var ssidx  = sSched.indexOf(sdow);
            strengthSession = ssidx >= 0 ? ST_TYPES[ssidx] : { name: 'Strength', muscles: '' };
          }
          var strengthCal = 0;
          if (strengthSession) strengthCal = Math.round(3.0 * weightKg * ((strengthEntry.duration || 60) / 60));

          var boulderSession = boulderSessions.find(function(s) { return s.date === dateStr; }) || null;
          var boulderCal = 0;
          if (boulderSession) boulderCal = Math.round(2.0 * weightKg * ((boulderSession.duration || 90) / 60));

          var dtParts  = dateStr.split('-').map(Number);
          var dt       = new Date(dtParts[0], dtParts[1]-1, dtParts[2]);
          var DOW      = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
          var MONL     = ['January','February','March','April','May','June','July','August','September','October','November','December'];
          var dateLabel = DOW[dt.getDay()] + ', ' + MONL[dt.getMonth()] + ' ' + dtParts[2] + ', ' + dtParts[0];

          var W = 600, PAD_X = 38, PAD_TOP = 30, PAD_BOT = 38, IW = W - PAD_X * 2;

          function paint(ctx) {
            var y = PAD_TOP;
            var totalBurn = workoutCal + strengthCal + boulderCal;
            var net = Math.round(totalCalIn - totalBurn);

            function r(color, x, yy, w, h) { if (!ctx) return; ctx.fillStyle = color; ctx.fillRect(x, yy, w, h); }
            function t(font, color, ls, str, x, yy) { if (!ctx) return; ctx.font = font; ctx.fillStyle = color; ctx.letterSpacing = ls; ctx.fillText(str, x, yy); }
            function tr(font, color, ls, str, rx, yy) {
              if (!ctx) return;
              ctx.font = font; ctx.letterSpacing = ls; ctx.fillStyle = color;
              ctx.fillText(str, rx - ctx.measureText(str).width, yy);
            }
            function clampStr(str, maxPx, font, ls) {
              if (!ctx) return str;
              ctx.font = font; ctx.letterSpacing = ls;
              var s = str;
              while (ctx.measureText(s).width > maxPx && s.length > 1) s = s.slice(0, -1);
              return s === str ? str : s + '…';
            }
            function divider(yy) { r('#3a3025', PAD_X, yy, IW, 1); }
            function sectionLabel(str, yy) { t('700 9px "DM Serif Text", Georgia, serif', '#c4864a', '1.4px', str, PAD_X, yy + 9); }

            if (ctx) {
              var grad = ctx.createLinearGradient(PAD_X, 0, PAD_X + 220, 0);
              grad.addColorStop(0, '#c4864a'); grad.addColorStop(1, 'rgba(196,134,74,0)');
              ctx.fillStyle = grad; ctx.fillRect(PAD_X, y, 220, 3);
            }
            y += 13;
            sectionLabel('DAILY REPORT', y); y += 16;
            t('italic 700 24px "Cormorant Garamond", Georgia, serif', '#e8dfd0', '-0.24px', dateLabel, PAD_X, y + 24);
            y += 42;
            divider(y); y += 21;

            var COL_W = Math.floor(IW / 3);
            var heroStats = [
              { label: 'CALORIES IN',    value: Math.round(totalCalIn).toLocaleString() + ' kcal', color: '#c4864a' },
              { label: 'CALORIES BURNT', value: totalBurn > 0 ? totalBurn.toLocaleString() + ' kcal' : '—', color: '#5ab4cc' },
              { label: 'PROTEIN',        value: totalProtein > 0 ? Math.round(totalProtein) + 'g' : '—', color: '#7ab87a' },
            ];
            heroStats.forEach(function(stat, i) {
              var lx = PAD_X + COL_W * i;
              t('700 8px "DM Serif Text", Georgia, serif', '#7a6e60', '1.2px', stat.label, lx, y + 8);
              t('italic 700 22px "Cormorant Garamond", Georgia, serif', stat.color, '-0.22px', stat.value, lx, y + 40);
            });
            y += 60;
            divider(y); y += 17;

            t('700 9px "DM Serif Text", Georgia, serif', '#9a8a76', '1.1px', 'NET CALORIES', PAD_X, y + 9); y += 17;
            t('italic 700 28px "Cormorant Garamond", Georgia, serif', '#e8dfd0', '-0.28px', net.toLocaleString() + ' kcal', PAD_X, y + 28); y += 48;

            if (dayWeighIn) {
              divider(y); y += 17;
              sectionLabel('BODY WEIGHT', y); y += 17;
              var wKgStr = dayWeighIn.toFixed(1) + ' kg';
              t('italic 700 26px "Cormorant Garamond", Georgia, serif', '#a8c4e0', '-0.26px', wKgStr, PAD_X, y + 26);
              var lbsStr = (dayWeighIn * 2.20462).toFixed(1) + ' lbs';
              t('14px "DM Serif Text", Georgia, serif', '#7a6e60', '0px', lbsStr, PAD_X + 90, y + 26);
              y += 44;
            }

            if (activeCats.length > 0) {
              divider(y); y += 17;
              sectionLabel('MEALS', y); y += 19;
              activeCats.forEach(function(cat) {
                var ces = grouped[cat];
                var catTotal = ces.reduce(function(s, e) { return s + (e.calories || 0); }, 0);
                r(CAT_COLORS[cat], PAD_X, y + 5, 4, 14);
                t('700 13px "DM Serif Text", Georgia, serif', '#e8dfd0', '0px', CAT_LABELS[cat], PAD_X + 10, y + 16);
                tr('13px "DM Serif Text", Georgia, serif', '#9a8a76', '0px', Math.round(catTotal).toLocaleString() + ' kcal', PAD_X + IW, y + 16);
                y += 26;
                ces.forEach(function(e) {
                  var entryFont = '11px "DM Serif Text", Georgia, serif';
                  var calStr   = Math.round(e.calories || 0).toLocaleString() + ' kcal';
                  var maxNamePx = IW - 14 - 66;
                  var name = clampStr(e.name || 'Unnamed', maxNamePx, entryFont, '0px');
                  t(entryFont, '#7a6e60', '0px', name, PAD_X + 14, y + 11);
                  tr(entryFont, '#7a6e60', '0px', calStr, PAD_X + IW, y + 11);
                  y += 18;
                });
                y += 4;
              });
              y += 4;
            }

            if (dayWorkout && dayWorkout.status) {
              divider(y); y += 17;
              sectionLabel('RUNNING', y); y += 19;
              var SC = { completed:'#7ab87a', modified:'#d4924a', skipped:'#c46a6a' };
              var SL = { completed:'✓ Completed', modified:'◎ Modified', skipped:'✗ Skipped' };
              t('700 14px "DM Serif Text", Georgia, serif', SC[dayWorkout.status] || '#9a8a76', '0px', SL[dayWorkout.status] || dayWorkout.status, PAD_X, y + 14); y += 22;
              var parts = [];
              if (dayWorkout.km)   parts.push(dayWorkout.km + ' km');
              if (dayWorkout.time) parts.push(dayWorkout.time + ' min');
              if (workoutCal > 0)  parts.push('∼' + workoutCal.toLocaleString() + ' kcal burned');
              if (parts.length > 0) { t('12px "DM Serif Text", Georgia, serif', '#9a8a76', '0px', parts.join('  \xb7  '), PAD_X, y + 12); y += 20; }
              if (dayWorkout.notes) { t('italic 11px "DM Serif Text", Georgia, serif', '#7a6e60', '0px', '"' + dayWorkout.notes + '"', PAD_X, y + 11); y += 19; }
            }

            if (strengthSession) {
              divider(y); y += 17;
              sectionLabel('STRENGTH TRAINING', y); y += 19;
              t('700 14px "DM Serif Text", Georgia, serif', '#7ab87a', '0px', '✓ ' + strengthSession.name + ' Session', PAD_X, y + 14); y += 20;
              if (strengthSession.muscles) { t('11px "DM Serif Text", Georgia, serif', '#9a8a76', '0px', strengthSession.muscles, PAD_X, y + 11); y += 17; }
              var sParts = [];
              if (strengthEntry.duration) sParts.push(strengthEntry.duration + ' min');
              if (strengthCal > 0) sParts.push('∼' + strengthCal.toLocaleString() + ' kcal burned');
              if (sParts.length > 0) { t('12px "DM Serif Text", Georgia, serif', '#9a8a76', '0px', sParts.join('  \xb7  '), PAD_X, y + 12); y += 22; }
            }

            if (boulderSession) {
              divider(y); y += 17;
              sectionLabel('BOULDERING', y); y += 19;
              t('700 14px "DM Serif Text", Georgia, serif', '#7ab87a', '0px', '✓ Session', PAD_X, y + 14); y += 20;
              var bParts = [];
              if (boulderSession.duration) bParts.push(boulderSession.duration + ' min');
              if (boulderCal > 0) bParts.push('∼' + boulderCal.toLocaleString() + ' kcal burned');
              var totalClimbs = Object.values(boulderSession.grades || {}).reduce(function(s, c) { return s + c; }, 0);
              if (totalClimbs > 0) bParts.push(totalClimbs + ' climb' + (totalClimbs !== 1 ? 's' : ''));
              if (bParts.length > 0) { t('12px "DM Serif Text", Georgia, serif', '#9a8a76', '0px', bParts.join('  \xb7  '), PAD_X, y + 12); y += 20; }
              if (boulderSession.notes) {
                var noteFont = 'italic 11px "DM Serif Text", Georgia, serif';
                var noteStr  = clampStr('"' + boulderSession.notes + '"', IW - 4, noteFont, '0px');
                t(noteFont, '#7a6e60', '0px', noteStr, PAD_X, y + 11); y += 19;
              }
            }

            return y + PAD_BOT;
          }

          var totalH = paint(null);
          var DPR = 2;
          var canvas = document.createElement('canvas');
          canvas.width  = W * DPR; canvas.height = totalH * DPR;
          var ctx = canvas.getContext('2d');
          ctx.scale(DPR, DPR);
          paintBg(ctx, W, totalH);
          paint(ctx);

          canvas.toBlob(function(blob) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = 'daily-report-' + dateStr + '.png';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(function() { URL.revokeObjectURL(url); }, 2000);
            resolve();
          }, 'image/png');
        });
      });
    }

    // ── Period (week / month) report export ──────────────────────────────────
    function generatePeriodReport(period) {
      return new Promise(function(resolve) {
        document.fonts.ready.then(function() {
          var data  = loadAll();
          var since = period === 'week' ? weekStart() : monthStart();
          var s     = computeStats(data, since);
          var today = todayIso();
          var now   = new Date();
          var MONL  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
          var generated = MONL[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
          var pLabel = period === 'week' ? 'WEEKLY' : 'MONTHLY';
          var label  = rangeLabel(period);

          // Days elapsed
          var d = new Date(since + 'T00:00:00'), periodDayCount = 0;
          while (isoDate(d) <= today) { periodDayCount++; d.setDate(d.getDate() + 1); }

          var avgKm  = s.runs > 0 ? Math.round(s.runKm / s.runs * 10) / 10 : 0;
          var calAvg = s.calDays ? Math.round(s.calTotal / s.calDays) : 0;
          var avgProt = s.calProteinDays ? Math.round(s.calProteinTotal / s.calProteinDays) : 0;

          // Weight delta (month only)
          var weightStr = null, weightDelta = null;
          if (period === 'month' && s.weightLast) {
            weightStr = s.weightLast.toFixed(1) + ' kg';
            if (s.weightFirst && s.weightFirst !== s.weightLast) {
              var dl = (s.weightLast - s.weightFirst);
              weightDelta = (dl < 0 ? '' : '+') + dl.toFixed(1) + ' kg';
            }
          }

          var W = 600, PAD_X = 38, PAD_TOP = 30, PAD_BOT = 42, IW = W - PAD_X * 2;

          function paint(ctx) {
            var y = PAD_TOP;

            function r(color, x, yy, w, h) { if (!ctx) return; ctx.fillStyle = color; ctx.fillRect(x, yy, w, h); }
            function t(font, color, ls, str, x, yy) { if (!ctx) return; ctx.font = font; ctx.fillStyle = color; ctx.letterSpacing = ls; ctx.fillText(str, x, yy); }
            function divider(yy) { r('#3a3025', PAD_X, yy, IW, 1); }
            function sectionLabel(str, yy) { t('700 9px "DM Serif Text", Georgia, serif', '#c4864a', '1.4px', str, PAD_X, yy + 9); }

            // Accent gradient
            if (ctx) {
              var grad = ctx.createLinearGradient(PAD_X, 0, PAD_X + 220, 0);
              grad.addColorStop(0, '#c4864a'); grad.addColorStop(1, 'rgba(196,134,74,0)');
              ctx.fillStyle = grad; ctx.fillRect(PAD_X, y, 220, 3);
            }
            y += 13;

            sectionLabel(pLabel + ' REPORT', y); y += 16;
            t('italic 700 24px "Cormorant Garamond", Georgia, serif', '#e8dfd0', '-0.24px', label, PAD_X, y + 24); y += 34;
            t('italic 11px "DM Serif Text", Georgia, serif', '#5a4e40', '0px', 'Generated: ' + generated, PAD_X, y + 11); y += 24;

            divider(y); y += 21;

            // ── 3-column hero stats ───────────────────────────────────────────
            var COL_W = Math.floor(IW / 3);
            var heroStats = [
              {
                label: 'RUNNING',
                value: s.runs + ' run' + (s.runs !== 1 ? 's' : ''),
                detail: s.runKm > 0 ? (Math.round(s.runKm*10)/10) + ' km' + (avgKm ? ' \xb7 avg ' + avgKm + ' km' : '') : 'no runs',
                color: s.runs > 0 ? '#c4864a' : '#5a4e40',
              },
              {
                label: 'STRENGTH',
                value: s.workouts + ' session' + (s.workouts !== 1 ? 's' : ''),
                detail: s.workoutTypes.length ? s.workoutTypes.join(' \xb7 ') : 'no sessions',
                color: s.workouts > 0 ? '#7ab87a' : '#5a4e40',
              },
              {
                label: 'BOULDERING',
                value: s.boulderSessions + ' session' + (s.boulderSessions !== 1 ? 's' : ''),
                detail: s.boulderMaxGrade
                  ? (s.boulderTotalClimbs > 0 ? s.boulderTotalClimbs + ' climbs \xb7 ' : '') + 'max G' + s.boulderMaxGrade
                  : 'no sessions',
                color: s.boulderSessions > 0 ? '#5ab4cc' : '#5a4e40',
              },
            ];

            heroStats.forEach(function(stat, i) {
              var lx = PAD_X + COL_W * i;
              t('700 8px "DM Serif Text", Georgia, serif', '#7a6e60', '1.2px', stat.label, lx, y + 8);
              t('italic 700 19px "Cormorant Garamond", Georgia, serif', stat.color, '-0.19px', stat.value, lx, y + 30);
              t('11px "DM Serif Text", Georgia, serif', '#4a3e30', '0px', stat.detail, lx, y + 46);
            });
            y += 62;

            divider(y); y += 19;

            // ── Journal ───────────────────────────────────────────────────────
            sectionLabel('JOURNAL', y); y += 19;
            t('14px "DM Serif Text", Georgia, serif', '#9a8a76', '0px',
              'Morning: ' + s.journalMorning + ' / ' + periodDayCount + ' days', PAD_X, y + 14); y += 22;
            t('14px "DM Serif Text", Georgia, serif', '#9a8a76', '0px',
              'Evening: ' + s.journalEvening + ' / ' + periodDayCount + ' days', PAD_X, y + 14); y += 26;

            divider(y); y += 19;

            // ── Nutrition ─────────────────────────────────────────────────────
            sectionLabel('NUTRITION', y); y += 19;
            if (s.calDays > 0) {
              t('italic 700 22px "Cormorant Garamond", Georgia, serif', '#c4864a', '-0.22px',
                calAvg.toLocaleString() + ' kcal avg / day', PAD_X, y + 22); y += 32;
              t('14px "DM Serif Text", Georgia, serif', '#7a6e60', '0px',
                'Days tracked: ' + s.calDays + ' / ' + periodDayCount, PAD_X, y + 14); y += 22;
              t('14px "DM Serif Text", Georgia, serif', '#7a6e60', '0px',
                'Total: ' + Math.round(s.calTotal).toLocaleString() + ' kcal', PAD_X, y + 14); y += 22;
              if (avgProt > 0) {
                t('14px "DM Serif Text", Georgia, serif', '#7a6e60', '0px',
                  'Avg protein: ' + avgProt + 'g / day', PAD_X, y + 14); y += 22;
              }
            } else {
              t('italic 13px "DM Serif Text", Georgia, serif', '#5a4e40', '0px',
                'No nutrition data this ' + period + '.', PAD_X, y + 13); y += 21;
            }
            y += 10;

            // ── Weight (month only) ───────────────────────────────────────────
            if (period === 'month' && weightStr) {
              divider(y); y += 19;
              sectionLabel('BODY WEIGHT', y); y += 19;
              t('italic 700 22px "Cormorant Garamond", Georgia, serif', '#a8c4e0', '-0.22px', weightStr, PAD_X, y + 22); y += 32;
              if (weightDelta) {
                var deltaCol = weightDelta.startsWith('-') ? '#7ab87a' : '#c4864a';
                t('14px "DM Serif Text", Georgia, serif', deltaCol, '0px', weightDelta + ' this month', PAD_X, y + 14); y += 22;
              }
              y += 8;
            }

            // ── Footer ────────────────────────────────────────────────────────
            divider(y); y += 14;
            t('italic 700 10px "DM Serif Text", Georgia, serif', '#5a4e40', '0.8px',
              'xssxghjk \xb7 personal.dashboard', PAD_X, y + 10);
            y += 10;

            return y + PAD_BOT;
          }

          var totalH = paint(null);
          var DPR = 2;
          var canvas = document.createElement('canvas');
          canvas.width  = W * DPR; canvas.height = totalH * DPR;
          var ctx = canvas.getContext('2d');
          ctx.scale(DPR, DPR);
          paintBg(ctx, W, totalH);
          paint(ctx);

          canvas.toBlob(function(blob) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = period + '-report-' + todayIso() + '.png';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(function() { URL.revokeObjectURL(url); }, 2000);
            resolve();
          }, 'image/png');
        });
      });
    }

    // ── Tab system ───────────────────────────────────────────────────────────
    var currentTab = 'week';
    var TAB_LABELS = { day: 'Daily Report', week: 'Weekly Report', month: 'Monthly Report', year: 'Year Report' };

    function updateNav() {
      document.getElementById('nav-label').textContent = getPeriodLabel(currentTab, currentOffset);
      document.getElementById('nav-next').disabled = currentOffset >= 0;
    }

    function switchTab(tab) {
      currentTab = tab;
      currentOffset = 0;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === tab);
      });
      renderCurrentStats();
      updateNav();
      document.getElementById('export-label').textContent = TAB_LABELS[tab] || 'Export';
    }

    function renderCurrentStats() {
      var grid = document.getElementById('stats-grid');
      if      (currentTab === 'day')   grid.innerHTML = renderStatsDay(appData, currentOffset);
      else if (currentTab === 'week')  grid.innerHTML = renderStatsWeek(appData, currentOffset);
      else if (currentTab === 'month') grid.innerHTML = renderStatsMonth(appData, currentOffset);
      else if (currentTab === 'year')  grid.innerHTML = renderStatsYear(appData, currentOffset);
    }

    // ── Export handler ───────────────────────────────────────────────────────
    document.getElementById('export-btn').addEventListener('click', function() {
      var btn = this;
      btn.disabled = true;
      btn.querySelector('#export-label').textContent = 'Generating…';
      var p;
      if (currentTab === 'day')        p = generateDailyReport(offsetDayIso(currentOffset));
      else if (currentTab === 'week')  p = generatePeriodReport('week');
      else if (currentTab === 'month') p = generatePeriodReport('month');
      else                             p = generatePeriodReport('month'); // year: no dedicated export
      p.then(function() {
        btn.disabled = false;
        btn.querySelector('#export-label').textContent = TAB_LABELS[currentTab];
      });
    });

    // ── Tab click handlers ───────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { switchTab(btn.dataset.tab); });
    });

    // ── Arrow navigation handlers ────────────────────────────────────────────
    document.getElementById('nav-prev').addEventListener('click', function() {
      currentOffset--;
      renderCurrentStats();
      updateNav();
    });
    document.getElementById('nav-next').addEventListener('click', function() {
      if (currentOffset < 0) {
        currentOffset++;
        renderCurrentStats();
        updateNav();
      }
    });

    // ── Hero date ────────────────────────────────────────────────────────────
    (function () {
      var d = new Date();
      var DOW = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var MON = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('hero-date').textContent =
        DOW[d.getDay()] + ', ' + MON[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    })();

    // ── Main render ──────────────────────────────────────────────────────────
    var appData = loadAll();
    switchTab('week');
    updateNav();

    document.getElementById('activity-feed').innerHTML  = renderActivity(buildActivity(appData, 15));
    document.getElementById('goals-list').innerHTML     = renderGoals(appData);

    (function () {
      var tcg = document.getElementById('tcg-section');
      tcg.innerHTML = '<div class="section-head">Tournament Records</div>' +
        '<div style="font-size:0.78rem;color:var(--muted);font-style:italic;padding:0.5rem 0">' +
        'View full reports and tournament history in ' +
        '<a href="../tcg-tournament-reports/" style="color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(196,134,74,0.3)">Tournament Reports</a>.' +
        '</div>';
    })();

    // ── Version ──────────────────────────────────────────────────────────────
    fetch('../version.json').then(function(r) { return r.json(); }).then(function(v) {
      var e = document.getElementById('page-version');
      if (e) e.textContent = 'v' + v.version;
    }).catch(function() {});

  })();
  </script>

</body>
</html>
