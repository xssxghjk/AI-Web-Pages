<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaB Tournament Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&display=swap">
  <script src="../nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #181818;
      --border: #1e1e1e;
      --border2: #2c2c2c;
      --accent: #ff2d20;
      --accent-dim: rgba(255,45,32,0.1);
      --text: #f0f0f0;
      --muted: #505050;
      --muted2: #707070;
      --muted-2: #2a2a2a;
      --t1: #ff2d20;
      --t1-bg: rgba(255,45,32,0.07);
      --t1-border: rgba(255,45,32,0.22);
      --t2: #f0c030;
      --t2-bg: rgba(240,192,48,0.07);
      --t2-border: rgba(240,192,48,0.22);
      --t3: #4060e0;
      --t3-bg: rgba(64,96,224,0.07);
      --t3-border: rgba(64,96,224,0.22);
      --t4: #20c050;
      --t4-bg: rgba(32,192,80,0.07);
      --t4-border: rgba(32,192,80,0.22);
      --win: #20c050;
      --win-bg: rgba(32,192,80,0.08);
      --loss: #ff2d20;
      --loss-bg: rgba(255,45,32,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    /* ── HERO ── */
    .hero {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 2px solid var(--accent);
      position: relative;
      overflow: hidden;
    }
    .hero-inner { max-width: 1000px; margin: 0 auto; position: relative; z-index: 1; }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: 0.08em;
      line-height: 0.9;
      margin-bottom: 0.4rem;
      color: var(--text);
    }
    .hero p {
      color: var(--muted2);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .hero-stats {
      display: flex;
      gap: 0;
      flex-wrap: wrap;
    }
    .stat-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.3rem 0.75rem;
      border-radius: 0;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted2);
      margin-right: -1px;
    }
    .stat-pill.win  { color: var(--win);  background: var(--win-bg);  border-color: rgba(32,192,80,0.3); }
    .stat-pill.loss { color: var(--loss); background: var(--loss-bg); border-color: rgba(255,45,32,0.3); }
    .stat-pill.wr   { color: var(--accent); background: var(--accent-dim); border-color: rgba(255,45,32,0.3); }

    /* ── FILTER TOGGLE ── */
    .filter-toggle-bar {
      padding: 0.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--surface);
    }
    .filter-toggle-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.25rem 0.65rem;
      border-radius: 0;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .filter-toggle-btn:hover { border-color: var(--text); color: var(--text); }
    .filter-toggle-btn.has-filters {
      background: var(--accent-dim);
      border-color: rgba(255,45,32,0.4);
      color: var(--accent);
    }
    .filter-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.1rem;
      height: 1.1rem;
      border-radius: 0;
      background: var(--accent);
      color: var(--bg);
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0 0.25rem;
    }
    .filter-active-tags {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-active-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 0.15rem 0.5rem;
      border-radius: 0;
      background: var(--accent-dim);
      border: 1px solid rgba(255,45,32,0.3);
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .filter-active-tag:hover { background: rgba(255,45,32,0.16); }
    .filter-active-tag .remove { opacity: 0.7; font-size: 0.9rem; line-height: 1; }

    /* ── FILTER PANEL ── */
    .filter-panel {
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.22s ease, padding 0.22s ease;
      padding: 0 2rem;
    }
    .filter-panel.open {
      max-height: 220px;
      padding: 0.85rem 2rem;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.55rem;
    }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      min-width: 2.5rem;
    }
    .filter-pills { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .filter-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.67rem;
      font-weight: 500;
      padding: 0.2rem 0.55rem;
      border-radius: 0;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .filter-pill:hover { border-color: var(--muted2); color: var(--text); }
    .filter-pill.active { background: var(--accent-dim); border-color: rgba(255,45,32,0.4); color: var(--accent); }
    .filter-pill.t1.active { background: var(--t1-bg); border-color: var(--t1-border); color: var(--t1); }
    .filter-pill.t2.active { background: var(--t2-bg); border-color: var(--t2-border); color: var(--t2); }
    .filter-pill.t3.active { background: var(--t3-bg); border-color: var(--t3-border); color: var(--t3); }
    .filter-pill.t4.active { background: var(--t4-bg); border-color: var(--t4-border); color: var(--t4); }

    /* ── MAIN ── */
    .main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 0 4rem;
    }

    .no-results {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── TILES GRID — ledger format ── */
    .tiles-grid {
      display: flex;
      flex-direction: column;
      border-top: 2px solid var(--accent);
    }

    @keyframes rowFlash {
      0%   { opacity: 0; transform: translateX(-6px); }
      70%  { opacity: 1; transform: translateX(1px); }
      100% { opacity: 1; transform: none; }
    }

    /* ── REPORT TILE ── */
    .report-tile {
      display: block;
      text-decoration: none;
      color: inherit;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      border-left: 3px solid transparent;
      overflow: hidden;
      transition: background 0.1s, border-left-color 0.12s;
      position: relative;
      opacity: 0;
      animation: rowFlash 0.3s ease forwards;
    }
    .report-tile:nth-child(2)  { animation-delay: 0.03s; }
    .report-tile:nth-child(3)  { animation-delay: 0.07s; }
    .report-tile:nth-child(4)  { animation-delay: 0.11s; }
    .report-tile:nth-child(5)  { animation-delay: 0.15s; }
    .report-tile:nth-child(6)  { animation-delay: 0.19s; }
    .report-tile:nth-child(7)  { animation-delay: 0.23s; }
    .report-tile:nth-child(n+8){ animation-delay: 0.27s; }
    .report-tile:hover {
      background: rgba(255,45,32,0.04);
      border-left-color: var(--accent);
    }
    .report-tile.tier-1 { border-left-color: rgba(255,45,32,0.18); }
    .report-tile.tier-2 { border-left-color: rgba(240,192,48,0.15); }
    .report-tile.tier-3 { border-left-color: rgba(64,96,224,0.15); }
    .report-tile.tier-4 { border-left-color: rgba(32,192,80,0.15); }
    .report-tile.tier-1:hover { border-left-color: var(--t1); background: rgba(255,45,32,0.04); }
    .report-tile.tier-2:hover { border-left-color: var(--t2); background: rgba(240,192,48,0.03); }
    .report-tile.tier-3:hover { border-left-color: var(--t3); background: rgba(64,96,224,0.04); }
    .report-tile.tier-4:hover { border-left-color: var(--t4); background: rgba(32,192,80,0.04); }

    .tile-body {
      padding: 0.65rem 1.25rem 0.65rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .tile-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .tier-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.12rem 0.45rem;
      border-radius: 0;
      border: 1px solid;
    }
    .tier-badge.t1 { color: var(--t1); background: var(--t1-bg); border-color: var(--t1-border); }
    .tier-badge.t2 { color: var(--t2); background: var(--t2-bg); border-color: var(--t2-border); }
    .tier-badge.t3 { color: var(--t3); background: var(--t3-bg); border-color: var(--t3-border); }
    .tier-badge.t4 { color: var(--t4); background: var(--t4-bg); border-color: var(--t4-border); }
    .hero-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.12rem 0.45rem;
      border-radius: 0;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--muted2);
    }
    .format-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.12rem 0.45rem;
      border-radius: 0;
      background: rgba(64,96,224,0.08);
      border: 1px solid rgba(64,96,224,0.25);
      color: #8090e8;
    }

    .tile-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      line-height: 1.05;
      color: var(--text);
    }

    .tile-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .tile-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .tile-record {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    .rr-win  { color: var(--win); }
    .rr-loss { color: var(--loss); }
    .rr-sep  { color: var(--muted); margin: 0 0.15rem; }

    /* ── FOOTER ── */
    footer {
      padding: 1.75rem 2rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted-2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <h1>Tournament Reports</h1>
      <p>Post-event analysis, round-by-round breakdowns, and deck learnings.</p>
      <div class="hero-stats" id="hero-stats"></div>
    </div>
  </header>

  <div class="filter-toggle-bar">
    <button class="filter-toggle-btn" id="filter-toggle-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 2.5h10M3 6h6M5 9.5h2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Filter
      <span class="filter-badge" id="filter-badge" style="display:none"></span>
    </button>
    <div class="filter-active-tags" id="filter-active-tags"></div>
  </div>
  <div class="filter-panel" id="filter-panel">
    <div class="filter-group">
      <span class="filter-label">Hero</span>
      <div class="filter-pills" id="hero-filter"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Tier</span>
      <div class="filter-pills" id="tier-filter"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Format</span>
      <div class="filter-pills" id="format-filter"></div>
    </div>
  </div>

  <main class="main">
    <div class="tiles-grid" id="reports-container"></div>
    <div class="no-results" id="no-results" style="display:none">No reports match the selected filters.</div>
  </main>

  <footer>
    <span id="page-version" style="opacity:0.65"></span>
    <a href="https://github.com/xssxghjk/AI-Web-Pages" target="_blank" rel="noopener">View on GitHub</a>
  </footer>
  <script>fetch('../version.json').then(r=>r.json()).then(v=>{var e=document.getElementById('page-version');if(e)e.textContent='v'+v.version}).catch(()=>{});</script>

  <script src="reports.js"></script>
  <script>
  (function () {

    const TIER_INFO = {
      RTN:          { tier: 1, label: 'Tier 1 · RTN' },
      PQ:           { tier: 1, label: 'Tier 1 · PQ' },
      Battleground: { tier: 2, label: 'Tier 2 · Battleground' },
      Showdown:     { tier: 2, label: 'Tier 2 · Showdown' },
      Calling:      { tier: 3, label: 'Tier 3 · Calling' },
      Worlds:       { tier: 4, label: 'Tier 4 · Worlds' },
      PT:           { tier: 4, label: 'Tier 4 · Pro Tour' },
    };

    function getTierLabel(eventType) {
      return (TIER_INFO[eventType] || { label: 'Tier ? · ' + eventType }).label;
    }

    function computeRecord(rounds) {
      const wins   = rounds.filter(r => r.result === 'win').length;
      const losses = rounds.filter(r => r.result === 'loss').length;
      return { wins, losses };
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    REPORTS.sort((a, b) => (a.date < b.date ? 1 : -1));

    /* ── RENDER TILE ── */
    function renderTile(r) {
      const rec = computeRecord(r.rounds);
      const tierLabel = getTierLabel(r.eventType);
      const tier = getTierForReport(r);
      const tierClass = `t${tier}`;

      const formatHtml = r.format
        ? `<span class="format-badge">${esc(r.format)}</span>`
        : '';

      return `
        <a
          class="report-tile tier-${tier}"
          href="./detail.html?id=${esc(r.id)}"
          data-hero="${esc(r.hero.toLowerCase())}"
          data-tier="${tier}"
          data-format="${esc((r.format || '').toLowerCase())}"
        >
          <div class="tile-body">
            <div class="tile-meta">
              <span class="tier-badge ${tierClass}">${esc(tierLabel)}</span>
              <span class="hero-badge">${esc(r.hero)}</span>
              ${formatHtml}
            </div>
            <div class="tile-title">${esc(r.event)}</div>
            <div class="tile-footer">
              <span class="tile-date">${esc(r.displayDate)}</span>
              <span class="tile-record">
                <span class="rr-win">${rec.wins}W</span>
                <span class="rr-sep">–</span>
                <span class="rr-loss">${rec.losses}L</span>
              </span>
            </div>
          </div>
        </a>`;
    }

    /* ── FILTER STATE ── */
    let activeHero   = 'all';
    let activeTier   = 'all';
    let activeFormat = 'all';

    function getTierForReport(r) {
      if (r.tier != null) return r.tier;
      return (TIER_INFO[r.eventType] || { tier: 1 }).tier;
    }

    function applyFilters() {
      const tiles = document.querySelectorAll('.report-tile');
      let visible = 0;
      tiles.forEach(tile => {
        const heroMatch   = activeHero   === 'all' || tile.dataset.hero   === activeHero;
        const tierMatch   = activeTier   === 'all' || tile.dataset.tier   === activeTier;
        const formatMatch = activeFormat === 'all' || tile.dataset.format === activeFormat;
        const show = heroMatch && tierMatch && formatMatch;
        tile.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
      updateFilterUI();
      const filteredReports = REPORTS.filter(r => {
        const heroMatch   = activeHero   === 'all' || r.hero.toLowerCase() === activeHero;
        const tierMatch   = activeTier   === 'all' || getTierForReport(r) == activeTier;
        const formatMatch = activeFormat === 'all' || (r.format || '').toLowerCase() === activeFormat;
        return heroMatch && tierMatch && formatMatch;
      });
      buildStats(filteredReports);
    }

    const tierLabels   = { 1: 'RTN / PQ', 2: 'BG / Show', 3: 'Calling', 4: 'Worlds / PT' };
    const heroLabelMap = {};
    const formatLabelMap = {};

    function updateFilterUI() {
      const activeCount = (activeHero !== 'all' ? 1 : 0) + (activeTier !== 'all' ? 1 : 0) + (activeFormat !== 'all' ? 1 : 0);
      const badge = document.getElementById('filter-badge');
      const btn   = document.getElementById('filter-toggle-btn');
      const tags  = document.getElementById('filter-active-tags');

      badge.style.display = activeCount > 0 ? '' : 'none';
      badge.textContent = activeCount;
      btn.classList.toggle('has-filters', activeCount > 0);

      const parts = [];
      if (activeHero   !== 'all') parts.push({ label: heroLabelMap[activeHero]     || activeHero,   type: 'hero' });
      if (activeTier   !== 'all') parts.push({ label: tierLabels[activeTier]        || 'Tier ' + activeTier, type: 'tier' });
      if (activeFormat !== 'all') parts.push({ label: formatLabelMap[activeFormat]  || activeFormat, type: 'format' });

      tags.innerHTML = parts.map(p =>
        `<span class="filter-active-tag" data-clear="${p.type}">
          ${esc(p.label)}<span class="remove">×</span>
        </span>`
      ).join('');

      tags.querySelectorAll('.filter-active-tag').forEach(tag => {
        tag.addEventListener('click', () => {
          if (tag.dataset.clear === 'hero')   setFilter('hero',   'all');
          if (tag.dataset.clear === 'tier')   setFilter('tier',   'all');
          if (tag.dataset.clear === 'format') setFilter('format', 'all');
        });
      });
    }

    function setFilter(ftype, fval) {
      if (ftype === 'hero')   activeHero   = fval;
      if (ftype === 'tier')   activeTier   = fval;
      if (ftype === 'format') activeFormat = fval;
      document.querySelectorAll(`[data-ftype="${ftype}"]`)
        .forEach(b => b.classList.toggle('active', b.dataset.fval === fval));
      applyFilters();
    }

    /* ── BUILD FILTERS ── */
    function buildFilters() {
      const heroes  = [...new Set(REPORTS.map(r => r.hero))].sort();
      const tiers   = [...new Set(REPORTS.map(r => getTierForReport(r)))].sort();
      const formats = [...new Set(REPORTS.map(r => r.format).filter(Boolean))].sort();

      const heroEl = document.getElementById('hero-filter');
      heroEl.innerHTML =
        `<button class="filter-pill active" data-ftype="hero" data-fval="all">All</button>` +
        heroes.map(h => {
          heroLabelMap[h.toLowerCase()] = h;
          return `<button class="filter-pill" data-ftype="hero" data-fval="${esc(h.toLowerCase())}">${esc(h)}</button>`;
        }).join('');

      const tierEl = document.getElementById('tier-filter');
      tierEl.innerHTML =
        `<button class="filter-pill active" data-ftype="tier" data-fval="all">All</button>` +
        tiers.map(t =>
          `<button class="filter-pill t${t}" data-ftype="tier" data-fval="${t}">${esc(tierLabels[t] || 'Tier ' + t)}</button>`
        ).join('');

      const formatEl = document.getElementById('format-filter');
      formatEl.innerHTML =
        `<button class="filter-pill active" data-ftype="format" data-fval="all">All</button>` +
        formats.map(f => {
          formatLabelMap[f.toLowerCase()] = f;
          return `<button class="filter-pill" data-ftype="format" data-fval="${esc(f.toLowerCase())}">${esc(f)}</button>`;
        }).join('');

      document.querySelectorAll('.filter-pill').forEach(btn => {
        btn.addEventListener('click', () => setFilter(btn.dataset.ftype, btn.dataset.fval));
      });

      /* ── FILTER TOGGLE ── */
      const toggleBtn   = document.getElementById('filter-toggle-btn');
      const filterPanel = document.getElementById('filter-panel');
      toggleBtn.addEventListener('click', () => {
        filterPanel.classList.toggle('open');
      });
    }

    /* ── BUILD STATS ── */
    function buildStats(reports) {
      reports = reports || REPORTS;
      let wins = 0, losses = 0;
      reports.forEach(r => {
        const rec = computeRecord(r.rounds);
        wins   += rec.wins;
        losses += rec.losses;
      });
      const total = wins + losses;
      const wr = total > 0 ? Math.round(wins / total * 100) : 0;
      document.getElementById('hero-stats').innerHTML = `
        <span class="stat-pill">${reports.length} report${reports.length !== 1 ? 's' : ''}</span>
        <span class="stat-pill win">${wins}W</span>
        <span class="stat-pill loss">${losses}L</span>
        <span class="stat-pill wr">${wr}% WR</span>`;
    }

    /* ── INIT ── */
    function init() {
      const container = document.getElementById('reports-container');
      container.innerHTML = REPORTS.map(renderTile).join('');
      buildStats();
      buildFilters();
    }

    init();

  })();
  </script>

</body>
</html>
