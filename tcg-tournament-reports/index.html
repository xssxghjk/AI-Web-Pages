<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaB Tournament Reports</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05080f;
      --surface: #0c1120;
      --surface2: #111827;
      --border: #1e2d45;
      --border2: #243348;
      --accent: #0ea5e9;
      --text: #e2e8f0;
      --muted: #64748b;
      --muted2: #8898aa;
      /* Tier colours */
      --t1: #0ea5e9;
      --t1-bg: rgba(14,165,233,0.08);
      --t1-border: rgba(14,165,233,0.25);
      --t2: #22c55e;
      --t2-bg: rgba(34,197,94,0.08);
      --t2-border: rgba(34,197,94,0.25);
      --t3: #f59e0b;
      --t3-bg: rgba(245,158,11,0.08);
      --t3-border: rgba(245,158,11,0.25);
      --t4: #a855f7;
      --t4-bg: rgba(168,85,247,0.08);
      --t4-border: rgba(168,85,247,0.25);
      /* Result colours */
      --win: #22c55e;
      --win-bg: rgba(34,197,94,0.08);
      --loss: #ef4444;
      --loss-bg: rgba(239,68,68,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5,8,15,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-back {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .nav-back:hover { color: var(--text); }
    .nav-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .nav-sep { color: var(--border2); }

    /* ── HERO ── */
    .hero {
      padding: 3.5rem 1.5rem 2.5rem;
      text-align: center;
      background: linear-gradient(180deg, rgba(14,165,233,0.05) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    .hero-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(14,165,233,0.35);
      border-radius: 999px;
      padding: 0.25rem 0.8rem;
      margin-bottom: 1rem;
    }
    .hero h1 {
      font-size: clamp(1.9rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.6rem;
    }
    .hero p {
      color: var(--muted);
      font-size: 1rem;
      max-width: 520px;
      margin-inline: auto;
      margin-bottom: 1.5rem;
    }
    .hero-stats {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-pill {
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--muted2);
    }
    .stat-pill.win  { color: var(--win);  background: var(--win-bg);  border-color: rgba(34,197,94,0.25); }
    .stat-pill.loss { color: var(--loss); background: var(--loss-bg); border-color: rgba(239,68,68,0.25); }
    .stat-pill.wr   { color: var(--accent); background: var(--t1-bg); border-color: var(--t1-border); }

    /* ── FILTERS ── */
    .filters-bar {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
      background: var(--surface);
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .filter-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .filter-pills { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .filter-pill {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-pill:hover { border-color: var(--muted2); color: var(--text); }
    .filter-pill.active {
      background: rgba(14,165,233,0.12);
      border-color: rgba(14,165,233,0.45);
      color: var(--accent);
    }
    .filter-pill.t1.active { background: var(--t1-bg); border-color: var(--t1-border); color: var(--t1); }
    .filter-pill.t2.active { background: var(--t2-bg); border-color: var(--t2-border); color: var(--t2); }
    .filter-pill.t3.active { background: var(--t3-bg); border-color: var(--t3-border); color: var(--t3); }
    .filter-pill.t4.active { background: var(--t4-bg); border-color: var(--t4-border); color: var(--t4); }

    /* ── MAIN ── */
    .main {
      max-width: 820px;
      margin: 2rem auto;
      padding: 0 1.25rem 4rem;
    }

    .no-results {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── REPORT CARD ── */
    .report-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 1.5rem;
      overflow: hidden;
      /* left accent bar set via tier class */
      border-left-width: 3px;
    }
    .report-card.tier-1 { border-left-color: var(--t1); }
    .report-card.tier-2 { border-left-color: var(--t2); }
    .report-card.tier-3 { border-left-color: var(--t3); }
    .report-card.tier-4 { border-left-color: var(--t4); }

    /* report header */
    .report-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .report-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.55rem;
    }
    .tier-badge {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      border: 1px solid;
    }
    .tier-badge.t1 { color: var(--t1); background: var(--t1-bg); border-color: var(--t1-border); }
    .tier-badge.t2 { color: var(--t2); background: var(--t2-bg); border-color: var(--t2-border); }
    .tier-badge.t3 { color: var(--t3); background: var(--t3-bg); border-color: var(--t3-border); }
    .tier-badge.t4 { color: var(--t4); background: var(--t4-bg); border-color: var(--t4-border); }
    .hero-badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border2);
      color: var(--muted2);
    }
    .report-title {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .report-footer-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.45rem;
      flex-wrap: wrap;
    }
    .report-date {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .report-record {
      font-size: 0.85rem;
      font-weight: 700;
    }
    .rr-win  { color: var(--win); }
    .rr-loss { color: var(--loss); }
    .rr-sep  { color: var(--muted); margin: 0 0.1rem; }

    /* ── SECTIONS INSIDE REPORT ── */
    .rep-section {
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .rep-section:last-child { border-bottom: none; }

    .rep-section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.65rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .rep-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .summary-text {
      font-size: 0.9rem;
      color: var(--muted2);
      line-height: 1.65;
    }

    /* learnings */
    .learnings-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .learning-item {
      display: flex;
      align-items: baseline;
      gap: 0.55rem;
      font-size: 0.875rem;
      line-height: 1.55;
    }
    .learning-tag {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border2);
      color: var(--muted2);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .learning-text {
      color: var(--muted2);
    }

    /* collapsible */
    .collapsible-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: none;
      border: none;
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      padding: 0;
      transition: color 0.15s;
    }
    .collapsible-btn:hover { color: var(--accent); }
    .collapsible-btn .count-pill {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--muted);
    }
    .collapsible-btn .chevron {
      margin-left: auto;
      font-size: 1.1rem;
      color: var(--muted);
      transition: transform 0.25s;
      display: inline-block;
    }
    .collapsible-btn[aria-expanded="true"] .chevron {
      transform: rotate(90deg);
    }
    .collapsible-content {
      margin-top: 0.85rem;
      display: none;
    }
    .collapsible-content.open { display: block; }

    /* notes list */
    .notes-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .notes-list li {
      font-size: 0.875rem;
      color: var(--muted2);
      line-height: 1.55;
      padding-left: 1.1rem;
      position: relative;
    }
    .notes-list li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--muted);
    }

    /* rounds */
    .rounds-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .round-item {
      border-radius: 10px;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      background: var(--surface2);
    }
    .round-item.win  { border-color: rgba(34,197,94,0.2);  background: rgba(34,197,94,0.04); }
    .round-item.loss { border-color: rgba(239,68,68,0.2);  background: rgba(239,68,68,0.04); }
    .round-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .round-num {
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 0.15rem 0.45rem;
      flex-shrink: 0;
    }
    .round-opponent {
      font-size: 0.92rem;
      font-weight: 700;
      flex: 1;
    }
    .round-result {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }
    .round-result.win  { color: var(--win);  background: var(--win-bg);  border: 1px solid rgba(34,197,94,0.3); }
    .round-result.loss { color: var(--loss); background: var(--loss-bg); border: 1px solid rgba(239,68,68,0.3); }
    .round-score {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .round-notes {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      padding-top: 0.15rem;
    }
    .round-notes li {
      font-size: 0.835rem;
      color: var(--muted);
      line-height: 1.5;
      padding-left: 1rem;
      position: relative;
    }
    .round-notes li::before {
      content: '·';
      position: absolute;
      left: 0.2rem;
      color: var(--border2);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .filters-bar { gap: 0.75rem; }
      .report-title { font-size: 1.1rem; }
      .rep-section { padding: 0.9rem 1.1rem; }
      .report-header { padding: 1rem 1.1rem 0.85rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-back" href="../">← Hub</a>
    <span class="nav-sep">|</span>
    <span class="nav-title">Tournament Reports</span>
    <span class="nav-sub">Flesh and Blood</span>
  </nav>

  <header class="hero">
    <div class="hero-tag">Flesh and Blood</div>
    <h1>Tournament Reports</h1>
    <p>Post-event analysis, round-by-round breakdowns, and deck learnings.</p>
    <div class="hero-stats" id="hero-stats"></div>
  </header>

  <div class="filters-bar">
    <div class="filter-group">
      <span class="filter-label">Hero</span>
      <div class="filter-pills" id="hero-filter"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Tier</span>
      <div class="filter-pills" id="tier-filter"></div>
    </div>
  </div>

  <main class="main">
    <div id="reports-container"></div>
    <div class="no-results" id="no-results" style="display:none">No reports match the selected filters.</div>
  </main>

  <script>
  (function () {

    /* ────────────────────────────────────────────
       REPORT DATA
       To add a new report, copy the object below
       and fill in the fields. Rounds should be
       listed from last played (highest R#) down.
       ──────────────────────────────────────────── */
    const REPORTS = [
      {
        id: 'rtn-hagen-2026-01-03',
        hero: 'Slippy',
        date: '2026-01-03',        // ISO date for sorting
        displayDate: '03.01.26',   // shown on card
        event: 'RTN Hagen',
        // eventType: RTN | PQ | Battleground | Showdown | Calling | Worlds | PT
        eventType: 'RTN',
        tier: 1,                   // 1–4 derived automatically, but can override
        generalNotes: [
          'Razor reflex really good',
          'Always use the first nimbilism if no jack was seen yet',
          'More stealth attacks? Too many stealth reactions compared to attacks — double trouble?',
          'Snappies not useful in a lot of games; should be cut — blade beckoner / blacktec / armory deck',
          'Blood splattered vest sideboard for aggro?',
          'Find earth tech',
          'AB1 probably',
        ],
        rounds: [
          {
            number: 6,
            opponent: 'Verdance',
            result: 'loss',
            score: null,
            notes: [
              '8 value behind turn 0',
              'Hands aligned really badly',
              'Not much agency',
            ]
          },
          {
            number: 5,
            opponent: 'Cindra',
            result: 'win',
            score: '0–5',
            notes: [
              'Somewhat close',
              'Misplayed: didn\'t arsenal a relevant on-hit — threw 3 when it wasn\'t relevant',
              'Misplayed when opponent bricked — blocked with flick knives instead of hand ("safe play")',
              'Need extra block value',
            ]
          },
          {
            number: 4,
            opponent: 'Kayo',
            result: 'win',
            score: '2–0',
            notes: [
              'Very close',
              'Stampede is busted — might need to block equip earlier',
              'Used snappies very greedy early, probably game-losing',
              'Gotta play around fleshbag',
            ]
          },
          {
            number: 3,
            opponent: 'Slippy',
            result: 'win',
            score: '13–0',
            notes: [
              'Not close',
              'Opponent on standard list with weird adaptations (leyline, surgical)',
              'Deck was smooth, although no codex drawn',
              'Boarding out codex of inertia feels right in the mirror',
            ]
          },
          {
            number: 2,
            opponent: 'Florian',
            result: 'loss',
            score: '0–9',
            notes: [
              'Cursed game: 2 codex with 3 stealth reactions and no stealth attack until turn 3',
              'Hands didn\'t align',
              'Average Florian hands — no "highroll" turns',
              'Really hard to flick / hit daggers; cut through is a liability',
              'Florian created 4 runechants turn 0',
              'It\'s a race — probably shouldn\'t fatstack',
              'First earth banish gives him so much value; meet madness lost the game (equip + felling for 8)',
            ]
          },
          {
            number: 1,
            opponent: 'Puffin',
            result: 'win',
            score: '17–0',
            notes: [
              'No boost — lost in champ select',
              'Good value from savour bloodshed (cost codex value — needed to pitch yellow)',
              'Sketchy double react hand without stealth',
              'No snapdragon scalers value',
              'Yellows are decent filler (shouldn\'t be too many)',
              'No codex of inertias felt correct',
            ]
          },
        ],
        summary: 'Went 4–2 at RTN Hagen with Slippy. Wins against Puffin, the Slippy mirror, Kayo, and Cindra. Losses to Florian (dead opening hand — 2 codex with only reactions, no stealth attack until turn 3) and Verdance (8-value swing on turn 0 with no agency to recover). Deck felt smooth when hands aligned; variance in the Florian and Verdance matches was too swingy to overcome.',
        learnings: [
          { tag: 'Deck Cut',       text: 'Snapdragon scalers underperformed in most games — cut them and replace with blade beckoner, blacktec, or armory deck package.' },
          { tag: 'Card Quality',   text: 'Razor reflex was consistently high value across games — keep and consider increasing.' },
          { tag: 'Sequencing',     text: 'Always use the first nimbilism if jack hasn\'t been seen yet — don\'t save it.' },
          { tag: 'vs Florian',     text: 'It\'s a race — avoid fatstacking. Beware the earth banish engine: first banish gives massive value, and meet madness (equip + felling for 8) can end the game. Cut through is a liability. Flick knives too hard to connect with daggers.' },
          { tag: 'vs Kayo',        text: 'Stampede is a blowout — consider blocking equip earlier. Avoid greedy early snappies (probably game-losing). Play around fleshbag.' },
          { tag: 'vs Verdance',    text: 'Very hard to recover from 8+ value disadvantage on turn 0. Hand-dependent matchup with limited agency when behind.' },
          { tag: 'Arsenal',        text: 'Arsenal relevant on-hits before throwing non-relevant attacks, especially when opponent bricks — don\'t waste tempo.' },
          { tag: 'Sideboard',      text: 'Blood splattered vest could be a strong sideboard option against aggro — test in upcoming events.' },
          { tag: 'Mirror (Slippy)', text: 'Boarding out codex of inertia feels correct. Standard list played smoothly even without drawing codex.' },
        ]
      },

      /* ── PASTE YOUR NEXT REPORT HERE ── */
    ];

    /* ──────────────────────────────────────────
       HELPERS
    ────────────────────────────────────────── */
    const TIER_INFO = {
      RTN:          { tier: 1, label: 'Tier 1 · RTN' },
      PQ:           { tier: 1, label: 'Tier 1 · PQ' },
      Battleground: { tier: 2, label: 'Tier 2 · Battleground' },
      Showdown:     { tier: 2, label: 'Tier 2 · Showdown' },
      Calling:      { tier: 3, label: 'Tier 3 · Calling' },
      Worlds:       { tier: 4, label: 'Tier 4 · Worlds' },
      PT:           { tier: 4, label: 'Tier 4 · Pro Tour' },
    };

    function getTierLabel(eventType) {
      return (TIER_INFO[eventType] || { label: 'Tier ?' + ' · ' + eventType }).label;
    }

    function computeRecord(rounds) {
      const wins   = rounds.filter(r => r.result === 'win').length;
      const losses = rounds.filter(r => r.result === 'loss').length;
      return { wins, losses };
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* Sort newest first */
    REPORTS.sort((a, b) => (a.date < b.date ? 1 : -1));

    /* ──────────────────────────────────────────
       RENDER FUNCTIONS
    ────────────────────────────────────────── */
    function renderRound(round) {
      const notesHtml = round.notes.length
        ? `<ul class="round-notes">${round.notes.map(n => `<li>${esc(n)}</li>`).join('')}</ul>`
        : '';
      const scoreHtml = round.score
        ? `<span class="round-score">${esc(round.score)}</span>`
        : '';
      return `
        <div class="round-item ${round.result}">
          <div class="round-header">
            <span class="round-num">R${round.number}</span>
            <span class="round-opponent">${esc(round.opponent)}</span>
            <span class="round-result ${round.result}">${round.result === 'win' ? 'Won' : 'Lost'}</span>
            ${scoreHtml}
          </div>
          ${notesHtml}
        </div>`;
    }

    function renderReport(r) {
      const rec = computeRecord(r.rounds);
      const tierLabel = getTierLabel(r.eventType);
      const tierClass = `t${r.tier}`;

      const generalNotesHtml = r.generalNotes.map(n => `<li>${esc(n)}</li>`).join('');
      const roundsHtml = r.rounds.map(renderRound).join('');
      const learningsHtml = r.learnings.map(l =>
        `<div class="learning-item">
           <span class="learning-tag">${esc(l.tag)}</span>
           <span class="learning-text">${esc(l.text)}</span>
         </div>`
      ).join('');

      return `
        <article
          class="report-card tier-${r.tier}"
          data-hero="${esc(r.hero.toLowerCase())}"
          data-tier="${r.tier}"
          id="report-${esc(r.id)}"
        >
          <!-- Header -->
          <div class="report-header">
            <div class="report-meta">
              <span class="tier-badge ${tierClass}">${esc(tierLabel)}</span>
              <span class="hero-badge">${esc(r.hero)}</span>
            </div>
            <h2 class="report-title">${esc(r.event)}</h2>
            <div class="report-footer-meta">
              <span class="report-date">${esc(r.displayDate)}</span>
              <span class="report-record">
                <span class="rr-win">${rec.wins}W</span>
                <span class="rr-sep">–</span>
                <span class="rr-loss">${rec.losses}L</span>
              </span>
            </div>
          </div>

          <!-- Summary -->
          <div class="rep-section">
            <div class="rep-section-label">Summary</div>
            <p class="summary-text">${esc(r.summary)}</p>
          </div>

          <!-- Key Learnings -->
          <div class="rep-section">
            <div class="rep-section-label">Key Learnings</div>
            <div class="learnings-list">${learningsHtml}</div>
          </div>

          <!-- General Notes (collapsible) -->
          <div class="rep-section">
            <button class="collapsible-btn" aria-expanded="false">
              General Notes
              <span class="count-pill">${r.generalNotes.length}</span>
              <span class="chevron">›</span>
            </button>
            <div class="collapsible-content">
              <ul class="notes-list">${generalNotesHtml}</ul>
            </div>
          </div>

          <!-- Rounds (collapsible) -->
          <div class="rep-section">
            <button class="collapsible-btn" aria-expanded="false">
              Round by Round
              <span class="count-pill">${r.rounds.length} rounds</span>
              <span class="chevron">›</span>
            </button>
            <div class="collapsible-content">
              <div class="rounds-list">${roundsHtml}</div>
            </div>
          </div>
        </article>`;
    }

    /* ──────────────────────────────────────────
       FILTER STATE
    ────────────────────────────────────────── */
    let activeHero = 'all';
    let activeTier = 'all';

    function applyFilters() {
      const cards = document.querySelectorAll('.report-card');
      let visible = 0;
      cards.forEach(card => {
        const heroMatch = activeHero === 'all' || card.dataset.hero === activeHero;
        const tierMatch = activeTier === 'all' || card.dataset.tier === activeTier;
        const show = heroMatch && tierMatch;
        card.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
    }

    /* ──────────────────────────────────────────
       BUILD FILTERS
    ────────────────────────────────────────── */
    function buildFilters() {
      const heroes = [...new Set(REPORTS.map(r => r.hero))].sort();
      const tiers  = [...new Set(REPORTS.map(r => r.tier))].sort();

      const heroEl = document.getElementById('hero-filter');
      heroEl.innerHTML =
        `<button class="filter-pill active" data-ftype="hero" data-fval="all">All</button>` +
        heroes.map(h =>
          `<button class="filter-pill" data-ftype="hero" data-fval="${esc(h.toLowerCase())}">${esc(h)}</button>`
        ).join('');

      const tierLabels = { 1: 'RTN / PQ', 2: 'BG / Show', 3: 'Calling', 4: 'Worlds / PT' };
      const tierEl = document.getElementById('tier-filter');
      tierEl.innerHTML =
        `<button class="filter-pill active" data-ftype="tier" data-fval="all">All</button>` +
        tiers.map(t =>
          `<button class="filter-pill t${t}" data-ftype="tier" data-fval="${t}">${esc(tierLabels[t] || 'Tier ' + t)}</button>`
        ).join('');

      document.querySelectorAll('.filter-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          const ftype = btn.dataset.ftype;
          const fval  = btn.dataset.fval;
          if (ftype === 'hero') activeHero = fval;
          if (ftype === 'tier') activeTier = fval;
          document.querySelectorAll(`[data-ftype="${ftype}"]`)
            .forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          applyFilters();
        });
      });
    }

    /* ──────────────────────────────────────────
       BUILD HERO STATS
    ────────────────────────────────────────── */
    function buildStats() {
      let wins = 0, losses = 0;
      REPORTS.forEach(r => {
        const rec = computeRecord(r.rounds);
        wins   += rec.wins;
        losses += rec.losses;
      });
      const total = wins + losses;
      const wr = total > 0 ? Math.round(wins / total * 100) : 0;
      document.getElementById('hero-stats').innerHTML = `
        <span class="stat-pill">${REPORTS.length} report${REPORTS.length !== 1 ? 's' : ''}</span>
        <span class="stat-pill win">${wins}W</span>
        <span class="stat-pill loss">${losses}L</span>
        <span class="stat-pill wr">${wr}% WR</span>`;
    }

    /* ──────────────────────────────────────────
       COLLAPSIBLES
    ────────────────────────────────────────── */
    function initCollapsibles() {
      document.querySelectorAll('.collapsible-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const expanded = btn.getAttribute('aria-expanded') === 'true';
          btn.setAttribute('aria-expanded', String(!expanded));
          const content = btn.nextElementSibling;
          content.classList.toggle('open', !expanded);
        });
      });
    }

    /* ──────────────────────────────────────────
       INIT
    ────────────────────────────────────────── */
    function init() {
      const container = document.getElementById('reports-container');
      container.innerHTML = REPORTS.map(renderReport).join('');
      buildStats();
      buildFilters();
      initCollapsibles();
    }

    init();

  })();
  </script>

</body>
</html>
