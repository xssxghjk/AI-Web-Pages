<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaB Tournament Reports</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05080f;
      --surface: #0c1120;
      --surface2: #111827;
      --border: #1e2d45;
      --border2: #243348;
      --accent: #0ea5e9;
      --text: #e2e8f0;
      --muted: #64748b;
      --muted2: #8898aa;
      --t1: #0ea5e9;
      --t1-bg: rgba(14,165,233,0.08);
      --t1-border: rgba(14,165,233,0.25);
      --t2: #22c55e;
      --t2-bg: rgba(34,197,94,0.08);
      --t2-border: rgba(34,197,94,0.25);
      --t3: #f59e0b;
      --t3-bg: rgba(245,158,11,0.08);
      --t3-border: rgba(245,158,11,0.25);
      --t4: #a855f7;
      --t4-bg: rgba(168,85,247,0.08);
      --t4-border: rgba(168,85,247,0.25);
      --win: #22c55e;
      --win-bg: rgba(34,197,94,0.08);
      --loss: #ef4444;
      --loss-bg: rgba(239,68,68,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5,8,15,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-back {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .nav-back:hover { color: var(--text); }
    .nav-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .nav-sep { color: var(--border2); }

    /* ── HERO ── */
    .hero {
      padding: 3.5rem 1.5rem 2.5rem;
      text-align: center;
      background: linear-gradient(180deg, rgba(14,165,233,0.05) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    .hero-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(14,165,233,0.35);
      border-radius: 999px;
      padding: 0.25rem 0.8rem;
      margin-bottom: 1rem;
    }
    .hero h1 {
      font-size: clamp(1.9rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.6rem;
    }
    .hero p {
      color: var(--muted);
      font-size: 1rem;
      max-width: 520px;
      margin-inline: auto;
      margin-bottom: 1.5rem;
    }
    .hero-stats {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-pill {
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--muted2);
    }
    .stat-pill.win  { color: var(--win);  background: var(--win-bg);  border-color: rgba(34,197,94,0.25); }
    .stat-pill.loss { color: var(--loss); background: var(--loss-bg); border-color: rgba(239,68,68,0.25); }
    .stat-pill.wr   { color: var(--accent); background: var(--t1-bg); border-color: var(--t1-border); }

    /* ── FILTERS ── */
    .filters-bar {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
      background: var(--surface);
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .filter-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .filter-pills { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .filter-pill {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-pill:hover { border-color: var(--muted2); color: var(--text); }
    .filter-pill.active {
      background: rgba(14,165,233,0.12);
      border-color: rgba(14,165,233,0.45);
      color: var(--accent);
    }
    .filter-pill.t1.active { background: var(--t1-bg); border-color: var(--t1-border); color: var(--t1); }
    .filter-pill.t2.active { background: var(--t2-bg); border-color: var(--t2-border); color: var(--t2); }
    .filter-pill.t3.active { background: var(--t3-bg); border-color: var(--t3-border); color: var(--t3); }
    .filter-pill.t4.active { background: var(--t4-bg); border-color: var(--t4-border); color: var(--t4); }

    /* ── MAIN ── */
    .main {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1.25rem 4rem;
    }

    .no-results {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── TILES GRID ── */
    .tiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    /* ── REPORT TILE ── */
    .report-tile {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      border-left-width: 3px;
      transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
      position: relative;
    }
    .report-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    .report-tile.tier-1 { border-left-color: var(--t1); }
    .report-tile.tier-2 { border-left-color: var(--t2); }
    .report-tile.tier-3 { border-left-color: var(--t3); }
    .report-tile.tier-4 { border-left-color: var(--t4); }
    .report-tile.tier-1:hover { border-color: var(--t1-border); }
    .report-tile.tier-2:hover { border-color: var(--t2-border); }
    .report-tile.tier-3:hover { border-color: var(--t3-border); }
    .report-tile.tier-4:hover { border-color: var(--t4-border); }

    .tile-body {
      padding: 1.1rem 1.25rem 1rem;
    }

    .tile-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }
    .tier-badge {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.18rem 0.6rem;
      border-radius: 999px;
      border: 1px solid;
    }
    .tier-badge.t1 { color: var(--t1); background: var(--t1-bg); border-color: var(--t1-border); }
    .tier-badge.t2 { color: var(--t2); background: var(--t2-bg); border-color: var(--t2-border); }
    .tier-badge.t3 { color: var(--t3); background: var(--t3-bg); border-color: var(--t3-border); }
    .tier-badge.t4 { color: var(--t4); background: var(--t4-bg); border-color: var(--t4-border); }
    .hero-badge {
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.18rem 0.6rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border2);
      color: var(--muted2);
    }

    .tile-title {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.25;
      margin-bottom: 0.6rem;
    }

    .tile-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .tile-date {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .tile-record {
      font-size: 0.82rem;
      font-weight: 700;
    }
    .rr-win  { color: var(--win); }
    .rr-loss { color: var(--loss); }
    .rr-sep  { color: var(--muted); margin: 0 0.1rem; }

    .tile-cta {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.55rem 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      transition: color 0.15s, background 0.15s;
    }
    .report-tile:hover .tile-cta {
      color: var(--accent);
      background: rgba(14,165,233,0.04);
    }
    .tile-cta-arrow {
      margin-left: auto;
      font-size: 1rem;
      transition: transform 0.15s;
    }
    .report-tile:hover .tile-cta-arrow { transform: translateX(3px); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .filters-bar { gap: 0.75rem; }
      .tiles-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-back" href="../">← Hub</a>
    <span class="nav-sep">|</span>
    <span class="nav-title">Tournament Reports</span>
    <span class="nav-sub">Flesh and Blood</span>
  </nav>

  <header class="hero">
    <div class="hero-tag">Flesh and Blood</div>
    <h1>Tournament Reports</h1>
    <p>Post-event analysis, round-by-round breakdowns, and deck learnings.</p>
    <div class="hero-stats" id="hero-stats"></div>
  </header>

  <div class="filters-bar">
    <div class="filter-group">
      <span class="filter-label">Hero</span>
      <div class="filter-pills" id="hero-filter"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Tier</span>
      <div class="filter-pills" id="tier-filter"></div>
    </div>
  </div>

  <main class="main">
    <div class="tiles-grid" id="reports-container"></div>
    <div class="no-results" id="no-results" style="display:none">No reports match the selected filters.</div>
  </main>

  <script src="reports.js"></script>
  <script>
  (function () {

    const TIER_INFO = {
      RTN:          { tier: 1, label: 'Tier 1 · RTN' },
      PQ:           { tier: 1, label: 'Tier 1 · PQ' },
      Battleground: { tier: 2, label: 'Tier 2 · Battleground' },
      Showdown:     { tier: 2, label: 'Tier 2 · Showdown' },
      Calling:      { tier: 3, label: 'Tier 3 · Calling' },
      Worlds:       { tier: 4, label: 'Tier 4 · Worlds' },
      PT:           { tier: 4, label: 'Tier 4 · Pro Tour' },
    };

    function getTierLabel(eventType) {
      return (TIER_INFO[eventType] || { label: 'Tier ? · ' + eventType }).label;
    }

    function computeRecord(rounds) {
      const wins   = rounds.filter(r => r.result === 'win').length;
      const losses = rounds.filter(r => r.result === 'loss').length;
      return { wins, losses };
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    REPORTS.sort((a, b) => (a.date < b.date ? 1 : -1));

    /* ── RENDER TILE ── */
    function renderTile(r) {
      const rec = computeRecord(r.rounds);
      const tierLabel = getTierLabel(r.eventType);
      const tier = r.tier != null ? r.tier : ((TIER_INFO[r.eventType] || { tier: 1 }).tier);
      const tierClass = `t${tier}`;

      return `
        <a
          class="report-tile tier-${tier}"
          href="./detail.html?id=${esc(r.id)}"
          data-hero="${esc(r.hero.toLowerCase())}"
          data-tier="${tier}"
        >
          <div class="tile-body">
            <div class="tile-meta">
              <span class="tier-badge ${tierClass}">${esc(tierLabel)}</span>
              <span class="hero-badge">${esc(r.hero)}</span>
            </div>
            <div class="tile-title">${esc(r.event)}</div>
            <div class="tile-footer">
              <span class="tile-date">${esc(r.displayDate)}</span>
              <span class="tile-record">
                <span class="rr-win">${rec.wins}W</span>
                <span class="rr-sep">–</span>
                <span class="rr-loss">${rec.losses}L</span>
              </span>
            </div>
          </div>
          <div class="tile-cta">
            View report
            <span class="tile-cta-arrow">→</span>
          </div>
        </a>`;
    }

    /* ── FILTER STATE ── */
    let activeHero = 'all';
    let activeTier = 'all';

    function applyFilters() {
      const tiles = document.querySelectorAll('.report-tile');
      let visible = 0;
      tiles.forEach(tile => {
        const heroMatch = activeHero === 'all' || tile.dataset.hero === activeHero;
        const tierMatch = activeTier === 'all' || tile.dataset.tier === activeTier;
        const show = heroMatch && tierMatch;
        tile.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
    }

    /* ── BUILD FILTERS ── */
    function buildFilters() {
      const heroes = [...new Set(REPORTS.map(r => r.hero))].sort();
      const tiers  = [...new Set(REPORTS.map(r => r.tier))].sort();

      const heroEl = document.getElementById('hero-filter');
      heroEl.innerHTML =
        `<button class="filter-pill active" data-ftype="hero" data-fval="all">All</button>` +
        heroes.map(h =>
          `<button class="filter-pill" data-ftype="hero" data-fval="${esc(h.toLowerCase())}">${esc(h)}</button>`
        ).join('');

      const tierLabels = { 1: 'RTN / PQ', 2: 'BG / Show', 3: 'Calling', 4: 'Worlds / PT' };
      const tierEl = document.getElementById('tier-filter');
      tierEl.innerHTML =
        `<button class="filter-pill active" data-ftype="tier" data-fval="all">All</button>` +
        tiers.map(t =>
          `<button class="filter-pill t${t}" data-ftype="tier" data-fval="${t}">${esc(tierLabels[t] || 'Tier ' + t)}</button>`
        ).join('');

      document.querySelectorAll('.filter-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          const ftype = btn.dataset.ftype;
          const fval  = btn.dataset.fval;
          if (ftype === 'hero') activeHero = fval;
          if (ftype === 'tier') activeTier = fval;
          document.querySelectorAll(`[data-ftype="${ftype}"]`)
            .forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          applyFilters();
        });
      });
    }

    /* ── BUILD STATS ── */
    function buildStats() {
      let wins = 0, losses = 0;
      REPORTS.forEach(r => {
        const rec = computeRecord(r.rounds);
        wins   += rec.wins;
        losses += rec.losses;
      });
      const total = wins + losses;
      const wr = total > 0 ? Math.round(wins / total * 100) : 0;
      document.getElementById('hero-stats').innerHTML = `
        <span class="stat-pill">${REPORTS.length} report${REPORTS.length !== 1 ? 's' : ''}</span>
        <span class="stat-pill win">${wins}W</span>
        <span class="stat-pill loss">${losses}L</span>
        <span class="stat-pill wr">${wr}% WR</span>`;
    }

    /* ── INIT ── */
    function init() {
      const container = document.getElementById('reports-container');
      container.innerHTML = REPORTS.map(renderTile).join('');
      buildStats();
      buildFilters();
    }

    init();

  })();
  </script>

</body>
</html>
