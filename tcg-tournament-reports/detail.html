<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report – FaB Tournament Reports</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05080f;
      --surface: #0c1120;
      --surface2: #111827;
      --border: #1e2d45;
      --border2: #243348;
      --accent: #0ea5e9;
      --text: #e2e8f0;
      --muted: #64748b;
      --muted2: #8898aa;
      --t1: #0ea5e9;
      --t1-bg: rgba(14,165,233,0.08);
      --t1-border: rgba(14,165,233,0.25);
      --t2: #22c55e;
      --t2-bg: rgba(34,197,94,0.08);
      --t2-border: rgba(34,197,94,0.25);
      --t3: #f59e0b;
      --t3-bg: rgba(245,158,11,0.08);
      --t3-border: rgba(245,158,11,0.25);
      --t4: #a855f7;
      --t4-bg: rgba(168,85,247,0.08);
      --t4-border: rgba(168,85,247,0.25);
      --win: #22c55e;
      --win-bg: rgba(34,197,94,0.08);
      --loss: #ef4444;
      --loss-bg: rgba(239,68,68,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5,8,15,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-back {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .nav-back:hover { color: var(--text); }
    .nav-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-sep { color: var(--border2); }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 3rem 2rem 2.5rem;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(14,165,233,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .page-header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .header-left { flex: 1; min-width: 0; }
    .report-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.8rem;
    }
    .tier-badge {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      border: 1px solid;
    }
    .tier-badge.t1 { color: var(--t1); background: var(--t1-bg); border-color: var(--t1-border); }
    .tier-badge.t2 { color: var(--t2); background: var(--t2-bg); border-color: var(--t2-border); }
    .tier-badge.t3 { color: var(--t3); background: var(--t3-bg); border-color: var(--t3-border); }
    .tier-badge.t4 { color: var(--t4); background: var(--t4-bg); border-color: var(--t4-border); }
    .hero-badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border2);
      color: var(--muted2);
    }
    .report-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }
    .header-stats {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    .stat-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .stat-value {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }
    .stat-value.record {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .rr-win  { color: var(--win); }
    .rr-loss { color: var(--loss); }
    .rr-sep  { color: var(--muted); }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    /* share button */
    .btn-share {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.5rem 1.1rem;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--muted2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-share:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--t1-bg);
    }
    .btn-share.copied {
      border-color: var(--win);
      color: var(--win);
      background: var(--win-bg);
    }
    .copy-feedback {
      font-size: 0.75rem;
      color: var(--win);
      opacity: 0;
      transition: opacity 0.2s;
      text-align: right;
    }
    .copy-feedback.visible { opacity: 1; }

    /* ── MAIN LAYOUT ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 2.5rem;
      align-items: start;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 1px;
      position: sticky;
      top: 68px;
    }
    .sidebar-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 0.75rem;
    }
    .sidebar-block:last-child { margin-bottom: 0; }
    .sidebar-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .summary-text {
      font-size: 0.875rem;
      color: var(--muted2);
      line-height: 1.7;
    }

    /* collapsible notes in sidebar */
    .notes-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: none;
      border: none;
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      padding: 0;
      transition: color 0.15s;
    }
    .notes-toggle:hover { color: var(--accent); }
    .notes-toggle .count-pill {
      font-size: 0.62rem;
      font-weight: 700;
      padding: 0.12rem 0.45rem;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--muted);
    }
    .notes-toggle .chevron {
      margin-left: auto;
      font-size: 1rem;
      color: var(--muted);
      transition: transform 0.25s;
      display: inline-block;
    }
    .notes-toggle[aria-expanded="true"] .chevron { transform: rotate(90deg); }
    .collapsible-content {
      margin-top: 0.85rem;
      display: none;
    }
    .collapsible-content.open { display: block; }

    .notes-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .notes-list li {
      font-size: 0.825rem;
      color: var(--muted2);
      line-height: 1.55;
      padding-left: 1rem;
      position: relative;
    }
    .notes-list li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--muted);
    }

    /* ── ROUNDS ── */
    .rounds-section {}
    .rounds-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .rounds-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .rounds-header-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .rounds-summary {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 600;
    }

    .rounds-list {
      display: flex;
      flex-direction: column;
    }

    .round-row {
      display: grid;
      grid-template-columns: 48px 1fr auto;
      gap: 0;
      position: relative;
    }

    /* connector line between rows */
    .round-row:not(:last-child) .round-connector::after {
      content: '';
      position: absolute;
      left: 23px;
      top: 52px;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }

    .round-connector {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 14px;
      position: relative;
    }

    .round-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      background: var(--surface2);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .round-row.win  .round-dot { border-color: var(--win);  background: rgba(34,197,94,0.2); }
    .round-row.loss .round-dot { border-color: var(--loss); background: rgba(239,68,68,0.2); }

    .round-body {
      padding: 0.65rem 0 1.1rem 0.25rem;
      border-bottom: 1px solid var(--border);
      min-width: 0;
    }
    .round-row:last-child .round-body {
      border-bottom: none;
    }

    .round-top {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 0.3rem;
    }
    .round-num {
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
      min-width: 28px;
    }
    .round-opponent {
      font-size: 0.95rem;
      font-weight: 700;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .round-badges {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
      padding: 0.65rem 0 1.1rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .round-row:last-child .round-badges {
      border-bottom: none;
    }

    .round-result {
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .round-result.win  { color: var(--win);  background: var(--win-bg);  border: 1px solid rgba(34,197,94,0.3); }
    .round-result.loss { color: var(--loss); background: var(--loss-bg); border: 1px solid rgba(239,68,68,0.3); }

    .round-score {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .round-order {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      border: 1px solid;
    }
    .round-order.first  { color: #f59e0b; background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.3); }
    .round-order.second { color: #a78bfa; background: rgba(167,139,250,0.08); border-color: rgba(167,139,250,0.3); }

    .round-notes {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      margin-top: 0.15rem;
    }
    .round-notes li {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
      padding-left: 0.85rem;
      position: relative;
    }
    .round-notes li::before {
      content: '·';
      position: absolute;
      left: 0.15rem;
      color: var(--border2);
      font-size: 1.1rem;
      line-height: 1.2;
    }

    /* not found */
    .not-found {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--muted);
    }
    .not-found h2 { font-size: 1.4rem; margin-bottom: 0.75rem; color: var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width: 800px) {
      .main {
        grid-template-columns: 1fr;
        padding: 1.5rem 1.25rem 4rem;
        gap: 1.5rem;
      }
      .sidebar {
        position: static;
      }
      .page-header { padding: 2rem 1.25rem 1.75rem; }
      .header-right { align-items: flex-start; }
      .page-header-inner { flex-direction: column; align-items: flex-start; }
      .report-title { font-size: 1.7rem; }
    }
    @media (max-width: 480px) {
      .round-row {
        grid-template-columns: 36px 1fr;
      }
      .round-badges {
        grid-column: 2;
        padding-top: 0;
        border-bottom: none;
        padding-bottom: 0.5rem;
      }
      .round-body { padding-bottom: 0.4rem; border-bottom: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-back" href="./">← All Reports</a>
    <span class="nav-sep">|</span>
    <span class="nav-title" id="nav-title">Tournament Report</span>
  </nav>

  <div id="page-content"></div>

  <script src="reports.js"></script>
  <script>
  (function () {

    const TIER_INFO = {
      RTN:          { tier: 1, label: 'Tier 1 · RTN' },
      PQ:           { tier: 1, label: 'Tier 1 · PQ' },
      Battleground: { tier: 2, label: 'Tier 2 · Battleground' },
      Showdown:     { tier: 2, label: 'Tier 2 · Showdown' },
      Calling:      { tier: 3, label: 'Tier 3 · Calling' },
      Worlds:       { tier: 4, label: 'Tier 4 · Worlds' },
      PT:           { tier: 4, label: 'Tier 4 · Pro Tour' },
    };

    function getTierLabel(eventType) {
      return (TIER_INFO[eventType] || { label: 'Tier ? · ' + eventType }).label;
    }

    function computeRecord(rounds) {
      const wins   = rounds.filter(r => r.result === 'win').length;
      const losses = rounds.filter(r => r.result === 'loss').length;
      return { wins, losses };
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* ── RENDER ROUNDS ── */
    function renderRound(round) {
      const notesHtml = round.notes && round.notes.length
        ? `<ul class="round-notes">${round.notes.map(n => `<li>${esc(n)}</li>`).join('')}</ul>`
        : '';
      const scoreHtml = round.score
        ? `<span class="round-score">${esc(round.score)}</span>`
        : '';
      const order = round.order || null;
      const orderHtml = order
        ? `<span class="round-order ${order}">${order === 'first' ? '1st' : '2nd'}</span>`
        : '';
      const roundLabel = round.stage || `R${round.number}`;

      return `
        <div class="round-row ${round.result}">
          <div class="round-connector">
            <div class="round-dot"></div>
          </div>
          <div class="round-body">
            <div class="round-top">
              <span class="round-num">${esc(roundLabel)}</span>
              <span class="round-opponent">${esc(round.opponent)}</span>
            </div>
            ${notesHtml}
          </div>
          <div class="round-badges">
            <span class="round-result ${round.result}">${round.result === 'win' ? 'W' : 'L'}</span>
            ${scoreHtml}
            ${orderHtml}
          </div>
        </div>`;
    }

    function renderDetail(r) {
      const rec = computeRecord(r.rounds);
      const tierLabel = getTierLabel(r.eventType);
      const tier = r.tier != null ? r.tier : ((TIER_INFO[r.eventType] || { tier: 1 }).tier);
      const tierClass = `t${tier}`;
      const sortedRounds = [...r.rounds].sort((a, b) => a.number - b.number);
      const roundsHtml = sortedRounds.map(renderRound).join('');
      const winRate = rec.wins + rec.losses > 0
        ? Math.round(rec.wins / (rec.wins + rec.losses) * 100)
        : 0;

      const generalNotesHtml = r.generalNotes && r.generalNotes.length
        ? `<div class="sidebar-block">
              <button class="notes-toggle" aria-expanded="false">
                General Notes
                <span class="count-pill">${r.generalNotes.length}</span>
                <span class="chevron">›</span>
              </button>
              <div class="collapsible-content">
                <ul class="notes-list">${r.generalNotes.map(n => `<li>${esc(n)}</li>`).join('')}</ul>
              </div>
            </div>`
        : '';

      return `
        <header class="page-header">
          <div class="page-header-inner">
            <div class="header-left">
              <div class="report-meta">
                <span class="tier-badge ${tierClass}">${esc(tierLabel)}</span>
                <span class="hero-badge">${esc(r.hero)}</span>
              </div>
              <h1 class="report-title">${esc(r.event)}</h1>
              <div class="header-stats">
                <div class="stat-item">
                  <span class="stat-label">Date</span>
                  <span class="stat-value">${esc(r.displayDate)}</span>
                </div>
                <div class="stat-item">
                  <span class="stat-label">Record</span>
                  <span class="stat-value record">
                    <span class="rr-win">${rec.wins}W</span>
                    <span class="rr-sep">–</span>
                    <span class="rr-loss">${rec.losses}L</span>
                  </span>
                </div>
                <div class="stat-item">
                  <span class="stat-label">Win Rate</span>
                  <span class="stat-value">${winRate}%</span>
                </div>
                <div class="stat-item">
                  <span class="stat-label">Rounds</span>
                  <span class="stat-value">${r.rounds.length}</span>
                </div>
              </div>
            </div>
            <div class="header-right">
              <button class="btn-share" id="copy-btn" onclick="copyLink()">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="5" y="5" width="9" height="9" rx="2"/>
                  <path d="M11 5V3a2 2 0 0 0-2-2H3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/>
                </svg>
                Copy link
              </button>
              <span class="copy-feedback" id="copy-feedback">Link copied!</span>
            </div>
          </div>
        </header>

        <div class="main">

          <aside class="sidebar">
            <div class="sidebar-block">
              <div class="sidebar-label">Summary</div>
              <p class="summary-text">${esc(r.summary)}</p>
            </div>
            ${generalNotesHtml}
          </aside>

          <section class="rounds-section">
            <div class="rounds-header">
              <span class="rounds-title">Round by Round</span>
              <div class="rounds-header-line"></div>
              <span class="rounds-summary">${rec.wins}W – ${rec.losses}L</span>
            </div>
            <div class="rounds-list">${roundsHtml}</div>
          </section>

        </div>`;
    }

    /* ── COPY LINK ── */
    window.copyLink = function () {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.getElementById('copy-btn');
        const fb  = document.getElementById('copy-feedback');
        btn.classList.add('copied');
        fb.classList.add('visible');
        setTimeout(() => {
          btn.classList.remove('copied');
          fb.classList.remove('visible');
        }, 2200);
      });
    };

    /* ── COLLAPSIBLES ── */
    function initCollapsibles() {
      document.querySelectorAll('.notes-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
          const expanded = btn.getAttribute('aria-expanded') === 'true';
          btn.setAttribute('aria-expanded', String(!expanded));
          btn.nextElementSibling.classList.toggle('open', !expanded);
        });
      });
    }

    /* ── INIT ── */
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const report = REPORTS.find(r => r.id === id);
    const container = document.getElementById('page-content');

    if (!report) {
      container.innerHTML = `
        <div class="not-found">
          <h2>Report not found</h2>
          <p>The report <strong>${esc(id || '')}</strong> doesn't exist.</p>
          <p style="margin-top:1rem"><a href="./" style="color:var(--accent)">← Back to all reports</a></p>
        </div>`;
    } else {
      document.title = `${report.event} – FaB Tournament Reports`;
      document.getElementById('nav-title').textContent = report.event;
      container.innerHTML = renderDetail(report);
      initCollapsibles();
    }

  })();
  </script>

</body>
</html>
