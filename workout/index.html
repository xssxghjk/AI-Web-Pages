<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Plan</title>
<script src="../nav.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Serif+Text:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #1c1814;
  --surface: #252018;
  --surf2:   #2e2820;
  --border:  #3a3025;
  --bord2:   #4a4030;
  --accent:  #c4864a;
  --text:    #e8dfd0;
  --text2:   #9a8a76;
  --muted:   #7a6e60;
  --muted2:  #5a5040;
}
html { overflow-x: hidden; }
body {
  font-family: 'DM Serif Text', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.55;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(232,223,208,0.04) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
.app-header {
  background: var(--surface);
  border-bottom: 2px solid var(--text);
  padding: 14px 20px 0;
  position: sticky; top: 0; z-index: 100;
  overflow: hidden;
}
.header-inner {
  max-width: 820px; margin: 0 auto;
  padding-bottom: 12px;
}
.app-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 22px; font-weight: 700; font-style: italic;
}
.app-title span { color: var(--accent); }
.header-sub {
  font-size: 10px; color: var(--muted);
  letter-spacing: 0.12em; text-transform: uppercase;
  font-style: italic; margin-top: 1px;
}
.type-spectrum { display: flex; height: 3px; width: 100%; margin-top: 12px; }
.type-spectrum span { flex: 1; }

/* ── MAIN ── */
.main {
  max-width: 820px; margin: 0 auto;
  padding: 24px 16px 60px;
  position: relative; z-index: 1;
}

/* ── WEEK NAV ── */
.week-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 10px;
}
.week-label {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 17px; font-weight: 700; font-style: italic;
  text-align: center; flex: 1;
}
.nav-btn {
  background: none; border: 1px solid var(--bord2);
  color: var(--text2); padding: 5px 14px;
  font-family: 'DM Serif Text', Georgia, serif;
  font-size: 12px; cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
.nav-btn:hover:not(:disabled) { border-color: var(--text2); color: var(--text); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

/* ── STATS ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 20px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 12px 14px;
}
.stat-label {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted);
  font-style: italic; margin-bottom: 5px;
}
.stat-value {
  font-family: 'Space Mono', monospace;
  font-size: 26px; font-weight: 700;
  color: var(--text); line-height: 1;
}
.stat-sub { font-size: 10px; color: var(--text2); margin-top: 4px; }

/* ── WEEK GRID ── */
.week-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 6px;
  margin-bottom: 28px;
}

.day-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--border);
  padding: 10px 8px;
  display: flex; flex-direction: column;
  min-height: 170px;
  position: relative;
  transition: background 0.2s;
}
.day-card.workout-day { border-top-color: var(--dc, var(--accent)); }
.day-card.done { background: rgba(var(--dc-r, 196,134,74), 0.06); }
.day-card.today { box-shadow: inset 0 0 0 1px var(--text2); }
.day-card.future { opacity: 0.5; }

.day-top {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 8px;
}
.day-name {
  font-family: 'Space Mono', monospace;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.08em; color: var(--muted2);
}
.day-card.today .day-name { color: var(--text2); }
.done-check {
  font-family: 'Space Mono', monospace;
  font-size: 11px; font-weight: 700;
  color: var(--dc, var(--accent));
  display: none;
}
.day-card.done .done-check { display: block; }

.day-body { flex: 1; }
.muscle-name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 15px; font-weight: 700; font-style: italic;
  color: var(--dc, var(--accent));
  line-height: 1.2; margin-bottom: 5px;
}
.muscle-focus {
  font-size: 9px; color: var(--muted);
  font-style: italic; line-height: 1.45;
}

.rest-label {
  font-size: 11px; color: var(--muted2);
  font-style: italic; margin-top: 4px;
}

.check-btn {
  margin-top: auto;
  padding: 7px 0 0;
  background: none; border: none;
  border-top: 1px solid rgba(var(--dc-r, 196,134,74), 0.2);
  color: var(--dc, var(--text2));
  width: 100%;
  font-family: 'DM Serif Text', Georgia, serif;
  font-size: 11px; cursor: pointer;
  text-align: left;
  transition: color 0.15s;
}
.check-btn:hover { color: var(--text); }
.check-btn.done-btn {
  color: var(--muted2);
  border-top-color: var(--border);
}
.check-btn.done-btn:hover { color: #c44840; }

.future-label {
  margin-top: auto;
  padding-top: 7px;
  font-size: 10px; color: var(--muted2);
  font-style: italic;
  border-top: 1px solid var(--border);
}

/* ── MOBILE ── */
@media (max-width: 620px) {
  .week-grid {
    grid-template-columns: 1fr;
    gap: 4px;
  }
  .day-card {
    flex-direction: row;
    align-items: center;
    min-height: auto;
    padding: 10px 12px;
    gap: 12px;
    border-top: 1px solid var(--border);
    border-left: 3px solid var(--border);
  }
  .day-card.workout-day {
    border-top-color: var(--border);
    border-left-color: var(--dc, var(--accent));
  }
  .day-card.today {
    box-shadow: none;
    outline: 1px solid var(--text2);
  }
  .day-top {
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    margin-bottom: 0;
    min-width: 38px;
    gap: 2px;
  }
  .done-check { display: none !important; }
  .day-body { margin-top: 0; flex: 1; }
  .muscle-name { font-size: 13px; }
  .muscle-focus { font-size: 9px; }
  .check-btn {
    margin-top: 0;
    padding: 0 0 0 10px;
    border-top: none;
    border-left: 1px solid rgba(var(--dc-r, 196,134,74), 0.25);
    width: auto;
    white-space: nowrap;
  }
  .check-btn.done-btn { border-left-color: var(--border); }
  .future-label {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
    white-space: nowrap;
  }
}

/* ── DIVIDER ── */
.divider { border: none; border-top: 1px solid var(--border); margin: 0 0 20px; }

/* ── HISTORY ── */
.section-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 14px; font-weight: 700; font-style: italic;
  display: block; margin-bottom: 10px;
}
.hist-row {
  display: flex; align-items: center; gap: 12px;
  padding: 7px 10px;
  background: var(--surface); border: 1px solid var(--border);
  margin-bottom: 3px;
}
.hist-week {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--text2);
  min-width: 56px;
}
.hist-dots { display: flex; gap: 5px; }
.hist-dot {
  width: 9px; height: 9px;
  border-radius: 50%; flex-shrink: 0;
}
.dot-miss { background: var(--muted2); }
.hist-frac {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--muted2);
  margin-left: auto;
}
.hist-frac.perfect { color: var(--accent); }

/* ── FOOTER ── */
.app-footer {
  border-top: 1px solid var(--border);
  padding: 12px 20px;
  text-align: center; font-size: 11px; color: var(--muted2);
  position: relative; z-index: 1;
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  background: var(--surface); border: 1px solid var(--bord2);
  border-left: 3px solid var(--accent);
  padding: 10px 16px; font-size: 13px; color: var(--text);
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; max-width: 240px;
}
#toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <h1 class="app-title">Workout <span>Plan</span></h1>
    <div class="header-sub">Push · Pull · Legs — Mon · Wed · Fri</div>
  </div>
  <div class="type-spectrum" aria-hidden="true">
    <span style="background:#e87838"></span>
    <span style="background:#4ec994"></span>
    <span style="background:#7a9de8"></span>
  </div>
</header>

<main class="main">

  <div class="week-nav">
    <button class="nav-btn" id="btn-prev">← Prev</button>
    <span class="week-label" id="week-label"></span>
    <button class="nav-btn" id="btn-next">Next →</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">This Week</div>
      <div class="stat-value" id="stat-week">0/3</div>
      <div class="stat-sub">sessions done</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="stat-streak">0</div>
      <div class="stat-sub">consecutive sessions</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">All Time</div>
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-sub">sessions completed</div>
    </div>
  </div>

  <div class="week-grid" id="week-grid"></div>

  <hr class="divider">
  <div id="history"></div>

</main>

<footer class="app-footer">
  <span id="footer-ver"></span>
</footer>

<div id="toast"></div>

<script>
const SK = 'workout_plan_v2';

const SESSIONS = {
  1: { name: 'Push',  muscles: 'Chest · Shoulders · Triceps · Core',         color: '#e87838', rgb: '232,120,56'  },
  3: { name: 'Pull',  muscles: 'Back · Rear Delts · Biceps · Grip',           color: '#4ec994', rgb: '78,201,148'  },
  5: { name: 'Legs',  muscles: 'Glutes · Hamstrings · Lower Back · Hips',     color: '#7a9de8', rgb: '122,157,232' },
};
const WORKOUT_DAYS = new Set([1, 3, 5]); // Mon, Wed, Fri
const DAY_NAMES    = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];

let viewOffset = 0; // weeks from current week

function load() {
  try { return new Set(JSON.parse(localStorage.getItem(SK) || '[]')); }
  catch { return new Set(); }
}
function save(set) {
  localStorage.setItem(SK, JSON.stringify([...set]));
}

function toIso(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
function todayIso() { return toIso(new Date()); }

function getMonday(offset) {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7) + offset * 7);
  return d;
}
function getWeekDays(offset) {
  const mon = getMonday(offset);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function calcStats(completions) {
  const today = todayIso();

  const twDays = getWeekDays(0).filter(d => WORKOUT_DAYS.has(d.getDay()));
  const twDone = twDays.filter(d => completions.has(toIso(d))).length;

  // Streak: consecutive completed workout days going backward from today
  let streak = 0;
  const now = new Date(); now.setHours(0, 0, 0, 0);
  for (let i = 0; i < 730; i++) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    if (!WORKOUT_DAYS.has(d.getDay())) continue;
    const iso = toIso(d);
    if (iso > today) continue;
    if (iso === today && !completions.has(iso)) continue; // today not done yet — don't break
    if (completions.has(iso)) streak++;
    else break;
  }

  return { twDone, twTotal: twDays.length, streak, total: completions.size };
}

function render() {
  const completions = load();
  const today = todayIso();
  const days = getWeekDays(viewOffset);

  document.getElementById('week-label').textContent =
    days[0].toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' – ' +
    days[6].toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  document.getElementById('btn-prev').disabled = viewOffset <= -52;
  document.getElementById('btn-next').disabled = viewOffset >= 0;

  const { twDone, twTotal, streak, total } = calcStats(completions);
  document.getElementById('stat-week').textContent    = twDone + '/' + twTotal;
  document.getElementById('stat-streak').textContent  = streak;
  document.getElementById('stat-total').textContent   = total;

  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';

  for (const d of days) {
    const iso       = toIso(d);
    const dow       = d.getDay();
    const isWorkout = WORKOUT_DAYS.has(dow);
    const isDone    = completions.has(iso);
    const isFuture  = iso > today;
    const isToday   = iso === today;
    const session   = SESSIONS[dow];

    const card = document.createElement('div');
    card.className = [
      'day-card',
      isWorkout ? 'workout-day' : 'rest-day',
      isDone    ? 'done'        : '',
      isToday   ? 'today'       : '',
      isFuture  ? 'future'      : '',
    ].filter(Boolean).join(' ');

    if (isWorkout && session) {
      card.style.setProperty('--dc',   session.color);
      card.style.setProperty('--dc-r', session.rgb);
    }

    if (isWorkout && session) {
      let action = '';
      if (!isFuture) {
        action = `<button class="check-btn${isDone ? ' done-btn' : ''}" data-date="${iso}">${isDone ? '✓ Done' : 'Check off'}</button>`;
      } else {
        action = '<div class="future-label">upcoming</div>';
      }
      card.innerHTML = `
        <div class="day-top">
          <span class="day-name">${DAY_NAMES[dow]}</span>
          <span class="done-check">✓</span>
        </div>
        <div class="day-body">
          <div class="muscle-name">${session.name}</div>
          <div class="muscle-focus">${session.muscles}</div>
        </div>
        ${action}
      `;
      if (!isFuture) {
        card.querySelector('.check-btn').addEventListener('click', () => {
          const s = load();
          if (s.has(iso)) s.delete(iso);
          else s.add(iso);
          save(s);
          toast(s.has(iso) ? 'Session logged!' : 'Removed');
          render();
        });
      }
    } else {
      card.innerHTML = `
        <div class="day-top">
          <span class="day-name">${DAY_NAMES[dow]}</span>
        </div>
        <div class="day-body">
          <div class="rest-label">Rest</div>
        </div>
      `;
    }

    grid.appendChild(card);
  }

  renderHistory(completions, today);
}

function renderHistory(completions, today) {
  const el = document.getElementById('history');
  el.innerHTML = '';
  const rows = [];

  for (let w = -1; w >= -52; w--) {
    const wdays = getWeekDays(w);
    const pastWo = wdays.filter(d => WORKOUT_DAYS.has(d.getDay()) && toIso(d) <= today);
    if (!pastWo.length) continue;
    const done = pastWo.filter(d => completions.has(toIso(d))).length;
    rows.push({ mon: wdays[0], days: pastWo, done, total: pastWo.length });
    if (rows.length >= 10) break;
  }

  if (!rows.length) return;

  const title = document.createElement('div');
  title.innerHTML = '<span class="section-title">Previous Weeks</span>';
  el.appendChild(title);

  for (const { mon, days: wdays, done, total } of rows) {
    const div = document.createElement('div');
    div.className = 'hist-row';
    const dotsHtml = wdays.map(d => {
      const session = SESSIONS[d.getDay()];
      const isDone  = completions.has(toIso(d));
      return `<span class="hist-dot${isDone ? '' : ' dot-miss'}" ${isDone ? `style="background:${session.color}"` : ''}></span>`;
    }).join('');
    div.innerHTML = `
      <span class="hist-week">${mon.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>
      <div class="hist-dots">${dotsHtml}</div>
      <span class="hist-frac${done === total ? ' perfect' : ''}">${done}/${total}</span>
    `;
    el.appendChild(div);
  }
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

document.getElementById('btn-prev').addEventListener('click', () => { viewOffset--; render(); });
document.getElementById('btn-next').addEventListener('click', () => { viewOffset++; render(); });

fetch('../version.json').then(r => r.json()).then(v => {
  document.getElementById('footer-ver').textContent = 'v' + v.version;
}).catch(() => {});

render();
</script>
</body>
</html>
