<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Plan</title>
<script src="../nav.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Serif+Text:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #1c1814;
  --surface: #252018;
  --surf2:   #2e2820;
  --border:  #3a3025;
  --bord2:   #4a4030;
  --accent:  #c4864a;
  --text:    #e8dfd0;
  --text2:   #9a8a76;
  --muted:   #7a6e60;
  --muted2:  #5a5040;
  --skip-c:  #8a7a9a;
}
html { overflow-x: hidden; }
body {
  font-family: 'DM Serif Text', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.55;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(232,223,208,0.04) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
.app-header {
  background: var(--surface);
  border-bottom: 2px solid var(--text);
  padding: 14px 20px 0;
  position: sticky; top: 0; z-index: 100;
  overflow: hidden;
}
.header-inner {
  max-width: 820px; margin: 0 auto;
  padding-bottom: 12px;
}
.app-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 22px; font-weight: 700; font-style: italic;
}
.app-title span { color: var(--accent); }
.header-sub {
  font-size: 10px; color: var(--muted);
  letter-spacing: 0.12em; text-transform: uppercase;
  font-style: italic; margin-top: 1px;
}
.type-spectrum { display: flex; height: 3px; width: 100%; margin-top: 12px; }
.type-spectrum span { flex: 1; }

/* ── MAIN ── */
.main {
  max-width: 820px; margin: 0 auto;
  padding: 24px 16px 60px;
  position: relative; z-index: 1;
}

/* ── WEEK NAV ── */
.week-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px; gap: 10px;
}
.week-label {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 17px; font-weight: 700; font-style: italic;
  text-align: center; flex: 1;
}
.nav-btn {
  background: none; border: 1px solid var(--bord2);
  color: var(--text2); padding: 5px 14px;
  font-family: 'DM Serif Text', Georgia, serif;
  font-size: 12px; cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
.nav-btn:hover:not(:disabled) { border-color: var(--text2); color: var(--text); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

/* ── SCHEDULE TOGGLE ── */
.schedule-toggle-row {
  text-align: center;
  margin-bottom: 16px;
}
.schedule-toggle-btn {
  background: none; border: none;
  color: var(--muted); font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase;
  font-style: italic; cursor: pointer;
  transition: color 0.15s;
  font-family: 'DM Serif Text', Georgia, serif;
}
.schedule-toggle-btn:hover { color: var(--text2); }

/* ── SCHEDULE PANEL ── */
.schedule-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 0 16px;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease;
  margin-bottom: 0;
}
.schedule-panel.open {
  max-height: 150px;
  padding: 14px 16px;
  margin-bottom: 16px;
}
.schedule-panel-title {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted);
  font-style: italic; margin-bottom: 12px;
}
/* ── SCHEDULE DRAG GRID ── */
.sched-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  user-select: none;
  -webkit-user-select: none;
}
.sched-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  padding: 5px 2px 6px;
  border: 1px solid transparent;
  transition: border-color 0.12s, background 0.12s;
  min-height: 56px;
}
.sched-slot.drag-over {
  border-color: var(--accent);
  background: rgba(196,134,74,0.1);
}
.sched-day-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.07em;
  color: var(--muted2);
}
.sched-chip {
  background: rgba(var(--chip-rgb, 196,134,74), 0.12);
  border: 1px solid var(--chip-c, var(--accent));
  color: var(--chip-c, var(--accent));
  font-family: 'Space Mono', monospace;
  font-size: 9px; font-weight: 700;
  padding: 5px 3px;
  cursor: grab;
  text-align: center;
  width: 100%;
  touch-action: none;
  line-height: 1.2;
  letter-spacing: 0.04em;
  transition: opacity 0.12s;
}
.sched-chip:active { cursor: grabbing; }
.sched-chip.is-dragging { opacity: 0.22; cursor: grabbing; }
.sched-rest {
  color: var(--muted2); font-size: 14px;
  font-style: italic; margin-top: 6px;
  font-family: 'DM Serif Text', Georgia, serif;
}
#sched-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  box-shadow: 0 6px 22px rgba(0,0,0,0.55);
  transform: scale(1.1);
  opacity: 0.92;
  transition: none !important;
}

/* ── STATS ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 20px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 12px 14px;
}
.stat-label {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted);
  font-style: italic; margin-bottom: 5px;
}
.stat-value {
  font-family: 'Space Mono', monospace;
  font-size: 26px; font-weight: 700;
  color: var(--text); line-height: 1;
}
.stat-sub { font-size: 10px; color: var(--text2); margin-top: 4px; }

/* ── WEEK GRID ── */
.week-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 6px;
  margin-bottom: 28px;
}

.day-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--border);
  padding: 10px 8px;
  display: flex; flex-direction: column;
  min-height: 170px;
  position: relative;
  transition: background 0.2s;
}
.day-card.workout-day { border-top-color: var(--dc, var(--accent)); }
.day-card.done { background: rgba(var(--dc-r, 196,134,74), 0.06); }
.day-card.skipped { background: rgba(138,122,154,0.05); }
.day-card.today { box-shadow: inset 0 0 0 1px var(--text2); }
.day-card.future { opacity: 0.5; }

.day-top {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 8px;
}
.day-name {
  font-family: 'Space Mono', monospace;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.08em; color: var(--muted2);
}
.day-card.today .day-name { color: var(--text2); }
.done-check {
  font-family: 'Space Mono', monospace;
  font-size: 11px; font-weight: 700;
  color: var(--dc, var(--accent));
  display: none;
}
.day-card.done .done-check { display: block; }
.skip-mark {
  font-family: 'Space Mono', monospace;
  font-size: 11px; font-weight: 700;
  color: var(--skip-c);
  display: none;
}
.day-card.skipped .skip-mark { display: block; }

.day-body { flex: 1; }
.muscle-name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 15px; font-weight: 700; font-style: italic;
  color: var(--dc, var(--accent));
  line-height: 1.2; margin-bottom: 5px;
}
.day-card.skipped .muscle-name { color: var(--skip-c); }
.muscle-focus {
  font-size: 9px; color: var(--muted);
  font-style: italic; line-height: 1.45;
}

.rest-label {
  font-size: 11px; color: var(--muted2);
  font-style: italic; margin-top: 4px;
}

/* ── CARD ACTIONS ── */
.card-actions {
  margin-top: auto;
  padding-top: 7px;
  border-top: 1px solid rgba(var(--dc-r, 196,134,74), 0.2);
  display: flex; align-items: center; gap: 6px;
}
.day-card.skipped .card-actions { border-top-color: rgba(138,122,154,0.2); }

.check-btn {
  background: none; border: none;
  color: var(--dc, var(--text2));
  font-family: 'DM Serif Text', Georgia, serif;
  font-size: 11px; cursor: pointer;
  text-align: left; padding: 0; flex: 1;
  transition: color 0.15s;
}
.check-btn:hover { color: var(--text); }

.skip-btn {
  background: none; border: none;
  color: var(--muted2);
  font-family: 'DM Serif Text', Georgia, serif;
  font-size: 10px; cursor: pointer;
  padding: 0; font-style: italic;
  transition: color 0.15s; white-space: nowrap;
}
.skip-btn:hover { color: var(--skip-c); }

.done-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--dc, var(--accent));
  flex: 1;
}
.skipped-label {
  font-size: 10px; color: var(--skip-c);
  font-style: italic; flex: 1;
}
.undo-btn {
  background: none; border: none;
  color: var(--muted2);
  font-family: 'DM Serif Text', Georgia, serif;
  font-size: 10px; cursor: pointer;
  padding: 0; font-style: italic;
  transition: color 0.15s;
}
.undo-btn:hover { color: var(--text2); }

.future-label {
  margin-top: auto;
  padding-top: 7px;
  font-size: 10px; color: var(--muted2);
  font-style: italic;
  border-top: 1px solid var(--border);
}

/* ── MOBILE ── */
@media (max-width: 620px) {
  .week-grid {
    grid-template-columns: 1fr;
    gap: 4px;
  }
  .day-card {
    flex-direction: row;
    align-items: center;
    min-height: auto;
    padding: 10px 12px;
    gap: 12px;
    border-top: 1px solid var(--border);
    border-left: 3px solid var(--border);
  }
  .day-card.workout-day {
    border-top-color: var(--border);
    border-left-color: var(--dc, var(--accent));
  }
  .day-card.skipped { border-left-color: var(--skip-c); }
  .day-card.today {
    box-shadow: none;
    outline: 1px solid var(--text2);
  }
  .done-check, .skip-mark { display: none !important; }
  .day-top {
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    margin-bottom: 0;
    min-width: 38px;
    gap: 2px;
  }
  .day-body { margin-top: 0; flex: 1; }
  .muscle-name { font-size: 13px; }
  .muscle-focus { font-size: 9px; }
  .card-actions {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
    padding-left: 10px;
    border-left: 1px solid rgba(var(--dc-r, 196,134,74), 0.25);
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    min-width: 64px;
  }
  .day-card.skipped .card-actions { border-left-color: rgba(138,122,154,0.3); }
  .future-label {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
    white-space: nowrap;
  }
}

/* ── DIVIDER ── */
.divider { border: none; border-top: 1px solid var(--border); margin: 0 0 20px; }

/* ── HISTORY ── */
.section-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 14px; font-weight: 700; font-style: italic;
  display: block; margin-bottom: 10px;
}
.hist-row {
  display: flex; align-items: center; gap: 12px;
  padding: 7px 10px;
  background: var(--surface); border: 1px solid var(--border);
  margin-bottom: 3px;
}
.hist-week {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--text2);
  min-width: 56px;
}
.hist-dots { display: flex; gap: 5px; }
.hist-dot {
  width: 9px; height: 9px;
  border-radius: 50%; flex-shrink: 0;
}
.dot-miss { background: var(--muted2); }
.dot-skip { background: transparent; border: 1.5px solid var(--skip-c); }
.hist-frac {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--muted2);
  margin-left: auto;
}
.hist-frac.perfect { color: var(--accent); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(28,24,20,0.88);
  z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 1px solid var(--bord2);
  border-top: 3px solid var(--accent);
  padding: 20px 24px 18px;
  min-width: 280px; max-width: 360px; width: 100%;
  transform: translateY(8px);
  transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-session {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 20px; font-weight: 700; font-style: italic;
  margin-bottom: 2px;
}
.modal-date {
  font-size: 11px; color: var(--text2);
  margin-bottom: 16px; font-style: italic;
}
.modal-label {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted);
  font-style: italic; margin-bottom: 8px;
}
.dur-presets {
  display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap;
}
.dur-preset {
  background: var(--surf2); border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Space Mono', monospace; font-size: 11px;
  padding: 5px 10px; cursor: pointer;
  transition: all 0.15s;
}
.dur-preset:hover, .dur-preset.active {
  border-color: var(--accent); color: var(--text);
  background: rgba(196,134,74,0.08);
}
.dur-custom-row {
  display: flex; gap: 8px; align-items: center;
  margin-bottom: 14px;
}
.dur-input {
  background: var(--surf2); border: 1px solid var(--border);
  color: var(--text); padding: 5px 8px;
  font-family: 'Space Mono', monospace; font-size: 12px;
  width: 64px; text-align: center;
}
.dur-input:focus { outline: 1px solid var(--accent); }
.dur-unit { font-size: 11px; color: var(--muted); }
.modal-actions { display: flex; gap: 8px; align-items: center; }
.btn-log {
  background: var(--accent); border: none;
  color: #1c1814; padding: 8px 18px;
  font-family: 'DM Serif Text', Georgia, serif;
  font-size: 13px; cursor: pointer;
  transition: opacity 0.15s;
}
.btn-log:hover { opacity: 0.85; }
.btn-cancel {
  background: none; border: 1px solid var(--border);
  color: var(--text2); padding: 8px 14px;
  font-family: 'DM Serif Text', Georgia, serif;
  font-size: 13px; cursor: pointer;
  transition: all 0.15s;
}
.btn-cancel:hover { border-color: var(--text2); color: var(--text); }

/* ── FOOTER ── */
.app-footer {
  border-top: 1px solid var(--border);
  padding: 12px 20px;
  text-align: center; font-size: 11px; color: var(--muted2);
  position: relative; z-index: 1;
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  background: var(--surface); border: 1px solid var(--bord2);
  border-left: 3px solid var(--accent);
  padding: 10px 16px; font-size: 13px; color: var(--text);
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; max-width: 240px;
}
#toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <h1 class="app-title">Workout <span>Plan</span></h1>
    <div class="header-sub" id="header-sub">Push · Pull · Legs</div>
  </div>
  <div class="type-spectrum" aria-hidden="true">
    <span style="background:#e87838"></span>
    <span style="background:#4ec994"></span>
    <span style="background:#7a9de8"></span>
  </div>
</header>

<main class="main">

  <div class="week-nav">
    <button class="nav-btn" id="btn-prev">← Prev</button>
    <span class="week-label" id="week-label"></span>
    <button class="nav-btn" id="btn-next">Next →</button>
  </div>
  <div class="schedule-toggle-row">
    <button class="schedule-toggle-btn" id="btn-schedule-toggle">⚙ adjust schedule</button>
  </div>

  <div class="schedule-panel" id="schedule-panel">
    <div class="schedule-panel-title">Drag sessions to rearrange your week</div>
    <div class="sched-grid" id="sched-grid"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">This Week</div>
      <div class="stat-value" id="stat-week">0/3</div>
      <div class="stat-sub">sessions done</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="stat-streak">0</div>
      <div class="stat-sub">consecutive sessions</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">All Time</div>
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-sub">sessions completed</div>
    </div>
  </div>

  <div class="week-grid" id="week-grid"></div>

  <hr class="divider">
  <div id="history"></div>

</main>

<footer class="app-footer">
  <span id="footer-ver"></span>
</footer>

<div id="toast"></div>

<!-- Duration modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-session" id="modal-session-name"></div>
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-label">Duration</div>
    <div class="dur-presets">
      <button class="dur-preset" data-min="30">30 min</button>
      <button class="dur-preset" data-min="45">45 min</button>
      <button class="dur-preset" data-min="60">60 min</button>
      <button class="dur-preset" data-min="90">90 min</button>
    </div>
    <div class="dur-custom-row">
      <input class="dur-input" id="dur-input" type="number" min="1" max="300" placeholder="—">
      <span class="dur-unit">min</span>
    </div>
    <div class="modal-actions">
      <button class="btn-log" id="btn-log">Log Session</button>
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
    </div>
  </div>
</div>

<script>
const SK = 'workout_plan_v3';
const DEFAULT_SCHEDULE = [1, 3, 5];

const SESSION_TYPES = [
  { name: 'Push', muscles: 'Chest · Shoulders · Triceps · Core',       color: '#e87838', rgb: '232,120,56'  },
  { name: 'Pull', muscles: 'Back · Rear Delts · Biceps · Grip',         color: '#4ec994', rgb: '78,201,148'  },
  { name: 'Legs', muscles: 'Glutes · Hamstrings · Lower Back · Hips',   color: '#7a9de8', rgb: '122,157,232' },
];
const DAY_NAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const DAY_LONG  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

let viewOffset = 0;
let scheduleOpen = false;
let modalState = null; // { iso, session }

// ── Data ────────────────────────────────────────────

function loadData() {
  try {
    const raw = localStorage.getItem(SK);
    if (raw) return JSON.parse(raw);
  } catch {}
  // Migrate from v2 (Set of ISO strings)
  try {
    const old = localStorage.getItem('workout_plan_v2');
    if (old) {
      const entries = {};
      JSON.parse(old).forEach(iso => { entries[iso] = { status: 'done', duration: null }; });
      return { entries, schedule: [...DEFAULT_SCHEDULE] };
    }
  } catch {}
  return { entries: {}, schedule: [...DEFAULT_SCHEDULE] };
}

function saveData(data) {
  localStorage.setItem(SK, JSON.stringify(data));
}

function getSchedule(data) {
  return Array.isArray(data.schedule) && data.schedule.length === 3
    ? data.schedule : [...DEFAULT_SCHEDULE];
}

function getSessionByDow(schedule, dow) {
  const idx = schedule.indexOf(dow);
  return idx >= 0 ? SESSION_TYPES[idx] : null;
}

// ── Date utils ──────────────────────────────────────

function toIso(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
function todayIso() { return toIso(new Date()); }

function getMonday(offset) {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7) + offset * 7);
  return d;
}
function getWeekDays(offset) {
  const mon = getMonday(offset);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(mon); d.setDate(mon.getDate() + i); return d;
  });
}

// ── Stats ────────────────────────────────────────────

function calcStats(data) {
  const schedule = getSchedule(data);
  const today = todayIso();
  const twDays = getWeekDays(0).filter(d => schedule.includes(d.getDay()));
  const twDone = twDays.filter(d => data.entries[toIso(d)]?.status === 'done').length;

  let streak = 0;
  const now = new Date(); now.setHours(0, 0, 0, 0);
  for (let i = 0; i < 730; i++) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    if (!schedule.includes(d.getDay())) continue;
    const iso = toIso(d);
    if (iso > today) continue;
    const entry = data.entries[iso];
    if (iso === today && !entry) continue; // today not logged yet — benefit of doubt
    if (entry?.status === 'done') streak++;
    else break;
  }

  const total = Object.values(data.entries).filter(e => e.status === 'done').length;
  return { twDone, twTotal: twDays.length, streak, total };
}

// ── Render ──────────────────────────────────────────

function render() {
  const data = loadData();
  const schedule = getSchedule(data);
  const today = todayIso();
  const days = getWeekDays(viewOffset);

  document.getElementById('week-label').textContent =
    days[0].toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' – ' +
    days[6].toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  document.getElementById('btn-prev').disabled = viewOffset <= -52;
  document.getElementById('btn-next').disabled = viewOffset >= 0;

  const { twDone, twTotal, streak, total } = calcStats(data);
  document.getElementById('stat-week').textContent   = twDone + '/' + twTotal;
  document.getElementById('stat-streak').textContent = streak;
  document.getElementById('stat-total').textContent  = total;

  document.getElementById('header-sub').textContent =
    'Push · Pull · Legs — ' + schedule.map(d => DAY_NAMES[d]).join(' · ');

  renderSchedulePanel(schedule);
  renderGrid(data, schedule, days, today);
  renderHistory(data, schedule, today);
}

// ── Schedule drag-and-drop ────────────────────────────

const SCHED_DOW_ORDER = [1, 2, 3, 4, 5, 6, 0]; // Mon → Sun

let dragState = null;

function renderSchedulePanel(schedule) {
  const container = document.getElementById('sched-grid');
  container.innerHTML = '';

  SCHED_DOW_ORDER.forEach(dow => {
    const slot = document.createElement('div');
    slot.className = 'sched-slot';
    slot.dataset.dow = dow;

    const lbl = document.createElement('div');
    lbl.className = 'sched-day-lbl';
    lbl.textContent = DAY_NAMES[dow];
    slot.appendChild(lbl);

    const sessIdx = schedule.indexOf(dow);
    if (sessIdx >= 0) {
      const sess = SESSION_TYPES[sessIdx];
      const chip = document.createElement('div');
      chip.className = 'sched-chip';
      chip.dataset.sessIdx = sessIdx;
      chip.style.setProperty('--chip-c',   sess.color);
      chip.style.setProperty('--chip-rgb', sess.rgb);
      chip.textContent = sess.name;
      chip.addEventListener('pointerdown', onChipPointerDown);
      slot.appendChild(chip);
    } else {
      const rest = document.createElement('div');
      rest.className = 'sched-rest';
      rest.textContent = '·';
      slot.appendChild(rest);
    }

    container.appendChild(slot);
  });
}

function onChipPointerDown(e) {
  e.preventDefault();
  const chip = e.currentTarget;
  const slot = chip.closest('.sched-slot');
  if (!slot) return;

  chip.setPointerCapture(e.pointerId);

  const rect = chip.getBoundingClientRect();
  const ghost = chip.cloneNode(true);
  ghost.id = 'sched-ghost';
  ghost.style.width   = rect.width  + 'px';
  ghost.style.left    = rect.left   + 'px';
  ghost.style.top     = rect.top    + 'px';
  document.body.appendChild(ghost);

  chip.classList.add('is-dragging');

  dragState = {
    chip,
    ghost,
    sessIdx:   parseInt(chip.dataset.sessIdx),
    fromDow:   parseInt(slot.dataset.dow),
    offsetX:   e.clientX - rect.left,
    offsetY:   e.clientY - rect.top,
    pointerId: e.pointerId,
  };

  chip.addEventListener('pointermove',   onChipPointerMove);
  chip.addEventListener('pointerup',     onChipPointerUp);
  chip.addEventListener('pointercancel', onChipPointerUp);
}

function slotAtPoint(x, y) {
  const { ghost } = dragState;
  ghost.style.visibility = 'hidden';
  const el = document.elementFromPoint(x, y);
  ghost.style.visibility = '';
  return el?.closest('.sched-slot') || null;
}

function onChipPointerMove(e) {
  if (!dragState) return;
  const { ghost, offsetX, offsetY, fromDow } = dragState;

  ghost.style.left = (e.clientX - offsetX) + 'px';
  ghost.style.top  = (e.clientY - offsetY) + 'px';

  const target = slotAtPoint(e.clientX, e.clientY);
  document.querySelectorAll('.sched-slot.drag-over').forEach(s => s.classList.remove('drag-over'));
  if (target && parseInt(target.dataset.dow) !== fromDow) {
    target.classList.add('drag-over');
  }
}

function onChipPointerUp(e) {
  if (!dragState) return;
  const { chip, ghost, sessIdx, fromDow, pointerId } = dragState;

  const target = slotAtPoint(e.clientX, e.clientY);
  const toDow  = target ? parseInt(target.dataset.dow) : null;

  ghost.remove();
  chip.classList.remove('is-dragging');
  chip.releasePointerCapture(pointerId);
  document.querySelectorAll('.sched-slot.drag-over').forEach(s => s.classList.remove('drag-over'));

  chip.removeEventListener('pointermove',   onChipPointerMove);
  chip.removeEventListener('pointerup',     onChipPointerUp);
  chip.removeEventListener('pointercancel', onChipPointerUp);

  dragState = null;

  if (toDow !== null && toDow !== fromDow) {
    const data = loadData();
    const s = getSchedule(data);
    const conflictIdx = s.indexOf(toDow);
    if (conflictIdx >= 0) s[conflictIdx] = fromDow; // swap
    s[sessIdx] = toDow;
    data.schedule = s;
    saveData(data);
    toast('Schedule updated');
    render();
  }
}

function renderGrid(data, schedule, days, today) {
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';

  for (const d of days) {
    const iso       = toIso(d);
    const dow       = d.getDay();
    const session   = getSessionByDow(schedule, dow);
    const isWorkout = !!session;
    const entry     = data.entries[iso];
    const isDone    = entry?.status === 'done';
    const isSkipped = entry?.status === 'skipped';
    const isFuture  = iso > today;
    const isToday   = iso === today;

    const card = document.createElement('div');
    card.className = [
      'day-card',
      isWorkout  ? 'workout-day' : 'rest-day',
      isDone     ? 'done'        : '',
      isSkipped  ? 'skipped'     : '',
      isToday    ? 'today'       : '',
      isFuture   ? 'future'      : '',
    ].filter(Boolean).join(' ');

    if (isWorkout && session) {
      card.style.setProperty('--dc',   session.color);
      card.style.setProperty('--dc-r', session.rgb);
    }

    if (isWorkout && session) {
      let actionHtml = '';
      if (isFuture) {
        actionHtml = '<div class="future-label">upcoming</div>';
      } else if (isDone) {
        const dur = entry.duration ? entry.duration + ' min' : 'done';
        actionHtml = `<div class="card-actions">
          <span class="done-label">✓ ${dur}</span>
          <button class="undo-btn" data-date="${iso}">undo</button>
        </div>`;
      } else if (isSkipped) {
        actionHtml = `<div class="card-actions">
          <span class="skipped-label">× skipped</span>
          <button class="undo-btn" data-date="${iso}">undo</button>
        </div>`;
      } else {
        actionHtml = `<div class="card-actions">
          <button class="check-btn" data-date="${iso}">Check off</button>
          <button class="skip-btn" data-date="${iso}">skip</button>
        </div>`;
      }

      card.innerHTML = `
        <div class="day-top">
          <span class="day-name">${DAY_NAMES[dow]}</span>
          <span class="done-check">✓</span>
          <span class="skip-mark">×</span>
        </div>
        <div class="day-body">
          <div class="muscle-name">${session.name}</div>
          <div class="muscle-focus">${session.muscles}</div>
        </div>
        ${actionHtml}
      `;

      if (!isFuture) {
        if (isDone || isSkipped) {
          card.querySelector('.undo-btn').addEventListener('click', () => {
            const d2 = loadData();
            delete d2.entries[iso];
            saveData(d2);
            toast('Entry removed');
            render();
          });
        } else {
          card.querySelector('.check-btn').addEventListener('click', () => openModal(iso, session));
          card.querySelector('.skip-btn').addEventListener('click', () => {
            const d2 = loadData();
            d2.entries[iso] = { status: 'skipped' };
            saveData(d2);
            toast('Workout skipped');
            render();
          });
        }
      }
    } else {
      card.innerHTML = `
        <div class="day-top">
          <span class="day-name">${DAY_NAMES[dow]}</span>
        </div>
        <div class="day-body">
          <div class="rest-label">Rest</div>
        </div>
      `;
    }

    grid.appendChild(card);
  }
}

function renderHistory(data, schedule, today) {
  const el = document.getElementById('history');
  el.innerHTML = '';
  const rows = [];

  for (let w = -1; w >= -52; w--) {
    const wdays = getWeekDays(w);
    const pastWo = wdays.filter(d => schedule.includes(d.getDay()) && toIso(d) <= today);
    if (!pastWo.length) continue;
    const done    = pastWo.filter(d => data.entries[toIso(d)]?.status === 'done').length;
    const total   = pastWo.length;
    rows.push({ mon: wdays[0], days: pastWo, done, total });
    if (rows.length >= 10) break;
  }

  if (!rows.length) return;

  const title = document.createElement('div');
  title.innerHTML = '<span class="section-title">Previous Weeks</span>';
  el.appendChild(title);

  for (const { mon, days: wdays, done, total } of rows) {
    const div = document.createElement('div');
    div.className = 'hist-row';
    const dotsHtml = wdays.map(d => {
      const iso   = toIso(d);
      const entry = data.entries[iso];
      const sess  = getSessionByDow(schedule, d.getDay());
      if (entry?.status === 'done') {
        return `<span class="hist-dot" style="background:${sess?.color || '#c4864a'}"></span>`;
      } else if (entry?.status === 'skipped') {
        return `<span class="hist-dot dot-skip"></span>`;
      }
      return `<span class="hist-dot dot-miss"></span>`;
    }).join('');
    div.innerHTML = `
      <span class="hist-week">${mon.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>
      <div class="hist-dots">${dotsHtml}</div>
      <span class="hist-frac${done === total ? ' perfect' : ''}">${done}/${total}</span>
    `;
    el.appendChild(div);
  }
}

// ── Modal ────────────────────────────────────────────

function openModal(iso, session) {
  modalState = { iso, session };
  const modal = document.getElementById('modal');
  modal.style.borderTopColor = session.color;

  const nameEl = document.getElementById('modal-session-name');
  nameEl.textContent = session.name + ' Session';
  nameEl.style.color = session.color;

  const d = new Date(iso + 'T00:00:00');
  document.getElementById('modal-date').textContent =
    d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  document.getElementById('dur-input').value = '';
  document.querySelectorAll('.dur-preset').forEach(b => b.classList.remove('active'));

  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('dur-input').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalState = null;
}

function logSession(duration) {
  if (!modalState) return;
  const data = loadData();
  data.entries[modalState.iso] = { status: 'done', duration: duration || null };
  saveData(data);
  closeModal();
  toast(duration ? `Logged — ${duration} min` : 'Session logged!');
  render();
}

document.querySelectorAll('.dur-preset').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dur-preset').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('dur-input').value = btn.dataset.min;
  });
});

document.getElementById('dur-input').addEventListener('input', () => {
  document.querySelectorAll('.dur-preset').forEach(b => b.classList.remove('active'));
});

document.getElementById('btn-log').addEventListener('click', () => {
  const raw = parseInt(document.getElementById('dur-input').value);
  logSession(raw > 0 && raw <= 300 ? raw : null);
});

document.getElementById('btn-cancel').addEventListener('click', closeModal);

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── Schedule toggle ──────────────────────────────────

document.getElementById('btn-schedule-toggle').addEventListener('click', () => {
  scheduleOpen = !scheduleOpen;
  document.getElementById('schedule-panel').classList.toggle('open', scheduleOpen);
  document.getElementById('btn-schedule-toggle').textContent =
    scheduleOpen ? '⊗ close schedule' : '⚙ adjust schedule';
});

// ── Nav ──────────────────────────────────────────────

document.getElementById('btn-prev').addEventListener('click', () => { viewOffset--; render(); });
document.getElementById('btn-next').addEventListener('click', () => { viewOffset++; render(); });

// ── Toast ─────────────────────────────────────────────

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

fetch('../version.json').then(r => r.json()).then(v => {
  document.getElementById('footer-ver').textContent = 'v' + v.version;
}).catch(() => {});

render();
</script>
