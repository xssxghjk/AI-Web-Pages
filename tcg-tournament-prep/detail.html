<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prep – FaB Tournament Prep</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05080f;
      --surface: #0c1120;
      --surface2: #111827;
      --border: #1e2d45;
      --border2: #243348;
      --accent: #f97316;
      --accent-bg: rgba(249,115,22,0.08);
      --accent-border: rgba(249,115,22,0.28);
      --text: #e2e8f0;
      --muted: #64748b;
      --muted2: #8898aa;
      --t1: #0ea5e9;
      --t1-bg: rgba(14,165,233,0.08);
      --t1-border: rgba(14,165,233,0.25);
      --t2: #22c55e;
      --t2-bg: rgba(34,197,94,0.08);
      --t2-border: rgba(34,197,94,0.25);
      --t3: #f59e0b;
      --t3-bg: rgba(245,158,11,0.08);
      --t3-border: rgba(245,158,11,0.25);
      --t4: #a855f7;
      --t4-bg: rgba(168,85,247,0.08);
      --t4-border: rgba(168,85,247,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5,8,15,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-back {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .nav-back:hover { color: var(--text); }
    .nav-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-sep { color: var(--border2); }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 2.5rem 1.5rem 2rem;
      background: linear-gradient(180deg, rgba(249,115,22,0.05) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    .page-header-inner {
      max-width: 860px;
      margin: 0 auto;
    }
    .prep-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.7rem;
    }
    .tier-badge {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      border: 1px solid;
    }
    .tier-badge.t1 { color: var(--t1); background: var(--t1-bg); border-color: var(--t1-border); }
    .tier-badge.t2 { color: var(--t2); background: var(--t2-bg); border-color: var(--t2-border); }
    .tier-badge.t3 { color: var(--t3); background: var(--t3-bg); border-color: var(--t3-border); }
    .tier-badge.t4 { color: var(--t4); background: var(--t4-bg); border-color: var(--t4-border); }
    .format-chip {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      color: var(--accent);
    }

    .prep-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }
    .prep-date {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── MAIN ── */
    .main {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1.25rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── FORMAT CARD ── */
    .format-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      border-left-width: 3px;
      border-left-color: var(--accent);
    }

    .format-card-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .format-name {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }
    .format-abbr-badge {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.18rem 0.6rem;
      border-radius: 999px;
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      color: var(--accent);
    }

    /* ── SECTIONS ── */
    .prep-section {
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .prep-section:last-child { border-bottom: none; }

    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.65rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Hero pick */
    .hero-pick-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
    }
    .hero-name {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text);
    }
    .hero-reasons {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .hero-reasons li {
      font-size: 0.875rem;
      color: var(--muted2);
      line-height: 1.5;
      padding-left: 1.1rem;
      position: relative;
    }
    .hero-reasons li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--muted);
    }

    /* Meta table */
    .meta-table {
      width: 100%;
      border-collapse: collapse;
    }
    .meta-table th {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 0.35rem 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .meta-table td {
      font-size: 0.865rem;
      color: var(--muted2);
      padding: 0.45rem 0.6rem;
      border-bottom: 1px solid var(--border);
      line-height: 1.45;
    }
    .meta-table tr:last-child td { border-bottom: none; }
    .meta-table td:nth-child(2) {
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }
    .meta-table td:nth-child(1) {
      font-weight: 600;
      color: var(--text);
    }

    /* ── DATE COLLAPSIBLE ── */
    .date-entry {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 0.6rem;
    }
    .date-entry:last-child { margin-bottom: 0; }

    .date-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--surface2);
      border: none;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      padding: 0.65rem 1rem;
      transition: background 0.15s;
    }
    .date-btn:hover { background: rgba(249,115,22,0.06); }
    .date-label {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .date-chevron {
      margin-left: auto;
      font-size: 1.1rem;
      color: var(--muted);
      transition: transform 0.25s;
      display: inline-block;
    }
    .date-btn[aria-expanded="true"] .date-chevron { transform: rotate(90deg); }
    .date-content {
      display: none;
      padding: 0.9rem 1rem;
      border-top: 1px solid var(--border);
    }
    .date-content.open { display: block; }

    /* Note sections within a date */
    .note-section { margin-bottom: 0.75rem; }
    .note-section:last-child { margin-bottom: 0; }
    .note-section-heading {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    /* Bullet list (for headed sections like CC) */
    .note-bullets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .note-bullets li {
      font-size: 0.875rem;
      color: var(--muted2);
      line-height: 1.55;
      padding-left: 1.1rem;
      position: relative;
    }
    .note-bullets li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--muted);
    }

    /* Paragraphs (for unheaded sections like Sage) */
    .note-paragraphs {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }
    .note-para {
      font-size: 0.875rem;
      color: var(--muted2);
      line-height: 1.65;
    }

    /* not found */
    .not-found {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--muted);
    }
    .not-found h2 { font-size: 1.4rem; margin-bottom: 0.75rem; color: var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .prep-title { font-size: 1.4rem; }
      .prep-section { padding: 0.9rem 1.1rem; }
      .page-header { padding: 1.75rem 1rem 1.5rem; }
      .format-card-header { padding: 0.9rem 1.1rem; }
      .date-content { padding: 0.75rem 0.9rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-back" href="./">← All Preps</a>
    <span class="nav-sep">|</span>
    <span class="nav-title" id="nav-title">Tournament Prep</span>
  </nav>

  <div id="page-content"></div>

  <script src="preps.js"></script>
  <script>
  (function () {

    const TIER_INFO = {
      RTN:          { tier: 1, label: 'Tier 1 · RTN' },
      PQ:           { tier: 1, label: 'Tier 1 · PQ' },
      Battleground: { tier: 2, label: 'Tier 2 · Battleground' },
      Showdown:     { tier: 2, label: 'Tier 2 · Showdown' },
      Calling:      { tier: 3, label: 'Tier 3 · Calling' },
      Worlds:       { tier: 4, label: 'Tier 4 · Worlds' },
      PT:           { tier: 4, label: 'Tier 4 · Pro Tour' },
    };

    function getTierLabel(eventType) {
      return (TIER_INFO[eventType] || { label: 'Tier ? · ' + eventType }).label;
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* ── RENDER NOTES ── */
    function renderDateEntry(dateGroup, index) {
      const sectionsHtml = dateGroup.sections.map(sec => {
        if (sec.heading) {
          return `
            <div class="note-section">
              <div class="note-section-heading">${esc(sec.heading)}</div>
              <ul class="note-bullets">
                ${sec.entries.map(e => `<li>${esc(e)}</li>`).join('')}
              </ul>
            </div>`;
        } else {
          return `
            <div class="note-section">
              <div class="note-paragraphs">
                ${sec.entries.map(e => `<p class="note-para">${esc(e)}</p>`).join('')}
              </div>
            </div>`;
        }
      }).join('');

      const entryId = `date-content-${index}`;
      return `
        <div class="date-entry">
          <button class="date-btn" aria-expanded="true" data-target="${entryId}">
            <span class="date-label">${esc(dateGroup.date)}</span>
            <span class="date-chevron">›</span>
          </button>
          <div class="date-content open" id="${entryId}">
            ${sectionsHtml}
          </div>
        </div>`;
    }

    /* ── RENDER FORMAT CARD ── */
    function renderFormat(fmt, fmtIndex) {
      const heroReasonsHtml = fmt.heroReasons.map(r => `<li>${esc(r)}</li>`).join('');

      const metaHtml = fmt.predictedMeta.length
        ? `<div class="prep-section">
             <div class="section-label">Predicted Meta</div>
             <table class="meta-table">
               <thead>
                 <tr>
                   <th>Hero / Archetype</th>
                   <th>Share</th>
                   <th>Note</th>
                 </tr>
               </thead>
               <tbody>
                 ${fmt.predictedMeta.map(m => `
                   <tr>
                     <td>${esc(m.matchup)}</td>
                     <td>${esc(m.share)}</td>
                     <td>${esc(m.note)}</td>
                   </tr>`).join('')}
               </tbody>
             </table>
           </div>`
        : '';

      const notesHtml = fmt.notes.length
        ? `<div class="prep-section">
             <div class="section-label">Prep Notes</div>
             ${fmt.notes.map((d, i) => renderDateEntry(d, fmtIndex * 100 + i)).join('')}
           </div>`
        : '';

      return `
        <div class="format-card">
          <div class="format-card-header">
            <span class="format-abbr-badge">${esc(fmt.abbr)}</span>
            <span class="format-name">${esc(fmt.name)}</span>
          </div>

          <div class="prep-section">
            <div class="section-label">Hero Pick</div>
            <div class="hero-pick-row">
              <span class="hero-name">${esc(fmt.hero)}</span>
            </div>
            <ul class="hero-reasons">${heroReasonsHtml}</ul>
          </div>

          ${metaHtml}
          ${notesHtml}
        </div>`;
    }

    /* ── RENDER DETAIL ── */
    function renderDetail(p) {
      const tierLabel = getTierLabel(p.eventType);
      const tierClass = `t${p.tier}`;
      const formatChipsHtml = p.formats.map(f =>
        `<span class="format-chip">${esc(f.abbr)} · ${esc(f.hero)}</span>`
      ).join('');
      const formatsHtml = p.formats.map((f, i) => renderFormat(f, i)).join('');

      return `
        <header class="page-header">
          <div class="page-header-inner">
            <div class="prep-meta">
              <span class="tier-badge ${tierClass}">${esc(tierLabel)}</span>
              ${formatChipsHtml}
            </div>
            <h1 class="prep-title">${esc(p.event)}</h1>
            <div class="prep-date">${esc(p.displayDate)}</div>
          </div>
        </header>

        <main class="main">
          ${formatsHtml}
        </main>`;
    }

    /* ── COLLAPSIBLES ── */
    function initCollapsibles() {
      document.querySelectorAll('.date-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const expanded = btn.getAttribute('aria-expanded') === 'true';
          btn.setAttribute('aria-expanded', String(!expanded));
          const target = document.getElementById(btn.dataset.target);
          if (target) target.classList.toggle('open', !expanded);
        });
      });
    }

    /* ── INIT ── */
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const prep = PREPS.find(p => p.id === id);
    const container = document.getElementById('page-content');

    if (!prep) {
      container.innerHTML = `
        <div class="not-found">
          <h2>Prep not found</h2>
          <p>The prep entry <strong>${esc(id || '')}</strong> doesn't exist.</p>
          <p style="margin-top:1rem"><a href="./" style="color:var(--accent)">← Back to all preps</a></p>
        </div>`;
    } else {
      document.title = `${prep.event} Prep – FaB Tournament Prep`;
      document.getElementById('nav-title').textContent = prep.event;
      container.innerHTML = renderDetail(prep);
      initCollapsibles();
    }

  })();
  </script>

</body>
</html>
