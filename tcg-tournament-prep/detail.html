<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prep – FaB Tournament Prep</title>
  <script src="../nav.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Serif+Text:ital@0;1&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1c1814;
      --surface: #252018;
      --surface2: #2e271d;
      --border: #3a3025;
      --border2: #4a3e2e;
      --accent: #e8314a;
      --accent-bg: rgba(232,49,74,0.08);
      --accent-border: rgba(232,49,74,0.25);
      --accent-dim: rgba(232,49,74,0.10);
      --text: #e8dfd0;
      --muted: #9a8a76;
      --muted2: #b5a48e;
      --muted-2: #5a4e40;
      --t1: #e8314a;
      --t1-bg: rgba(232,49,74,0.08);
      --t1-border: rgba(232,49,74,0.22);
      --t2: #d4924a;
      --t2-bg: rgba(212,146,74,0.08);
      --t2-border: rgba(212,146,74,0.22);
      --t3: #5ab4cc;
      --t3-bg: rgba(90,180,204,0.08);
      --t3-border: rgba(90,180,204,0.22);
      --t4: #a07ae8;
      --t4-bg: rgba(160,122,232,0.08);
      --t4-border: rgba(160,122,232,0.22);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Serif Text', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 4px 4px, 6px 6px;
      background-position: 0 0, 2px 2px;
    }

    #page-content, footer {
      position: relative;
      z-index: 1;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 2rem 1.5rem 1.5rem;
      border-bottom: 2px solid var(--text);
      position: relative;
      z-index: 1;
    }
    .page-header-inner {
      max-width: 1000px;
      margin: 0 auto;
    }
    .prep-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }
    .tier-badge {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.65rem;
      font-style: italic;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.18rem 0.55rem;
      border-radius: 2px;
      border: 1px solid;
    }
    .tier-badge.t1 { color: var(--t1); background: var(--t1-bg); border-color: var(--t1-border); }
    .tier-badge.t2 { color: var(--t2); background: var(--t2-bg); border-color: var(--t2-border); }
    .tier-badge.t3 { color: var(--t3); background: var(--t3-bg); border-color: var(--t3-border); }
    .tier-badge.t4 { color: var(--t4); background: var(--t4-bg); border-color: var(--t4-border); }
    .format-chip {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.65rem;
      font-style: italic;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.18rem 0.55rem;
      border-radius: 2px;
      background: var(--t3-bg);
      border: 1px solid var(--t3-border);
      color: var(--t3);
    }

    .prep-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.8rem, 4vw, 3.5rem);
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .prep-date {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--muted2);
    }
    .header-links {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.85rem;
    }
    .header-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.75rem;
      font-style: italic;
      padding: 0.3rem 0.8rem;
      border-radius: 2px;
      border: 1px solid var(--border2);
      color: var(--muted2);
      background: transparent;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .header-link-btn:hover { border-color: var(--muted2); color: var(--text); }

    /* ── MAIN ── */
    .main {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── FORMAT CARD ── */
    .format-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      border-left: 2px solid var(--accent);
    }

    .format-card-header {
      padding: 0.9rem 1.4rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface2);
    }
    .format-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .format-abbr-badge {
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      color: var(--accent);
    }

    /* ── SECTIONS ── */
    .prep-section {
      padding: 1rem 1.4rem;
      border-bottom: 1px solid var(--border);
    }
    .prep-section:last-child { border-bottom: none; }

    .section-label {
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border2);
    }

    /* Hero pick */
    .hero-pick-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.65rem;
    }
    .hero-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }
    .hero-reasons {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .hero-reasons li {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.85rem;
      color: var(--muted2);
      line-height: 1.6;
      padding-left: 1.2rem;
      position: relative;
    }
    .hero-reasons li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--muted);
    }

    /* Meta table */
    .meta-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'DM Serif Text', Georgia, serif;
    }
    .meta-table th {
      font-size: 0.65rem;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 0.35rem 0.65rem;
      border-bottom: 1px solid var(--border2);
      background: var(--surface2);
    }
    .meta-table td {
      font-size: 0.85rem;
      color: var(--muted2);
      padding: 0.45rem 0.65rem;
      border-bottom: 1px solid var(--border);
      line-height: 1.45;
    }
    .meta-table tr:last-child td { border-bottom: none; }
    .meta-table td:nth-child(2) {
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }
    .meta-table td:nth-child(1) {
      font-weight: 600;
      color: var(--text);
    }

    /* ── DATE COLLAPSIBLE ── */
    .date-entry {
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .date-entry:last-child { margin-bottom: 0; }

    .date-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--surface2);
      border: none;
      color: var(--text);
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.85rem;
      font-weight: 400;
      cursor: pointer;
      text-align: left;
      padding: 0.6rem 0.9rem;
      transition: background 0.15s;
    }
    .date-btn:hover { background: rgba(232,49,74,0.05); }
    .date-label {
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .date-chevron {
      margin-left: auto;
      font-size: 1rem;
      color: var(--muted);
      transition: transform 0.25s;
      display: inline-block;
    }
    .date-btn[aria-expanded="true"] .date-chevron { transform: rotate(90deg); }
    .date-content {
      display: none;
      padding: 0.85rem 0.9rem;
      border-top: 1px solid var(--border);
    }
    .date-content.open { display: block; }

    /* Note sections within a date */
    .note-section { margin-bottom: 0.75rem; }
    .note-section:last-child { margin-bottom: 0; }
    .note-section-heading {
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    /* Bullet list (for headed sections like CC) */
    .note-bullets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .note-bullets li {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.85rem;
      color: var(--muted2);
      line-height: 1.6;
      padding-left: 1.2rem;
      position: relative;
    }
    .note-bullets li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--muted);
    }

    /* Paragraphs (for unheaded sections like Sage) */
    .note-paragraphs {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .note-para {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.85rem;
      color: var(--muted2);
      line-height: 1.65;
    }

    /* not found */
    .not-found {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--muted);
      font-family: 'DM Serif Text', Georgia, serif;
    }
    .not-found h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1.4rem;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    /* ── TABS ── */
    .format-tabs {
      display: flex;
      gap: 0.35rem;
      padding: 0 0 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.25rem;
    }
    .tab-btn {
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--muted2);
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      padding: 0.4rem 1rem;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .tab-btn:hover { border-color: var(--muted2); color: var(--text); }
    .tab-btn.active {
      background: var(--accent-bg);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    /* ── SUMMARY ── */
    .summary-card {
      background: rgba(232,49,74,0.04);
      border: 1px solid var(--accent-border);
      border-radius: 2px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.15rem;
    }
    .summary-label {
      font-family: 'DM Serif Text', Georgia, serif;
      font-style: italic;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .summary-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--accent-border);
    }
    .summary-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .summary-list li {
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.85rem;
      color: var(--muted2);
      line-height: 1.6;
      padding-left: 1.2rem;
      position: relative;
    }
    .summary-list li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .prep-title { font-size: 1.4rem; }
      .prep-section { padding: 0.85rem 1rem; }
      .page-header { padding: 1.75rem 1.25rem 1.5rem; }
      .format-card-header { padding: 0.85rem 1rem; }
      .date-content { padding: 0.7rem 0.85rem; }
    }

    /* ── FOOTER ── */
    footer {
      padding: 1.5rem 2rem;
      font-family: 'DM Serif Text', Georgia, serif;
      font-size: 0.72rem;
      color: var(--muted-2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <div id="page-content"></div>

  <footer>
    <span id="page-version" style="opacity:0.65"></span>
    <a href="https://github.com/xssxghjk/AI-Web-Pages" target="_blank" rel="noopener">View on GitHub</a>
  </footer>
  <script>fetch('../version.json').then(r=>r.json()).then(v=>{var e=document.getElementById('page-version');if(e)e.textContent='v'+v.version}).catch(()=>{});</script>

  <script src="preps.js"></script>
  <script>
  (function () {

    const TIER_INFO = {
      RTN:          { tier: 1, label: 'Tier 1 · RTN' },
      PQ:           { tier: 1, label: 'Tier 1 · PQ' },
      Battleground: { tier: 2, label: 'Tier 2 · Battleground' },
      Showdown:     { tier: 2, label: 'Tier 2 · Showdown' },
      Calling:      { tier: 3, label: 'Tier 3 · Calling' },
      Worlds:       { tier: 4, label: 'Tier 4 · Worlds' },
      PT:           { tier: 4, label: 'Tier 4 · Pro Tour' },
    };

    function getTierLabel(eventType) {
      return (TIER_INFO[eventType] || { label: 'Tier ? · ' + eventType }).label;
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* ── RENDER NOTES ── */
    function renderDateEntry(dateGroup, index) {
      const sectionsHtml = dateGroup.sections.map(sec => {
        if (sec.heading) {
          return `
            <div class="note-section">
              <div class="note-section-heading">${esc(sec.heading)}</div>
              <ul class="note-bullets">
                ${sec.entries.map(e => `<li>${esc(e)}</li>`).join('')}
              </ul>
            </div>`;
        } else {
          return `
            <div class="note-section">
              <div class="note-paragraphs">
                ${sec.entries.map(e => `<p class="note-para">${esc(e)}</p>`).join('')}
              </div>
            </div>`;
        }
      }).join('');

      const entryId = `date-content-${index}`;
      return `
        <div class="date-entry">
          <button class="date-btn" aria-expanded="true" data-target="${entryId}">
            <span class="date-label">${esc(dateGroup.date)}</span>
            <span class="date-chevron">›</span>
          </button>
          <div class="date-content open" id="${entryId}">
            ${sectionsHtml}
          </div>
        </div>`;
    }

    /* ── RENDER FORMAT CARD ── */
    function renderFormat(fmt, fmtIndex) {
      const heroReasonsHtml = fmt.heroReasons.map(r => `<li>${esc(r)}</li>`).join('');

      const summaryHtml = fmt.summary && fmt.summary.length
        ? `<div class="summary-card">
             <div class="summary-label">Summary</div>
             <ul class="summary-list">
               ${fmt.summary.map(s => `<li>${esc(s)}</li>`).join('')}
             </ul>
           </div>`
        : '';

      const metaHtml = fmt.predictedMeta.length
        ? `<div class="prep-section">
             <div class="section-label">Predicted Meta</div>
             <table class="meta-table">
               <thead>
                 <tr>
                   <th>Hero / Archetype</th>
                   <th>Share</th>
                   <th>Note</th>
                 </tr>
               </thead>
               <tbody>
                 ${fmt.predictedMeta.map(m => `
                   <tr>
                     <td>${esc(m.matchup)}</td>
                     <td>${esc(m.share)}</td>
                     <td>${esc(m.note)}</td>
                   </tr>`).join('')}
               </tbody>
             </table>
           </div>`
        : '';

      const notesHtml = fmt.notes.length
        ? `<div class="prep-section">
             <div class="section-label">Prep Notes</div>
             ${fmt.notes.map((d, i) => renderDateEntry(d, fmtIndex * 100 + i)).join('')}
           </div>`
        : '';

      return `
        <div class="format-card" data-format-id="${esc(fmt.id)}">
          <div class="format-card-header">
            <span class="format-abbr-badge">${esc(fmt.abbr)}</span>
            <span class="format-name">${esc(fmt.name)}</span>
          </div>

          ${summaryHtml ? `<div class="prep-section">${summaryHtml}</div>` : ''}

          <div class="prep-section">
            <div class="section-label">Hero Pick</div>
            <div class="hero-pick-row">
              <span class="hero-name">${esc(fmt.hero)}</span>
            </div>
            <ul class="hero-reasons">${heroReasonsHtml}</ul>
          </div>

          ${metaHtml}
          ${notesHtml}
        </div>`;
    }

    /* ── RENDER DETAIL ── */
    function renderDetail(p) {
      const tierLabel = getTierLabel(p.eventType);
      const tierClass = `t${p.tier}`;
      const formatChipsHtml = p.formats.map(f =>
        `<span class="format-chip">${esc(f.abbr)} · ${esc(f.hero)}</span>`
      ).join('');

      const reportLinkHtml = p.reportId
        ? `<div class="header-links">
             <a class="header-link-btn" href="../tcg-tournament-reports/detail.html?id=${encodeURIComponent(p.reportId)}">
               <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="2" y="1" width="8" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M4 4h4M4 6.5h4M4 9h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
               Tournament Report
             </a>
           </div>`
        : '';

      const tabsHtml = p.formats.length > 1
        ? `<div class="format-tabs">
             ${p.formats.map((f, i) =>
               `<button class="tab-btn${i === 0 ? ' active' : ''}" data-tab="${esc(f.id)}">${esc(f.name)}</button>`
             ).join('')}
           </div>`
        : '';

      const formatsHtml = p.formats.map((f, i) =>
        `<div class="format-tab-panel" data-panel="${esc(f.id)}"${i !== 0 ? ' style="display:none"' : ''}>
           ${renderFormat(f, i)}
         </div>`
      ).join('');

      return `
        <header class="page-header">
          <div class="page-header-inner">
            <div class="prep-meta">
              <span class="tier-badge ${tierClass}">${esc(tierLabel)}</span>
              ${formatChipsHtml}
            </div>
            <h1 class="prep-title">${esc(p.event)}</h1>
            <div class="prep-date">${esc(p.displayDate)}</div>
            ${reportLinkHtml}
          </div>
        </header>

        <main class="main">
          ${tabsHtml}
          ${formatsHtml}
        </main>`;
    }

    /* ── COLLAPSIBLES ── */
    function initCollapsibles() {
      document.querySelectorAll('.date-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const expanded = btn.getAttribute('aria-expanded') === 'true';
          btn.setAttribute('aria-expanded', String(!expanded));
          const target = document.getElementById(btn.dataset.target);
          if (target) target.classList.toggle('open', !expanded);
        });
      });
    }

    /* ── TABS ── */
    function initTabs() {
      const tabBtns = document.querySelectorAll('.tab-btn');
      if (!tabBtns.length) return;
      tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const tabId = btn.dataset.tab;
          tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
          document.querySelectorAll('.format-tab-panel').forEach(panel => {
            panel.style.display = panel.dataset.panel === tabId ? '' : 'none';
          });
        });
      });
    }

    /* ── INIT ── */
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const prep = PREPS.find(p => p.id === id);
    const container = document.getElementById('page-content');

    if (!prep) {
      container.innerHTML = `
        <div class="not-found">
          <h2>Prep not found</h2>
          <p>The prep entry <strong>${esc(id || '')}</strong> doesn't exist.</p>
          <p style="margin-top:1rem"><a href="./" style="color:var(--accent)">← Back to all preps</a></p>
        </div>`;
    } else {
      document.title = `${prep.event} Prep – FaB Tournament Prep`;
      container.innerHTML = renderDetail(prep);
      initCollapsibles();
      initTabs();
    }

  })();
  </script>

</body>
</html>
